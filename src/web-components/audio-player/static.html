<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Player — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <audio-player>.

    Upgrade relationship:
    - Without JS: The native <audio controls> element provides full playback
      functionality — play/pause, seeking, volume, and time display are all
      handled by the browser's built-in controls. The track list links are
      plain anchors so users can download or navigate to individual tracks.
    - With JS: <audio-player> hides native controls and renders a custom
      shadow DOM player with styled play/pause, seek timeline, volume slider,
      mute toggle, track title display, and keyboard shortcuts (Space, arrows,
      M to mute). It also handles playlist navigation, shuffle, and loop.

    The static form is fully functional for single-track playback. Playlist
    links remain accessible as download/navigation anchors.
  -->

  <main>
    <h1>Audio Player</h1>

    <h2>Single Track</h2>
    <audio controls>
      <source src="track.mp3" type="audio/mpeg">
      <p>Your browser does not support the audio element.
        <a href="track.mp3" download>Download the track</a>.</p>
    </audio>

    <h2>Playlist</h2>
    <audio controls>
      <source src="tracks/01-opening.mp3" type="audio/mpeg">
      <p>Your browser does not support the audio element.
        <a href="tracks/01-opening.mp3" download>Download the track</a>.</p>
    </audio>
    <details>
      <summary>Track Listing</summary>
      <ol>
        <li>
          <a href="tracks/01-opening.mp3">01. Opening</a>
          <span><time datetime="PT2M14S">2:14</time></span>
        </li>
        <li>
          <a href="tracks/02-verse.mp3">02. Verse</a>
          <span><time datetime="PT3M45S">3:45</time></span>
        </li>
        <li>
          <a href="tracks/03-chorus.mp3">03. Chorus</a>
          <span><time datetime="PT4M02S">4:02</time></span>
        </li>
      </ol>
    </details>
  </main>
</body>
</html>
