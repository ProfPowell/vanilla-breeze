<!--
  ai-chat — pre-upgrade fallback
  Without JS, the chat shell is empty. Authors should provide their own
  fallback content (a contact link, "open Claude" button, etc.) via the
  fallback-url attribute, which the upgraded component honours.
-->
<ai-chat
    fallback-url="https://claude.ai/new?q={prompt}"
    fallback-label="Ask Claude"
    placeholder="Ask anything…">
  <template data-role="starters">
    What can you help me with?
    Summarize the page above.
  </template>
</ai-chat>
