<!--
  ai-chat — pre-upgrade fallback
  Without JS, the user sees nothing useful (Chrome built-in AI is JS-only).
  Authors who want a meaningful no-JS path should pair ai-chat with a normal
  contact link or form alongside it.
-->
<ai-chat
    fallback-url="https://claude.ai/new?q={prompt}"
    fallback-label="Ask Claude"
    placeholder="Ask anything…">
  <template data-role="starters">
    What can you help me with?
    Summarize the page above.
  </template>
</ai-chat>
