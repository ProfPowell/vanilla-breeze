<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bread-crumb — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <bread-crumb>.

    Upgrade relationship:
    - Without JS: the <ol><li> structure renders as plain inline links.
      VB applies breadcrumb separator + token-driven styling via the
      bread-crumb element selector (no class needed). The trail is
      navigable and announceable.
    - With JS: <bread-crumb> applies role="navigation" and
      aria-label="Breadcrumb" if absent, ensures aria-current="page" is
      on the last crumb, and emits a BreadcrumbList JSON-LD <script>
      child for SEO.
    - Auto mode (data-from-pathname): the component builds the trail
      from window.location.pathname; segment labels come from the
      .labels property (e.g. .labels = { '/docs/': 'Documentation' }),
      data-current-label, or Title-Cased slug fallback.
  -->

  <bread-crumb>
    <ol>
      <li><a href="/docs/">Docs</a></li>
      <li><a href="/docs/elements/">Elements</a></li>
      <li><span aria-current="page">Bread Crumb</span></li>
    </ol>
  </bread-crumb>
</body>
</html>
