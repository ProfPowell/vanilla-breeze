<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Context-Menu — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <context-menu>.

    Upgrade relationship:
    - Without JS: The browser's native right-click context menu is the
      only context menu available. No custom markup is needed because
      the native menu is always present. Any actions that would appear
      in a custom context menu should be available through other UI
      paths — toolbar buttons, keyboard shortcuts, or inline controls.
      This page demonstrates that pattern: the same actions are
      accessible through visible buttons and standard keyboard shortcuts.
    - With JS: <context-menu> intercepts the contextmenu event on its
      trigger area, prevents the native menu, and shows a custom menu
      positioned at the cursor. It adds role="menu"/role="menuitem"
      ARIA semantics, arrow-key navigation, shortcut badge display
      (via data-shortcut), real keyboard shortcut bindings (via
      bindHotkey), Popover API top-layer positioning, and Escape/
      click-outside dismissal.

    The static form relies on the browser's built-in context menu and
    makes all custom actions available through visible inline controls.
    The component layers a richer, branded right-click experience on top.
  -->

  <main>
    <h1>Context-Menu Examples</h1>

    <!--
      Without JS, right-clicking shows the browser's native context menu.
      Custom actions are provided through visible controls instead.
    -->
    <h2>Text Editor Area</h2>
    <div>
      <p>Right-click in this area to use the browser's native context menu
         (cut, copy, paste). The actions below are also available as buttons:</p>
      <textarea rows="5" cols="40">Select this text and use the controls below.</textarea>
    </div>

    <!-- Actions that would be in the custom context menu, provided as visible controls -->
    <nav aria-label="Edit actions">
      <ul>
        <li><button type="button">Cut</button> <kbd>Ctrl+X</kbd></li>
        <li><button type="button">Copy</button> <kbd>Ctrl+C</kbd></li>
        <li><button type="button">Paste</button> <kbd>Ctrl+V</kbd></li>
        <li><button type="button">Delete</button></li>
      </ul>
    </nav>
  </main>
</body>
</html>
