<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iron Triangle (static fallback)</title>
  <link rel="stylesheet" href="/src/main.css">
</head>
<body>
  <!--
    Triangle-as-UI: the component IS the surface. Three vertex
    targets (Scope / Time / Cost) open native <dialog> editors on
    click; the center "Quality" target fires
    `iron-triangle:open-quality` and falls back to navigating
    `data-quality-href`. Hover any target for a tooltip.

    Pre-upgrade fallback: the component renders no UI without JS —
    the meaningful interaction is dialog-driven and JS-only. For a
    no-JS path, expose a server-rendered form on the same page and
    flip with a feature flag. UUCD pre-fills `data-quality-summary`
    so hover on the center previews the saved compass picks.
  -->
  <iron-triangle name="triangle"
                 data-focus-factor="0.6"
                 data-quality-href="/requirements"
                 data-quality-summary="3 critical: perf, sec, a11y"></iron-triangle>
</body>
</html>
