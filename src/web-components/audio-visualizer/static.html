<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Visualizer — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <audio-visualizer>.

    Upgrade relationship:
    - Without JS: The visualization canvas cannot render, so a descriptive
      text message indicates that the feature requires JavaScript. The
      associated <audio> element remains fully functional via native controls,
      so users can still listen to the audio.
    - With JS: <audio-visualizer> connects to an <audio> element via the
      `for` attribute, creates an AudioContext and AnalyserNode, and draws
      real-time frequency bars, waveform, or circular visualizations on a
      canvas. It pauses rendering when off-screen or when the user prefers
      reduced motion.

    The static form preserves the core audio experience. The visualization
    is a progressive enhancement that adds visual feedback only when the
    Web Audio API and JavaScript are available.
  -->

  <main>
    <h1>Audio Visualizer</h1>

    <audio id="demo-track" controls>
      <source src="track.mp3" type="audio/mpeg">
      <p>Your browser does not support the audio element.
        <a href="track.mp3" download>Download the track</a>.</p>
    </audio>

    <p>Audio visualization available when JavaScript is enabled.</p>
  </main>
</body>
</html>
