<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Risk Register — Static Fallback</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    table { border-collapse: collapse; }
    th, td { padding: 0.25rem 0.75rem; border-block-end: 1px solid #ddd; text-align: start; }
  </style>
</head>
<body>
  <!--
    Static fallback for <risk-register>.

    Upgrade relationship:
    - Without JS: the <template> below is invisible (templates do not
      render); the <noscript>-style fallback table preserves the data.
    - With JS: the component reads rows from the <template>, computes
      severity = likelihood × impact, renders a sortable <data-table>
      with low-good severity heatmap, and a <quadrant-grid> mapping each
      risk to a labelled dot at (likelihood, impact).
  -->

  <risk-register label="Q3 Project risks">
    <template>
      <tr data-id="vendor-delay"><td>Vendor delay</td><td>4</td><td>3</td><td>PM</td><td>Pre-stage assets in week 6</td></tr>
      <tr data-id="data-breach"><td>Data breach</td><td>2</td><td>5</td><td>Security</td><td>Tabletop exercise + WAF tuning</td></tr>
      <tr data-id="scope-creep"><td>Scope creep</td><td>5</td><td>3</td><td>EM</td><td>Strict change-control board</td></tr>
      <tr data-id="staff-churn"><td>Staff churn</td><td>2</td><td>2</td><td>EM</td><td>Document playbooks + cross-train</td></tr>
    </template>
    <table>
      <thead>
        <tr><th>Risk</th><th>Likelihood</th><th>Impact</th><th>Owner</th></tr>
      </thead>
      <tbody>
        <tr><td>Vendor delay</td><td>4</td><td>3</td><td>PM</td></tr>
        <tr><td>Data breach</td><td>2</td><td>5</td><td>Security</td></tr>
        <tr><td>Scope creep</td><td>5</td><td>3</td><td>EM</td></tr>
        <tr><td>Staff churn</td><td>2</td><td>2</td><td>EM</td></tr>
      </tbody>
    </table>
  </risk-register>
</body>
</html>
