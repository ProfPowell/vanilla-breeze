<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>watch-wc (static fallback)</title>
  <style>
    body { font-family: system-ui; max-inline-size: 32rem; margin-inline: auto; padding: 2rem; }
    button { padding: 0.5rem 1rem; border: 1px solid #ccc; border-radius: 0.25rem; background: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <h1>watch-wc</h1>
  <p>Without JS the static fallback inside the component is a plain button — no state, no persistence. With JS the component renders an icon/text button wired to <code>data-watch-page</code>.</p>

  <p>
    <watch-wc>
      <button type="button">Watch this page</button>
    </watch-wc>
  </p>
</body>
</html>
