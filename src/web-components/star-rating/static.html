<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Star Rating — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <star-rating>.

    Upgrade relationship:
    - Without JS: A standard fieldset with radio buttons provides a fully
      functional rating input. Users can select a value from 1 to 5 using
      keyboard (arrow keys, Tab) or mouse. The form submits the selected
      radio value under the given name. Labels include accessible text
      ("1 star", "2 stars", etc.).
    - With JS: <star-rating> wraps this pattern with form-associated
      custom element internals (ElementInternals), adds visual star icons
      (text or Lucide via <icon-wc>), supports half-star increments,
      read-only display mode, form validation, and reset/restore callbacks.

    The static form participates in native form submission and is fully
    keyboard navigable and screen-reader accessible.
  -->

  <main>
    <h1>Star Rating</h1>

    <form action="/submit" method="post">
      <fieldset>
        <legend>Rating</legend>
        <label>
          <input type="radio" name="rating" value="1" aria-label="1 star">
          1 star
        </label>
        <label>
          <input type="radio" name="rating" value="2" aria-label="2 stars">
          2 stars
        </label>
        <label>
          <input type="radio" name="rating" value="3" aria-label="3 stars">
          3 stars
        </label>
        <label>
          <input type="radio" name="rating" value="4" aria-label="4 stars">
          4 stars
        </label>
        <label>
          <input type="radio" name="rating" value="5" aria-label="5 stars">
          5 stars
        </label>
      </fieldset>
      <button type="submit">Submit</button>
    </form>
  </main>
</body>
</html>
