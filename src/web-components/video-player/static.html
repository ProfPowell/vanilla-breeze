<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Player — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <video-player>.

    Upgrade relationship:
    - Without JS: The native <video controls> element provides full playback
      functionality — play/pause, seeking, volume, time display, fullscreen,
      and caption rendering are all handled by the browser's built-in controls.
      The track list links are plain anchors so users can download or navigate
      to individual video files.
    - With JS: <video-player> hides native controls and renders custom shadow
      DOM overlay controls with styled play/pause, big center play button,
      seek timeline with buffer indicator, volume slider, mute toggle,
      playback speed, captions toggle, fullscreen toggle, skip ±10s buttons,
      and keyboard shortcuts (Space/K, arrows, M, F, C, Escape). It also
      handles playlist navigation, shuffle, and loop.

    The static form is fully functional for single-video playback. Playlist
    links remain accessible as download/navigation anchors.
  -->

  <main>
    <h1>Video Player</h1>

    <h2>Single Video</h2>
    <video controls poster="poster.jpg" width="960" height="540">
      <source src="video.mp4" type="video/mp4">
      <track kind="captions" src="en.vtt" srclang="en" label="English" default>
      <p>Your browser does not support the video element.
        <a href="video.mp4" download>Download the video</a>.</p>
    </video>

    <h2>Playlist</h2>
    <video controls poster="episodes/ep1.jpg" width="960" height="540">
      <source src="episodes/01.mp4" type="video/mp4">
      <track kind="captions" src="captions/01-en.vtt" srclang="en" label="English" default>
      <p>Your browser does not support the video element.
        <a href="episodes/01.mp4" download>Download the video</a>.</p>
    </video>
    <details>
      <summary>Episodes</summary>
      <ol>
        <li>
          <a href="episodes/01.mp4">01. Introduction</a>
          <span><time datetime="PT12M30S">12:30</time></span>
        </li>
        <li>
          <a href="episodes/02.mp4">02. Getting Started</a>
          <span><time datetime="PT18M45S">18:45</time></span>
        </li>
        <li>
          <a href="episodes/03.mp4">03. Advanced Topics</a>
          <span><time datetime="PT24M10S">24:10</time></span>
        </li>
      </ol>
    </details>
  </main>
</body>
</html>
