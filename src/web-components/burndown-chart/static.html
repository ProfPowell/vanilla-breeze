<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Burndown Chart — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <burndown-chart>.

    Upgrade relationship:
    - Without JS: the <template> below is invisible (templates do not
      render). The component is purely additive over <chart-wc>.
    - With JS: the component reads start/end/total + the <template>
      rows, computes the ideal-line series, builds a <chart-wc> with
      two series (Actual + Ideal), and renders scope-change notes
      below the chart when the optional 3rd cell is present.
  -->

  <burndown-chart start="2026-05-04" end="2026-05-15" total="42" label="Sprint 14">
    <template>
      <tr><td>2026-05-04</td><td>42</td></tr>
      <tr><td>2026-05-05</td><td>40</td></tr>
      <tr><td>2026-05-06</td><td>37</td></tr>
      <tr><td>2026-05-07</td><td>32</td><td>+5</td></tr>
      <tr><td>2026-05-08</td><td>28</td></tr>
    </template>
  </burndown-chart>
</body>
</html>
