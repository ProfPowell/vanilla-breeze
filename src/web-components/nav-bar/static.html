<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nav-bar — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <nav-bar>.

    Upgrade relationship:
    - Without JS: A plain set of anchor links inside <nav-bar>. Native
      navigation works; nothing is broken. The active link is not
      highlighted (no aria-current applied).
    - With JS: <nav-bar> sets role="navigation" if absent, matches
      location.pathname against each child link, and sets
      aria-current="page" on the best match (exact wins; longest
      prefix breaks ties). Listens for popstate to keep the active
      state fresh after client-side navigation.

    HTML-first authors do not need to do anything special — wrap the
    existing <nav> in <nav-bar> and active-state sync is automatic.
  -->

  <nav-bar aria-label="Main">
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/settings">Settings</a>
  </nav-bar>
</body>
</html>
