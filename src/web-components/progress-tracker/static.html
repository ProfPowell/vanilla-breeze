<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>progress-tracker demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { font-family: system-ui, sans-serif; max-inline-size: 48rem; margin-inline: auto; padding: 2rem 1rem; line-height: 1.5; }
    section { margin-block: 1.5rem; }
  </style>
</head>
<body>
  <h1>progress-tracker</h1>

  <section>
    <h2>Wizard at step 2</h2>
    <progress-tracker data-current="2">
      <li data-step="1">Account</li>
      <li data-step="2">Profile</li>
      <li data-step="3">Preferences</li>
      <li data-step="4">Confirm</li>
    </progress-tracker>
  </section>

  <section>
    <h2>Step with error</h2>
    <progress-tracker data-current="3">
      <li data-step="1">Account</li>
      <li data-step="2" data-error>Profile</li>
      <li data-step="3">Preferences</li>
      <li data-step="4">Confirm</li>
    </progress-tracker>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
