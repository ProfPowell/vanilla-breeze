<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>comment-thread demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { font-family: system-ui, sans-serif; max-inline-size: 48rem; margin-inline: auto; padding: 2rem 1rem; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>comment-thread</h1>

  <comment-thread aria-label="Comments on issue 482">
    <article data-comment id="c1" data-author="Ada Lovelace" data-time="2026-05-14T08:00:00Z" data-mine>
      <div data-comment-body>Looks great — ship it.</div>
      <reaction-bar>
        <button data-reaction="thumbsup" data-count="3" data-mine>👍</button>
        <template data-palette>
          <button data-reaction="thumbsup">👍</button>
          <button data-reaction="heart">❤️</button>
          <button data-reaction="rocket">🚀</button>
        </template>
      </reaction-bar>
    </article>

    <article data-comment id="c2" data-author="Bob" data-time="2026-05-14T09:00:00Z" data-parent="c1">
      <div data-comment-body>Agreed!</div>
    </article>

    <article data-comment id="c3" data-author="Carol" data-time="2026-05-14T10:00:00Z">
      <div data-comment-body>One nit: please double-check the migration script.</div>
    </article>

    <template data-reply-form>
      <comment-box submit-label="Reply" data-show-cancel></comment-box>
    </template>
  </comment-thread>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
