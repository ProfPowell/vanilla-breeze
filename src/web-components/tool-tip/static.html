<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tool-Tip — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <tool-tip>.

    Upgrade relationship:
    - Without JS: The trigger element carries a title attribute, which
      the browser renders as a native tooltip on hover. Title tooltips
      are accessible to mouse users and announced by screen readers as
      the element's accessible description. No custom markup is needed.
    - With JS: <tool-tip> removes the title attribute (to prevent a
      double tooltip), creates a popover element with role="tooltip",
      wires up aria-describedby, and uses the Popover API (popover="hint")
      with interestfor or JS event listeners for show/hide timing. It
      supports rich HTML content via <template data-tooltip>, CSS Anchor
      Positioning for layout, and a card variant (data-variant="card")
      for hover cards with interactive content.

    The static form provides the essential information on hover. The
    component adds styled positioning, rich content, and keyboard/focus
    triggered display.
  -->

  <main>
    <h1>Tool-Tip Examples</h1>

    <!-- Simple text tooltip via title attribute -->
    <h2>Icon Button with Tooltip</h2>
    <p>
      <button type="button" title="Save your changes">Save</button>
    </p>

    <!-- Multiple tooltips -->
    <h2>Toolbar with Tooltips</h2>
    <p>
      <button type="button" title="Bold (Ctrl+B)">B</button>
      <button type="button" title="Italic (Ctrl+I)">I</button>
      <button type="button" title="Underline (Ctrl+U)">U</button>
    </p>

    <!-- Link with supplementary info -->
    <h2>Link with Description</h2>
    <p>
      Read the <a href="/docs/api" title="Opens the full API reference documentation">API docs</a>
      for more details.
    </p>

    <!-- Abbreviation with explanation (native alternative to rich tooltip) -->
    <h2>Abbreviation</h2>
    <p>
      The server responded with a <abbr title="HyperText Transfer Protocol">HTTP</abbr> 200 status.
    </p>
  </main>
</body>
</html>
