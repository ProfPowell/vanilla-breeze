<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capacity Plan (static fallback)</title>
  <link rel="stylesheet" href="/src/main.css">
</head>
<body>
  <!--
    The ledger ties iron-triangle's capacity, quality-target's spend,
    and slotted work-items' data-capacity-cost into one view.
    Pre-upgrade: empty (the math is JS-only). For a no-JS path the
    server can render the same ledger as a static <dl>.
  -->
  <iron-triangle id="shape"></iron-triangle>
  <quality-target id="quality" data-bind-to="shape"></quality-target>

  <capacity-plan data-bind-triangle="shape" data-bind-quality="quality">
    <work-item data-capacity-cost="3">Bulk import</work-item>
    <work-item data-capacity-cost="2">API webhooks</work-item>
  </capacity-plan>
</body>
</html>
