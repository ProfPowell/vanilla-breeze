<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>pager-wc (Static Fallback)</title>
</head>
<body>
  <h1>pager-wc</h1>
  <noscript><p>This component works best with JavaScript enabled.</p></noscript>
  <pager-wc target="#feed"></pager-wc>
  <ul id="feed" data-paged data-paged-size="3">
    <li>One</li><li>Two</li><li>Three</li>
    <li>Four</li><li>Five</li><li>Six</li>
    <li>Seven</li><li>Eight</li><li>Nine</li>
  </ul>
  <pager-wc target="#feed"></pager-wc>
</body>
</html>
