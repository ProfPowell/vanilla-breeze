<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Command-Palette — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <command-palette>.

    Upgrade relationship:
    - Without JS: A visible navigation section provides links to all
      available actions, organized by group. Users can scan the list
      and click to navigate. A standard search input with a form action
      can provide server-side filtering if needed. All commands are
      always visible — there is no hidden modal to open.
    - With JS: <command-palette> builds a <dialog> (modal) with a
      search input, renders command-group/command-item children as a
      filterable listbox, binds a global keyboard shortcut (default
      Cmd+K / Ctrl+K) to toggle it open, provides arrow-key navigation
      through results, Enter to select, Escape to close, and optional
      auto-discovery of commands from [data-command] elements and
      nav links on the page.

    The static form makes all commands immediately visible and reachable
    via standard link navigation. The component adds a quick-access
    modal with real-time keyboard-driven filtering.
  -->

  <main>
    <h1>Command-Palette Examples</h1>

    <!-- Visible command navigation (replaces hidden modal palette) -->
    <h2>Quick Actions</h2>
    <nav aria-label="Commands">
      <section>
        <h3>Navigation</h3>
        <ul>
          <li><a href="/">Go Home</a></li>
          <li><a href="/settings">Settings</a></li>
          <li><a href="/profile">Profile</a></li>
        </ul>
      </section>

      <section>
        <h3>Actions</h3>
        <ul>
          <li><a href="/new">New Document</a></li>
          <li><a href="/upload">Upload File</a></li>
          <li><a href="/export">Export Data</a></li>
        </ul>
      </section>

      <section>
        <h3>Help</h3>
        <ul>
          <li><a href="/docs">Documentation</a></li>
          <li><a href="/shortcuts">Keyboard Shortcuts</a></li>
          <li><a href="/support">Contact Support</a></li>
        </ul>
      </section>
    </nav>
  </main>
</body>
</html>
