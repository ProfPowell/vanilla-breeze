<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>activity-feed demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { font-family: system-ui, sans-serif; max-inline-size: 48rem; margin-inline: auto; padding: 2rem 1rem; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>activity-feed</h1>

  <activity-feed aria-label="Recent activity" data-group="day">
    <article data-activity data-time="2026-05-14T11:00:00Z">
      <a data-activity-actor href="/users/ada">Ada</a>
      <span data-activity-verb>commented on</span>
      <a data-activity-object href="/issues/482">issue #482</a>
    </article>
    <article data-activity data-time="2026-05-14T10:30:00Z">
      <a data-activity-actor href="/users/bob">Bob</a>
      <span data-activity-verb>opened</span>
      <a data-activity-object href="/issues/485">issue #485</a>
    </article>
    <article data-activity data-time="2026-05-13T17:00:00Z">
      <a data-activity-actor href="/users/carol">Carol</a>
      <span data-activity-verb>merged</span>
      <a data-activity-object href="/pull/120">PR #120</a>
    </article>
  </activity-feed>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
