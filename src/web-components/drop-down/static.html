<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drop-Down — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <drop-down>.

    Upgrade relationship:
    - Without JS: A native <details>/<summary> pair provides the
      disclosure pattern. The browser handles open/close toggling,
      keyboard activation (Enter/Space on summary), and focus. No ARIA
      attributes are needed — the semantics are built into <details>.
    - With JS: <drop-down> replaces this with a button+menu pattern
      using aria-haspopup, aria-expanded, role="menu", and role="menuitem".
      It adds arrow-key navigation within the menu, Escape to close,
      click-outside dismissal, Popover API top-layer positioning, and
      optional hover-triggered opening (data-hover).

    The static form gives users full access to the menu items via click
    or keyboard. The component adds richer menu semantics and navigation.
  -->

  <main>
    <h1>Drop-Down Examples</h1>

    <!-- Basic dropdown menu -->
    <h2>Actions Menu</h2>
    <details>
      <summary>Options</summary>
      <ul>
        <li><a href="#edit">Edit</a></li>
        <li><a href="#duplicate">Duplicate</a></li>
        <li><a href="#delete">Delete</a></li>
      </ul>
    </details>

    <!-- Navigation dropdown -->
    <h2>Navigation Menu</h2>
    <nav>
      <details>
        <summary><a href="/section/">Section</a></summary>
        <ul>
          <li><a href="/section/page1">Page 1</a></li>
          <li><a href="/section/page2">Page 2</a></li>
          <li><a href="/section/page3">Page 3</a></li>
        </ul>
      </details>
    </nav>

    <!-- Dropdown with grouped items -->
    <h2>Grouped Actions</h2>
    <details>
      <summary>File</summary>
      <ul>
        <li><a href="#new">New</a></li>
        <li><a href="#open">Open</a></li>
        <li><a href="#save">Save</a></li>
        <li><a href="#export">Export</a></li>
      </ul>
    </details>
  </main>
</body>
</html>
