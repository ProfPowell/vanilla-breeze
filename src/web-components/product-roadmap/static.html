<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roadmap — Static Fallback</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    section { margin-block: 1rem; }
    section h2 { font-size: 0.9rem; text-transform: uppercase; }
    article { padding: 0.5rem; background: #eee; border-radius: 0.25rem; margin-block: 0.25rem; }
  </style>
</head>
<body>
  <!--
    Static fallback for <roadmap>.

    Upgrade relationship:
    - Without JS: lanes and initiatives render in source order. Each
      <article data-start data-end> is just a card; the time axis +
      bar positioning is purely additive once the component upgrades.
    - With JS: the component reads start/end attributes, builds a
      horizontal time axis (quarter or month), positions each bar by
      its data-start/data-end fraction, and (with editable) wires
      drag-to-reschedule, drag-to-resize, and drop-on-lane.
  -->

  <product-roadmap start="2026-Q3" end="2027-Q2">
    <section data-lane="Platform">
      <article data-start="2026-Q3" data-end="2026-Q4" data-status="in-progress">
        <h3>Multi-tenant database</h3>
      </article>
      <article data-start="2027-Q1" data-end="2027-Q2" data-status="planned">
        <h3>Edge cache layer</h3>
      </article>
    </section>
    <section data-lane="Growth">
      <article data-start="2026-Q4" data-end="2027-Q1" data-status="planned">
        <h3>Onboarding rewrite</h3>
      </article>
    </section>
  </product-roadmap>
</body>
</html>
