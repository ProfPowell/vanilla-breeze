<!--
  score-card — static (zero-JS) form

  Pre-upgrade fallback uses the same semantic figure pattern documented at
  /docs/patterns/data/stats/. Slotted children render inline before the
  shadow tree projects them, so content is fully readable without JS or CSS.
-->
<score-card trend="up">
  <figure>
    <figcaption slot="title">Total Users</figcaption>
    <data slot="value" value="24521">24,521</data>
    <small slot="change" data-trend="up">
      <data value="0.125">+12.5%</data> vs last month
    </small>
    <figcaption slot="description">Active in last 30 days</figcaption>
  </figure>
</score-card>
