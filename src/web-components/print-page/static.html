<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Print Page — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <print-page>.

    Upgrade relationship:
    - Without JS: A short text instruction tells users to use their browser's
      built-in print function (Ctrl+P / Cmd+P). This is universally available
      and requires no scripting.
    - With JS: <print-page> replaces its content with a styled button that
      calls window.print(). It optionally includes a checkbox toggle to
      disable VB's print-optimized styles for a "raw" print output.

    The static form ensures users always know how to print the page, even
    when JavaScript is unavailable or the component fails to load.
  -->

  <main>
    <h1>Quarterly Report</h1>

    <p>
      This report covers key metrics and milestones from the past quarter.
    </p>

    <section>
      <h2>Summary</h2>
      <p>Revenue increased by 12% compared to the previous quarter.</p>
    </section>

    <section>
      <h2>Details</h2>
      <p>Detailed breakdown of performance across all departments.</p>
    </section>

    <footer>
      <p>
        To print this page, press
        <kbd>Ctrl</kbd>+<kbd>P</kbd> (Windows/Linux) or
        <kbd>Cmd</kbd>+<kbd>P</kbd> (Mac).
      </p>
    </footer>
  </main>
</body>
</html>
