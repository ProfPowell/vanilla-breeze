<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Code — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <qr-code>.

    Upgrade relationship:
    - Without JS: The URL or text value is displayed as a plain clickable
      link. Users can follow the link directly, which is the same action
      that scanning the QR code would accomplish.
    - With JS: <qr-code> reads `data-value` (or its text content), encodes
      it using a built-in QR code generator (byte mode, versions 1-10 with
      configurable error correction), and renders the result on a canvas
      element. The original text content is replaced by the canvas. Supports
      `data-size`, `data-color`, `data-background`, and
      `data-error-correction` attributes.

    The static form provides the same end-user action (visiting the URL)
    without requiring the visual QR encoding step.
  -->

  <main>
    <h1>QR Code</h1>

    <p>
      <a href="https://example.com">https://example.com</a>
    </p>
  </main>
</body>
</html>
