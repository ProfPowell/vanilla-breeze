<!--
  kanban-board — static (zero-JS) form
  Column sections with draggable children render as vertical flow before
  JS upgrades to horizontal columns with drag-and-drop.
-->
<kanban-board>
  <section data-column="backlog" data-column-label="Backlog">
    <article draggable="true" data-id="task-1">Design review for dashboard</article>
    <article draggable="true" data-id="task-2">Write API documentation</article>
  </section>
  <section data-column="doing" data-column-label="In Progress" data-wip="3">
    <article draggable="true" data-id="task-3">Implement user authentication</article>
  </section>
  <section data-column="review" data-column-label="Review" data-wip="2">
    <article draggable="true" data-id="task-4">Add loading indicators</article>
  </section>
  <section data-column="done" data-column-label="Done" data-column-color="success">
    <article draggable="true" data-id="task-5">Set up CI/CD pipeline</article>
  </section>
</kanban-board>
