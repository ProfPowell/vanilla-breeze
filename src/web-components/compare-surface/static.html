<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compare Surface (Static Fallback)</title>
  <style>
    /*
     * Static fallback for <compare-surface>.
     *
     * Upgrade relationship:
     * When JavaScript loads and the <compare-surface> custom element is defined,
     * it overlays both images on top of each other and injects a draggable
     * divider handle (role="slider") that clips the top image via CSS
     * clip-path. Users can drag the handle or use keyboard arrows
     * (with Shift for 10% steps) to reveal more or less of each image.
     *
     * Without JS, this static page shows both images side by side so
     * users can compare them visually. Both images remain fully visible.
     */

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 2rem;
      color: #1a1a1a;
      background: #f8f8f8;
    }

    h1 {
      margin-block-end: 1rem;
    }

    .compare-static {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      max-width: 48rem;
    }

    .compare-static figure {
      flex: 1 1 20rem;
      margin: 0;
      text-align: center;
    }

    .compare-static img {
      width: 100%;
      height: auto;
      border-radius: 0.5rem;
      border: 1px solid #ddd;
      display: block;
    }

    .compare-static figcaption {
      margin-block-start: 0.5rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Image Comparison</h1>
  <p>Both images are shown side by side. With JavaScript enabled, a draggable slider overlays them for interactive comparison.</p>

  <div class="compare-static">
    <figure>
      <img src="before.jpg" alt="Before — original version of the image">
      <figcaption>Before</figcaption>
    </figure>
    <figure>
      <img src="after.jpg" alt="After — modified version of the image">
      <figcaption>After</figcaption>
    </figure>
  </div>
</body>
</html>
