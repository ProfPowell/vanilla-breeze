<!--
  site-map-wc — static (zero-JS) form
  A nested nav/ul/li structure renders as a readable site hierarchy
  before JS upgrades to an interactive tree with badges and toggles.
-->
<site-map-wc title="Taskflow Information Architecture">
  <nav>
    <ul>
      <li data-page-type="layout" data-template="app-shell">
        <a href="/">Home</a>
        <ul>
          <li data-page-type="dashboard" data-template="two-column">
            <a href="/dashboard">Dashboard</a>
            <ul>
              <li data-page-type="page" data-template="detail"><a href="/dashboard/project">Project Detail</a></li>
              <li data-page-type="page" data-template="list"><a href="/dashboard/tasks">Task List</a></li>
            </ul>
          </li>
          <li data-page-type="section" data-template="sidebar">
            <a href="/reports">Reports</a>
            <ul>
              <li data-page-type="page" data-template="document"><a href="/reports/weekly">Weekly Report</a></li>
              <li data-page-type="page" data-template="document"><a href="/reports/export">Export</a></li>
            </ul>
          </li>
          <li data-page-type="page" data-template="settings">
            <a href="/settings">Settings</a>
          </li>
        </ul>
      </li>
    </ul>
  </nav>
</site-map-wc>
