<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slide Accept (Static Fallback)</title>
  <style>
    /*
     * Static fallback for <slide-accept>.
     *
     * Upgrade relationship:
     * When JavaScript loads and the <slide-accept> custom element is defined,
     * it replaces the text content with a track containing a draggable handle
     * (role="slider") and a label. Users slide the handle across the track
     * using pointer drag or keyboard arrows (ArrowRight/Left, Shift for
     * larger steps, End to confirm immediately). If released before the
     * threshold (default 90%), the handle springs back. On activation,
     * the label changes to a confirmed message and the handle is disabled.
     *
     * Without JS, the element's text content is displayed as a readable
     * label inside a styled pill — a simple confirmation prompt that
     * the surrounding form or page can handle with its own submit flow.
     */

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 2rem;
      color: #1a1a1a;
      background: #f8f8f8;
    }

    h1 {
      margin-block-end: 1rem;
    }

    /* Mimics the :not(:defined) fallback from the component CSS */
    slide-accept {
      display: inline-flex;
      align-items: center;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: #f0f0f0;
      border: 1px solid #ddd;
      font-size: 0.875rem;
      color: #666;
    }

    .demo {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 24rem;
    }
  </style>
</head>
<body>
  <h1>Slide to Confirm</h1>
  <p>Without JavaScript, the slide-accept element renders its text content as a readable label. The surrounding form handles the actual confirmation.</p>

  <section class="demo">
    <slide-accept label="Slide to confirm">
      Slide to confirm
    </slide-accept>

    <slide-accept label="Slide to delete" attention="shimmer">
      Slide to delete
    </slide-accept>

    <slide-accept label="Slide to send" attention="pulse">
      Slide to send
    </slide-accept>
  </section>
</body>
</html>
