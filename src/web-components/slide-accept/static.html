<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slide Accept (Static Fallback)</title>
  <style>
    /*
     * Static fallback for <slide-accept>.
     *
     * Upgrade relationship:
     * When JavaScript loads and the <slide-accept> custom element is defined,
     * it replaces the content with a track containing a draggable handle
     * (role="slider") and a label. Users slide the handle across the track
     * using pointer drag or keyboard arrows (ArrowRight/Left, Shift for
     * larger steps, End to confirm immediately). If released before the
     * threshold (default 90%), the handle springs back. On activation,
     * the label changes to a confirmed message and the handle is disabled.
     *
     * Without JS, this static page presents a standard confirmation
     * checkbox that provides equivalent functionality through a
     * familiar, fully accessible form control.
     */

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 2rem;
      color: #1a1a1a;
      background: #f8f8f8;
    }

    h1 {
      margin-block-end: 1rem;
    }

    .accept-static {
      max-width: 30rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      padding: 1.5rem;
    }

    .accept-static fieldset {
      border: none;
      padding: 0;
      margin: 0;
    }

    .accept-static legend {
      font-weight: 600;
      margin-block-end: 1rem;
    }

    .accept-static label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 0.25rem;
    }

    .accept-static label:focus-within {
      outline: 2px solid #0066cc;
      outline-offset: 2px;
    }

    .accept-static input[type="checkbox"] {
      width: 1.25rem;
      height: 1.25rem;
      flex-shrink: 0;
    }

    .accept-static button {
      margin-block-start: 1rem;
      padding: 0.625rem 1.5rem;
      font: inherit;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
    }

    .accept-static button:hover {
      background: #0052a3;
    }

    .accept-static button:focus-visible {
      outline: 2px solid #0066cc;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <h1>Slide to Confirm</h1>
  <p>Confirm the action using the checkbox below. With JavaScript enabled, this becomes a slide-to-confirm interaction.</p>

  <form class="accept-static">
    <fieldset>
      <legend>Confirmation</legend>
      <label>
        <input type="checkbox" name="confirm" required>
        I confirm this action
      </label>
      <button type="submit">Confirm</button>
    </fieldset>
  </form>
</body>
</html>
