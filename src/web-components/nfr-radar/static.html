<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFR Radar (static fallback)</title>
  <link rel="stylesheet" href="/src/main.css">
</head>
<body>
  <!--
    <nfr-radar> renders an inline <svg> radar viz of an NFR vector
    against the project's capacity envelope. Bind to a sibling
    <nfr-compass> via data-bind-to; the radar listens for
    nfr-compass:change and re-renders. Pre-upgrade fallback: the
    component is empty (acceptable — radar is a viz, not load-bearing).

    Drive imperatively via radar.value when you don't have a compass:
      radar.value = { vector, costWeights, capacityPoints };
  -->
  <iron-triangle id="shape">
    <!-- … Time / Cost / Scope inputs … -->
  </iron-triangle>

  <nfr-compass id="picker" data-bind-to="shape">
    <!-- 11 ility fieldsets … -->
  </nfr-compass>

  <figure data-layout="stack" data-layout-gap="s">
    <figcaption>Quality envelope vs chosen vector</figcaption>
    <nfr-radar data-bind-to="picker"></nfr-radar>
  </figure>
</body>
</html>
