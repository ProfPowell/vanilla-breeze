<!--
  ai-summary — pre-upgrade fallback
  Without JS, the wrapped content reads normally. Once JS upgrades,
  ai-summary prepends a Summarize trigger and routes through Chrome's
  Summarizer API → endpoint → fallback-url → unavailable.
-->
<ai-summary
    fallback-url="https://claude.ai/new?q={prompt}"
    fallback-label="Read with Claude">
  <article>
    <h2>Sample article</h2>
    <p>This article is what gets summarised. Without JavaScript or the Chrome
       Summarizer API, this paragraph reads exactly as it would in any
       browser. With both available, ai-summary prepends a control panel and
       streams a summary inline.</p>
  </article>
</ai-summary>
