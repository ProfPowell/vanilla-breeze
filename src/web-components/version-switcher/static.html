<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>version-switcher demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { font-family: system-ui, sans-serif; max-inline-size: 48rem; margin-inline: auto; padding: 2rem 1rem; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>version-switcher</h1>

  <p>Releases mode (inline data-versions JSON):</p>
  <version-switcher
    data-versions='[
      {"id":"v2.1","label":"v2.1","url":"/v2.1/api","date":"2026-05-01","summary":"Adds rate-limit headers","versionUrl":"/changelog#v2-1"},
      {"id":"v2.0","label":"v2.0","url":"/v2/api","date":"2026-01-15","summary":"Breaking: auth flow renamed","versionUrl":"/changelog#v2-0"},
      {"id":"v1.4","label":"v1.4","url":"/v1.4/api","date":"2025-08-10","summary":"Last v1 release","archived":true}
    ]'
  ></version-switcher>

  <p style="margin-block-start: 2rem;">History mode (script-tag data, same URL across entries):</p>
  <version-switcher>
    <script type="application/json" data-versions>
    [
      {"id":"r-2026-05-12","label":"Latest revision","url":"/policy","date":"2026-05-12","author":"Ada","summary":"Clarified data-retention period.","current":true},
      {"id":"r-2026-04-01","label":"April revision","url":"/policy","date":"2026-04-01","author":"Bob","summary":"Updated EU references."},
      {"id":"r-2026-01-15","label":"Q1 baseline","url":"/policy","date":"2026-01-15","author":"Carol","summary":"Initial public version."}
    ]
    </script>
  </version-switcher>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
