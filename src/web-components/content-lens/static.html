<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Content Lens (Static Fallback)</title>
</head>
<body>

  <!--
    Static fallback: when JS is not available, content-lens renders
    every lens child stacked. The CSS in styles.css separates them
    with a top border and spacing so the page remains readable.
  -->

  <h1>Content Lens</h1>

  <noscript>
    <p>This component falls back to showing every lens stacked when JavaScript is disabled.</p>
  </noscript>

</body>
</html>
