<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carousel (Static Fallback)</title>
  <style>
    /*
     * Static fallback for <carousel-wc>.
     *
     * Upgrade relationship:
     * When JavaScript loads and the <carousel-wc> custom element is defined,
     * it wraps these children in a scrollable track, injects prev/next buttons
     * and dot indicators, adds keyboard navigation (Arrow keys, Home, End),
     * autoplay, ARIA roledescription="carousel", view-transition animations,
     * and IntersectionObserver-based slide tracking.
     *
     * Without JS, this static page presents all slides visible in a
     * horizontally scrollable container using CSS scroll-snap, so all
     * content remains accessible and browsable.
     */

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 2rem;
      color: #1a1a1a;
      background: #f8f8f8;
    }

    h1 {
      margin-block-end: 1rem;
    }

    .carousel-static {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      padding-block-end: 0.75rem;
    }

    .carousel-static:focus-visible {
      outline: 2px solid #0066cc;
      outline-offset: 2px;
    }

    .slide {
      flex: 0 0 min(100%, 32rem);
      scroll-snap-align: start;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      padding: 2rem;
      min-height: 12rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <h1>Carousel</h1>
  <p>All slides are shown in a scrollable row. Scroll horizontally to browse.</p>

  <div class="carousel-static" role="region" aria-label="Carousel" tabindex="0">
    <article class="slide" aria-label="1 of 4">
      <p>Slide 1 — Introduction</p>
    </article>
    <article class="slide" aria-label="2 of 4">
      <p>Slide 2 — Features</p>
    </article>
    <article class="slide" aria-label="3 of 4">
      <p>Slide 3 — Testimonials</p>
    </article>
    <article class="slide" aria-label="4 of 4">
      <p>Slide 4 — Call to Action</p>
    </article>
  </div>
</body>
</html>
