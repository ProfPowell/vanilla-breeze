<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Traceability Matrix — Static Fallback</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    table { border-collapse: collapse; }
    th, td { padding: 0.25rem 0.75rem; border-block-end: 1px solid #ddd; text-align: center; }
    th[scope="row"] { text-align: start; }
  </style>
</head>
<body>
  <!--
    Static fallback for <traceability-matrix>.

    Upgrade relationship:
    - Without JS: the matrix host is invisible (no auto-discovery
      possible). Authors who need a no-JS RTM should write the table
      directly inside <data-table>; the matrix component is purely
      additive (auto-discovery + chain highlight).
    - With JS: the component reads `rows` and `cols` selectors,
      auto-discovers source elements page-wide, builds a <data-table>
      with checkmark intersections, and wires click-to-highlight.
  -->

  <traceability-matrix
    rows="user-story"
    cols="user-persona"
    link-attr="persona-id"
    label="Story coverage"
    flag-orphans>
  </traceability-matrix>

  <user-persona id="p-sarah" data-matrix-label="Sarah Chen">…</user-persona>
  <user-persona id="p-alex"  data-matrix-label="Alex Rivera">…</user-persona>
  <user-story story-id="s-1" persona-id="p-sarah" data-matrix-label="Story 1">…</user-story>
  <user-story story-id="s-2" persona-id="p-alex"  data-matrix-label="Story 2">…</user-story>
</body>
</html>
