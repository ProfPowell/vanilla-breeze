<!--
  review-surface — static (zero-JS) form
  Without JS, child content renders normally.
  Pin data can be listed as a fallback <ol>.
-->
<review-surface
  editable
  adapter="local"
  storage-key="demo-review"
  author="Sarah Chen">

  <img src="/comps/landing-page-v3.png"
       alt="Landing page design comp"
       width="800" height="600" />

  <ol slot="pins-fallback">
    <li>
      <strong>Sarah Chen</strong> (42%, 18%):
      Header alignment is off — needs 8px left padding
    </li>
    <li>
      <strong>Tom Rivera</strong> (67%, 55%):
      CTA button colour doesn't match the brand guide
      <ul>
        <li><strong>Sarah Chen</strong>: Updated in v2 — please re-check</li>
      </ul>
    </li>
    <li>
      <strong>Sarah Chen</strong> (15%, 82%):
      Footer links need to match the nav order
    </li>
  </ol>
</review-surface>
