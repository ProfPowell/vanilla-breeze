<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emoji Picker (Static Fallback)</title>
  <style>
    /*
     * Static fallback for <emoji-picker>.
     *
     * Upgrade relationship:
     * When JavaScript loads, the <emoji-picker> custom element builds a
     * trigger button (or uses the author-supplied one) and a dropdown panel
     * with search, categories, and an emoji grid. Clicking an emoji inserts
     * it into the target input/textarea/contenteditable identified by the
     * `for` attribute.
     *
     * Without JS, the text field still works — users can type emoji using
     * their OS emoji keyboard (Cmd+Ctrl+Space on macOS, Win+. on Windows).
     * The trigger button remains visible but non-functional. The picker
     * panel is not created.
     *
     * This is the correct VB progressive enhancement story:
     * - the text field is the baseline
     * - OS emoji input is always available
     * - the picker is an optional convenience
     */

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 2rem;
      color: #1a1a1a;
      background: #f8f8f8;
    }

    h1 { margin-block-end: 1rem; }

    .demo {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 30rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-block-end: 0.5rem;
    }

    .field-row {
      display: flex;
      align-items: start;
      gap: 0.5rem;
    }

    textarea {
      flex: 1;
      font: inherit;
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 0.375rem;
      resize: vertical;
      min-height: 4rem;
    }

    /* Without JS, emoji-picker renders as inline-block with the trigger visible */
    emoji-picker {
      display: inline-block;
    }

    emoji-picker button {
      font: inherit;
      font-size: 1.25rem;
      padding: 0.375rem 0.5rem;
      border: 1px solid #ddd;
      border-radius: 0.375rem;
      background: #fff;
      cursor: pointer;
    }

    .hint {
      font-size: 0.875rem;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Emoji Picker</h1>
  <p>Without JavaScript, the text field works normally. Use your OS emoji keyboard to insert emoji.</p>

  <section class="demo">
    <div>
      <label for="message">Message</label>
      <div class="field-row">
        <textarea id="message" placeholder="Type your message..."></textarea>
        <emoji-picker for="message">
          <button type="button" data-trigger aria-label="Open emoji picker">😀</button>
        </emoji-picker>
      </div>
      <p class="hint">macOS: <kbd>Cmd</kbd>+<kbd>Ctrl</kbd>+<kbd>Space</kbd> &middot; Windows: <kbd>Win</kbd>+<kbd>.</kbd></p>
    </div>
  </section>
</body>
</html>
