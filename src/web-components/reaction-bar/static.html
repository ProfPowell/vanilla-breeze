<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reaction-bar demos</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { font-family: system-ui, sans-serif; max-inline-size: 48rem; margin-inline: auto; padding: 2rem 1rem; line-height: 1.5; }
    article { margin-block: 1.5rem; border: 1px solid var(--color-border); padding: 1rem; border-radius: var(--radius-m); }
    pre { font-size: 0.8rem; color: var(--color-text-muted); }
  </style>
</head>
<body>
  <h1>reaction-bar</h1>

  <article>
    <p>Looks great — ship it.</p>
    <reaction-bar aria-label="Reactions to comment 1">
      <button data-reaction="thumbsup" data-count="3" data-mine>👍</button>
      <button data-reaction="heart"    data-count="1">❤️</button>
      <template data-palette>
        <button data-reaction="thumbsup">👍</button>
        <button data-reaction="thumbsdown">👎</button>
        <button data-reaction="laugh">😄</button>
        <button data-reaction="hooray">🎉</button>
        <button data-reaction="confused">😕</button>
        <button data-reaction="heart">❤️</button>
        <button data-reaction="rocket">🚀</button>
        <button data-reaction="eyes">👀</button>
      </template>
    </reaction-bar>
  </article>

  <article>
    <p>Read-only display (e.g., archived thread):</p>
    <reaction-bar data-disabled>
      <button data-reaction="thumbsup" data-count="12">👍</button>
      <button data-reaction="heart"    data-count="3">❤️</button>
      <template data-palette>
        <button data-reaction="thumbsup">👍</button>
        <button data-reaction="heart">❤️</button>
      </template>
    </reaction-bar>
  </article>

  <pre id="log"></pre>

  <script type="module" src="/src/main.js"></script>
  <script type="module">
    const log = document.getElementById('log');
    document.querySelectorAll('reaction-bar').forEach((bar) => {
      bar.addEventListener('reaction-bar:toggle', (e) => {
        const { reaction, action, count, mine } = e.detail;
        log.textContent += `${action} ${reaction} (count was ${count}, mine was ${mine})\n`;
        // Mocked optimistic update — real apps would call the backend here.
        const next = action === 'add' ? count + 1 : count - 1;
        bar.setCount(reaction, next, { mine: action === 'add' });
      });
    });
  </script>
</body>
</html>
