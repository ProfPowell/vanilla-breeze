<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Day View (Static Fallback)</title>
  <style>
    /*
      Static fallback for <day-view>.
      Without JS, this renders as a plain ordered list of hours
      with event entries — fully readable and semantic.

      The enhanced web component adds:
      1. CSS Grid hour-grid layout (hours as rows, labels + events)
      2. Half-hour subgrid positioning via <hour-view>
      3. Multi-hour event spanning via JS absolute positioning
      4. Click-to-expand event details
      5. Keyboard navigation between events
    */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      line-height: 1.5;
      max-inline-size: 40rem;
      margin-inline: auto;
      padding: 2rem 1rem;
    }
  </style>
</head>
<body>
  <h1>Day Schedule — April 10, 2026</h1>

  <day-view data-date="2026-04-10">
    <ol>
      <li>
        <time datetime="09:00">9 AM</time>
        <hour-view>
          <calendar-event data-category="meeting">
            <time datetime="09:00">9:00</time>
            Sprint standup
          </calendar-event>
        </hour-view>
      </li>
      <li>
        <time datetime="10:00">10 AM</time>
        <hour-view>
          <calendar-event data-category="meeting" data-duration="2h">
            <time datetime="10:00">10:00</time>
            Design review
          </calendar-event>
        </hour-view>
      </li>
      <li>
        <time datetime="14:00">2 PM</time>
        <hour-view>
          <calendar-event data-category="focus">
            <time datetime="14:00">2:00</time>
            Code review
          </calendar-event>
        </hour-view>
      </li>
    </ol>
  </day-view>
</body>
</html>
