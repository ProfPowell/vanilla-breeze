<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quality Target (static fallback)</title>
  <link rel="stylesheet" href="/src/main.css">
</head>
<body>
  <!--
    Polygon-as-UI quality picker. The radar IS the picker — click an
    axis to open its per-ility editor. Pre-upgrade fallback: empty
    element (the meaningful interaction is dialog-driven and JS-only).

    Pair with <iron-triangle> via data-bind-to so capacity reads from
    the project shape; or set data-capacity-points directly.
  -->
  <iron-triangle id="shape" data-quality-href="#quality"></iron-triangle>

  <quality-target id="quality" name="quality" data-bind-to="shape"></quality-target>
</body>
</html>
