<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keyboard Shortcuts (Static Fallback)</title>
  <style>
    /*
      Minimal styling so the file is self-contained.
      A production page would load the project stylesheet instead.
    */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      line-height: 1.5;
      max-inline-size: 36rem;
      margin-inline: auto;
      padding: 2rem 1rem;
    }

    table {
      inline-size: 100%;
      border-collapse: collapse;
      margin-block-end: 2rem;
    }

    caption {
      text-align: start;
      font-weight: 600;
      padding-block-end: 0.5rem;
      font-size: 1.1rem;
    }

    th, td {
      text-align: start;
      padding: 0.5rem 0.75rem;
      border-block-end: 1px solid #eee;
    }

    th {
      font-weight: 400;
      color: #555;
    }

    td {
      text-align: end;
    }

    kbd {
      display: inline-block;
      padding: 0.15rem 0.4rem;
      font-family: ui-monospace, monospace;
      font-size: 0.85em;
      background: #f4f4f5;
      border: 1px solid #d4d4d8;
      border-radius: 4px;
      box-shadow: 0 1px 0 #d4d4d8;
    }
  </style>
</head>
<body>

  <!--
    Upgrade relationship
    ====================
    This static HTML IS the baseline that <short-cuts> enhances.

    Without JS the user sees a static reference table of keyboard
    shortcuts.  The information is immediately readable, navigable
    with Tab, and accessible to screen readers via the <table>
    semantics.

    When JavaScript loads and the <short-cuts> custom element is
    defined, the upgrade adds:

      1. Dialog overlay     - Pressing ? opens a modal <dialog> listing
                              all currently registered keyboard shortcuts.
      2. Dynamic content    - The shortcut list is built dynamically from
                              the command registry, so it always reflects
                              the current bindings.
      3. Formatted badges   - Shortcut combos are formatted into
                              platform-aware badges (e.g. Cmd vs Ctrl).
      4. Toggle on ?        - The same ? key both opens and closes the
                              overlay.
      5. Backdrop dismiss   - Clicking outside the dialog closes it.
  -->

  <h1>Keyboard Shortcuts</h1>

  <table>
    <caption>General</caption>
    <thead>
      <tr>
        <th scope="col">Action</th>
        <th scope="col">Shortcut</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row">Show keyboard shortcuts</th>
        <td><kbd>?</kbd></td>
      </tr>
      <tr>
        <th scope="row">Open search</th>
        <td><kbd>Ctrl</kbd> + <kbd>K</kbd></td>
      </tr>
    </tbody>
  </table>

  <table>
    <caption>Navigation</caption>
    <thead>
      <tr>
        <th scope="col">Action</th>
        <th scope="col">Shortcut</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row">Go to home</th>
        <td><kbd>G</kbd> then <kbd>H</kbd></td>
      </tr>
      <tr>
        <th scope="row">Go to settings</th>
        <td><kbd>G</kbd> then <kbd>S</kbd></td>
      </tr>
    </tbody>
  </table>

  <table>
    <caption>Editing</caption>
    <thead>
      <tr>
        <th scope="col">Action</th>
        <th scope="col">Shortcut</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row">Bold</th>
        <td><kbd>Ctrl</kbd> + <kbd>B</kbd></td>
      </tr>
      <tr>
        <th scope="row">Italic</th>
        <td><kbd>Ctrl</kbd> + <kbd>I</kbd></td>
      </tr>
      <tr>
        <th scope="row">Save</th>
        <td><kbd>Ctrl</kbd> + <kbd>S</kbd></td>
      </tr>
    </tbody>
  </table>

</body>
</html>
