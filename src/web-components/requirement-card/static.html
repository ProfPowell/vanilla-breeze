<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>requirement-card (static fallback)</title>
</head>
<body>
  <!--
    Display-only card for ONE NFR ility row. The prioritization
    decision lives in <nfr-compass>; this is the visual atom.
    Pre-upgrade, the card renders as a plain article — no JS needed
    for it to be readable.
  -->
  <requirement-card data-priority="critical">
    <span slot="name">Performance</span>
    <span slot="badge">Quality attribute</span>
    <p slot="rationale">Sub-200ms TTI is our differentiator vs Competitor X.</p>
  </requirement-card>

  <requirement-card data-priority="not-relevant">
    <span slot="name">Internationalization</span>
    <span slot="badge">Quality attribute</span>
  </requirement-card>

  <!-- Drill-down: wrap in <a href> to make the whole card clickable -->
  <a href="/requirements?ility=security">
    <requirement-card data-priority="important" data-conflict>
      <span slot="name">Security</span>
      <span slot="badge">Quality attribute</span>
      <p slot="rationale">SOC 2 audit pending Q2.</p>
      <p slot="conflicts">Vector decided against an older Iron Triangle — re-review.</p>
    </requirement-card>
  </a>
</body>
</html>
