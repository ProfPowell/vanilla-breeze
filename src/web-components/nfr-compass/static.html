<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFR Compass (Static Fallback)</title>
</head>
<body>
  <!--
    Pre-upgrade markup is a plain <form> with one <fieldset> per ility.
    Each fieldset has a 4-radio group (critical / important / acceptable
    / not-relevant) and a hidden rationale <textarea>. Without JS the
    form submits all picks to its action and a server can validate the
    capacity budget.

    With JS, <nfr-compass> upgrades, computes criticalSum live, reveals
    rationale textareas only when Critical is picked, and reveals an
    overrunRationale textarea when sum > capacity (capacity sourced
    from a paired <iron-triangle id="…"> via data-bind-to).

    Omit the fieldsets entirely and the upgraded component will inject
    the default 11 ilities. They are shown here for the no-JS path.
  -->
  <iron-triangle id="project-shape">
    <!-- Time / Cost / Scope inputs ... -->
  </iron-triangle>

  <nfr-compass name="nfr-vector" data-bind-to="project-shape">
    <h2 slot="title">Quality priorities for v1</h2>

    <fieldset name="performance">
      <legend>Performance</legend>
      <label><input type="radio" name="performance" value="critical">     Critical</label>
      <label><input type="radio" name="performance" value="important">    Important</label>
      <label><input type="radio" name="performance" value="acceptable" checked> Acceptable</label>
      <label><input type="radio" name="performance" value="not-relevant"> Not relevant</label>
      <textarea name="performance-rationale" hidden minlength="10" maxlength="200"></textarea>
    </fieldset>

    <!-- Repeat the fieldset for accessibility, security, reliability,
         maintainability, observability, compatibility, scalability,
         portability, internationalization, privacy -->

    <textarea slot="overrun-rationale" name="overrunRationale" hidden minlength="10" maxlength="400"></textarea>

    <footer slot="footer">
      <button type="submit">Save priorities</button>
    </footer>
  </nfr-compass>
</body>
</html>
