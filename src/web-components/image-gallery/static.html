<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery — No-JS Baseline</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>Image Gallery — Progressive Enhancement</h1>
  <p>Without JavaScript, thumbnails are a responsive grid of links. Click any thumbnail to navigate directly to the full image.</p>

  <h2>Image-only mode</h2>
  <image-gallery>
    <a href="https://picsum.photos/id/10/1200/800">
      <img src="https://picsum.photos/id/10/400/400" alt="Misty forest" loading="lazy" />
    </a>
    <a href="https://picsum.photos/id/20/1200/800">
      <img src="https://picsum.photos/id/20/400/400" alt="Coast highway" loading="lazy" />
    </a>
    <a href="https://picsum.photos/id/30/1200/800">
      <img src="https://picsum.photos/id/30/400/400" alt="House on a hill" loading="lazy" />
    </a>
    <a href="https://picsum.photos/id/40/1200/800">
      <img src="https://picsum.photos/id/40/400/400" alt="Autumn trees" loading="lazy" />
    </a>
    <a href="https://picsum.photos/id/50/1200/800">
      <img src="https://picsum.photos/id/50/400/400" alt="Winding road" loading="lazy" />
    </a>
    <a href="https://picsum.photos/id/60/1200/800">
      <img src="https://picsum.photos/id/60/400/400" alt="Mountain peak" loading="lazy" />
    </a>
  </image-gallery>

  <h2>With captions</h2>
  <image-gallery columns="250px" ratio="4:3">
    <figure>
      <a href="https://picsum.photos/id/100/1200/800">
        <img src="https://picsum.photos/id/100/400/300" alt="Mountain lake" loading="lazy" />
      </a>
      <figcaption>
        <strong>Morning at the Lake</strong>
        <p>Taken at dawn, Banff National Park.</p>
      </figcaption>
    </figure>
    <figure>
      <a href="https://picsum.photos/id/110/1200/800">
        <img src="https://picsum.photos/id/110/400/300" alt="Desert road" loading="lazy" />
      </a>
      <figcaption>
        <strong>Desert Highway</strong>
        <p>Route 66, Arizona. <a href="#">View series</a></p>
      </figcaption>
    </figure>
    <figure>
      <a href="https://picsum.photos/id/120/1200/800">
        <img src="https://picsum.photos/id/120/400/300" alt="City at night" loading="lazy" />
      </a>
      <figcaption>
        <strong>Urban Glow</strong>
        <p>Downtown after midnight.</p>
      </figcaption>
    </figure>
  </image-gallery>

  <!-- No JS loaded — demonstrates baseline behavior -->
</body>
</html>
