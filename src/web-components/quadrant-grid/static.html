<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quadrant Grid — Static Fallback</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    dl { display: grid; grid-template-columns: max-content 1fr; gap: 0.25rem 1rem; max-width: 36rem; }
    dt { font-weight: 600; }
    dd { margin: 0; color: #555; }
  </style>
</head>
<body>
  <!--
    Static fallback for <quadrant-grid>.

    Upgrade relationship:
    - Without JS or CSS: the <dl> below remains a readable list of
      quadrant titles and their items. Children with data-quadrant are
      grouped in author order.
    - With CSS but no JS: the :not(:defined) selector keeps the host
      visible; without the grid layout the items appear in source order
      grouped under their data-quadrant heading.
    - With JS: the component upgrades, builds the 2x2 grid with axis
      labels, distributes children into quadrant sections, optionally
      wires <drag-surface> for moves, and fires quadrant-grid:move.
  -->

  <quadrant-grid
    x-label="Effort"
    y-label="Impact"
    q1-label="Big Bets"
    q2-label="Quick Wins"
    q3-label="Fill-Ins"
    q4-label="Money Pit">
    <dl>
      <dt>Big Bets</dt>
      <dd>High impact, high effort. Long-term initiatives.</dd>
      <dt>Quick Wins</dt>
      <dd>High impact, low effort. Do these first.</dd>
      <dt>Fill-Ins</dt>
      <dd>Low impact, low effort. Background work.</dd>
      <dt>Money Pit</dt>
      <dd>Low impact, high effort. Avoid.</dd>
    </dl>
  </quadrant-grid>
</body>
</html>
