# Deploy to GitHub Pages
name: Deploy to GitHub Pages

on:
  # Run on pushes to main branch
  push:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # GATES — must pass to deploy
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validator tests
        run: npm test

      - name: Type check (tsc --noEmit)
        run: npm run typecheck

      - name: Lint JS (ESLint + JSDoc)
        run: npm run lint:js

      - name: Lint HTML
        run: npm run lint:html

      - name: VB conformance check
        run: npm run conformance

      - name: Theme token coverage
        run: npm run lint:theme-tokens

      - name: Build CDN bundles (for budget check)
        run: npm run build:cdn

      - name: Bundle size budget check
        run: npm run budget

  # REPORTS — informational, don't block deployment
  quality-report:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Visual regression tests (surfaces)
        run: npm run test:surfaces || true
        continue-on-error: true

      - name: Visual regression tests (other)
        run: npm run test:visual || true
        continue-on-error: true

      - name: Component behavior tests
        run: npm run test:components || true
        continue-on-error: true

      - name: Health dashboard
        run: npm run health || true
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    needs: quality-gate  # Only gates block build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build CDN bundles
        run: npm run build:cdn

      - name: Build doc-extras bundle
        run: cd site && npm run build:doc-extras

      - name: Build site
        run: cd site && npm run build

      - name: Copy CDN to site output
        run: cp -r dist/cdn site/_site/cdn

      - name: Copy icons to site output
        run: mkdir -p site/_site/src && cp -r src/icons site/_site/src/icons

      - name: Copy VB source for dev references
        run: cp -r src/base src/tokens src/native-elements src/custom-elements src/web-components src/utils src/lib src/charts src/*.css src/*.js site/_site/src/

      - name: Fix paths for GitHub Pages
        run: npm run build:fix-paths
        env:
          BASE_URL: /vanilla-breeze/
          DIST_DIR: site/_site

      - name: Build search index
        run: npx pagefind --site site/_site

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
