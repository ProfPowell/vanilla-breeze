<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings Panel Sections</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface);
      min-block-size: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
    }
    .demo-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--size-m);
      border-block-start: var(--border-width-thin, 1px) solid var(--color-border);
      margin-block-start: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>Panel Sections</h1>
    <p>The settings panel contains four collapsible sections: Appearance, Accessibility, Layout, and Effects. Only one section can be open at a time.</p>
  </main>

  <footer class="demo-footer">
    <span>Footer area</span>
    <settings-panel></settings-panel>
  </footer>

  <script type="module" src="/src/main.js"></script>
  <script type="module">
    setTimeout(() => document.querySelector('settings-panel').open(), 300);
  </script>
</body>
</html>
