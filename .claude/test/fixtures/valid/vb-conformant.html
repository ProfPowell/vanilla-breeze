<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>VB Conformant Page</title>
</head>
<body>
  <header>
    <nav aria-label="Main navigation">
      <ul>
        <li><a href="#main">Home</a></li>
        <li><a href="#about">About</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">
    <article>
      <h1>VB Conformant Page</h1>
      <p>This page follows all VB architectural principles.</p>

      <section id="about">
        <h2>About Section</h2>
        <p>Content organized with semantic elements.</p>
      </section>

      <section>
        <h2>Form Example</h2>
        <form>
          <form-field>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required=""/>
          </form-field>
          <form-field>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required=""/>
          </form-field>
          <footer>
            <button type="submit">Submit</button>
          </footer>
        </form>
      </section>
    </article>

    <aside aria-label="Related content">
      <h2>Related Links</h2>
      <ul>
        <li><a href="#main">Back to main</a></li>
      </ul>
    </aside>
  </main>

  <footer>
    <p>Footer content</p>
  </footer>
</body>
</html>
