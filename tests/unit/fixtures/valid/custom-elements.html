<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Custom Elements Test</title>
</head>
<body>
  <h1 id="home">Custom Elements Demo</h1>

  <layout-stack data-gap="m">
    <h2>Stacked Content</h2>
    <p>Content inside a layout stack component.</p>
  </layout-stack>

  <layout-grid data-gap="m">
    <layout-card data-variant="elevated" data-padding="m">
      <h2>Card One</h2>
      <p>Card content here.</p>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <h2>Card Two</h2>
      <p>More card content.</p>
    </layout-card>
  </layout-grid>

  <p>Icon example: <icon-wc name="star"></icon-wc></p>

  <section id="about">
    <h2>About</h2>
    <p>About this demo page.</p>
  </section>

  <accordion-wc>
    <details>
      <summary>Section One</summary>
      <p>Accordion content for section one.</p>
    </details>
    <details>
      <summary>Section Two</summary>
      <p>Accordion content for section two.</p>
    </details>
  </accordion-wc>
</body>
</html>
