# Pagefind configuration for Cook-built VB docs
# https://pagefind.app/docs/config-options/

site: dist/pages
output_subdir: pagefind

# Only index content inside [data-pagefind-body]
# (set on <main> in all layouts)

# Exclude navigation, header, footer from indexing
exclude_selectors:
  - "header"
  - "footer"
  - "nav"
  - ".mobile-menu"
  - ".subnav"
  - ".nav-drawer-toggle"
  - "[data-pagefind-ignore]"
