<!DOCTYPE html>
<html lang="en" data-page="docs" data-fluid>
<head>
  <div data-include="/includes/head.html"></div>
  <link rel="stylesheet" href="${site.docsCss}">
</head>
<body>

  <div data-include="/includes/header.html"></div>

  <main data-pagefind-body>
    <div data-include="/includes/sidebar-nav-drawer.html"></div>

    <layout-sidebar data-layout-gap="xl" data-layout-sidebar-width="narrow" data-layout-content-min="60">
      <nav class="tree" id="nav-drawer" data-layout-density="compact" aria-label="Attributes navigation" data-vt="sidebar">
        <label for="nav-drawer-toggle" class="nav-drawer-close" aria-label="Close navigation">
          <icon-wc name="x"></icon-wc>
        </label>
        <div data-include="/includes/sidebar-attributes.html"></div>
      </nav>

      <layout-sidebar data-layout-side="end" data-layout-sidebar-width="narrow" data-layout-gap="xl">
        <aside>
          <page-toc levels="h2,h3" scope="article"></page-toc>
        </aside>
        <article>
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <ol>
              <li><a href="/docs/attributes/">Attributes</a></li>
              <li><a href="${crumbHref}">${crumbLabel}</a></li>
              <li><span aria-current="page">${attributeName}</span></li>
            </ol>
          </nav>
          <h1>${attributeName}</h1>
          <p class="lead">${description}</p>

          <heading-links levels="h2,h3">
            ${content}
          </heading-links>
        </article>
      </layout-sidebar>
    </layout-sidebar>

    <div data-include="/includes/sidebar-auto-open.html"></div>
  </main>

  <div data-include="/includes/footer.html"></div>
  <div data-include="/includes/mobile-menu.html"></div>

  <short-cuts></short-cuts>
  <script type="module" src="${site.js}"></script>
  <script type="module" src="${site.uiJs}"></script>
  <script type="module" src="${site.effectsJs}"></script>
  <script type="module" src="${site.prototypeJs}"></script>
  <script type="module" src="${site.extrasJs}"></script>
  <script type="module" src="${site.docExtrasJs}"></script>
</body>
</html>
