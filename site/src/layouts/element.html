<!DOCTYPE html>
<html lang="en" data-page="docs" data-fluid${site.iconPathAttr}>
<head>
  <meta data-include="/includes/head.html">
  <link rel="stylesheet" href="${site.docsCss}">
  ${slot:extraHead}
</head>
<body style="overflow-x: clip;">

  <include-file src="/includes/header.html"></include-file>

  <main data-pagefind-body style="overflow-x: clip;">
    <include-file src="/includes/sidebar-nav-drawer.html"></include-file>

    <layout-sidebar data-layout-gap="xl" data-layout-sidebar-width="narrow" data-layout-content-min="60">
      <nav class="tree" id="nav-drawer" data-layout-density="compact" data-layout-sticky aria-label="Elements navigation" data-vt="sidebar">
        <label for="nav-drawer-toggle" class="nav-drawer-close" aria-label="Close navigation">
          <icon-wc name="x"></icon-wc>
        </label>
        <include-file src="/includes/sidebar-elements.html"></include-file>
      </nav>

      <layout-sidebar data-layout-side="end" data-layout-sidebar-width="narrow" data-layout-gap="xl">
        <aside>
          <page-toc levels="h2,h3" scope="article"></page-toc>
          <page-tools data-position="sticky" data-orientation="horizontal">
            <print-page></print-page>
            <share-wc variant="icon" size="s"></share-wc>
            <button type="button" data-watch-page class="ghost icon-only" aria-label="Watch this page for updates">
              <icon-wc name="eye" size="sm"></icon-wc>
            </button>
          </page-tools>
        </aside>
        <article>
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <ol>
              <li><a href="/docs/elements/">Elements</a></li>
              <li><a href="${crumbHref}">${crumbLabel}</a></li>
              <li><span aria-current="page">${elementName}</span></li>
            </ol>
          </nav>
          <h1>${elementName}</h1>
          <p class="lead">${description}</p>

          <heading-links levels="h2,h3">
            ${content}
          </heading-links>
        </article>
      </layout-sidebar>
    </layout-sidebar>

    <include-file src="/includes/sidebar-auto-open.html"></include-file>
  </main>

  <include-file src="/includes/footer.html"></include-file>

  <fab-stack>
    <settings-panel></settings-panel>
    <a href="#" data-back-to-top aria-label="Back to top">&uarr;</a>
  </fab-stack>
  <short-cuts></short-cuts>
  <script type="module" src="${site.js}"></script>
  <script type="module" src="${site.extrasJs}"></script>
  <script type="module" src="${site.uiJs}"></script>
  <script type="module" src="${site.docExtrasJs}"></script>
</body>
</html>
