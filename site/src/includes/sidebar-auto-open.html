<script>
// Auto-open the <details> ancestor chain of the active sidebar link.
(function() {
  const active = document.querySelector('.tree a[aria-current="page"]') ||
                 document.querySelector('.tree a.active');
  if (!active) return;
  let el = active.closest('details');
  while (el) {
    el.open = true;
    el = el.parentElement.closest('details');
  }
})();
</script>
