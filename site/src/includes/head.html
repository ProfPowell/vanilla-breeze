<!-- Global Metadata -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a1a">
<meta name="generator" content="Cook">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- Sitemap -->
<link rel="sitemap" type="application/xml" href="/sitemap.xml">

<!-- Primary Meta Tags -->
<title>${title} | ${siteTitle}</title>
<meta name="title" content="${title} | ${siteTitle}">
<meta name="description" content="${description}">

<!-- Canonical URL -->
<link rel="canonical" href="${siteUrl}${currentPath}">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="${siteUrl}${currentPath}">
<meta property="og:title" content="${title} | ${siteTitle}">
<meta property="og:description" content="${description}">
<meta property="og:image" content="${siteUrl}/og-image.png">

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="${siteUrl}${currentPath}">
<meta property="twitter:title" content="${title} | ${siteTitle}">
<meta property="twitter:description" content="${description}">
<meta property="twitter:image" content="${siteUrl}/og-image.png">

<!-- Theme: prevent flash of wrong theme -->
<!-- FOUC guard: hide body while a non-core brand theme is still loading.
     The inline boot script below may document.write a <link rel="stylesheet"
     data-vb-theme-state="loading"> for the user's saved theme. With
     cross-document View Transitions enabled (@view-transition in
     view-transitions.css), the new page's first paint can happen before
     that stylesheet arrives, producing a one-frame flash in default theme
     before the user's real theme repaints. Hiding the body via :has()
     on the loading attribute keeps paint suppressed until the onload
     handler flips state → "ready" (or onerror → "error"), at which point
     this selector no longer matches and body becomes visible. -->
<style>
  html:has(link[data-vb-theme-state="loading"]) body {
    visibility: hidden;
  }
</style>

<script data-vb-is-dev="${site.isDev}">
  try {
    // Read VBStore-format keys: `vb:{namespace}:{key}` with an envelope
    // { data, timestamp }. The boot used to read simple keys like
    // 'vb-theme' — those were never written by any code (theme-picker
    // and settings-panel both persist through VBStore), so every
    // localStorage.getItem returned null, the boot fell through to
    // the default theme, and ThemeManager.init() belatedly applied
    // the real brand — producing the visible flash from default →
    // stored theme on every page load.
    const vbRead = (ns, key) => {
      try {
        const raw = localStorage.getItem(`vb:${ns}:${key}`);
        if (!raw) return null;
        const env = JSON.parse(raw);
        return env && typeof env === 'object' && 'data' in env ? env.data : null;
      } catch { return null; }
    };

    const stored = vbRead('theme', 'current') || {};
    const mode = stored.mode || 'auto';
    const brand = stored.brand || 'default';
    const isDev = document.currentScript?.dataset.vbIsDev === 'true';
    const coreThemes = new Set([
      'default',
      'a11y-high-contrast',
      'a11y-large-text',
      'a11y-dyslexia',
      'modern',
      'minimal',
      'classic'
    ]);
    const packThemes = new Set(['kawaii', 'memphis']);
    if (mode !== 'auto') {
      document.documentElement.dataset.mode = mode;
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.dataset.mode = 'dark';
    }
    const a11y = vbRead('settings', 'a11y') || [];
    const parts = [];
    if (brand && brand !== 'default') parts.push(brand);
    parts.push(...(Array.isArray(a11y) ? a11y : []));
    if (parts.length) document.documentElement.dataset.theme = parts.join(' ');
    const safeBrand = /^[a-z0-9-]+$/.test(brand) ? brand : 'default';
    if (!isDev && safeBrand && !coreThemes.has(safeBrand) && !document.querySelector(`link[data-vb-theme="${safeBrand}"]`)) {
      const href = `/cdn/themes/${safeBrand}.css`;
      const packAttr = packThemes.has(safeBrand) ? ` data-vb-pack="${safeBrand}"` : '';
      document.write(
        `<link rel="stylesheet" href="${href}" data-vb-theme="${safeBrand}" data-vb-theme-state="loading" data-vb-theme-boot=""${packAttr} onload="this.setAttribute('data-vb-theme-state','ready')" onerror="this.setAttribute('data-vb-theme-state','error')">`
      );
      // Safety fallback: if neither onload nor onerror fires within 1.5s
      // (slow network, broken cache, …), flip the state anyway so the
      // :has(loading) FOUC guard above doesn't leave the page invisible.
      setTimeout(() => {
        const link = document.querySelector('link[data-vb-theme-boot]');
        if (link && link.getAttribute('data-vb-theme-state') === 'loading') {
          link.setAttribute('data-vb-theme-state', 'timeout');
        }
      }, 1500);
    }
    if (stored.fluid) document.documentElement.dataset.fluid = stored.fluid;
    const effectiveMode = mode !== 'auto' ? mode
      : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    const themeColor = effectiveMode === 'dark' ? '#1a1a1a' : '#ffffff';
    document.querySelectorAll('meta[name="theme-color"]').forEach(m => {
      m.removeAttribute('media');
    });
    document.querySelector('meta[name="theme-color"]').content = themeColor;
    const ext = vbRead('settings', 'extensions') || {};
    if (ext.motionFx === false) document.documentElement.dataset.motionReduced = '';
    if (vbRead('settings', 'sticky') === 'on') document.documentElement.dataset.sticky = '';
  } catch(e) {}
</script>

${serviceWorkerMeta}

<!-- Analytics config (read by src/lib/analytics.js when vanilla-breeze-core.js boots).
     Transport 'beacon' POSTs to /api/analytics/*. Use 'console' to log events to
     devtools instead, or 'disabled' to turn analytics off entirely.

     Local dev (*.test, localhost, 127.0.0.1) has no analytics Worker, so the
     transport drops to 'disabled' to avoid 404 spam. Flip to 'console' in
     devtools via `vbAnalyticsConfig.transport = 'console'` before reload to
     inspect events locally.

     urlMasks collapses the /stats/?site=…&window=… query-string variants into
     a single canonical /stats/ path so the Top Pages panel doesn't fragment
     across every filter combination. See /docs/analytics/#url-masking. -->
<script>
  (function () {
    const host = location.hostname;
    const isLocal =
      host === 'localhost' || host === '127.0.0.1' || host.endsWith('.test');
    window.vbAnalyticsConfig = {
      siteId: 'vb-docs',
      transport: isLocal ? 'disabled' : 'beacon',
      endpoint: '/api/analytics',
      urlMasks: [
        { pattern: /^\/stats\/\?.*$/, replace: '/stats/' },
      ],
    };
  })();
</script>
