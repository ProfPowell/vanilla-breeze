<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grid Product Layout</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .product-price { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-grid data-layout-min="15rem" data-layout-gap="l">
    <layout-card data-variant="outlined">
      <layout-stack data-layout-gap="s">
        <div data-media data-layout-ratio="4:3" data-radius="s">
          <img src="https://picsum.photos/300/225?1" alt="Product 1" loading="lazy" />
        </div>
        <h4>Product Name</h4>
        <p class="product-price">$29.99</p>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined">
      <layout-stack data-layout-gap="s">
        <div data-media data-layout-ratio="4:3" data-radius="s">
          <img src="https://picsum.photos/300/225?2" alt="Product 2" loading="lazy" />
        </div>
        <h4>Product Name</h4>
        <p class="product-price">$34.99</p>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined">
      <layout-stack data-layout-gap="s">
        <div data-media data-layout-ratio="4:3" data-radius="s">
          <img src="https://picsum.photos/300/225?3" alt="Product 3" loading="lazy" />
        </div>
        <h4>Product Name</h4>
        <p class="product-price">$24.99</p>
      </layout-stack>
    </layout-card>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
