<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Status Message Filled Style</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m">
    <status-message data-variant="info" data-filled>
      <div data-content>
        <div data-title>Filled Info</div>
        <div data-description>A more prominent informational alert.</div>
      </div>
    </status-message>

    <status-message data-variant="error" data-filled>
      <div data-content>
        <div data-title>Filled Error</div>
        <div data-description>A critical error that needs attention.</div>
      </div>
    </status-message>
  </layout-stack>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
