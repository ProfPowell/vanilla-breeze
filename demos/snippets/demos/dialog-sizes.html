<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dialog Size Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); min-block-size: 300px; }
  </style>
</head>
<body>
  <layout-cluster data-layout-gap="m">
    <button type="button" commandfor="dlg-s" command="show-modal">Small</button>
    <button type="button" commandfor="dlg-default" command="show-modal">Default</button>
    <button type="button" commandfor="dlg-l" command="show-modal">Large</button>
    <button type="button" commandfor="dlg-full" command="show-modal">Full Screen</button>
  </layout-cluster>

  <dialog id="dlg-s" data-size="s">
    <header aria-label="Small (24rem) heading"><h1>Small (24rem)</h1></header>
    <p>Compact for simple confirmations or alerts.</p>
    <footer aria-label="Small (24rem) actions"><button type="button" commandfor="dlg-s" command="close">Close</button></footer>
  </dialog>

  <dialog id="dlg-default">
    <header aria-label="Default (32rem) heading"><h1>Default (32rem)</h1></header>
    <p>Standard size for most dialogs and forms.</p>
    <footer aria-label="Default (32rem) actions"><button type="button" commandfor="dlg-default" command="close">Close</button></footer>
  </dialog>

  <dialog id="dlg-l" data-size="l">
    <header aria-label="Large (48rem) heading"><h1>Large (48rem)</h1></header>
    <p>More space for complex content, tables, or multi-step forms.</p>
    <footer aria-label="Large (48rem) actions"><button type="button" commandfor="dlg-l" command="close">Close</button></footer>
  </dialog>

  <dialog id="dlg-full" data-size="full">
    <header aria-label="Full Screen (95vw / 95dvh) heading"><h1>Full Screen (95vw / 95dvh)</h1></header>
    <p>Full-screen experience for immersive content or complex workflows.</p>
    <footer aria-label="Full Screen (95vw / 95dvh) actions"><button type="button" commandfor="dlg-full" command="close">Close</button></footer>
  </dialog>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="https://unpkg.com/invokers-polyfill"></script>
</body>
</html>
