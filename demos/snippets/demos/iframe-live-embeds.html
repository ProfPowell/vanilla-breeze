<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Iframe Embeds</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="xl">
    <section>
      <h3>YouTube Video (16:9)</h3>
      <section class="embed-responsive" style="max-inline-size: 560px;">
        <iframe
          src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ"
          title="YouTube video player"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
          loading="lazy">
        </iframe>
      </section>
    </section>
    <section>
      <h3>OpenStreetMap (4:3)</h3>
      <section class="embed-responsive ratio-4x3" style="max-inline-size: 500px;">
        <iframe
          src="https://www.openstreetmap.org/export/embed.html?bbox=-122.4194%2C37.7749%2C-122.3894%2C37.7949&layer=mapnik"
          title="Map of San Francisco"
          loading="lazy">
        </iframe>
      </section>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
