<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Output Calculated Values</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="xl" style="max-inline-size: 30rem;">

    <section>
      <h2>Calculated Values</h2>
      <form class="stacked">
        <form-field>
          <label for="calc-qty">Quantity</label>
          <input type="number" id="calc-qty" value="2" min="1" />
        </form-field>
        <form-field>
          <label for="calc-price">Price per item</label>
          <input type="number" id="calc-price" value="29.99" step="0.01" min="0" />
        </form-field>
        <form-field>
          <label>Total</label>
          <output class="large highlight" for="calc-qty calc-price">$59.98</output>
        </form-field>
      </form>
    </section>

    <section>
      <h2>Combined Variants</h2>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label>Large + Highlight</label>
          <output class="large highlight">$1,234.56</output>
        </form-field>
        <form-field>
          <label>Block + Success</label>
          <output class="block success">Order confirmed. Your reference number is #VB-2024-0042.</output>
        </form-field>
        <form-field>
          <label>Block + Warning</label>
          <output class="block warning">Your session will expire in 5 minutes.</output>
        </form-field>
        <form-field>
          <label>Block + Error</label>
          <output class="block error">Payment could not be processed. Please try again.</output>
        </form-field>
      </layout-stack>
    </section>

  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
