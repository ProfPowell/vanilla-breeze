<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>layout-card Content Card</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 25rem; }
    .muted { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-card>
    <layout-stack data-layout-gap="m">
      <div data-media data-layout-ratio="16:9" data-radius="s">
        <img src="https://picsum.photos/400/225" alt="Card image" loading="lazy" />
      </div>
      <layout-stack data-layout-gap="xs">
        <h3>Card Title</h3>
        <p class="muted">A brief description of the card content that provides context for the user.</p>
      </layout-stack>
      <layout-cluster data-layout-gap="s">
        <button type="button">Primary</button>
        <button type="button" class="secondary">Secondary</button>
      </layout-cluster>
    </layout-stack>
  </layout-card>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
