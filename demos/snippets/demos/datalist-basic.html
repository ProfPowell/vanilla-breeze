<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Datalist Basic</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m" style="max-inline-size: 25rem;">
    <label for="browser">Browser</label>
    <input type="text" id="browser" list="browsers" placeholder="Start typing..." />
    <datalist id="browsers">
      <option value="Chrome"></option>
      <option value="Firefox"></option>
      <option value="Safari"></option>
      <option value="Edge"></option>
      <option value="Opera"></option>
      <option value="Brave"></option>
    </datalist>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
