<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reel Team Members</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .team-avatar { inline-size: 5rem; }
    .role { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-reel data-layout-gap="m" data-layout-item-width="s" data-layout-scrollbar>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="s" data-layout-align="center">
        <div data-media data-layout-ratio="1:1" data-radius="full" class="team-avatar">
          <img src="https://picsum.photos/100/100?30" alt="Team member 1" loading="lazy" />
        </div>
        <strong>Alice Williams</strong>
        <small class="role">Engineering Lead</small>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="s" data-layout-align="center">
        <div data-media data-layout-ratio="1:1" data-radius="full" class="team-avatar">
          <img src="https://picsum.photos/100/100?31" alt="Team member 2" loading="lazy" />
        </div>
        <strong>Bob Chen</strong>
        <small class="role">Product Manager</small>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="s" data-layout-align="center">
        <div data-media data-layout-ratio="1:1" data-radius="full" class="team-avatar">
          <img src="https://picsum.photos/100/100?32" alt="Team member 3" loading="lazy" />
        </div>
        <strong>Carol Davis</strong>
        <small class="role">Design Director</small>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="s" data-layout-align="center">
        <div data-media data-layout-ratio="1:1" data-radius="full" class="team-avatar">
          <img src="https://picsum.photos/100/100?33" alt="Team member 4" loading="lazy" />
        </div>
        <strong>David Evans</strong>
        <small class="role">Marketing Lead</small>
      </layout-stack>
    </layout-card>
  </layout-reel>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
