<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Table Colgroup</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <table>
    <caption>Team Schedule</caption>
    <colgroup>
      <col />
      <col style="background: oklch(from var(--color-interactive) l c h / 0.05);" />
      <col />
      <col style="background: oklch(from var(--color-interactive) l c h / 0.05);" />
    </colgroup>
    <thead>
      <tr>
        <th scope="col">Name</th>
        <th scope="col">Monday</th>
        <th scope="col">Tuesday</th>
        <th scope="col">Wednesday</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Alice</td><td>9am–5pm</td><td>Remote</td><td>9am–5pm</td>
      </tr>
      <tr>
        <td>Bob</td><td>10am–6pm</td><td>9am–5pm</td><td>Remote</td>
      </tr>
      <tr>
        <td>Carol</td><td>Remote</td><td>9am–5pm</td><td>10am–6pm</td>
      </tr>
    </tbody>
  </table>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
