<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkboxes and Radios</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Checkboxes</h3>
      <layout-stack data-layout-gap="s">
        <label><input type="checkbox" name="features" value="dark" /> Enable dark mode</label>
        <label><input type="checkbox" name="features" value="notify" checked /> Notifications</label>
        <label><input type="checkbox" name="features" value="analytics" /> Share analytics</label>
        <label><input type="checkbox" disabled /> Premium (disabled)</label>
      </layout-stack>
    </section>
    <section>
      <h3>Radio group</h3>
      <fieldset class="minimal">
        <legend>Shipping Method</legend>
        <layout-stack data-layout-gap="s">
          <label><input type="radio" name="ship" value="standard" checked /> Standard (5-7 days)</label>
          <label><input type="radio" name="ship" value="express" /> Express (2-3 days)</label>
          <label><input type="radio" name="ship" value="overnight" /> Overnight</label>
          <label><input type="radio" name="ship" value="pickup" disabled /> Pickup (unavailable)</label>
        </layout-stack>
      </fieldset>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
