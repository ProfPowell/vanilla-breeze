<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Layout Badge - Status Indicators</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="s">
    <layout-cluster data-layout-gap="s" data-layout-align="center">
      <span>Order Status:</span>
      <layout-badge data-color="success">Completed</layout-badge>
    </layout-cluster>
    <layout-cluster data-layout-gap="s" data-layout-align="center">
      <span>Payment:</span>
      <layout-badge data-variant="subtle" data-color="warning">Pending</layout-badge>
    </layout-cluster>
    <layout-cluster data-layout-gap="s" data-layout-align="center">
      <span>Subscription:</span>
      <layout-badge data-variant="outlined" data-color="error">Expired</layout-badge>
    </layout-cluster>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
