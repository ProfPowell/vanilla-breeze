<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Field Checkbox and Radio</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 30rem; }
  </style>
</head>
<body>
  <form>
    <layout-stack data-layout-gap="l">
      <form-field data-type="checkbox">
        <label>
          <input type="checkbox" id="terms" name="terms" required />
          I agree to the Terms of Service
        </label>
      </form-field>

      <fieldset>
        <legend>Preferred Contact Method</legend>
        <layout-stack data-layout-gap="xs">
          <form-field data-type="radio">
            <label>
              <input type="radio" name="contact" value="email" required />
              Email
            </label>
          </form-field>
          <form-field data-type="radio">
            <label>
              <input type="radio" name="contact" value="phone" />
              Phone
            </label>
          </form-field>
          <form-field data-type="radio">
            <label>
              <input type="radio" name="contact" value="mail" />
              Mail
            </label>
          </form-field>
        </layout-stack>
      </fieldset>
    </layout-stack>
  </form>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
