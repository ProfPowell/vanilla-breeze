<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>dl-item Horizontal</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 65ch; }
  </style>
</head>
<body>
  <dl class="horizontal bordered">
    <dl-item>
      <dt>Full Name</dt>
      <dd>Alexandra Chen</dd>
    </dl-item>
    <dl-item>
      <dt>Email</dt>
      <dd>alexandra.chen@example.com</dd>
    </dl-item>
    <dl-item>
      <dt>Role</dt>
      <dd>Senior Engineer</dd>
    </dl-item>
    <dl-item>
      <dt>Status</dt>
      <dd>Active</dd>
    </dl-item>
  </dl>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
