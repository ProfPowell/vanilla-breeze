<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Switcher - Threshold Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <p><strong>Lower Threshold (20rem)</strong> — stays horizontal longer</p>
      <layout-switcher data-layout-gap="m" data-layout-threshold="20rem">
        <layout-card data-variant="outlined" data-padding="s">
          <p>Card A</p>
        </layout-card>
        <layout-card data-variant="outlined" data-padding="s">
          <p>Card B</p>
        </layout-card>
      </layout-switcher>
    </section>
    <section>
      <p><strong>Higher Threshold (40rem)</strong> — stacks earlier</p>
      <layout-switcher data-layout-gap="m" data-layout-threshold="40rem">
        <layout-card data-variant="outlined" data-padding="s">
          <p>Card A</p>
        </layout-card>
        <layout-card data-variant="outlined" data-padding="s">
          <p>Card B</p>
        </layout-card>
      </layout-switcher>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
