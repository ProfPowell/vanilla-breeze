<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Avatar Sizes</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-cluster data-layout-gap="m" data-layout-align="center">
    <user-avatar data-size="xs">
      <span data-fallback>XS</span>
    </user-avatar>
    <user-avatar data-size="sm">
      <span data-fallback>SM</span>
    </user-avatar>
    <user-avatar data-size="md">
      <span data-fallback>MD</span>
    </user-avatar>
    <user-avatar data-size="lg">
      <span data-fallback>LG</span>
    </user-avatar>
    <user-avatar data-size="xl">
      <span data-fallback>XL</span>
    </user-avatar>
    <user-avatar data-size="2xl">
      <span data-fallback>2XL</span>
    </user-avatar>
  </layout-cluster>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
