<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Switcher - Pricing Comparison</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .plan-name { font-size: var(--font-size-lg); }
    .plan-price { font-size: var(--font-size-2xl); font-weight: 700; }
  </style>
</head>
<body>
  <layout-switcher data-layout-gap="l" data-layout-threshold="35rem">
    <layout-card data-variant="outlined" data-padding="l">
      <layout-stack data-layout-gap="m" data-layout-align="center">
        <strong class="plan-name">Basic</strong>
        <p class="plan-price">$9/mo</p>
        <ul>
          <li>5 Projects</li>
          <li>10GB Storage</li>
          <li>Email Support</li>
        </ul>
        <button type="button" class="secondary">Choose Basic</button>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="elevated" data-padding="l">
      <layout-stack data-layout-gap="m" data-layout-align="center">
        <strong class="plan-name">Pro</strong>
        <p class="plan-price">$29/mo</p>
        <ul>
          <li>Unlimited Projects</li>
          <li>100GB Storage</li>
          <li>Priority Support</li>
        </ul>
        <button type="button">Choose Pro</button>
      </layout-stack>
    </layout-card>
  </layout-switcher>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
