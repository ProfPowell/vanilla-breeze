<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sidebar Gap Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="xl">
    <section>
      <p><strong>data-layout-gap="xs"</strong></p>
      <layout-sidebar data-layout-gap="xs">
        <layout-card data-variant="outlined" data-padding="s">
          <p>Sidebar</p>
        </layout-card>
        <layout-card data-variant="outlined" data-padding="s">
          <p>Main content with extra-small gap.</p>
        </layout-card>
      </layout-sidebar>
    </section>

    <section>
      <p><strong>data-layout-gap="m"</strong> (default)</p>
      <layout-sidebar data-layout-gap="m">
        <layout-card data-variant="outlined" data-padding="s">
          <p>Sidebar</p>
        </layout-card>
        <layout-card data-variant="outlined" data-padding="s">
          <p>Main content with medium gap.</p>
        </layout-card>
      </layout-sidebar>
    </section>

    <section>
      <p><strong>data-layout-gap="l"</strong></p>
      <layout-sidebar data-layout-gap="l">
        <layout-card data-variant="outlined" data-padding="s">
          <p>Sidebar</p>
        </layout-card>
        <layout-card data-variant="outlined" data-padding="s">
          <p>Main content with large gap.</p>
        </layout-card>
      </layout-sidebar>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
