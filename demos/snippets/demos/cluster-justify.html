<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cluster Justify Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .demo-cluster {
      background: var(--color-surface-raised);
      padding: var(--size-s);
      border-radius: var(--radius-s);
    }
    .demo-tag {
      padding: var(--size-xs) var(--size-s);
      background: var(--color-interactive);
      color: white;
      border-radius: var(--radius-s);
    }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <p><strong>data-layout-justify="start"</strong> (default)</p>
      <layout-cluster data-layout-gap="m" data-layout-justify="start" class="demo-cluster">
        <span class="demo-tag">Tag 1</span>
        <span class="demo-tag">Tag 2</span>
        <span class="demo-tag">Tag 3</span>
      </layout-cluster>
    </section>
    <section>
      <p><strong>data-layout-justify="center"</strong></p>
      <layout-cluster data-layout-gap="m" data-layout-justify="center" class="demo-cluster">
        <span class="demo-tag">Tag 1</span>
        <span class="demo-tag">Tag 2</span>
        <span class="demo-tag">Tag 3</span>
      </layout-cluster>
    </section>
    <section>
      <p><strong>data-layout-justify="end"</strong></p>
      <layout-cluster data-layout-gap="m" data-layout-justify="end" class="demo-cluster">
        <span class="demo-tag">Tag 1</span>
        <span class="demo-tag">Tag 2</span>
        <span class="demo-tag">Tag 3</span>
      </layout-cluster>
    </section>
    <section>
      <p><strong>data-layout-justify="between"</strong></p>
      <layout-cluster data-layout-gap="m" data-layout-justify="between" class="demo-cluster">
        <span class="demo-tag">Start</span>
        <span class="demo-tag">Middle</span>
        <span class="demo-tag">End</span>
      </layout-cluster>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
