<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grid Stats Layout</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .stat-value { font-size: var(--font-size-2xl); font-weight: 700; }
    .stat-label { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-grid data-layout-min="12rem" data-layout-gap="m">
    <layout-card data-variant="outlined" data-padding="l">
      <layout-stack data-layout-gap="xs" data-layout-align="center">
        <span class="stat-value">1,234</span>
        <span class="stat-label">Total Users</span>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="l">
      <layout-stack data-layout-gap="xs" data-layout-align="center">
        <span class="stat-value">567</span>
        <span class="stat-label">Active Today</span>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="l">
      <layout-stack data-layout-gap="xs" data-layout-align="center">
        <span class="stat-value">89%</span>
        <span class="stat-label">Satisfaction</span>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="l">
      <layout-stack data-layout-gap="xs" data-layout-align="center">
        <span class="stat-value">42</span>
        <span class="stat-label">New Signups</span>
      </layout-stack>
    </layout-card>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
