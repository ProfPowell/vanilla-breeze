<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Responsive Iframe Embeds</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .embed-responsive {
      border: var(--border-width-thin) solid var(--color-border);
      border-radius: var(--radius-m);
      overflow: hidden;
    }
  </style>
</head>
<body>
  <h1>Responsive Iframe Embeds</h1>
  <layout-stack data-layout-gap="xl">
    <section>
      <h2>.embed-responsive (16:9)</h2>
      <section class="embed-responsive" style="max-inline-size: 500px;">
        <iframe src="/docs/snippets/demos/iframe-content.html" title="16:9 responsive embed"></iframe>
      </section>
    </section>
    <section>
      <h2>.ratio-4x3</h2>
      <section class="embed-responsive ratio-4x3" style="max-inline-size: 400px;">
        <iframe src="/docs/snippets/demos/iframe-content.html" title="4:3 responsive embed"></iframe>
      </section>
    </section>
    <section>
      <h2>.ratio-1x1</h2>
      <section class="embed-responsive ratio-1x1" style="max-inline-size: 300px;">
        <iframe src="/docs/snippets/demos/iframe-content.html" title="Square responsive embed"></iframe>
      </section>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
