<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cover Hero Section</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: 0;
      background: var(--color-surface);
    }
    .demo-hero {
      background: linear-gradient(135deg, var(--color-interactive), oklch(0.5 0.2 280));
      color: white;
      min-block-size: 20rem;
    }
    .demo-hero a {
      color: white;
      text-decoration: none;
    }
    .demo-hero .btn-primary {
      background: white;
      color: var(--color-interactive);
    }
    .demo-hero .btn-secondary {
      background: transparent;
      border: 2px solid white;
      color: white;
    }
    .demo-hero .hero-subtitle {
      opacity: 0.9;
      max-inline-size: 40ch;
    }
    .demo-hero footer small {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <layout-cover class="demo-hero" data-layout-min="auto" data-layout-padding="xl" data-layout-centered>
    <header>
      <layout-cluster data-layout-gap="m" data-layout-justify="between">
        <strong>Brand</strong>
        <layout-cluster data-layout-gap="m">
          <a href="#">Home</a>
          <a href="#">About</a>
          <a href="#">Contact</a>
        </layout-cluster>
      </layout-cluster>
    </header>
    <div data-layout-principal>
      <layout-stack data-layout-gap="l" data-layout-align="center">
        <h1>Welcome to Our Platform</h1>
        <p class="hero-subtitle">Build amazing experiences with our comprehensive suite of tools and components.</p>
        <layout-cluster data-layout-gap="m">
          <button type="button" class="btn-primary">Get Started</button>
          <button type="button" class="btn-secondary">Learn More</button>
        </layout-cluster>
      </layout-stack>
    </div>
    <footer>
      <small>Scroll down to explore</small>
    </footer>
  </layout-cover>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
