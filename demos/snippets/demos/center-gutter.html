<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Center Gutter Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    layout-center {
      background: var(--color-surface-raised);
    }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m">
    <section>
      <p><strong>data-layout-gutter="none"</strong></p>
      <layout-center data-layout-gutter="none" data-layout-max="narrow">
        <p>No side padding — content touches edges.</p>
      </layout-center>
    </section>

    <section>
      <p><strong>data-layout-gutter="s"</strong></p>
      <layout-center data-layout-gutter="s" data-layout-max="narrow">
        <p>Small gutter padding.</p>
      </layout-center>
    </section>

    <section>
      <p><strong>data-layout-gutter="l"</strong></p>
      <layout-center data-layout-gutter="l" data-layout-max="narrow">
        <p>Large gutter padding.</p>
      </layout-center>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
