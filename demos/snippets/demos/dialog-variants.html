<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dialog Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); min-block-size: 300px; }
  </style>
</head>
<body>
  <layout-cluster data-layout-gap="m">
    <button commandfor="basic-dlg" command="show-modal">Basic</button>
    <button commandfor="confirm-dlg" command="show-modal" class="secondary">Confirmation</button>
    <button commandfor="form-dlg" command="show-modal">Form</button>
  </layout-cluster>

  <dialog id="basic-dlg">
    <header><h3>Basic Dialog</h3></header>
    <p>A simple dialog with header, content, and footer.</p>
    <footer>
      <button commandfor="basic-dlg" command="close">Close</button>
    </footer>
  </dialog>

  <dialog id="confirm-dlg">
    <header><h3>Confirm Deletion</h3></header>
    <p>Are you sure you want to delete this item? This action cannot be undone.</p>
    <footer>
      <button class="secondary" commandfor="confirm-dlg" command="close">Cancel</button>
      <button commandfor="confirm-dlg" command="close">Delete</button>
    </footer>
  </dialog>

  <dialog id="form-dlg">
    <header><h3>Subscribe</h3></header>
    <form id="subscribe-form" class="stacked">
      <form-field>
        <label for="dlg-email">Email Address</label>
        <input type="email" id="dlg-email" placeholder="you@example.com" />
      </form-field>
      <form-field>
        <label><input type="checkbox" /> Send me weekly updates</label>
      </form-field>
    </form>
    <footer>
      <button class="secondary" commandfor="form-dlg" command="close">Cancel</button>
      <button type="submit" form="subscribe-form" commandfor="form-dlg" command="close">Subscribe</button>
    </footer>
  </dialog>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="https://unpkg.com/invokers-polyfill"></script>
</body>
</html>
