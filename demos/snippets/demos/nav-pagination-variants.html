<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nav Pagination Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <p><small>With ellipsis</small></p>
      <nav class="pagination" aria-label="Pagination with ellipsis">
        <ul>
          <li><a href="#" data-prev>Previous</a></li>
          <li><a href="#">1</a></li>
          <li><span data-ellipsis>...</span></li>
          <li><a href="#">4</a></li>
          <li><a href="#" aria-current="page">5</a></li>
          <li><a href="#">6</a></li>
          <li><span data-ellipsis>...</span></li>
          <li><a href="#">20</a></li>
          <li><a href="#" data-next>Next</a></li>
        </ul>
      </nav>
    </section>
    <section>
      <p><small>Simple variant (prev/next only)</small></p>
      <nav class="pagination" data-variant="simple" aria-label="Simple pagination">
        <ul>
          <li><a href="#" data-prev>Previous</a></li>
          <li><span data-info>Page 3 of 10</span></li>
          <li><a href="#" data-next>Next</a></li>
        </ul>
      </nav>
    </section>
    <section>
      <p><small>Compact variant (connected buttons)</small></p>
      <nav class="pagination" data-variant="compact" aria-label="Compact pagination">
        <ul>
          <li><a href="#" data-prev>Prev</a></li>
          <li><a href="#">1</a></li>
          <li><a href="#">2</a></li>
          <li><a href="#" aria-current="page">3</a></li>
          <li><a href="#">4</a></li>
          <li><a href="#">5</a></li>
          <li><a href="#" data-next>Next</a></li>
        </ul>
      </nav>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
