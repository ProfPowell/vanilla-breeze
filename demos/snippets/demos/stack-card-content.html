<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stack Card Content</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .card-container { max-inline-size: 20rem; }
    .card-description { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <section class="card-container">
    <layout-card>
      <layout-stack data-layout-gap="s">
        <h3>Card Title</h3>
        <p class="card-description">Card description text that explains the content.</p>
        <layout-cluster data-layout-gap="s">
          <button type="button">Action</button>
          <button type="button" class="secondary">Cancel</button>
        </layout-cluster>
      </layout-stack>
    </layout-card>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
