<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>layout-card Grid Mode</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 25rem; }
  </style>
</head>
<body>
  <layout-card>
    <header>
      <h3>Card Title</h3>
    </header>
    <section>
      <p>Card content goes here. This area expands to fill available space.</p>
    </section>
    <footer>
      <button type="button" class="secondary">Cancel</button>
      <button type="button">Save</button>
    </footer>
  </layout-card>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
