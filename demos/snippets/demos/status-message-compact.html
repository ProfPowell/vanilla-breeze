<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Status Message Compact</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m">
    <status-message data-variant="info" data-compact>
      <div data-content>Your session will expire in 5 minutes.</div>
    </status-message>

    <status-message data-variant="success" data-compact>
      <div data-content>File uploaded successfully!</div>
    </status-message>
  </layout-stack>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
