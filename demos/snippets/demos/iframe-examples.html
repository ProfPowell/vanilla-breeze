<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iframe Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>Iframe Variants</h1>
  <layout-stack data-layout-gap="xl">
    <section>
      <h2>Default (no border)</h2>
      <iframe src="/docs/snippets/demos/iframe-content.html" title="Default iframe" style="block-size: 180px;"></iframe>
    </section>
    <section>
      <h2>.bordered</h2>
      <iframe src="/docs/snippets/demos/iframe-content.html" title="Bordered iframe" class="bordered" style="block-size: 180px;"></iframe>
    </section>
    <section>
      <h2>.rounded</h2>
      <iframe src="/docs/snippets/demos/iframe-content.html" title="Rounded iframe" class="rounded" style="block-size: 180px;"></iframe>
    </section>
    <section>
      <h2>.full (100% width)</h2>
      <iframe src="/docs/snippets/demos/iframe-content.html" title="Full width iframe" class="full" style="block-size: 180px;"></iframe>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
