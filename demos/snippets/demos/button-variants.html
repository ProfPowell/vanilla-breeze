<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Button Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Style variants</h3>
      <layout-cluster data-layout-gap="m">
        <button type="button">Primary</button>
        <button type="button" class="secondary">Secondary</button>
        <button type="button" class="ghost">Ghost</button>
      </layout-cluster>
    </section>
    <section>
      <h3>Sizes</h3>
      <layout-cluster data-layout-gap="m" data-layout-align="center">
        <button type="button" class="small">Small</button>
        <button type="button">Default</button>
        <button type="button" class="large">Large</button>
      </layout-cluster>
    </section>
    <section>
      <h3>Full width</h3>
      <button type="button" class="full-width" style="max-inline-size: 25rem;">Full Width</button>
    </section>
    <section>
      <h3>States</h3>
      <layout-cluster data-layout-gap="m">
        <button type="button">Normal</button>
        <button type="button" disabled>Disabled</button>
      </layout-cluster>
    </section>
    <section>
      <h3>With icons</h3>
      <layout-cluster data-layout-gap="m">
        <button type="button"><icon-wc name="save" size="s"></icon-wc> Save</button>
        <button type="button" class="secondary"><icon-wc name="download" size="s"></icon-wc> Export</button>
        <button type="button" class="ghost"><icon-wc name="trash-2" size="s"></icon-wc> Delete</button>
      </layout-cluster>
    </section>
    <section>
      <h3>Button types in forms</h3>
      <form class="stacked" style="max-inline-size: 25rem;">
        <form-field>
          <label for="btn-demo">Name</label>
          <input type="text" id="btn-demo" />
        </form-field>
        <footer class="actions end">
          <button type="reset" class="ghost">Reset</button>
          <button type="button" class="secondary">Cancel</button>
          <button type="submit">Submit</button>
        </footer>
      </form>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
