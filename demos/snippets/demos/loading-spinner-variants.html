<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Loading Spinner - Color Variants</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
      display: flex;
      align-items: center;
      gap: var(--size-l);
    }
  </style>
</head>
<body>
  <loading-spinner data-size="l" data-variant="primary" aria-label="Loading"></loading-spinner>
  <loading-spinner data-size="l" data-variant="success" aria-label="Loading"></loading-spinner>
  <loading-spinner data-size="l" data-variant="warning" aria-label="Loading"></loading-spinner>
  <loading-spinner data-size="l" data-variant="error" aria-label="Loading"></loading-spinner>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
