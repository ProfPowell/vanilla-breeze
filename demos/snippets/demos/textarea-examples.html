<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Textarea Examples</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="xl" style="max-inline-size: 35rem;">

    <section>
      <h2>Basic Textarea</h2>
      <form-field>
        <label for="basic-msg">Message</label>
        <textarea id="basic-msg" name="message" placeholder="Enter your message..."></textarea>
      </form-field>
    </section>

    <section>
      <h2>Size with rows</h2>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="rows-3">Small (3 rows)</label>
          <textarea id="rows-3" rows="3" placeholder="Short input..."></textarea>
        </form-field>
        <form-field>
          <label for="rows-5">Medium (5 rows)</label>
          <textarea id="rows-5" rows="5" placeholder="Medium input..."></textarea>
        </form-field>
        <form-field>
          <label for="rows-10">Large (10 rows)</label>
          <textarea id="rows-10" rows="10" placeholder="Long input..."></textarea>
        </form-field>
      </layout-stack>
    </section>

    <section>
      <h2>Character Limits</h2>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="bio-limit">Bio (50-200 characters)</label>
          <textarea id="bio-limit" minlength="50" maxlength="200" placeholder="Tell us about yourself..."></textarea>
        </form-field>
        <form-field>
          <label for="tweet-limit">Tweet (280 max)</label>
          <textarea id="tweet-limit" maxlength="280" rows="3" placeholder="What's happening?"></textarea>
        </form-field>
      </layout-stack>
    </section>

    <section>
      <h2>States</h2>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="state-disabled">Disabled</label>
          <textarea id="state-disabled" disabled>This content cannot be edited.</textarea>
        </form-field>
        <form-field>
          <label for="state-readonly">Read-only</label>
          <textarea id="state-readonly" readonly>This content can be selected and copied but not modified.</textarea>
        </form-field>
        <form-field>
          <label for="state-invalid">Invalid</label>
          <textarea id="state-invalid" aria-invalid="true" minlength="50">Too short</textarea>
          <output class="error" for="state-invalid">Please enter at least 50 characters</output>
        </form-field>
      </layout-stack>
    </section>

    <section>
      <h2>With form-field Validation</h2>
      <form>
        <form-field>
          <label for="ff-msg">Message</label>
          <textarea id="ff-msg"
                    name="message"
                    required
                    minlength="10"
                    rows="5"
                    aria-describedby="ff-msg-hint"></textarea>
          <output id="ff-msg-hint" for="ff-msg" aria-live="polite">
            Please enter at least 10 characters
          </output>
        </form-field>
      </form>
    </section>

    <section>
      <h2>Real-World Patterns</h2>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="contact-msg">How can we help? *</label>
          <textarea id="contact-msg" name="message" required minlength="20" rows="6" placeholder="Please describe your question or issue in detail..."></textarea>
        </form-field>
        <form-field>
          <label for="code-snippet">Code Snippet</label>
          <textarea id="code-snippet" rows="6" spellcheck="false" style="font-family: var(--font-mono); font-size: var(--font-size-sm);">function greet(name) {
  return `Hello, ${name}!`;
}

console.log(greet('World'));</textarea>
        </form-field>
        <form-field>
          <label for="address">Full Address</label>
          <textarea id="address" name="address" rows="4" autocomplete="street-address" placeholder="Street address&#10;City, State ZIP&#10;Country"></textarea>
        </form-field>
      </layout-stack>
    </section>

  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
