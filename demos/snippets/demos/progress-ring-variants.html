<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Progress Ring - Color Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
      display: flex;
      align-items: center;
      gap: var(--size-l);
    }
  </style>
</head>
<body>
  <progress-ring data-size="l" data-variant="success" style="--progress: 100" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"><span>Done</span></progress-ring>
  <progress-ring data-size="l" data-variant="warning" style="--progress: 45" role="progressbar" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100"><span>45%</span></progress-ring>
  <progress-ring data-size="l" data-variant="error" style="--progress: 15" role="progressbar" aria-valuenow="15" aria-valuemin="0" aria-valuemax="100"><span>15%</span></progress-ring>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
