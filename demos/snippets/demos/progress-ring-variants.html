<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Progress Ring - Color Variants</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
      display: flex;
      align-items: center;
      gap: var(--size-l);
    }
  </style>
</head>
<body>
  <progress data-type="ring" data-size="l" class="success" value="100" max="100">Done</progress>
  <progress data-type="ring" data-size="l" class="warning" value="45" max="100">45%</progress>
  <progress data-type="ring" data-size="l" class="error" value="15" max="100">15%</progress>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
