<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unordered List Markers</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Check marks</h3>
      <ul data-marker="check">
        <li>Task completed</li>
        <li>Another done item</li>
        <li>All finished</li>
      </ul>
    </section>
    <section>
      <h3>Arrows</h3>
      <ul data-marker="arrow">
        <li>Navigate here</li>
        <li>Go to settings</li>
        <li>View details</li>
      </ul>
    </section>
    <section>
      <h3>Dashes</h3>
      <ul data-marker="dash">
        <li>Minimal style</li>
        <li>Clean and simple</li>
        <li>Understated</li>
      </ul>
    </section>
    <section>
      <h3>Stars</h3>
      <ul data-marker="star">
        <li>Featured item</li>
        <li>Highlighted content</li>
        <li>Special note</li>
      </ul>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
