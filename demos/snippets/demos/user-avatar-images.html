<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Avatar With Image</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-cluster data-layout-gap="m" data-layout-align="center">
    <user-avatar data-size="lg">
      <img src="https://i.pravatar.cc/150?img=1" alt="Jane Doe" />
    </user-avatar>
    <user-avatar data-size="lg">
      <img src="https://i.pravatar.cc/150?img=2" alt="John Smith" />
    </user-avatar>
    <user-avatar data-size="lg">
      <img src="https://i.pravatar.cc/150?img=3" alt="Alex Johnson" />
    </user-avatar>
  </layout-cluster>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
