<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>layout-card Block Mode Padding</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .padding-none-inner { background: var(--color-surface-raised); padding: var(--size-xs); }
  </style>
</head>
<body>
  <layout-grid data-layout-min="12rem" data-layout-gap="m">
    <layout-card data-variant="outlined" data-padding="none">
      <p class="padding-none-inner">
        <code>padding="none"</code>
      </p>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="s">
      <code>padding="s"</code>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <code>padding="m"</code> (default)
    </layout-card>
    <layout-card data-variant="outlined" data-padding="l">
      <code>padding="l"</code>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="xl">
      <code>padding="xl"</code>
    </layout-card>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
