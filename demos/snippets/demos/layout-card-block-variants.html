<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>layout-card Block Mode Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .muted { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-grid data-layout-min="15rem" data-layout-gap="l">
    <layout-stack data-layout-gap="s">
      <p><strong>Default</strong></p>
      <layout-card>
        <layout-stack data-layout-gap="s">
          <strong>Default Card</strong>
          <p class="muted">Subtle shadow with background color.</p>
        </layout-stack>
      </layout-card>
    </layout-stack>

    <layout-stack data-layout-gap="s">
      <p><strong>data-variant="elevated"</strong></p>
      <layout-card data-variant="elevated">
        <layout-stack data-layout-gap="s">
          <strong>Elevated Card</strong>
          <p class="muted">Stronger shadow for more emphasis.</p>
        </layout-stack>
      </layout-card>
    </layout-stack>

    <layout-stack data-layout-gap="s">
      <p><strong>data-variant="outlined"</strong></p>
      <layout-card data-variant="outlined">
        <layout-stack data-layout-gap="s">
          <strong>Outlined Card</strong>
          <p class="muted">Border instead of shadow.</p>
        </layout-stack>
      </layout-card>
    </layout-stack>

    <layout-stack data-layout-gap="s">
      <p><strong>data-variant="ghost"</strong></p>
      <layout-card data-variant="ghost">
        <layout-stack data-layout-gap="s">
          <strong>Ghost Card</strong>
          <p class="muted">Transparent, no shadow or border.</p>
        </layout-stack>
      </layout-card>
    </layout-stack>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
