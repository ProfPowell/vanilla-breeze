<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Datalist with form-field</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <form style="max-inline-size: 25rem;">
    <layout-stack data-layout-gap="m">
      <form-field>
        <label for="country">Country</label>
        <input type="text"
               id="country"
               name="country"
               list="countries"
               required
               autocomplete="country-name"
               aria-describedby="country-msg" />
        <datalist id="countries">
          <option value="United States"></option>
          <option value="Canada"></option>
          <option value="United Kingdom"></option>
          <option value="Australia"></option>
          <option value="Germany"></option>
          <option value="France"></option>
        </datalist>
        <output id="country-msg" for="country" aria-live="polite">
          Start typing to see suggestions
        </output>
      </form-field>
      <footer>
        <button type="submit">Submit</button>
      </footer>
    </layout-stack>
  </form>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
