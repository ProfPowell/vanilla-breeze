<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meter Labeled</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l" style="max-inline-size: 25rem;">
    <section class="labeled">
      <label>
        <span>Storage</span>
        <span>14.3 GB / 20 GB</span>
      </label>
      <meter value="14.3" min="0" max="20" low="5" high="17" optimum="0">71.5%</meter>
    </section>
    <section class="labeled">
      <label>
        <span>Password Strength</span>
        <span>Strong</span>
      </label>
      <meter value="0.85" min="0" max="1" low="0.3" high="0.6" optimum="1">85%</meter>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
