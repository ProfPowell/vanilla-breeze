<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Table Density</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="xl">
    <section>
      <h3>data-density="compact"</h3>
      <table data-density="compact">
        <thead><tr><th>Name</th><th>Role</th></tr></thead>
        <tbody>
          <tr><td>Alice</td><td>Engineer</td></tr>
          <tr><td>Bob</td><td>Designer</td></tr>
          <tr><td>Carol</td><td>Manager</td></tr>
        </tbody>
      </table>
    </section>
    <section>
      <h3>Default</h3>
      <table>
        <thead><tr><th>Name</th><th>Role</th></tr></thead>
        <tbody>
          <tr><td>Alice</td><td>Engineer</td></tr>
          <tr><td>Bob</td><td>Designer</td></tr>
          <tr><td>Carol</td><td>Manager</td></tr>
        </tbody>
      </table>
    </section>
    <section>
      <h3>data-density="comfortable"</h3>
      <table data-density="comfortable">
        <thead><tr><th>Name</th><th>Role</th></tr></thead>
        <tbody>
          <tr><td>Alice</td><td>Engineer</td></tr>
          <tr><td>Bob</td><td>Designer</td></tr>
          <tr><td>Carol</td><td>Manager</td></tr>
        </tbody>
      </table>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
