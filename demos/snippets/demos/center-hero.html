<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Center Hero Section</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-2xl);
      background: linear-gradient(to bottom, var(--color-gray-900), var(--color-gray-800));
      color: white;
    }
    h1 { font-size: var(--font-size-3xl); }
    .hero-subtitle { opacity: 0.8; font-size: var(--font-size-lg); }
    .btn-outline {
      background: transparent;
      border-color: white;
      color: white;
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow" data-layout-text data-layout-intrinsic>
    <layout-stack data-layout-gap="l" data-layout-align="center">
      <h1>Welcome to Our Platform</h1>
      <p class="hero-subtitle">Build amazing products with our comprehensive toolkit designed for modern development.</p>
      <layout-cluster data-layout-gap="m">
        <button type="button">Get Started</button>
        <button type="button" class="secondary btn-outline">Learn More</button>
      </layout-cluster>
    </layout-stack>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
