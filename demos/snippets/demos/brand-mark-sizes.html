<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brand Mark Sizes</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m">
    <p>
      <brand-mark data-size="s">
        <svg width="20" height="20" viewBox="0 0 32 32" fill="currentColor"><circle cx="16" cy="16" r="14" /></svg>
        Small
      </brand-mark>
    </p>
    <p>
      <brand-mark>
        <svg width="28" height="28" viewBox="0 0 32 32" fill="currentColor"><circle cx="16" cy="16" r="14" /></svg>
        Default
      </brand-mark>
    </p>
    <p>
      <brand-mark data-size="l">
        <svg width="36" height="36" viewBox="0 0 32 32" fill="currentColor"><circle cx="16" cy="16" r="14" /></svg>
        Large
      </brand-mark>
    </p>
    <p>
      <brand-mark data-size="xl">
        <svg width="48" height="48" viewBox="0 0 32 32" fill="currentColor"><circle cx="16" cy="16" r="14" /></svg>
        Extra Large
      </brand-mark>
    </p>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
