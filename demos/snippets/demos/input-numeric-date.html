<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Numeric and Date Inputs</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l" style="max-inline-size: 25rem;">
    <section>
      <h3>Numeric</h3>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="n-qty">Quantity</label>
          <input type="number" id="n-qty" value="1" min="1" max="99" step="1" />
        </form-field>
        <form-field>
          <label for="n-range">Volume: <output id="vol-out">50</output></label>
          <input type="range" id="n-range" min="0" max="100" value="50" />
        </form-field>
      </layout-stack>
    </section>
    <section>
      <h3>Date and Time</h3>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="d-date">Date</label>
          <input type="date" id="d-date" />
        </form-field>
        <form-field>
          <label for="d-time">Time</label>
          <input type="time" id="d-time" />
        </form-field>
        <form-field>
          <label for="d-dtl">Date &amp; Time</label>
          <input type="datetime-local" id="d-dtl" />
        </form-field>
      </layout-stack>
    </section>
  </layout-stack>
  <script>
    document.getElementById('n-range').addEventListener('input', e => {
      document.getElementById('vol-out').value = e.target.value;
    });
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
