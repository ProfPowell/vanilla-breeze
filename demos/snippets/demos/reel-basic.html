<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reel Basic Usage</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-reel data-layout-gap="m" data-layout-item-width="m">
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="xs">
        <strong>Item 1</strong>
        <p>Scroll horizontally to see more items</p>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="xs">
        <strong>Item 2</strong>
        <p>Each item snaps into place</p>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="xs">
        <strong>Item 3</strong>
        <p>Works great on touch devices</p>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="xs">
        <strong>Item 4</strong>
        <p>No JavaScript required</p>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="xs">
        <strong>Item 5</strong>
        <p>CSS scroll-snap handles positioning</p>
      </layout-stack>
    </layout-card>
  </layout-reel>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
