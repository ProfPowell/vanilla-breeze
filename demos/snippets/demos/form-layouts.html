<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Layouts</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="xl">
    <section>
      <h3>form.stacked (vertical)</h3>
      <form class="stacked" style="max-inline-size: 25rem;">
        <form-field>
          <label for="s-name">Name</label>
          <input type="text" id="s-name" placeholder="Your name" />
        </form-field>
        <form-field>
          <label for="s-email">Email</label>
          <input type="email" id="s-email" placeholder="you@example.com" />
        </form-field>
        <form-field>
          <label for="s-msg">Message</label>
          <textarea id="s-msg" rows="3" placeholder="Your message"></textarea>
        </form-field>
        <footer class="actions end">
          <button type="button" class="secondary">Cancel</button>
          <button type="submit">Send</button>
        </footer>
      </form>
    </section>
    <section>
      <h3>form.inline (horizontal)</h3>
      <form class="inline">
        <form-field>
          <label for="i-search" class="visually-hidden">Search</label>
          <input type="search" id="i-search" placeholder="Search..." />
        </form-field>
        <button type="submit">Search</button>
      </form>
    </section>
    <section>
      <h3>form.grid (two-column)</h3>
      <form class="grid" style="max-inline-size: 30rem;">
        <label for="g-first">First Name</label>
        <input type="text" id="g-first" />
        <label for="g-last">Last Name</label>
        <input type="text" id="g-last" />
        <label for="g-phone">Phone</label>
        <input type="tel" id="g-phone" />
      </form>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
