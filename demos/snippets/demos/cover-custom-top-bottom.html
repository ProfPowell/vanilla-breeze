<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cover Custom Top/Bottom</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: 0;
      background: var(--color-surface);
    }
    .demo-custom-cover {
      background: var(--color-surface-raised);
      min-block-size: 15rem;
    }
    .demo-step-label {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
    }
    .demo-description {
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <layout-cover class="demo-custom-cover" data-layout-min="auto" data-layout-padding="m" data-layout-gap="m">
    <nav class="breadcrumb" data-layout-cover-top aria-label="Breadcrumb">
      <ol>
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><span aria-current="page">Item</span></li>
      </ol>
    </nav>
    <div data-layout-principal>
      <layout-stack data-layout-gap="s">
        <strong>Product Details</strong>
        <p class="demo-description">Main content centered vertically.</p>
      </layout-stack>
    </div>
    <div data-layout-cover-bottom>
      <layout-cluster data-layout-gap="s" data-layout-justify="between">
        <span class="demo-step-label">Step 2 of 4</span>
        <layout-cluster data-layout-gap="s">
          <button type="button" class="secondary small">Back</button>
          <button type="button" class="small">Next</button>
        </layout-cluster>
      </layout-cluster>
    </div>
  </layout-cover>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
