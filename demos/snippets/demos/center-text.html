<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Center Text Centering</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    layout-center {
      background: var(--color-surface-raised);
      padding: var(--size-l);
      border-radius: var(--radius-s);
    }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <p><strong>Text centering only</strong></p>
      <layout-center data-layout-text>
        <layout-stack data-layout-gap="m">
          <h2>Centered Heading</h2>
          <p>All text content within this container is centered, making it perfect for hero sections and call-to-action blocks.</p>
          <button type="button">Call to Action</button>
        </layout-stack>
      </layout-center>
    </section>

    <section>
      <p><strong>Combined: Intrinsic + Text</strong></p>
      <layout-center data-layout-intrinsic data-layout-text>
        <layout-stack data-layout-gap="s">
          <strong>Fully Centered</strong>
          <p>Both container and text are centered.</p>
        </layout-stack>
      </layout-center>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
