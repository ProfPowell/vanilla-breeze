<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Imposter Edge Positions</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .demo-container {
      position: relative;
      block-size: 150px;
      background: var(--color-surface-alt);
      border-radius: var(--radius-m);
    }
    .position-label {
      background: var(--color-primary);
      color: var(--color-on-primary);
      padding: var(--size-xs) var(--size-s);
      border-radius: var(--radius-s);
      font-size: var(--font-size-sm);
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <layout-imposter data-position="top" data-margin="s">
      <span class="position-label">Top</span>
    </layout-imposter>
    <layout-imposter data-position="bottom" data-margin="s">
      <span class="position-label">Bottom</span>
    </layout-imposter>
    <layout-imposter data-position="start" data-margin="s">
      <span class="position-label">Start</span>
    </layout-imposter>
    <layout-imposter data-position="end" data-margin="s">
      <span class="position-label">End</span>
    </layout-imposter>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
