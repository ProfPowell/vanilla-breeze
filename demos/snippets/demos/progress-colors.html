<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Progress Colors</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m" style="max-inline-size: 25rem;">
    <form-field>
      <label>Default (interactive color)</label>
      <progress value="70" max="100">70%</progress>
    </form-field>
    <form-field>
      <label>.success</label>
      <progress class="success" value="100" max="100">100%</progress>
    </form-field>
    <form-field>
      <label>.warning</label>
      <progress class="warning" value="60" max="100">60%</progress>
    </form-field>
    <form-field>
      <label>.error</label>
      <progress class="error" value="30" max="100">30%</progress>
    </form-field>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
