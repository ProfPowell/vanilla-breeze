<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stack Alignment Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-grid data-layout-min="15rem" data-layout-gap="l">
    <section>
      <p><strong>data-layout-align="start"</strong></p>
      <layout-stack data-layout-gap="s" data-layout-align="start">
        <button type="button">Short</button>
        <button type="button">Medium Button</button>
        <button type="button">Longer Button Text</button>
      </layout-stack>
    </section>

    <section>
      <p><strong>data-layout-align="center"</strong></p>
      <layout-stack data-layout-gap="s" data-layout-align="center">
        <button type="button">Short</button>
        <button type="button">Medium Button</button>
        <button type="button">Longer Button Text</button>
      </layout-stack>
    </section>

    <section>
      <p><strong>data-layout-align="end"</strong></p>
      <layout-stack data-layout-gap="s" data-layout-align="end">
        <button type="button">Short</button>
        <button type="button">Medium Button</button>
        <button type="button">Longer Button Text</button>
      </layout-stack>
    </section>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
