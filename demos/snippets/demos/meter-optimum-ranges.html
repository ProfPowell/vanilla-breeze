<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meter Optimum Ranges</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-grid data-layout-min="280px" data-layout-gap="l">
    <section>
      <h3>Low Optimum (lower is better)</h3>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label>CPU Usage — 22%</label>
          <meter min="0" max="100" low="40" high="75" optimum="20" value="22">22%</meter>
        </form-field>
        <form-field>
          <label>Memory — 61%</label>
          <meter min="0" max="100" low="40" high="75" optimum="20" value="61">61%</meter>
        </form-field>
        <form-field>
          <label>Disk — 88%</label>
          <meter min="0" max="100" low="40" high="75" optimum="20" value="88">88%</meter>
        </form-field>
      </layout-stack>
    </section>

    <section>
      <h3>High Optimum (higher is better)</h3>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label>HTML — 9/10</label>
          <meter min="0" max="10" low="4" high="7" optimum="10" value="9">9/10</meter>
        </form-field>
        <form-field>
          <label>CSS — 7/10</label>
          <meter min="0" max="10" low="4" high="7" optimum="10" value="7">7/10</meter>
        </form-field>
        <form-field>
          <label>JavaScript — 3/10</label>
          <meter min="0" max="10" low="4" high="7" optimum="10" value="3">3/10</meter>
        </form-field>
      </layout-stack>
    </section>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
