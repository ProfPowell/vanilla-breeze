<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stack Nested Stacks</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>Stack Nested Stacks</h1>
  <layout-stack data-layout-gap="xl">
    <layout-stack data-layout-gap="s">
      <h2>Section 1</h2>
      <p>Content for section 1</p>
    </layout-stack>
    <layout-stack data-layout-gap="s">
      <h2>Section 2</h2>
      <p>Content for section 2</p>
    </layout-stack>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
