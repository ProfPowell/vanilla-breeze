<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>layout-card Stat Cards</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .stat-label { color: var(--color-text-muted); }
    .stat-value { font-size: var(--font-size-2xl); }
    .stat-change { color: var(--color-success); }
  </style>
</head>
<body>
  <layout-grid data-layout-min="15rem" data-layout-gap="m">
    <layout-card data-variant="elevated" data-padding="l">
      <layout-stack data-layout-gap="xs">
        <small class="stat-label">Total Revenue</small>
        <strong class="stat-value">$45,231</strong>
        <small class="stat-change">+12.5% from last month</small>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="elevated" data-padding="l">
      <layout-stack data-layout-gap="xs">
        <small class="stat-label">Active Users</small>
        <strong class="stat-value">2,345</strong>
        <small class="stat-change">+8.2% from last month</small>
      </layout-stack>
    </layout-card>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
