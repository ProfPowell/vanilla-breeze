<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fieldset Status Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l" style="max-inline-size: 30rem;">
    <fieldset data-status="success">
      <legend>Payment Complete</legend>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="fs-s-card">Card Number</label>
          <input type="text" id="fs-s-card" value="•••• •••• •••• 4242" readonly />
        </form-field>
      </layout-stack>
    </fieldset>

    <fieldset data-status="warning">
      <legend>Verification Needed</legend>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="fs-w-phone">Phone Number</label>
          <input type="tel" id="fs-w-phone" placeholder="Required for verification" />
        </form-field>
      </layout-stack>
    </fieldset>

    <fieldset data-status="error">
      <legend>Validation Errors</legend>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="fs-e-email">Email</label>
          <input type="email" id="fs-e-email" value="not-an-email" aria-invalid="true" />
        </form-field>
      </layout-stack>
    </fieldset>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
