<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video Chapter Markers</title>
  <link rel="stylesheet" href="/src/main.css" />
  <script type="module" src="/src/main.js"></script>
  <style>
    body { padding: var(--size-m); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack>
    <article>
      <h2>Tutorial with Chapters</h2>
      <p>Click any chapter below the video to jump to that section. The current chapter highlights during playback.</p>
      <video controls preload="metadata">
        <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" type="video/webm" />
        <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4" />
        <track kind="chapters" src="assets/chapters.vtt" default data-chapter-list />
      </video>
    </article>
  </layout-stack>
</body>
</html>
