<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fieldset Radio Group</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <fieldset style="max-inline-size: 30rem;">
    <legend>Preferred Contact Method</legend>
    <layout-stack data-layout-gap="s">
      <label>
        <input type="radio" name="contact-method" value="email" checked /> Email
      </label>
      <label>
        <input type="radio" name="contact-method" value="phone" /> Phone
      </label>
      <label>
        <input type="radio" name="contact-method" value="mail" /> Mail
      </label>
    </layout-stack>
  </fieldset>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
