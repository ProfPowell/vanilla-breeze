<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>layout-card Nested Cards</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 30rem; }
    .muted { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-card data-padding="l">
    <layout-stack data-layout-gap="m">
      <h3>Outer Card</h3>
      <p class="muted">Nested cards automatically get a raised surface color.</p>
      <layout-card>
        <layout-stack data-layout-gap="s">
          <strong>Nested Card</strong>
          <p class="muted">This inner card has a distinct background.</p>
        </layout-stack>
      </layout-card>
    </layout-stack>
  </layout-card>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
