<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Field Input Types</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 30rem; }
  </style>
</head>
<body>
  <form>
    <layout-stack data-layout-gap="l">
      <form-field>
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required
               minlength="2" autocomplete="name"
               aria-describedby="name-msg" />
        <output id="name-msg" for="name" aria-live="polite">
          At least 2 characters required
        </output>
      </form-field>

      <form-field>
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required
               autocomplete="email"
               aria-describedby="email-msg" />
        <output id="email-msg" for="email" aria-live="polite">
          Please enter a valid email address
        </output>
      </form-field>

      <form-field>
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               required minlength="8"
               autocomplete="new-password"
               aria-describedby="password-msg" />
        <output id="password-msg" for="password" aria-live="polite">
          At least 8 characters required
        </output>
      </form-field>

      <form-field>
        <label for="category">Category</label>
        <select id="category" name="category" required>
          <option value="" disabled selected>Select a category...</option>
          <option value="general">General Inquiry</option>
          <option value="support">Technical Support</option>
          <option value="sales">Sales Question</option>
        </select>
      </form-field>

      <form-field>
        <label for="message">Message</label>
        <textarea id="message" name="message" required
                  minlength="10" rows="4"
                  aria-describedby="message-msg"></textarea>
        <output id="message-msg" for="message" aria-live="polite">
          At least 10 characters required
        </output>
      </form-field>
    </layout-stack>
  </form>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
