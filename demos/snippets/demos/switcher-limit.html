<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Switcher - Item Limit</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-switcher data-layout-gap="m" data-layout-limit="2">
    <layout-card data-variant="outlined" data-padding="s"><p>Item 1</p></layout-card>
    <layout-card data-variant="outlined" data-padding="s"><p>Item 2</p></layout-card>
    <layout-card data-variant="outlined" data-padding="s"><p>Item 3 (forces stack)</p></layout-card>
  </layout-switcher>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
