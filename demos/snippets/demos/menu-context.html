<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu — Context</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Button Actions</h3>
      <menu class="context" style="display: inline-flex;">
        <li><button type="button">Cut</button></li>
        <li><button type="button">Copy</button></li>
        <li><button type="button">Paste</button></li>
        <li role="separator"></li>
        <li><button type="button">Select All</button></li>
      </menu>
    </section>
    <section>
      <h3>Link Actions</h3>
      <menu class="context" style="display: inline-flex;">
        <li><a href="#">View Profile</a></li>
        <li><a href="#">Settings</a></li>
        <li><a href="#">Help</a></li>
        <li role="separator"></li>
        <li><a href="#">Sign Out</a></li>
      </menu>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
