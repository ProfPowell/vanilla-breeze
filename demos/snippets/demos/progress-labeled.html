<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Progress Labeled</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l" style="max-inline-size: 25rem;">
    <section class="labeled">
      <label>
        <span>Uploading file.zip</span>
        <span>45%</span>
      </label>
      <progress value="45" max="100">45%</progress>
    </section>
    <section class="labeled">
      <label>
        <span>Installing updates</span>
        <span>78%</span>
      </label>
      <progress value="78" max="100">78%</progress>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
