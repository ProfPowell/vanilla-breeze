<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Label Patterns</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="xl" style="max-inline-size: 30rem;">

    <section>
      <h2>Explicit Association (for attribute)</h2>
      <form-field>
        <label for="explicit-name">Full Name</label>
        <input type="text" id="explicit-name" placeholder="Click the label to focus" />
      </form-field>
    </section>

    <section>
      <h2>Implicit Association (wrapping)</h2>
      <layout-stack data-layout-gap="m">
        <label>
          Email Address
          <input type="email" placeholder="Label wraps input" />
        </label>
        <label>
          <input type="checkbox" /> I agree to the terms
        </label>
      </layout-stack>
    </section>

    <section>
      <h2>Label Placement</h2>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="above-input">Above Input (default)</label>
          <input type="text" id="above-input" />
        </form-field>
      </layout-stack>
    </section>

    <section>
      <h2>Checkbox Labels</h2>
      <layout-stack data-layout-gap="s">
        <label>
          <input type="checkbox" name="features" value="notifications" /> Enable notifications
        </label>
        <label>
          <input type="checkbox" name="features" value="newsletter" /> Subscribe to newsletter
        </label>
        <label>
          <input type="checkbox" name="features" value="updates" checked /> Receive product updates
        </label>
      </layout-stack>
    </section>

    <section>
      <h2>Radio Button Labels</h2>
      <fieldset class="minimal">
        <legend>Select size</legend>
        <layout-stack data-layout-gap="s">
          <label>
            <input type="radio" name="size" value="small" /> Small
          </label>
          <label>
            <input type="radio" name="size" value="medium" checked /> Medium
          </label>
          <label>
            <input type="radio" name="size" value="large" /> Large
          </label>
        </layout-stack>
      </fieldset>
    </section>

    <section>
      <h2>Required Field Indicator</h2>
      <form class="stacked">
        <p class="help">Fields marked with * are required</p>
        <form-field>
          <label for="req-name">Name *</label>
          <input type="text" id="req-name" required />
        </form-field>
        <form-field>
          <label for="req-email">Email *</label>
          <input type="email" id="req-email" required />
        </form-field>
        <form-field>
          <label for="opt-phone">Phone (optional)</label>
          <input type="tel" id="opt-phone" />
        </form-field>
      </form>
    </section>

    <section>
      <h2>Visually Hidden Label</h2>
      <form class="inline">
        <form-field>
          <label for="hidden-search" class="visually-hidden">Search</label>
          <input type="search" id="hidden-search" placeholder="Search..." />
        </form-field>
        <button type="submit">Search</button>
      </form>
    </section>

    <section>
      <h2>With form-field</h2>
      <form>
        <form-field>
          <label for="ff-email">Email Address</label>
          <input type="email"
                 id="ff-email"
                 name="email"
                 required
                 autocomplete="email"
                 aria-describedby="ff-email-msg" />
          <output id="ff-email-msg" for="ff-email" aria-live="polite">
            Enter a valid email
          </output>
        </form-field>
      </form>
    </section>

  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
