<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Status Message With Icons</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m">
    <status-message data-variant="info">
      <icon-wc name="info" data-icon></icon-wc>
      <div data-content>
        <div data-title>Information</div>
        <div data-description>This message includes an icon for visual clarity.</div>
      </div>
    </status-message>

    <status-message data-variant="success">
      <icon-wc name="circle-check" data-icon></icon-wc>
      <div data-content>
        <div data-title>Success</div>
        <div data-description>Your changes have been saved successfully.</div>
      </div>
    </status-message>

    <status-message data-variant="warning">
      <icon-wc name="triangle-alert" data-icon></icon-wc>
      <div data-content>
        <div data-title>Warning</div>
        <div data-description>Please review your information before proceeding.</div>
      </div>
    </status-message>

    <status-message data-variant="error">
      <icon-wc name="circle-x" data-icon></icon-wc>
      <div data-content>
        <div data-title>Error</div>
        <div data-description>There was a problem processing your request.</div>
      </div>
    </status-message>
  </layout-stack>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
