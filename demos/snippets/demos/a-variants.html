<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link Visual Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m">
    <p>Default: <a href="#">default link</a> — interactive color, underline</p>
    <p>Muted: <a href="#" data-variant="muted">muted link</a> — less prominent</p>
    <p>Plain: <a href="#" data-variant="plain">plain link</a> — underline on hover only</p>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
