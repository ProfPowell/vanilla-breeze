<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Center Intrinsic</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    layout-center {
      background: var(--color-surface-raised);
      padding: var(--size-m);
      border-radius: var(--radius-s);
    }
    .card-constrained {
      max-inline-size: 20rem;
    }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <layout-center data-layout-intrinsic>
      <button type="button">Centered Button</button>
    </layout-center>

    <layout-center data-layout-intrinsic>
      <layout-card data-variant="outlined" class="card-constrained">
        <layout-stack data-layout-gap="s">
          <strong>Centered Card</strong>
          <p>This card is intrinsically centered.</p>
        </layout-stack>
      </layout-card>
    </layout-center>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
