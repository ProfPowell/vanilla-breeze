<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video Player — Custom Styling</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    video-player { max-inline-size: 560px; }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <h1>Video Player — Custom Styling</h1>
  <section data-layout="stack" data-layout-gap="m">
    <h2>Custom accent and radius</h2>
    <video-player style="--video-player-accent: oklch(60% 0.2 30); --video-player-radius: var(--radius-l);">
      <video controls preload="metadata" width="960" height="540"
        poster="/docs/examples/demos/assets/poster.jpg">
        <source src="/docs/examples/demos/assets/sample.mp4" type="video/mp4" />
      </video>
    </video-player>
  </section>

  <section data-layout="stack" data-layout-gap="m">
    <h2>Shadow and border</h2>
    <video-player style="--video-player-shadow: var(--shadow-lg); --video-player-radius: var(--radius-l);">
      <video controls preload="metadata" width="960" height="540"
        poster="/docs/examples/demos/assets/poster.jpg">
        <source src="/docs/examples/demos/assets/sample.mp4" type="video/mp4" />
      </video>
    </video-player>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
