<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audio Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>Audio Variants</h1>
  <layout-stack data-layout-gap="l">
    <section>
      <h2>Default</h2>
      <p>Full-width player with accent color and border radius from VB tokens.</p>
      <audio controls>
        <source src="/docs/examples/demos/assets/track.mp3" type="audio/mpeg" />
        <p>Your browser does not support audio. <a href="/docs/examples/demos/assets/track.mp3" download>Download the audio file</a>.</p>
      </audio>
    </section>
    <section>
      <h2>.compact</h2>
      <p>Max-width constrained for inline usage or sidebars.</p>
      <audio class="compact" controls>
        <source src="/docs/examples/demos/assets/track.mp3" type="audio/mpeg" />
      </audio>
    </section>
    <section>
      <h2>.minimal</h2>
      <p>Reduced height for tight layouts.</p>
      <audio class="minimal" controls>
        <source src="/docs/examples/demos/assets/track.mp3" type="audio/mpeg" />
      </audio>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
