<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iframe Test Content</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface-raised);
      display: flex;
      flex-direction: column;
      gap: var(--size-s);
      align-items: center;
      justify-content: center;
      min-block-size: 100%;
      background-image:
        linear-gradient(45deg, oklch(0% 0 0 / 0.03) 25%, transparent 25%),
        linear-gradient(-45deg, oklch(0% 0 0 / 0.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, oklch(0% 0 0 / 0.03) 75%),
        linear-gradient(-45deg, transparent 75%, oklch(0% 0 0 / 0.03) 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    }
  </style>
</head>
<body>
  <p style="font-size: var(--font-size-lg); font-weight: 600;">Embedded Content</p>
  <p style="color: var(--color-text-muted);">This page is loaded inside an <code>&lt;iframe&gt;</code>.</p>
  <p>
    <a href="#">Example link</a> &middot;
    <button type="button" class="small">Button</button>
  </p>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
