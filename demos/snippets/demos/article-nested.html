<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Article Nested</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <article>
    <header>
      <strong>User123</strong>
      <time datetime="2024-01-15T10:30">10:30 AM</time>
    </header>
    <p>This is a great article! Thanks for sharing.</p>

    <article class="nested">
      <header>
        <strong>Author</strong>
        <time datetime="2024-01-15T11:00">11:00 AM</time>
      </header>
      <p>Thank you for the kind words!</p>

      <article class="nested">
        <header>
          <strong>User123</strong>
          <time datetime="2024-01-15T11:15">11:15 AM</time>
        </header>
        <p>Looking forward to more content like this.</p>
      </article>
    </article>
  </article>
</body>
</html>
