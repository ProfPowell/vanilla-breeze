<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fieldset Basic</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <fieldset style="max-inline-size: 30rem;">
    <legend>Contact Information</legend>
    <layout-stack data-layout-gap="m">
      <form-field>
        <label for="fs-name">Full Name</label>
        <input type="text" id="fs-name" />
      </form-field>
      <form-field>
        <label for="fs-email">Email Address</label>
        <input type="email" id="fs-email" />
      </form-field>
      <form-field>
        <label for="fs-phone">Phone Number</label>
        <input type="tel" id="fs-phone" />
      </form-field>
    </layout-stack>
  </fieldset>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
