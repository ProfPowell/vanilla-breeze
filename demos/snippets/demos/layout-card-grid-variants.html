<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>layout-card Grid Mode Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>layout-card Grid Mode Variants</h1>
  <layout-grid data-layout-min="220px" data-layout-gap="m">
    <layout-card>
      <header aria-label="Default"><h4>Default</h4></header>
      <section><p>Subtle shadow, solid background.</p></section>
    </layout-card>
    <layout-card data-variant="elevated">
      <header aria-label="Elevated"><h4>Elevated</h4></header>
      <section><p>Stronger shadow for emphasis.</p></section>
    </layout-card>
    <layout-card data-variant="outlined">
      <header aria-label="Outlined"><h4>Outlined</h4></header>
      <section><p>Border instead of shadow.</p></section>
    </layout-card>
    <layout-card data-variant="ghost">
      <header aria-label="Ghost"><h4>Ghost</h4></header>
      <section><p>Transparent background.</p></section>
    </layout-card>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
