<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Article Highlights — Custom Colors</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .custom-colors {
      --highlight-red: #fecaca;
      --highlight-orange: #fed7aa;
      --highlight-teal: #99f6e4;
    }
  </style>
</head>
<body>
  <article data-highlights="custom-colors-demo" data-highlights-colors="red,orange,teal" class="custom-colors">
    <p>This article uses a custom set of highlight colors: red, orange, and teal. The colors are defined via CSS custom properties and listed in the data-highlights-colors attribute.</p>
    <p>You can define any colors you like by setting --highlight-{name} custom properties and listing the names in the attribute.</p>
  </article>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
</invoke>
