<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Layout Text - Centered Article</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-xl); background: var(--color-gray-100); }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <layout-text>
      <h2>Centered Article</h2>
      <p>Combining layout-text with layout-center creates an optimal reading experience. The prose handles vertical rhythm while the center constrains the horizontal width.</p>
      <p>This pattern is common for blog posts, documentation, and any long-form content.</p>
    </layout-text>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
