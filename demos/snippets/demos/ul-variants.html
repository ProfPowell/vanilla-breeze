<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unordered List Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <fieldset>
      <legend>.inline</legend>
      <ul class="inline">
        <li>Home</li>
        <li>About</li>
        <li>Services</li>
        <li>Contact</li>
      </ul>
    </fieldset>
    <fieldset>
      <legend>.unstyled</legend>
      <ul class="unstyled">
        <li>No bullets here</li>
        <li>Just plain text</li>
        <li>Useful for navigation</li>
        <li>Or custom layouts</li>
      </ul>
    </fieldset>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
