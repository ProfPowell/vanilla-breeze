<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>layout-card Grid Mode Padding</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>layout-card Grid Mode Padding</h1>
  <layout-grid data-layout-min="200px" data-layout-gap="m">
    <layout-card data-padding="s">
      <header aria-label="Small"><h2>Small</h2></header>
      <section aria-label="Layout Card Grid Padding section"><p>Compact padding.</p></section>
      <footer aria-label="Layout Card Grid Padding footer"><button type="button">OK</button></footer>
    </layout-card>
    <layout-card>
      <header aria-label="Default"><h2>Default</h2></header>
      <section aria-label="Layout Card Grid Padding section 2"><p>Standard padding.</p></section>
      <footer aria-label="Layout Card Grid Padding footer 2"><button type="button">OK</button></footer>
    </layout-card>
    <layout-card data-padding="l">
      <header aria-label="Large"><h2>Large</h2></header>
      <section aria-label="Layout Card Grid Padding section 3"><p>Spacious padding.</p></section>
      <footer aria-label="Layout Card Grid Padding footer 3"><button type="button">OK</button></footer>
    </layout-card>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
