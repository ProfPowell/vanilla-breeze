<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>layout-card Grid Mode Padding</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-grid data-layout-min="200px" data-layout-gap="m">
    <layout-card data-padding="s">
      <header><h4>Small</h4></header>
      <section><p>Compact padding.</p></section>
      <footer><button type="button">OK</button></footer>
    </layout-card>
    <layout-card>
      <header><h4>Default</h4></header>
      <section><p>Standard padding.</p></section>
      <footer><button type="button">OK</button></footer>
    </layout-card>
    <layout-card data-padding="l">
      <header><h4>Large</h4></header>
      <section><p>Spacious padding.</p></section>
      <footer><button type="button">OK</button></footer>
    </layout-card>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
