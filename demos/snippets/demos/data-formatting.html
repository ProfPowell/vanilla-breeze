<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data Format Number and Bytes</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Number formatting (data-format-number)</h3>
      <dl>
        <dt>Decimal</dt>
        <dd><data value="1234567" data-format-number>1,234,567</data></dd>

        <dt>Currency</dt>
        <dd><data value="48200" data-format-number="currency" data-currency="USD">$48,200</data></dd>

        <dt>Percent</dt>
        <dd><data value="0.85" data-format-number="percent">85%</data></dd>

        <dt>Compact</dt>
        <dd><data value="1500000" data-format-number="compact">1.5M</data></dd>
      </dl>
    </section>
    <section>
      <h3>Byte formatting (data-format-bytes)</h3>
      <dl>
        <dt>Megabyte</dt>
        <dd><data value="1048576" data-format-bytes>1 MB</data></dd>

        <dt>With decimal</dt>
        <dd><data value="1536000" data-format-bytes="1">1.5 MB</data></dd>

        <dt>Gigabyte</dt>
        <dd><data value="1073741824" data-format-bytes>1 GB</data></dd>
      </dl>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
