<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cover Basic Usage</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: 0;
      background: var(--color-surface);
    }
    .demo-cover {
      block-size: 25rem;
      background: linear-gradient(to bottom, var(--color-gray-900), var(--color-gray-700));
      color: white;
    }
  </style>
</head>
<body>
  <layout-cover class="demo-cover" data-layout-min="auto" data-layout-padding="m" data-layout-centered>
    <header><small>Header content</small></header>
    <div data-layout-principal>
      <layout-stack data-layout-gap="s" data-layout-align="center">
        <h3>Principal Content</h3>
        <p>This content is vertically centered using data-layout-principal</p>
        <button type="button">Call to Action</button>
      </layout-stack>
    </div>
    <footer><small>Footer content</small></footer>
  </layout-cover>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
