<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reel Gap Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <p><strong>data-layout-gap="xs"</strong></p>
      <layout-reel data-layout-gap="xs" data-layout-item-width="s">
        <layout-card data-variant="outlined" data-padding="s">1</layout-card>
        <layout-card data-variant="outlined" data-padding="s">2</layout-card>
        <layout-card data-variant="outlined" data-padding="s">3</layout-card>
        <layout-card data-variant="outlined" data-padding="s">4</layout-card>
        <layout-card data-variant="outlined" data-padding="s">5</layout-card>
      </layout-reel>
    </section>

    <section>
      <p><strong>data-layout-gap="xl"</strong></p>
      <layout-reel data-layout-gap="xl" data-layout-item-width="s">
        <layout-card data-variant="outlined" data-padding="s">1</layout-card>
        <layout-card data-variant="outlined" data-padding="s">2</layout-card>
        <layout-card data-variant="outlined" data-padding="s">3</layout-card>
        <layout-card data-variant="outlined" data-padding="s">4</layout-card>
        <layout-card data-variant="outlined" data-padding="s">5</layout-card>
      </layout-reel>
    </section>
  </layout-stack>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
