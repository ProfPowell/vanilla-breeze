<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accessible Mark Usage</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m">
    <p>Status: <mark class="error"><span class="visually-hidden">Error: </span>Invalid input detected</mark></p>
    <p>Review: <mark class="success"><span class="visually-hidden">Approved: </span>All checks passed</mark></p>
    <p>Notice: <mark class="warning"><span class="visually-hidden">Warning: </span>This feature is experimental</mark></p>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
