<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reel Image Gallery</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .gallery-image {
      inline-size: 20rem;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <layout-reel data-layout-gap="m" data-layout-item-width="m" data-layout-scrollbar>
    <div data-media data-layout-ratio="4:3" data-radius="m" class="gallery-image">
      <img src="https://picsum.photos/400/300?1" alt="Gallery image 1" loading="lazy" />
    </div>
    <div data-media data-layout-ratio="4:3" data-radius="m" class="gallery-image">
      <img src="https://picsum.photos/400/300?2" alt="Gallery image 2" loading="lazy" />
    </div>
    <div data-media data-layout-ratio="4:3" data-radius="m" class="gallery-image">
      <img src="https://picsum.photos/400/300?3" alt="Gallery image 3" loading="lazy" />
    </div>
    <div data-media data-layout-ratio="4:3" data-radius="m" class="gallery-image">
      <img src="https://picsum.photos/400/300?4" alt="Gallery image 4" loading="lazy" />
    </div>
    <div data-media data-layout-ratio="4:3" data-radius="m" class="gallery-image">
      <img src="https://picsum.photos/400/300?5" alt="Gallery image 5" loading="lazy" />
    </div>
  </layout-reel>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
