<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ordered List — Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <fieldset>
      <legend>.inline</legend>
      <ol class="inline">
        <li>Step 1</li>
        <li>Step 2</li>
        <li>Step 3</li>
        <li>Step 4</li>
      </ol>
    </fieldset>
    <fieldset>
      <legend>.unstyled</legend>
      <ol class="unstyled">
        <li>First item (no number)</li>
        <li>Second item (no number)</li>
        <li>Third item (no number)</li>
      </ol>
    </fieldset>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
