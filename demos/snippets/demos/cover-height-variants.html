<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cover Height Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
    .demo-cover {
      background: var(--color-surface-raised);
      min-block-size: 12rem;
    }
    .demo-cover-capped {
      background: var(--color-surface-raised);
      max-block-size: 15rem;
    }
  </style>
</head>
<body>
  <layout-grid data-layout-min="15rem" data-layout-gap="m">
    <layout-cover class="demo-cover" data-layout-min="auto" data-layout-padding="m" data-layout-centered>
      <div data-layout-principal>
        <strong>data-layout-min="auto"</strong>
        <p>Fits content</p>
      </div>
    </layout-cover>

    <layout-cover class="demo-cover-capped" data-layout-min="50vh" data-layout-padding="m" data-layout-centered>
      <div data-layout-principal>
        <strong>data-layout-min="50vh"</strong>
        <p>Half viewport</p>
      </div>
    </layout-cover>

    <layout-cover class="demo-cover-capped" data-layout-min="75vh" data-layout-padding="m" data-layout-centered>
      <div data-layout-principal>
        <strong>data-layout-min="75vh"</strong>
        <p>Three-quarter viewport</p>
      </div>
    </layout-cover>
  </layout-grid>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
