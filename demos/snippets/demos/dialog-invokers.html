<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dialog Invokers API</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); min-block-size: 300px; }
  </style>
</head>
<body>
  <button commandfor="invoker-demo" command="show-modal">Open Dialog</button>

  <dialog id="invoker-demo">
    <header>
      <h3>Invokers API Demo</h3>
    </header>
    <p>This dialog opens and closes using only HTML attributes &mdash; no JavaScript.</p>
    <footer>
      <button commandfor="invoker-demo" command="close">Close</button>
    </footer>
  </dialog>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="https://unpkg.com/invokers-polyfill"></script>
</body>
</html>
