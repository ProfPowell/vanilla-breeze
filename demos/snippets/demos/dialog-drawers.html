<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dialog Drawer Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-cluster data-layout-gap="m">
    <button commandfor="drw-end" command="show-modal">Right</button>
    <button commandfor="drw-start" command="show-modal">Left</button>
    <button commandfor="drw-bottom" command="show-modal">Bottom</button>
    <button commandfor="drw-top" command="show-modal">Top</button>
  </layout-cluster>

  <dialog id="drw-end" data-position="end">
    <header><h3>Navigation</h3></header>
    <section>
      <nav>
        <ul class="unstyled">
          <li><a href="#">Home</a></li>
          <li><a href="#">Products</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </section>
    <footer><button commandfor="drw-end" command="close">Close</button></footer>
  </dialog>

  <dialog id="drw-start" data-position="start">
    <header><h3>Filters</h3></header>
    <section>
      <form-field>
        <label for="cat">Category</label>
        <select id="cat">
          <option>All</option>
          <option>Electronics</option>
          <option>Clothing</option>
        </select>
      </form-field>
    </section>
    <footer>
      <button class="secondary" commandfor="drw-start" command="close">Cancel</button>
      <button commandfor="drw-start" command="close">Apply</button>
    </footer>
  </dialog>

  <dialog id="drw-bottom" data-position="bottom">
    <header><h3>Share</h3></header>
    <section>
      <ul class="unstyled">
        <li><a href="#">Copy Link</a></li>
        <li><a href="#">Email</a></li>
        <li><a href="#">Twitter</a></li>
      </ul>
    </section>
    <footer><button commandfor="drw-bottom" command="close">Close</button></footer>
  </dialog>

  <dialog id="drw-top" data-position="top">
    <header><h3>Announcement</h3></header>
    <p>New feature release! Check out our latest update.</p>
    <footer><button commandfor="drw-top" command="close">Dismiss</button></footer>
  </dialog>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="https://unpkg.com/invokers-polyfill"></script>
</body>
</html>
