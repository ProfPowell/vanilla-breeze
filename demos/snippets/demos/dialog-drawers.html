<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dialog Drawer Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-cluster data-layout-gap="m">
    <button type="button" commandfor="drw-end" command="show-modal">Right</button>
    <button type="button" commandfor="drw-start" command="show-modal">Left</button>
    <button type="button" commandfor="drw-bottom" command="show-modal">Bottom</button>
    <button type="button" commandfor="drw-top" command="show-modal">Top</button>
  </layout-cluster>

  <dialog id="drw-end" data-position="end">
    <header aria-label="Navigation heading"><h1>Navigation</h1></header>
    <section aria-label="Navigation body">
      <nav>
        <ul class="unstyled">
          <li><a href="#">Home</a></li>
          <li><a href="#">Products</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </section>
    <footer aria-label="Navigation actions"><button type="button" commandfor="drw-end" command="close">Close</button></footer>
  </dialog>

  <dialog id="drw-start" data-position="start">
    <header aria-label="Filters heading"><h1>Filters</h1></header>
    <section aria-label="Filters body">
      <form-field>
        <label for="cat">Category</label>
        <select id="cat">
          <option>All</option>
          <option>Electronics</option>
          <option>Clothing</option>
        </select>
      </form-field>
    </section>
    <footer aria-label="Filters actions">
      <button type="button" class="secondary" commandfor="drw-start" command="close">Cancel</button>
      <button type="button" commandfor="drw-start" command="close">Apply</button>
    </footer>
  </dialog>

  <dialog id="drw-bottom" data-position="bottom">
    <header aria-label="Share heading"><h1>Share</h1></header>
    <section aria-label="Share body">
      <ul class="unstyled">
        <li><a href="#">Copy Link</a></li>
        <li><a href="#">Email</a></li>
        <li><a href="#">Twitter</a></li>
      </ul>
    </section>
    <footer aria-label="Share actions"><button type="button" commandfor="drw-bottom" command="close">Close</button></footer>
  </dialog>

  <dialog id="drw-top" data-position="top">
    <header aria-label="Announcement heading"><h1>Announcement</h1></header>
    <p>New feature release! Check out our latest update.</p>
    <footer aria-label="Announcement actions"><button type="button" commandfor="drw-top" command="close">Dismiss</button></footer>
  </dialog>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="https://unpkg.com/invokers-polyfill"></script>
</body>
</html>
