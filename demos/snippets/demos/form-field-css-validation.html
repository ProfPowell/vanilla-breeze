<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Field CSS Validation</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 30rem; }
  </style>
</head>
<body>
  <form>
    <layout-stack data-layout-gap="m">
      <p>Type in each field and then clear it to see validation states.</p>

      <form-field>
        <label for="email">Email (required)</label>
        <input type="email" id="email" name="email" required
               placeholder="you@example.com"
               aria-describedby="email-msg" />
        <output id="email-msg" for="email" aria-live="polite">
          Enter a valid email address
        </output>
      </form-field>

      <form-field>
        <label for="website">Website (optional)</label>
        <input type="url" id="website" name="website"
               placeholder="https://example.com"
               aria-describedby="website-msg" />
        <output id="website-msg" for="website" aria-live="polite">
          Include https://
        </output>
      </form-field>

      <form-field>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required
               minlength="3" maxlength="20" pattern="[a-zA-Z0-9]+"
               aria-describedby="username-hint username-error" />
        <output id="username-hint" class="hint" for="username">
          3-20 characters, letters and numbers only.
        </output>
        <output id="username-error" class="error" for="username" aria-live="polite">
          Please enter a valid username.
        </output>
      </form-field>
    </layout-stack>
  </form>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
