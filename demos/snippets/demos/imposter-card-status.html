<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Imposter Card Status</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .card-wrapper {
      position: relative;
      display: inline-block;
    }
    .status-badge {
      background: var(--color-success);
      color: white;
      padding: var(--size-2xs) var(--size-xs);
      border-radius: var(--radius-s);
      font-size: var(--font-size-xs);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <span class="card-wrapper">
    <layout-card data-variant="outlined" data-padding="l" style="inline-size: 250px;">
      <layout-stack data-layout-gap="s">
        <strong>Project Alpha</strong>
        <p>Last updated yesterday</p>
      </layout-stack>
    </layout-card>
    <layout-imposter data-position="top-end" data-margin="m">
      <span class="status-badge">Active</span>
    </layout-imposter>
  </span>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
