<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fieldset Minimal</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <fieldset class="minimal" style="max-inline-size: 30rem;">
    <legend>Notification Preferences</legend>
    <layout-stack data-layout-gap="s">
      <label>
        <input type="checkbox" name="notify" value="email" /> Email notifications
      </label>
      <label>
        <input type="checkbox" name="notify" value="sms" /> SMS notifications
      </label>
      <label>
        <input type="checkbox" name="notify" value="push" /> Push notifications
      </label>
    </layout-stack>
  </fieldset>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
