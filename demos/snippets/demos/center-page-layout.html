<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Center Page Layout</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-m); background: var(--color-gray-200); }
    header, main {
      padding: var(--size-m);
      background: var(--color-surface);
      border-radius: var(--radius-s);
    }
    main {
      padding: var(--size-l);
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="normal">
    <layout-stack data-layout-gap="xl">
      <header>
        <layout-cluster data-layout-gap="m" data-layout-justify="between">
          <strong>Logo</strong>
          <layout-cluster data-layout-gap="m">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
          </layout-cluster>
        </layout-cluster>
      </header>
      <main>
        <p>Main page content goes here.</p>
      </main>
    </layout-stack>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
