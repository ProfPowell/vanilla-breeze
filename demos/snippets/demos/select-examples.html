<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Select Examples</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l" style="max-inline-size: 25rem;">
    <form-field>
      <label for="sel-basic">Basic select</label>
      <select id="sel-basic">
        <option value="">Choose one...</option>
        <option value="a">Option A</option>
        <option value="b">Option B</option>
        <option value="c">Option C</option>
      </select>
    </form-field>
    <form-field>
      <label for="sel-group">With optgroups</label>
      <select id="sel-group">
        <option value="">Select a country...</option>
        <optgroup label="North America">
          <option>United States</option>
          <option>Canada</option>
          <option>Mexico</option>
        </optgroup>
        <optgroup label="Europe">
          <option>United Kingdom</option>
          <option>France</option>
          <option>Germany</option>
        </optgroup>
      </select>
    </form-field>
    <form-field>
      <label for="sel-multi">Multiple select</label>
      <select id="sel-multi" multiple size="5">
        <option>JavaScript</option>
        <option>Python</option>
        <option>Rust</option>
        <option>Go</option>
        <option>TypeScript</option>
      </select>
    </form-field>
    <form-field>
      <label for="sel-disabled">Disabled</label>
      <select id="sel-disabled" disabled>
        <option>Cannot change</option>
      </select>
    </form-field>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
