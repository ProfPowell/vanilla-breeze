<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Article Highlights — Readonly</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <article data-highlights="readonly-demo" data-highlights-readonly>
    <p>This article renders existing highlights from localStorage but does not allow creating new ones. Useful for displaying shared or pre-set annotations.</p>
    <p>Try selecting text — no toolbar will appear because the readonly attribute is set.</p>
  </article>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
