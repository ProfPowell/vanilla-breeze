<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Datalist Input Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l" style="max-inline-size: 25rem;">

    <fieldset>
      <legend>Default (with dropdown arrow)</legend>
      <label for="color-default">Color</label>
      <input type="text" id="color-default" list="colors-1" placeholder="Pick a color..." />
      <datalist id="colors-1">
        <option value="Red"></option>
        <option value="Blue"></option>
        <option value="Green"></option>
        <option value="Yellow"></option>
        <option value="Purple"></option>
      </datalist>
    </fieldset>

    <fieldset>
      <legend>.no-arrow</legend>
      <label for="color-no-arrow">Color</label>
      <input type="text" id="color-no-arrow" list="colors-2" class="no-arrow" placeholder="Pick a color..." />
      <datalist id="colors-2">
        <option value="Red"></option>
        <option value="Blue"></option>
        <option value="Green"></option>
        <option value="Yellow"></option>
        <option value="Purple"></option>
      </datalist>
    </fieldset>

    <fieldset>
      <legend>.search</legend>
      <label for="product-search">Search Products</label>
      <input type="search" id="product-search" list="products" class="search" placeholder="Search..." />
      <datalist id="products">
        <option value="Laptop"></option>
        <option value="Laptop Stand"></option>
        <option value="Laptop Bag"></option>
        <option value="Wireless Mouse"></option>
        <option value="Mechanical Keyboard"></option>
      </datalist>
    </fieldset>

  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
