<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BDO Examples</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Reversed text</h3>
      <p>Normal: Hello World</p>
      <p>Reversed: <bdo dir="rtl">Hello World</bdo></p>
    </section>
    <section>
      <h3>LTR in RTL context</h3>
      <p dir="rtl">This is right-to-left, but <bdo dir="ltr">this text is forced left-to-right</bdo>.</p>
    </section>
    <section>
      <h3>Hebrew example</h3>
      <p>The Hebrew word for "peace" is <bdo dir="rtl">שלום</bdo>.</p>
    </section>
    <section>
      <h3>Nested overrides</h3>
      <p><bdo dir="rtl">Outer RTL <bdo dir="ltr">Inner LTR</bdo> Back to RTL</bdo></p>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
