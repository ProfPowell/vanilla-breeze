<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Progress Basic</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m" style="max-inline-size: 25rem;">
    <form-field>
      <label>Upload Progress</label>
      <progress value="70" max="100">70%</progress>
    </form-field>
    <form-field>
      <label>Step 3 of 5</label>
      <progress value="3" max="5">60%</progress>
    </form-field>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
