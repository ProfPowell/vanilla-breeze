<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cover Padding Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
    .demo-cover-padding {
      background: var(--color-surface-raised);
      border: 1px dashed var(--color-border);
    }
  </style>
</head>
<body>
  <layout-grid data-layout-min="12rem" data-layout-gap="m">
    <layout-cover class="demo-cover-padding" data-layout-min="auto" data-layout-padding="none" data-layout-centered>
      <div data-layout-principal>
        <code>padding="none"</code>
      </div>
    </layout-cover>
    <layout-cover class="demo-cover-padding" data-layout-min="auto" data-layout-padding="s" data-layout-centered>
      <div data-layout-principal>
        <code>padding="s"</code>
      </div>
    </layout-cover>
    <layout-cover class="demo-cover-padding" data-layout-min="auto" data-layout-padding="l" data-layout-centered>
      <div data-layout-principal>
        <code>padding="l"</code>
      </div>
    </layout-cover>
    <layout-cover class="demo-cover-padding" data-layout-min="auto" data-layout-padding="xl" data-layout-centered>
      <div data-layout-principal>
        <code>padding="xl"</code>
      </div>
    </layout-cover>
  </layout-grid>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
