<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data Element Basics</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>Data Element Basics</h1>
  <layout-stack data-layout-gap="l">
    <section>
      <h2>Price values</h2>
      <p>The item costs <data value="49.99">$49.99</data>.</p>
    </section>
    <section>
      <h2>Product identifiers</h2>
      <ul>
        <li><data value="UPC:012345678901">Wireless Headphones</data> &mdash; $79.99</li>
        <li><data value="UPC:012345678902">Bluetooth Speaker</data> &mdash; $49.99</li>
        <li><data value="UPC:012345678903">USB-C Cable</data> &mdash; $12.99</li>
      </ul>
    </section>
    <section>
      <h2>Currency comparison</h2>
      <table>
        <thead>
          <tr><th scope="col">Country</th><th scope="col">Amount</th></tr>
        </thead>
        <tbody>
          <tr><td>USA</td><td><data value="1000">$1,000</data></td></tr>
          <tr><td>UK</td><td><data value="800">&pound;800</data></td></tr>
          <tr><td>EU</td><td><data value="900">&euro;900</data></td></tr>
        </tbody>
      </table>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
