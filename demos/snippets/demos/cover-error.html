<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cover Error Page</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: 0;
      background: var(--color-surface);
    }
    .demo-error {
      background: var(--color-surface);
      min-block-size: 18rem;
    }
    .demo-error-code {
      font-size: 4rem;
      opacity: 0.3;
    }
    .demo-error-message {
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <layout-cover class="demo-error" data-layout-min="auto" data-layout-padding="l" data-layout-centered>
    <div data-layout-principal>
      <layout-stack data-layout-gap="m" data-layout-align="center">
        <span class="demo-error-code">404</span>
        <h2>Page Not Found</h2>
        <p class="demo-error-message">The page you're looking for doesn't exist.</p>
        <button type="button">Go Home</button>
      </layout-stack>
    </div>
  </layout-cover>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
