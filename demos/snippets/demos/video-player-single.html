<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video Player — Single Video</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    video-player { max-inline-size: 560px; }
  </style>
</head>
<body>
  <video-player>
    <video controls preload="metadata" width="960" height="540"
      poster="/docs/examples/demos/assets/poster.jpg">
      <source src="/docs/examples/demos/assets/sample.mp4" type="video/mp4" />
      <track kind="captions" src="/docs/examples/demos/assets/captions-en.vtt" srclang="en" label="English" default />
      <p><a href="/docs/examples/demos/assets/sample.mp4" download>Download video</a></p>
    </video>
  </video-player>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
