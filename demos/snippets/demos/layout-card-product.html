<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>layout-card Product Card</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 20rem; }
    .category { color: var(--color-text-muted); }
    .price { font-size: var(--font-size-lg); }
  </style>
</head>
<body>
  <layout-card data-variant="outlined">
    <layout-stack data-layout-gap="m">
      <div data-media data-layout-ratio="1:1" data-radius="s">
        <img src="https://picsum.photos/300/300" alt="Product image" loading="lazy" />
      </div>
      <layout-stack data-layout-gap="xs">
        <small class="category">Category</small>
        <strong>Product Name</strong>
        <strong class="price">$49.99</strong>
      </layout-stack>
      <button type="button">Add to Cart</button>
    </layout-stack>
  </layout-card>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
