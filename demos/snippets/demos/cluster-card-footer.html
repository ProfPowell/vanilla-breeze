<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cluster Card Footer</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 25rem; }
  </style>
</head>
<body>
  <layout-card data-variant="outlined">
    <layout-stack data-layout-gap="m">
      <h3>Card Title</h3>
      <p>Card content goes here.</p>
      <layout-cluster data-layout-gap="s" data-layout-justify="between">
        <layout-cluster data-layout-gap="xs">
          <button type="button" class="ghost small">Edit</button>
          <button type="button" class="ghost small">Delete</button>
        </layout-cluster>
        <button type="button" class="small">View Details</button>
      </layout-cluster>
    </layout-stack>
  </layout-card>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
