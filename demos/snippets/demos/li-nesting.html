<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nested Lists and Mixed Types</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Nested Unordered</h3>
      <ul>
        <li>Parent item one
          <ul>
            <li>Child item one</li>
            <li>Child item two
              <ul>
                <li>Grandchild item</li>
              </ul>
            </li>
          </ul>
        </li>
        <li>Parent item two</li>
      </ul>
    </section>
    <section>
      <h3>Mixed List Types</h3>
      <ol>
        <li>Step one: gather materials
          <ul>
            <li>Paper</li>
            <li>Scissors</li>
            <li>Glue</li>
          </ul>
        </li>
        <li>Step two: cut the paper</li>
        <li>Step three: assemble</li>
      </ol>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
