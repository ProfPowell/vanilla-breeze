<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8ecf0" />
      <stop offset="100%" stop-color="#dce2ea" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" />

  <!-- Grid lines -->
  <g stroke="#c8d0d8" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="160" y1="0" x2="160" y2="500" />
    <line x1="320" y1="0" x2="320" y2="500" />
    <line x1="480" y1="0" x2="480" y2="500" />
    <line x1="640" y1="0" x2="640" y2="500" />
  </g>

  <!-- Region A: Conference Hall (top-left rect) -->
  <rect x="40" y="40" width="280" height="180" rx="12" fill="#4a7bb5" />
  <text x="180" y="140" text-anchor="middle" fill="white" font-family="system-ui" font-size="18" font-weight="600">Conference Hall</text>

  <!-- Region B: Server Room (circle center) -->
  <circle cx="500" cy="160" r="80" fill="#2d8f6a" />
  <text x="500" y="165" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" font-weight="600">Server Room</text>

  <!-- Region C: Cafeteria (bottom-left rect) -->
  <rect x="40" y="280" width="300" height="180" rx="12" fill="#c47040" />
  <text x="190" y="380" text-anchor="middle" fill="white" font-family="system-ui" font-size="18" font-weight="600">Cafeteria</text>

  <!-- Region D: Open Office (polygon, right side) -->
  <polygon points="480,280 760,280 760,460 560,460 480,380" fill="#8555a8" />
  <text x="630" y="380" text-anchor="middle" fill="white" font-family="system-ui" font-size="18" font-weight="600">Open Office</text>

  <!-- Region E: Reception (top-right rect) -->
  <rect x="620" y="40" width="140" height="120" rx="12" fill="#b09530" />
  <text x="690" y="105" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="600">Reception</text>

  <!-- Title -->
  <text x="400" y="498" text-anchor="middle" fill="#556070" font-family="system-ui" font-size="12" opacity="0.6">Office Floor Plan — Level 2</text>
</svg>
