<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Avatar Group</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-cluster data-layout-overlap>
    <user-avatar>
      <img src="https://i.pravatar.cc/150?img=5" alt="User 1" />
    </user-avatar>
    <user-avatar>
      <img src="https://i.pravatar.cc/150?img=6" alt="User 2" />
    </user-avatar>
    <user-avatar>
      <img src="https://i.pravatar.cc/150?img=7" alt="User 3" />
    </user-avatar>
    <user-avatar>
      <span data-fallback>+5</span>
    </user-avatar>
  </layout-cluster>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
