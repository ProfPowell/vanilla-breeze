<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BDI Examples</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>User-generated names</h3>
      <p>User <bdi>إيان</bdi> posted 3 comments.</p>
      <p>User <bdi>Alice</bdi> posted 5 comments.</p>
    </section>
    <section>
      <h3>Leaderboard with mixed scripts</h3>
      <ol>
        <li><bdi>Alice</bdi>: 15 points</li>
        <li><bdi>محمد</bdi>: 12 points</li>
        <li><bdi>Bob</bdi>: 10 points</li>
        <li><bdi>יעקב</bdi>: 8 points</li>
      </ol>
    </section>
    <section>
      <h3>Without vs with bdi</h3>
      <p>Without: User محمد posted 3 comments.</p>
      <p>With: User <bdi>محمد</bdi> posted 3 comments.</p>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
