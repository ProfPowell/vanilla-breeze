<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Status Message With Dismiss</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <status-message data-variant="info">
    <div data-content>
      <div data-title>Dismissable Alert</div>
      <div data-description>Click the X to dismiss this alert.</div>
    </div>
    <button data-dismiss type="button" aria-label="Dismiss">&#x2715;</button>
  </status-message>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
