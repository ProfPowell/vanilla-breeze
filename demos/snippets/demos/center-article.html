<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Center Article Content</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <layout-text>
      <h2>Article Title</h2>
      <p>The narrow max-width ensures optimal line length for reading. Research shows that 45-75 characters per line is ideal for readability.</p>
      <p>This container automatically centers itself and maintains comfortable margins on all screen sizes.</p>
    </layout-text>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
