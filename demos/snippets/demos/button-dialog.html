<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Button Dialog Triggering</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Invokers API</h3>
      <p>Use <code>commandfor</code> and <code>command</code> to open and close dialogs without JavaScript.</p>
      <layout-cluster data-layout-gap="m">
        <button type="button" commandfor="demo-dialog" command="show-modal">Open Dialog</button>
        <button type="button" class="secondary" commandfor="demo-confirm" command="show-modal">Confirm Action</button>
      </layout-cluster>
    </section>
  </layout-stack>

  <dialog id="demo-dialog">
    <header>
      <h2>Example Dialog</h2>
      <button type="button" class="ghost" commandfor="demo-dialog" command="close" aria-label="Close">
        <icon-wc name="x"></icon-wc>
      </button>
    </header>
    <article>
      <p>This dialog was opened using the Invokers API. No JavaScript required.</p>
    </article>
    <footer class="actions end">
      <button type="button" class="secondary" commandfor="demo-dialog" command="close">Cancel</button>
      <button type="button" commandfor="demo-dialog" command="close">OK</button>
    </footer>
  </dialog>

  <dialog id="demo-confirm" data-size="s">
    <header>
      <h2>Confirm</h2>
    </header>
    <article>
      <p>Are you sure you want to proceed?</p>
    </article>
    <footer class="actions end">
      <button type="button" class="ghost" commandfor="demo-confirm" command="close">Cancel</button>
      <button type="button" commandfor="demo-confirm" command="close">Confirm</button>
    </footer>
  </dialog>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
