<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Field OTP/PIN</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 30rem; }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="xl">
    <form>
      <layout-stack data-layout-gap="m">
        <form-field data-no-icon>
          <label for="otp">Verification Code</label>
          <input type="text" id="otp" name="code"
                 data-type="otp" data-length="6"
                 inputmode="numeric" pattern="[0-9]{6}"
                 autocomplete="one-time-code" required
                 aria-describedby="otp-msg" />
          <output id="otp-msg" class="hint" for="otp" aria-live="polite">
            Enter the 6-digit code from your authenticator app.
          </output>
        </form-field>
      </layout-stack>
    </form>

    <form>
      <layout-stack data-layout-gap="m">
        <form-field data-no-icon>
          <label for="pin">PIN</label>
          <input type="text" id="pin" name="pin"
                 data-type="pin" data-length="4"
                 inputmode="numeric" pattern="[0-9]{4}"
                 required
                 aria-describedby="pin-msg" />
          <output id="pin-msg" class="hint" for="pin" aria-live="polite">
            Enter your 4-digit PIN.
          </output>
        </form-field>
      </layout-stack>
    </form>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
