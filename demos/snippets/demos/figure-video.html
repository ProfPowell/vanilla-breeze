<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Figure with Video</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    figure video { max-inline-size: 500px; }
  </style>
</head>
<body>
  <figure>
    <video controls preload="none" poster="https://picsum.photos/seed/vb-video/500/280">
      <p>Your browser does not support the video element. <a href="#">Download the video</a> instead.</p>
    </video>
    <figcaption>Figure 1: Introduction video with playback controls.</figcaption>
  </figure>
</body>
</html>
