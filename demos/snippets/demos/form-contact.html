<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Form</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <form class="stacked" style="max-inline-size: 30rem;">
    <fieldset>
      <legend>Contact Us</legend>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="c-name">Name</label>
          <input type="text" id="c-name" name="name" required autocomplete="name" />
        </form-field>
        <form-field>
          <label for="c-email">Email</label>
          <input type="email" id="c-email" name="email" required autocomplete="email" />
        </form-field>
        <form-field>
          <label for="c-subject">Subject</label>
          <select id="c-subject" name="subject" required>
            <option value="">Select a subject...</option>
            <option value="general">General Inquiry</option>
            <option value="support">Technical Support</option>
            <option value="feedback">Feedback</option>
          </select>
        </form-field>
        <form-field>
          <label for="c-message">Message</label>
          <textarea id="c-message" name="message" rows="5" required></textarea>
        </form-field>
        <label>
          <input type="checkbox" name="newsletter" /> Subscribe to our newsletter
        </label>
      </layout-stack>
    </fieldset>
    <footer class="actions end">
      <button type="reset" class="secondary">Clear</button>
      <button type="submit">Send Message</button>
    </footer>
  </form>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
