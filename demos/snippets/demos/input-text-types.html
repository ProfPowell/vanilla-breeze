<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Text Input Types</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m" style="max-inline-size: 25rem;">
    <form-field>
      <label for="t-text">Text</label>
      <input type="text" id="t-text" placeholder="Enter your name" autocomplete="name" />
    </form-field>
    <form-field>
      <label for="t-email">Email</label>
      <input type="email" id="t-email" placeholder="you@example.com" autocomplete="email" />
    </form-field>
    <form-field>
      <label for="t-password">Password</label>
      <input type="password" id="t-password" placeholder="Enter password" autocomplete="current-password" />
    </form-field>
    <form-field>
      <label for="t-url">URL</label>
      <input type="url" id="t-url" placeholder="https://example.com" />
    </form-field>
    <form-field>
      <label for="t-tel">Phone</label>
      <input type="tel" id="t-tel" placeholder="(555) 123-4567" autocomplete="tel" />
    </form-field>
    <form-field>
      <label for="t-search">Search</label>
      <input type="search" id="t-search" placeholder="Search..." />
    </form-field>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
