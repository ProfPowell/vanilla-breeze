<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Table Scope</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="xl">
    <section>
      <h3>Column and row headers</h3>
      <table>
        <thead>
          <tr>
            <th scope="col">Product</th>
            <th scope="col" data-numeric>Price</th>
            <th scope="col" data-numeric>Stock</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th scope="row">Laptop</th>
            <td data-numeric>$999</td>
            <td data-numeric>45</td>
          </tr>
          <tr>
            <th scope="row">Tablet</th>
            <td data-numeric>$499</td>
            <td data-numeric>128</td>
          </tr>
        </tbody>
      </table>
    </section>
    <section>
      <h3>Column group headers</h3>
      <table>
        <thead>
          <tr>
            <th rowspan="2" scope="col">Region</th>
            <th colspan="2" scope="colgroup">2024</th>
            <th colspan="2" scope="colgroup">2025</th>
          </tr>
          <tr>
            <th scope="col">Q1</th>
            <th scope="col">Q2</th>
            <th scope="col">Q1</th>
            <th scope="col">Q2</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th scope="row">North</th>
            <td>$120k</td><td>$135k</td><td>$142k</td><td>$158k</td>
          </tr>
          <tr>
            <th scope="row">South</th>
            <td>$98k</td><td>$105k</td><td>$112k</td><td>$119k</td>
          </tr>
        </tbody>
      </table>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
