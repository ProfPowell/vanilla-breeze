<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ruby Annotations</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>Ruby Annotations</h1>
  <layout-stack data-layout-gap="l">
    <section>
      <h2>Japanese furigana</h2>
      <p style="font-size: var(--font-size-xl);">
        <ruby>東京<rp>(</rp><rt>とうきょう</rt><rp>)</rp></ruby>は日本の首都です。
      </p>
    </section>
    <section>
      <h2>Chinese pinyin</h2>
      <p style="font-size: var(--font-size-xl);">
        <ruby>北京<rp>(</rp><rt>Běijīng</rt><rp>)</rp></ruby> is the capital of China.
      </p>
    </section>
    <section>
      <h2>Per-character annotations</h2>
      <p style="font-size: var(--font-size-xl);">
        <ruby>漢<rp>(</rp><rt>かん</rt><rp>)</rp></ruby><ruby>字<rp>(</rp><rt>じ</rt><rp>)</rp></ruby>
      </p>
    </section>
    <section>
      <h2>Multiple in a sentence</h2>
      <p style="font-size: var(--font-size-xl);">
        <ruby>明日<rp>(</rp><rt>あした</rt><rp>)</rp></ruby>の<ruby>天気<rp>(</rp><rt>てんき</rt><rp>)</rp></ruby>は<ruby>晴<rp>(</rp><rt>は</rt><rp>)</rp></ruby>れです。
      </p>
    </section>
    <section>
      <h2>Pronunciation guide (English)</h2>
      <p style="font-size: var(--font-size-xl);">
        How to pronounce <ruby>Versailles<rp>(</rp><rt>vair-SIGH</rt><rp>)</rp></ruby>.
      </p>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
