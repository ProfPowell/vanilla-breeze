<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fieldset Disabled</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m" style="max-inline-size: 30rem;">
    <button type="button" id="toggle-btn">Toggle disabled</button>

    <fieldset id="demo-fieldset" disabled>
      <legend>Account Settings</legend>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="fs-d-name">Name</label>
          <input type="text" id="fs-d-name" value="Cannot edit" />
        </form-field>
        <form-field>
          <label for="fs-d-email">Email</label>
          <input type="email" id="fs-d-email" value="disabled@example.com" />
        </form-field>
        <button type="button">Cannot Click</button>
      </layout-stack>
    </fieldset>
  </layout-stack>

  <script>
    document.getElementById('toggle-btn').addEventListener('click', () => {
      const fs = document.getElementById('demo-fieldset');
      fs.disabled = !fs.disabled;
    });
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
