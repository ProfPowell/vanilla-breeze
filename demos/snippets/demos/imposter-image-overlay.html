<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Imposter Image Overlay</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .image-wrapper {
      position: relative;
      display: inline-block;
    }
    .image-placeholder {
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      inline-size: 100%;
      block-size: 100%;
    }
    .caption {
      background: oklch(0% 0 0 / 0.7);
      color: white;
      padding: var(--size-xs) var(--size-s);
      border-radius: var(--radius-s);
      font-size: var(--font-size-sm);
    }
  </style>
</head>
<body>
  <span class="image-wrapper">
    <div data-media data-layout-ratio="16:9" style="inline-size: 300px;">
      <div class="image-placeholder"></div>
    </div>
    <layout-imposter data-position="bottom-start" data-margin="m">
      <span class="caption">Photo caption</span>
    </layout-imposter>
  </span>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
