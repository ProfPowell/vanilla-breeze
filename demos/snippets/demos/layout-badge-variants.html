<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Layout Badge - Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m">
    <section>
      <p><strong>Solid (default)</strong></p>
      <layout-cluster data-layout-gap="s">
        <layout-badge data-color="primary">Solid</layout-badge>
        <layout-badge data-color="success">Solid</layout-badge>
        <layout-badge data-color="error">Solid</layout-badge>
      </layout-cluster>
    </section>
    <section>
      <p><strong>Subtle</strong></p>
      <layout-cluster data-layout-gap="s">
        <layout-badge data-variant="subtle" data-color="primary">Subtle</layout-badge>
        <layout-badge data-variant="subtle" data-color="success">Subtle</layout-badge>
        <layout-badge data-variant="subtle" data-color="error">Subtle</layout-badge>
      </layout-cluster>
    </section>
    <section>
      <p><strong>Outlined</strong></p>
      <layout-cluster data-layout-gap="s">
        <layout-badge data-variant="outlined" data-color="primary">Outlined</layout-badge>
        <layout-badge data-variant="outlined" data-color="success">Outlined</layout-badge>
        <layout-badge data-variant="outlined" data-color="error">Outlined</layout-badge>
      </layout-cluster>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
