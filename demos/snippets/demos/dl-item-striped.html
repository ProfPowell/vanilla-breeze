<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>dl-item Striped</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 65ch; }
  </style>
</head>
<body>
  <dl class="horizontal" data-striped>
    <dl-item>
      <dt>CPU</dt>
      <dd>Apple M2 Pro</dd>
    </dl-item>
    <dl-item>
      <dt>Memory</dt>
      <dd>32 GB</dd>
    </dl-item>
    <dl-item>
      <dt>Storage</dt>
      <dd>1 TB SSD</dd>
    </dl-item>
    <dl-item>
      <dt>Display</dt>
      <dd>14-inch Liquid Retina XDR</dd>
    </dl-item>
  </dl>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
