<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data Ticker Effect</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>Data Ticker Effect</h1>
  <layout-stack data-layout-gap="l">
    <section>
      <h2>Animated counter (ticker effect)</h2>
      <p style="font-size: var(--font-size-2xl);">
        <data value="50000" data-effect="ticker" data-trigger="scroll" style="--vb-ticker-duration: 2000">50,000</data> customers served
      </p>
    </section>
    <section>
      <h2>Multiple counters</h2>
      <layout-grid data-layout-gap="m" style="--layout-grid-min: 10rem;">
        <article>
          <p style="font-size: var(--font-size-xl);"><data value="99.9" data-effect="ticker" data-trigger="scroll" data-ticker-decimals="1" style="--vb-ticker-duration: 1500">99.9</data>%</p>
          <p>Uptime</p>
        </article>
        <article>
          <p style="font-size: var(--font-size-xl);"><data value="2400" data-effect="ticker" data-trigger="scroll" style="--vb-ticker-duration: 1500">2,400</data>+</p>
          <p>Components</p>
        </article>
        <article>
          <p style="font-size: var(--font-size-xl);"><data value="15" data-effect="ticker" data-trigger="scroll" style="--vb-ticker-duration: 1000">15</data></p>
          <p>Themes</p>
        </article>
      </layout-grid>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
