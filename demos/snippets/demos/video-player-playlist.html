<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Player — Playlist</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    video-player { max-inline-size: 560px; }
  </style>
</head>
<body>
  <video-player>
    <video controls preload="metadata" width="960" height="540"
      poster="/docs/examples/demos/assets/poster.jpg">
      <source src="/docs/examples/demos/assets/sample.mp4" type="video/mp4">
    </video>
    <details open>
      <summary>Episodes</summary>
      <ol class="track-list">
        <li data-video-active>
          <a href="/docs/examples/demos/assets/sample.mp4"
            data-poster="/docs/examples/demos/assets/poster.jpg">01. Flower — Full</a>
          <span class="track-meta"><time datetime="PT0M5S">0:05</time></span>
        </li>
        <li>
          <a href="/docs/examples/demos/assets/sample-2.mp4"
            data-poster="/docs/examples/demos/assets/poster-2.jpg">02. Flower — Clip</a>
          <span class="track-meta"><time datetime="PT0M3S">0:03</time></span>
        </li>
      </ol>
    </details>
  </video-player>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
