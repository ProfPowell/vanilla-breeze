<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grid Gap Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .grid-cell {
      background: var(--color-surface-raised);
      padding: var(--size-s);
      border-radius: var(--radius-s);
      text-align: center;
    }
  </style>
</head>
<body>
  <layout-grid data-layout-min="20rem" data-layout-gap="l">
    <section>
      <p><strong>data-layout-gap="xs"</strong></p>
      <layout-grid data-layout-min="8rem" data-layout-gap="xs">
        <p class="grid-cell">1</p>
        <p class="grid-cell">2</p>
        <p class="grid-cell">3</p>
        <p class="grid-cell">4</p>
      </layout-grid>
    </section>

    <section>
      <p><strong>data-layout-gap="l"</strong></p>
      <layout-grid data-layout-min="8rem" data-layout-gap="l">
        <p class="grid-cell">1</p>
        <p class="grid-cell">2</p>
        <p class="grid-cell">3</p>
        <p class="grid-cell">4</p>
      </layout-grid>
    </section>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
