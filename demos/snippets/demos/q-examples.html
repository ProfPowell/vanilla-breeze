<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inline Quotations</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Basic quotation</h3>
      <p>She said <q>Hello, world!</q> and smiled.</p>
    </section>
    <section>
      <h3>Nested quotation</h3>
      <p>He asked, <q>Did she really say <q>I'll be there</q>?</q></p>
    </section>
    <section>
      <h3>With cite attribute</h3>
      <p>According to the documentation, <q cite="https://example.com/docs">this feature is experimental</q>.</p>
    </section>
    <section>
      <h3>Locale-aware quotes</h3>
      <p lang="en">English: <q>Hello</q></p>
      <p lang="de">German: <q>Hallo</q></p>
      <p lang="fr">French: <q>Bonjour</q></p>
      <p lang="ja">Japanese: <q>こんにちは</q></p>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
