<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Details Basic</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l" style="max-inline-size: 35rem;">
    <details>
      <summary>Click to expand</summary>
      <p>This content is revealed when the details element is opened. The summary acts as a clickable header that toggles the visibility of the content inside.</p>
    </details>

    <details open>
      <summary>Already expanded</summary>
      <p>This details element starts in the open state. Users can click to collapse it.</p>
    </details>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
