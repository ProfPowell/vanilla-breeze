<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Button-Styled Links</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Variants</h3>
      <layout-cluster data-layout-gap="m">
        <a href="#" class="button">Get Started</a>
        <a href="#" class="button secondary">Documentation</a>
        <a href="#" class="button ghost">Learn More</a>
      </layout-cluster>
    </section>
    <section>
      <h3>Sizes</h3>
      <layout-cluster data-layout-gap="m" data-layout-align="center">
        <a href="#" class="button small">Small</a>
        <a href="#" class="button">Default</a>
        <a href="#" class="button large">Large</a>
      </layout-cluster>
    </section>
    <section>
      <h3>Full Width</h3>
      <a href="#" class="button full-width" style="max-inline-size: 25rem;">Create Account</a>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
