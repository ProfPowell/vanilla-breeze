<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Details Stacked (Accordion)</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <section style="max-inline-size: 35rem;">
    <details>
      <summary>First item</summary>
      <p>Content for the first panel. Adjacent details elements automatically connect their borders.</p>
    </details>
    <details>
      <summary>Second item</summary>
      <p>Content for the second panel. The border-radius is removed between adjacent items.</p>
    </details>
    <details>
      <summary>Third item</summary>
      <p>Content for the third panel. No JavaScript required for this pattern.</p>
    </details>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
