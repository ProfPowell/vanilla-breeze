<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Input States and Validation</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>Input States and Validation</h1>
  <layout-stack data-layout-gap="l" style="max-inline-size: 25rem;">
    <section>
      <h2>States</h2>
      <layout-stack data-layout-gap="m">
        <form-field>
          <label for="st-normal">Normal</label>
          <input type="text" id="st-normal" value="Editable text" />
        </form-field>
        <form-field>
          <label for="st-disabled">Disabled</label>
          <input type="text" id="st-disabled" disabled value="Cannot edit" />
        </form-field>
        <form-field>
          <label for="st-readonly">Read-only</label>
          <input type="text" id="st-readonly" readonly value="Select but not edit" />
        </form-field>
      </layout-stack>
    </section>
    <section>
      <h2>Validation</h2>
      <form>
        <layout-stack data-layout-gap="m">
          <form-field>
            <label for="v-required">Required *</label>
            <input type="text" id="v-required" required />
          </form-field>
          <form-field>
            <label for="v-invalid">Email (invalid)</label>
            <input type="email" id="v-invalid" aria-invalid="true" value="not-an-email" />
            <output aria-live="polite" style="color: oklch(55% 0.25 25); font-size: var(--font-size-sm);">Please enter a valid email</output>
          </form-field>
          <form-field>
            <label for="v-pattern">Username</label>
            <input type="text" id="v-pattern" pattern="[a-zA-Z0-9_]+" title="Letters, numbers, underscores" />
            <output style="font-size: var(--font-size-sm); color: var(--color-text-muted);">Letters, numbers, underscores only</output>
          </form-field>
        </layout-stack>
      </form>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
