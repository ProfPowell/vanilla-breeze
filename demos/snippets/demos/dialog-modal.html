<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dialog Modal vs Non-Modal</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); min-block-size: 300px; }
  </style>
</head>
<body>
  <layout-cluster data-layout-gap="m">
    <button type="button" id="open-modal">Open Modal</button>
    <button type="button" id="open-non-modal">Open Non-Modal</button>
  </layout-cluster>

  <dialog id="modal-demo">
    <header aria-label="Modal Dialog heading">
      <h1>Modal Dialog</h1>
    </header>
    <p>Opened with <code>showModal()</code>. Has backdrop, focus trapping, and ESC to close.</p>
    <footer aria-label="Modal Dialog actions">
      <button type="button" onclick="this.closest('dialog').close()">Close</button>
    </footer>
  </dialog>

  <dialog id="non-modal-demo">
    <header aria-label="Non-Modal Dialog heading">
      <h1>Non-Modal Dialog</h1>
    </header>
    <p>Opened with <code>show()</code>. No backdrop, no focus trap. You can still interact with the page.</p>
    <footer aria-label="Non-Modal Dialog actions">
      <button type="button" onclick="this.closest('dialog').close()">Close</button>
    </footer>
  </dialog>

  <script type="module" src="/src/main.js"></script>
  <script>
    document.getElementById('open-modal').addEventListener('click', () => {
      document.getElementById('modal-demo').showModal();
    });
    document.getElementById('open-non-modal').addEventListener('click', () => {
      document.getElementById('non-modal-demo').show();
    });
  </script>
</body>
</html>
