<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Progress Ring - Sizes</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
      display: flex;
      align-items: center;
      gap: var(--size-l);
    }
  </style>
</head>
<body>
  <progress-ring data-size="xs" style="--progress: 60" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"></progress-ring>
  <progress-ring data-size="s" style="--progress: 60" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"></progress-ring>
  <progress-ring data-size="m" style="--progress: 60" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"><span>60%</span></progress-ring>
  <progress-ring data-size="l" style="--progress: 60" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"><span>60%</span></progress-ring>
  <progress-ring data-size="xl" style="--progress: 60" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"><span>60%</span></progress-ring>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
