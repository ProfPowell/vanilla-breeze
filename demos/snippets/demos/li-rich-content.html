<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>List Items with Rich Content</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>With Links</h3>
      <ul>
        <li><a href="#">Link to page one</a></li>
        <li><a href="#">Link to page two</a></li>
        <li><a href="#">Link to page three</a></li>
      </ul>
    </section>
    <section>
      <h3>Multiple Elements</h3>
      <ul>
        <li>
          <strong>Feature Name</strong>
          <p>Description of the feature with supporting text.</p>
        </li>
        <li>
          <strong>Another Feature</strong>
          <p>More descriptive text about this feature.</p>
        </li>
      </ul>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
