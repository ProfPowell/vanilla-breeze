<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Layout Badge - Notification Count</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .notification-label {
      position: relative;
    }
    .notification-label layout-badge {
      position: absolute;
      top: -0.5rem;
      right: -1rem;
    }
    .notification-label-wide layout-badge {
      right: -1.5rem;
    }
  </style>
</head>
<body>
  <layout-cluster data-layout-gap="l">
    <span class="notification-label">
      Messages
      <layout-badge data-color="error" data-size="sm">3</layout-badge>
    </span>
    <span class="notification-label notification-label-wide">
      Notifications
      <layout-badge data-color="primary" data-size="sm">12</layout-badge>
    </span>
  </layout-cluster>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
