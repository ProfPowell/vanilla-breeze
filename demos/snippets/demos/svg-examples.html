<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SVG sizes, colors, and animations</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Sizes</h3>
      <layout-cluster data-layout-gap="m" data-layout-align="center">
        <figure>
          <svg class="xs currentcolor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></svg>
          <figcaption>.xs</figcaption>
        </figure>
        <figure>
          <svg class="s currentcolor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></svg>
          <figcaption>.s</figcaption>
        </figure>
        <figure>
          <svg class="m currentcolor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></svg>
          <figcaption>.m</figcaption>
        </figure>
        <figure>
          <svg class="l currentcolor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></svg>
          <figcaption>.l</figcaption>
        </figure>
        <figure>
          <svg class="xl currentcolor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></svg>
          <figcaption>.xl</figcaption>
        </figure>
        <figure>
          <svg class="xxl currentcolor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></svg>
          <figcaption>.xxl</figcaption>
        </figure>
      </layout-cluster>
    </section>
    <section>
      <h3>Colors</h3>
      <layout-cluster data-layout-gap="m">
        <svg class="l currentcolor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z" /></svg>
        <svg class="l interactive" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z" /></svg>
        <svg class="l muted" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z" /></svg>
      </layout-cluster>
    </section>
    <section>
      <h3>Animations</h3>
      <layout-cluster data-layout-gap="l">
        <figure>
          <svg class="l currentcolor spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56" /></svg>
          <figcaption>.spin</figcaption>
        </figure>
        <figure>
          <svg class="l currentcolor pulse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></svg>
          <figcaption>.pulse</figcaption>
        </figure>
      </layout-cluster>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
