<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sidebar Dashboard Layout</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .stat-value { font-size: var(--font-size-xl); font-weight: 700; }
    .stat-label { color: var(--color-text-muted); font-size: var(--font-size-sm); }
    .dashboard-title { font-size: var(--font-size-lg); }
  </style>
</head>
<body>
  <layout-sidebar data-layout-gap="l" data-layout-sidebar-width="normal">
    <layout-card data-variant="outlined">
      <layout-stack data-layout-gap="m">
        <strong class="dashboard-title">Dashboard</strong>
        <nav class="vertical" aria-label="Dashboard navigation">
          <ul>
            <li><a href="#" aria-current="page">Overview</a></li>
            <li><a href="#">Analytics</a></li>
            <li><a href="#">Reports</a></li>
            <li><a href="#">Settings</a></li>
          </ul>
        </nav>
      </layout-stack>
    </layout-card>
    <layout-stack data-layout-gap="m">
      <h2>Overview</h2>
      <layout-grid data-layout-min="12rem" data-layout-gap="m">
        <layout-card data-variant="outlined" data-padding="m">
          <layout-stack data-layout-gap="xs" data-layout-align="center">
            <span class="stat-value">1,234</span>
            <span class="stat-label">Users</span>
          </layout-stack>
        </layout-card>
        <layout-card data-variant="outlined" data-padding="m">
          <layout-stack data-layout-gap="xs" data-layout-align="center">
            <span class="stat-value">567</span>
            <span class="stat-label">Orders</span>
          </layout-stack>
        </layout-card>
        <layout-card data-variant="outlined" data-padding="m">
          <layout-stack data-layout-gap="xs" data-layout-align="center">
            <span class="stat-value">$12.3k</span>
            <span class="stat-label">Revenue</span>
          </layout-stack>
        </layout-card>
      </layout-grid>
    </layout-stack>
  </layout-sidebar>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
