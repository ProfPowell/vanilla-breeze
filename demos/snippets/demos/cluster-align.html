<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cluster Align Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .demo-cluster {
      background: var(--color-surface-raised);
      padding: var(--size-s);
      border-radius: var(--radius-s);
      min-block-size: 5rem;
    }
    .baseline-sm { font-size: var(--font-size-sm); }
    .baseline-lg { font-size: var(--font-size-lg); }
    .baseline-2xl { font-size: var(--font-size-2xl); }
  </style>
</head>
<body>
  <layout-grid data-layout-min="15rem" data-layout-gap="l">
    <section>
      <p><strong>data-layout-align="start"</strong></p>
      <layout-cluster data-layout-gap="m" data-layout-align="start" class="demo-cluster">
        <button type="button" class="small">Small</button>
        <button type="button">Default</button>
        <button type="button" class="large">Large</button>
      </layout-cluster>
    </section>
    <section>
      <p><strong>data-layout-align="center"</strong> (default)</p>
      <layout-cluster data-layout-gap="m" data-layout-align="center" class="demo-cluster">
        <button type="button" class="small">Small</button>
        <button type="button">Default</button>
        <button type="button" class="large">Large</button>
      </layout-cluster>
    </section>
    <section>
      <p><strong>data-layout-align="end"</strong></p>
      <layout-cluster data-layout-gap="m" data-layout-align="end" class="demo-cluster">
        <button type="button" class="small">Small</button>
        <button type="button">Default</button>
        <button type="button" class="large">Large</button>
      </layout-cluster>
    </section>
    <section>
      <p><strong>data-layout-align="baseline"</strong></p>
      <layout-cluster data-layout-gap="m" data-layout-align="baseline" class="demo-cluster">
        <span class="baseline-sm">Small</span>
        <span class="baseline-lg">Medium</span>
        <span class="baseline-2xl">Large</span>
      </layout-cluster>
    </section>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
