<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Line Break Usage</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>Line Break Usage</h1>
  <layout-stack data-layout-gap="l">
    <section>
      <h2>Address formatting</h2>
      <address>
        John Smith<br />
        123 Main Street<br />
        Springfield, IL 62704
      </address>
    </section>
    <section>
      <h2>Poetry</h2>
      <p>
        Roses are red,<br />
        Violets are blue,<br />
        Sugar is sweet,<br />
        And so are you.
      </p>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
