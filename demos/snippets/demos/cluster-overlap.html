<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cluster Overlap Variant</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <p><strong>data-layout-overlap</strong> (default)</p>
      <layout-cluster data-layout-overlap>
        <user-avatar>
          <img src="https://i.pravatar.cc/150?img=5" alt="User 1" />
        </user-avatar>
        <user-avatar>
          <img src="https://i.pravatar.cc/150?img=6" alt="User 2" />
        </user-avatar>
        <user-avatar>
          <img src="https://i.pravatar.cc/150?img=7" alt="User 3" />
        </user-avatar>
        <user-avatar>
          <span data-fallback>+3</span>
        </user-avatar>
      </layout-cluster>
    </section>
    <section>
      <p><strong>data-layout-overlap="xs"</strong> (tight)</p>
      <layout-cluster data-layout-overlap="xs">
        <user-avatar data-size="sm"><span data-fallback>1</span></user-avatar>
        <user-avatar data-size="sm"><span data-fallback>2</span></user-avatar>
        <user-avatar data-size="sm"><span data-fallback>3</span></user-avatar>
      </layout-cluster>
    </section>
    <section>
      <p><strong>data-layout-overlap="m"</strong> (more overlap)</p>
      <layout-cluster data-layout-overlap="m">
        <user-avatar data-size="sm"><span data-fallback>1</span></user-avatar>
        <user-avatar data-size="sm"><span data-fallback>2</span></user-avatar>
        <user-avatar data-size="sm"><span data-fallback>3</span></user-avatar>
      </layout-cluster>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
