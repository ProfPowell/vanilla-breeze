<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Switcher - Basic Usage</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-switcher data-layout-gap="m">
    <layout-card data-variant="outlined" data-padding="m">
      <p><strong>Item 1</strong></p>
      <p>Content that shares space horizontally when there's room.</p>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <p><strong>Item 2</strong></p>
      <p>Stacks vertically when the container is narrow.</p>
    </layout-card>
  </layout-switcher>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
