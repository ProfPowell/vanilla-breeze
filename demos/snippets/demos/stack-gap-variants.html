<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stack Gap Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .demo-item {
      background: var(--color-surface-raised);
      padding: var(--size-s);
      border-radius: var(--radius-s);
    }
  </style>
</head>
<body>
  <layout-grid data-layout-min="15rem" data-layout-gap="l">
    <section>
      <p><strong>data-layout-gap="xs"</strong></p>
      <layout-stack data-layout-gap="xs">
        <p class="demo-item">Item 1</p>
        <p class="demo-item">Item 2</p>
        <p class="demo-item">Item 3</p>
      </layout-stack>
    </section>

    <section>
      <p><strong>data-layout-gap="m"</strong> (default)</p>
      <layout-stack data-layout-gap="m">
        <p class="demo-item">Item 1</p>
        <p class="demo-item">Item 2</p>
        <p class="demo-item">Item 3</p>
      </layout-stack>
    </section>

    <section>
      <p><strong>data-layout-gap="xl"</strong></p>
      <layout-stack data-layout-gap="xl">
        <p class="demo-item">Item 1</p>
        <p class="demo-item">Item 2</p>
        <p class="demo-item">Item 3</p>
      </layout-stack>
    </section>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
