<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Links with Custom Icons</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="s">
    <p><a href="/files/report.pdf" download data-no-icon><icon-wc name="file-text" size="xs"></icon-wc> Annual Report (PDF)</a></p>
    <p><a href="/files/data.xlsx" download data-no-icon><icon-wc name="file-spreadsheet" size="xs"></icon-wc> Data Export (Excel)</a></p>
    <p><a href="https://github.com/example" data-no-icon><icon-wc name="github" size="xs"></icon-wc> View on GitHub</a></p>
    <p><a href="mailto:support@example.com"><icon-wc name="mail" size="xs"></icon-wc> Contact Support</a></p>
    <p><a href="/calendar"><icon-wc name="calendar" size="xs"></icon-wc> Schedule Meeting</a></p>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
