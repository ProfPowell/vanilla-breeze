<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nav Breadcrumb Separators</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m">
    <nav class="breadcrumb" data-separator="chevron" aria-label="Breadcrumb chevron">
      <ol>
        <li><a href="#">Home</a></li>
        <li><a href="#">Docs</a></li>
        <li><span aria-current="page">Nav</span></li>
      </ol>
    </nav>
    <nav class="breadcrumb" data-separator="arrow" aria-label="Breadcrumb arrow">
      <ol>
        <li><a href="#">Home</a></li>
        <li><a href="#">Docs</a></li>
        <li><span aria-current="page">Nav</span></li>
      </ol>
    </nav>
    <nav class="breadcrumb" data-separator="dot" aria-label="Breadcrumb dot">
      <ol>
        <li><a href="#">Home</a></li>
        <li><a href="#">Docs</a></li>
        <li><span aria-current="page">Nav</span></li>
      </ol>
    </nav>
    <nav class="breadcrumb" data-separator="pipe" aria-label="Breadcrumb pipe">
      <ol>
        <li><a href="#">Home</a></li>
        <li><a href="#">Docs</a></li>
        <li><span aria-current="page">Nav</span></li>
      </ol>
    </nav>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
