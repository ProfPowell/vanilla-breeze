<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Legend Examples</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="xl" style="max-inline-size: 35rem;">

    <section>
      <h2>Default (Bordered Fieldset)</h2>
      <fieldset>
        <legend>Personal Information</legend>
        <layout-stack data-layout-gap="m">
          <form-field>
            <label for="legend-name">Full Name</label>
            <input type="text" id="legend-name" />
          </form-field>
          <form-field>
            <label for="legend-email">Email</label>
            <input type="email" id="legend-email" />
          </form-field>
        </layout-stack>
      </fieldset>
    </section>

    <section>
      <h2>Minimal Fieldset</h2>
      <fieldset class="minimal">
        <legend>Preferences</legend>
        <layout-stack data-layout-gap="s">
          <label>
            <input type="checkbox" name="prefs" value="dark" /> Dark mode
          </label>
          <label>
            <input type="checkbox" name="prefs" value="reduce" /> Reduce motion
          </label>
          <label>
            <input type="checkbox" name="prefs" value="compact" /> Compact view
          </label>
        </layout-stack>
      </fieldset>
    </section>

    <section>
      <h2>Radio Group</h2>
      <fieldset>
        <legend>Select Payment Method</legend>
        <layout-stack data-layout-gap="s">
          <label>
            <input type="radio" name="payment" value="card" checked /> Credit Card
          </label>
          <label>
            <input type="radio" name="payment" value="paypal" /> PayPal
          </label>
          <label>
            <input type="radio" name="payment" value="bank" /> Bank Transfer
          </label>
        </layout-stack>
      </fieldset>
    </section>

    <section>
      <h2>Checkbox Group</h2>
      <fieldset class="minimal">
        <legend>Notification Settings</legend>
        <layout-stack data-layout-gap="s">
          <label>
            <input type="checkbox" name="notify" value="email" checked /> Email notifications
          </label>
          <label>
            <input type="checkbox" name="notify" value="sms" /> SMS notifications
          </label>
          <label>
            <input type="checkbox" name="notify" value="push" /> Push notifications
          </label>
        </layout-stack>
      </fieldset>
    </section>

    <section>
      <h2>Rich Content in Legend</h2>
      <fieldset>
        <legend><strong>Required:</strong> Contact Details</legend>
        <layout-stack data-layout-gap="m">
          <form-field>
            <label for="legend-phone">Phone *</label>
            <input type="tel" id="legend-phone" required />
          </form-field>
          <form-field>
            <label for="legend-alt-email">Email *</label>
            <input type="email" id="legend-alt-email" required />
          </form-field>
        </layout-stack>
      </fieldset>
    </section>

    <section>
      <h2>Nested Fieldsets</h2>
      <fieldset>
        <legend>Shipping Information</legend>
        <layout-stack data-layout-gap="l">
          <fieldset class="minimal">
            <legend>Address</legend>
            <layout-stack data-layout-gap="m">
              <form-field>
                <label for="nested-street">Street</label>
                <input type="text" id="nested-street" />
              </form-field>
              <form-field>
                <label for="nested-city">City</label>
                <input type="text" id="nested-city" />
              </form-field>
            </layout-stack>
          </fieldset>
          <fieldset class="minimal">
            <legend>Delivery Options</legend>
            <layout-stack data-layout-gap="s">
              <label>
                <input type="radio" name="delivery" value="standard" checked /> Standard
              </label>
              <label>
                <input type="radio" name="delivery" value="express" /> Express
              </label>
            </layout-stack>
          </fieldset>
        </layout-stack>
      </fieldset>
    </section>

  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
