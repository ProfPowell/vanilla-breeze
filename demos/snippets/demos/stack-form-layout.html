<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stack Form Layout</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .form-container { max-inline-size: 25rem; }
  </style>
</head>
<body>
  <section class="form-container">
    <layout-stack data-layout-gap="m">
      <layout-stack data-layout-gap="xs">
        <label for="form-name">Name</label>
        <input type="text" id="form-name" placeholder="Your name" />
      </layout-stack>
      <layout-stack data-layout-gap="xs">
        <label for="form-email">Email</label>
        <input type="email" id="form-email" placeholder="you@example.com" />
      </layout-stack>
      <button type="submit">Submit</button>
    </layout-stack>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
