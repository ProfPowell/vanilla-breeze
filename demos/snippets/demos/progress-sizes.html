<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Progress Sizes</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m" style="max-inline-size: 25rem;">
    <form-field>
      <label>.xs (extra small)</label>
      <progress class="xs" value="60" max="100">60%</progress>
    </form-field>
    <form-field>
      <label>.s (small)</label>
      <progress class="s" value="60" max="100">60%</progress>
    </form-field>
    <form-field>
      <label>Default</label>
      <progress value="60" max="100">60%</progress>
    </form-field>
    <form-field>
      <label>.l (large)</label>
      <progress class="l" value="60" max="100">60%</progress>
    </form-field>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
