<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link Auto-Detection</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="m">
    <p>External: <a href="https://example.com">Example.com</a></p>
    <p>Download: <a href="/files/report.pdf" download="report.pdf">Download the PDF</a></p>
    <p>Email: <a href="mailto:hello@example.com">hello@example.com</a></p>
    <p>Phone: <a href="tel:+1234567890">+1 (234) 567-890</a></p>
    <p>PDF: <a href="/files/annual-report.pdf">Annual Report</a></p>
    <p>Suppressed: <a href="https://example.com" data-no-icon>Example.com</a> (no icon)</p>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
