<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Center Form Container</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .form-card {
      inline-size: 100%;
      max-inline-size: 25rem;
    }
    .form-card h3 { text-align: center; }
    .form-card button[type="submit"] { inline-size: 100%; }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow" data-layout-intrinsic>
    <layout-card data-variant="outlined" class="form-card">
      <layout-stack data-layout-gap="m">
        <h3>Sign In</h3>
        <layout-stack data-layout-gap="xs">
          <label for="center-email">Email</label>
          <input type="email" id="center-email" placeholder="you@example.com" />
        </layout-stack>
        <layout-stack data-layout-gap="xs">
          <label for="center-password">Password</label>
          <input type="password" id="center-password" placeholder="Enter password" />
        </layout-stack>
        <button type="submit">Sign In</button>
      </layout-stack>
    </layout-card>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
