<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Field Contact Form</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 30rem; }
  </style>
</head>
<body>
  <form>
    <layout-stack data-layout-gap="m">
      <form-field>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required
               minlength="2" autocomplete="name"
               aria-describedby="name-msg" />
        <output id="name-msg" for="name" aria-live="polite">
          Please enter your name (at least 2 characters)
        </output>
      </form-field>

      <form-field>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required
               autocomplete="email"
               aria-describedby="email-msg" />
        <output id="email-msg" for="email" aria-live="polite">
          Please enter a valid email address
        </output>
      </form-field>

      <form-field>
        <label for="subject">Subject</label>
        <select id="subject" name="subject" required>
          <option value="" disabled selected>Select a subject...</option>
          <option value="general">General Inquiry</option>
          <option value="support">Technical Support</option>
          <option value="feedback">Feedback</option>
        </select>
      </form-field>

      <form-field>
        <label for="message">Message</label>
        <textarea id="message" name="message" required
                  minlength="10" rows="5"
                  aria-describedby="message-msg"></textarea>
        <output id="message-msg" for="message" aria-live="polite">
          Please enter your message (at least 10 characters)
        </output>
      </form-field>

      <button type="submit">Send Message</button>
    </layout-stack>
  </form>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
