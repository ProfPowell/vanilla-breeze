<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Section Bordered</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <h1>Section Bordered</h1>
  <section>
    <h2>Previous Section</h2>
    <p>Content above the border.</p>
  </section>
  <section class="bordered">
    <h2>Bordered Section</h2>
    <p>This section has a top border to separate it from above content.</p>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
