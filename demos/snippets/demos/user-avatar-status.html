<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Avatar Status Indicator</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-cluster data-layout-gap="m" data-layout-align="center">
    <user-avatar data-size="lg">
      <img src="https://i.pravatar.cc/150?img=4" alt="Online User" />
      <span data-status="online"></span>
    </user-avatar>
    <user-avatar data-size="lg">
      <span data-fallback>AW</span>
      <span data-status="away"></span>
    </user-avatar>
    <user-avatar data-size="lg">
      <span data-fallback>BY</span>
      <span data-status="busy"></span>
    </user-avatar>
    <user-avatar data-size="lg">
      <span data-fallback>OF</span>
      <span data-status="offline"></span>
    </user-avatar>
  </layout-cluster>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
