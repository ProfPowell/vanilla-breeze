<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>layout-card Profile Card</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 20rem; }
    .muted { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-card data-variant="outlined">
    <layout-stack data-layout-gap="m" data-layout-align="center">
      <user-avatar data-size="xl">
        <img src="https://picsum.photos/80/80" alt="Jane Doe" loading="lazy" />
      </user-avatar>
      <layout-stack data-layout-gap="xs" data-layout-align="center">
        <strong>Jane Doe</strong>
        <small class="muted">Product Designer</small>
      </layout-stack>
      <layout-cluster data-layout-gap="xs">
        <layout-badge>UX</layout-badge>
        <layout-badge>UI</layout-badge>
        <layout-badge>Figma</layout-badge>
      </layout-cluster>
    </layout-stack>
  </layout-card>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
