<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ruby Visibility Control</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Default (always visible)</h3>
      <p style="font-size: var(--font-size-xl);">
        <ruby>漢字<rp>(</rp><rt>かんじ</rt><rp>)</rp></ruby>
      </p>
    </section>
    <section>
      <h3>Simulated "hide" mode</h3>
      <p style="font-size: var(--font-size-xl);">
        <ruby>漢字<rp>(</rp><rt style="position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0);">かんじ</rt><rp>)</rp></ruby>
        <small>(Ruby text is visually hidden but remains in the DOM for screen readers)</small>
      </p>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
