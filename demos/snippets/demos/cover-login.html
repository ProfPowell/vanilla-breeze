<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cover Login Page</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: 0;
      background: var(--color-surface);
    }
    .demo-login {
      background: var(--color-gray-100);
      min-block-size: 25rem;
    }
    .demo-login-card {
      inline-size: 100%;
      max-inline-size: 22rem;
    }
    .demo-login-subtitle {
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
    }
    .demo-login footer small {
      color: var(--color-text-muted);
    }
    .demo-login-submit {
      inline-size: 100%;
    }
  </style>
</head>
<body>
  <layout-cover class="demo-login" data-layout-min="auto" data-layout-padding="l" data-layout-centered>
    <header>
      <strong>Brand Logo</strong>
    </header>
    <div data-layout-principal>
      <layout-card class="demo-login-card">
        <layout-stack data-layout-gap="m">
          <layout-stack data-layout-gap="xs" data-layout-align="center">
            <h2>Sign In</h2>
            <p class="demo-login-subtitle">Welcome back</p>
          </layout-stack>
          <layout-stack data-layout-gap="xs">
            <label for="cover-email">Email</label>
            <input type="email" id="cover-email" placeholder="you@example.com" />
          </layout-stack>
          <layout-stack data-layout-gap="xs">
            <label for="cover-password">Password</label>
            <input type="password" id="cover-password" placeholder="Enter password" />
          </layout-stack>
          <button type="submit" class="demo-login-submit">Sign In</button>
        </layout-stack>
      </layout-card>
    </div>
    <footer>
      <small>Don't have an account? <a href="#">Sign up</a></small>
    </footer>
  </layout-cover>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
