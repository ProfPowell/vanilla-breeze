<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reel Product Carousel</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .price { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-reel data-layout-gap="m" data-layout-item-width="m">
    <layout-card data-variant="outlined">
      <layout-stack data-layout-gap="s">
        <div data-media data-layout-ratio="1:1" data-radius="s">
          <img src="https://picsum.photos/300/300?10" alt="Product 1" loading="lazy" />
        </div>
        <strong>Product Name</strong>
        <span class="price">$29.99</span>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined">
      <layout-stack data-layout-gap="s">
        <div data-media data-layout-ratio="1:1" data-radius="s">
          <img src="https://picsum.photos/300/300?11" alt="Product 2" loading="lazy" />
        </div>
        <strong>Product Name</strong>
        <span class="price">$34.99</span>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined">
      <layout-stack data-layout-gap="s">
        <div data-media data-layout-ratio="1:1" data-radius="s">
          <img src="https://picsum.photos/300/300?12" alt="Product 3" loading="lazy" />
        </div>
        <strong>Product Name</strong>
        <span class="price">$24.99</span>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined">
      <layout-stack data-layout-gap="s">
        <div data-media data-layout-ratio="1:1" data-radius="s">
          <img src="https://picsum.photos/300/300?13" alt="Product 4" loading="lazy" />
        </div>
        <strong>Product Name</strong>
        <span class="price">$44.99</span>
      </layout-stack>
    </layout-card>
  </layout-reel>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
