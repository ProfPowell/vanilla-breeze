<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video Variants</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="xl">
    <section>
      <h3>Default (responsive)</h3>
      <video controls preload="metadata" style="max-inline-size: 500px;"
        poster="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Big_buck_bunny_poster_big.jpg/800px-Big_buck_bunny_poster_big.jpg">
        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4" />
        <p>Your browser does not support video. <a href="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4">Download the video</a>.</p>
      </video>
    </section>
    <section>
      <h3>.rounded</h3>
      <video class="rounded" controls preload="metadata" style="max-inline-size: 500px;"
        poster="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Big_buck_bunny_poster_big.jpg/800px-Big_buck_bunny_poster_big.jpg">
        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4" />
      </video>
    </section>
    <section>
      <h3>Aspect ratio variants</h3>
      <layout-grid data-layout-gap="m" style="--layout-grid-min: 14rem;">
        <figure>
          <video class="widescreen" controls preload="metadata"
            poster="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Big_buck_bunny_poster_big.jpg/800px-Big_buck_bunny_poster_big.jpg">
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4" />
          </video>
          <figcaption>.widescreen (16:9)</figcaption>
        </figure>
        <figure>
          <video class="standard" controls preload="metadata"
            poster="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Big_buck_bunny_poster_big.jpg/800px-Big_buck_bunny_poster_big.jpg">
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4" />
          </video>
          <figcaption>.standard (4:3)</figcaption>
        </figure>
        <figure>
          <video class="square" controls preload="metadata"
            poster="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Big_buck_bunny_poster_big.jpg/800px-Big_buck_bunny_poster_big.jpg">
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4" />
          </video>
          <figcaption>.square (1:1)</figcaption>
        </figure>
      </layout-grid>
      <p><small>Video: <cite>Big Buck Bunny</cite> &copy; Blender Foundation, licensed under CC BY 3.0</small></p>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
