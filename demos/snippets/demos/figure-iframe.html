<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Figure with Iframe</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .embed-responsive {
      position: relative;
      aspect-ratio: 16 / 9;
      max-inline-size: 500px;
    }
    .embed-responsive iframe {
      position: absolute;
      inset: 0;
      inline-size: 100%;
      block-size: 100%;
      border: var(--border-width-thin) solid var(--color-border);
      border-radius: var(--radius-s);
    }
  </style>
</head>
<body>
  <figure>
    <div class="embed-responsive">
      <iframe src="/docs/snippets/demos/hr-default.html" title="Embedded demo page"></iframe>
    </div>
    <figcaption>Figure 1: An embedded page rendered inside an iframe.</figcaption>
  </figure>
</body>
</html>
