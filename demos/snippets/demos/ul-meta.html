<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unordered List Meta Variant</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-stack data-layout-gap="l">
    <section>
      <h3>Default (middle dot)</h3>
      <ul class="meta">
        <li>Jane Smith</li>
        <li><time datetime="2024-01-15">Jan 15, 2024</time></li>
        <li>5 min read</li>
        <li>Technology</li>
      </ul>
    </section>
    <section>
      <h3>Pipe separator</h3>
      <ul class="meta" data-separator="pipe">
        <li>Home</li>
        <li>Products</li>
        <li>About</li>
        <li>Contact</li>
      </ul>
    </section>
    <section>
      <h3>Dash separator</h3>
      <ul class="meta" data-separator="dash">
        <li>v2.1.0</li>
        <li>MIT License</li>
        <li>42 contributors</li>
      </ul>
    </section>
    <section>
      <h3>Slash separator</h3>
      <ul class="meta" data-separator="slash">
        <li>docs</li>
        <li>elements</li>
        <li>native</li>
        <li>ul</li>
      </ul>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
