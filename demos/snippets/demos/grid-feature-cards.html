<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grid Feature Cards</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .feature-description { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-grid data-layout-min="18rem" data-layout-gap="m">
    <layout-card>
      <layout-stack data-layout-gap="s">
        <strong>Fast Performance</strong>
        <p class="feature-description">Optimized for speed with minimal overhead.</p>
      </layout-stack>
    </layout-card>
    <layout-card>
      <layout-stack data-layout-gap="s">
        <strong>Accessible</strong>
        <p class="feature-description">Built with WCAG guidelines in mind.</p>
      </layout-stack>
    </layout-card>
    <layout-card>
      <layout-stack data-layout-gap="s">
        <strong>Progressive</strong>
        <p class="feature-description">Works without JavaScript, enhances with it.</p>
      </layout-stack>
    </layout-card>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
