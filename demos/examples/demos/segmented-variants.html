<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Segmented Control Variants</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <layout-stack data-layout-gap="l">
      <h1>Segmented Control Variants</h1>

      <section>
        <h2>Compact</h2>
        <fieldset data-segmented data-segmented-compact>
          <legend class="visually-hidden">Size</legend>
          <label><input type="radio" name="size-c" value="s" checked/> S</label>
          <label><input type="radio" name="size-c" value="m"/> M</label>
          <label><input type="radio" name="size-c" value="l"/> L</label>
        </fieldset>
      </section>

      <section>
        <h2>Vertical</h2>
        <fieldset data-segmented data-segmented-vertical>
          <legend class="visually-hidden">Alignment</legend>
          <label><input type="radio" name="align" value="start" checked/> Start</label>
          <label><input type="radio" name="align" value="center"/> Center</label>
          <label><input type="radio" name="align" value="end"/> End</label>
        </fieldset>
      </section>

      <section>
        <h2>Disabled segment</h2>
        <fieldset data-segmented>
          <legend class="visually-hidden">Plan tier</legend>
          <label><input type="radio" name="plan" value="free" checked/> Free</label>
          <label><input type="radio" name="plan" value="pro"/> Pro</label>
          <label><input type="radio" name="plan" value="enterprise" disabled/> Enterprise</label>
        </fieldset>
      </section>
    </layout-stack>
  </layout-center>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
