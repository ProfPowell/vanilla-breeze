<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Capacity Plan — Basic</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { padding: var(--size-l); background: var(--color-surface-alt); }
    h1   { margin-block-end: var(--size-m); }
    p    { margin-block-end: var(--size-l); color: var(--color-text-muted); }
    section { margin-block: var(--size-l); }
  </style>
</head>
<body>
  <layout-center data-layout-max="normal" data-layout-gap="l">
    <h1>Capacity Plan</h1>
    <p>The ledger ties the planning chain together: capacity (from <code>&lt;iron-triangle&gt;</code>) − quality spend (from <code>&lt;quality-target&gt;</code>'s critical sum) − feature spend (slotted <code>&lt;work-item data-capacity-cost&gt;</code>) = slack. Edit any input above and watch the bars rebalance.</p>

    <section><iron-triangle id="shape"></iron-triangle></section>
    <section><quality-target id="quality" data-bind-to="shape"></quality-target></section>

    <section>
      <h2>Plan</h2>
      <capacity-plan data-bind-triangle="shape" data-bind-quality="quality">
        <work-item data-capacity-cost="3">Bulk import</work-item>
        <work-item data-capacity-cost="2">API webhooks</work-item>
      </capacity-plan>
    </section>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
