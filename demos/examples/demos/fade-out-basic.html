<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fade Out Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Click to fade out</small>
    <p data-effect="fade-out" data-trigger="click">Click me to fade away</p>
  </section>
  <section>
    <small>Timed fade out (3 seconds)</small>
    <p data-effect="fade-out" data-trigger="time:3000">This will disappear after 3 seconds</p>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
