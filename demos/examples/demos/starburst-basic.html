<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starburst Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.theme.css" />
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.effects.css" />
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    [data-effect="starburst"] { padding: var(--size-2xl); border-radius: var(--radius-l); min-height: 200px; }
    [data-effect="starburst"][data-center-text] { text-align: center; }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <h1>Starburst Demo</h1>
  <section>
    <small>Pastel starburst section</small>
    <section data-effect="starburst" data-layout="center" data-layout-text>
      <h2>Pastel Starburst</h2>
    </section>
  </section>
  <section>
    <small>Starburst with centered content</small>
    <section data-effect="starburst" data-layout="stack" data-layout-gap="s" data-layout-align="center" data-center-text>
      <h3>Welcome!</h3>
      <p>The spinning conic-gradient creates a kawaii starburst backdrop.</p>
    </section>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
