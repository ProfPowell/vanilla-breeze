<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starburst Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.theme.css">
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.effects.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Pastel starburst section</small>
    <section data-effect="starburst" data-layout="center" data-layout-text style="padding: var(--size-2xl); border-radius: var(--radius-l); min-height: 200px;">
      <h2>Pastel Starburst</h2>
    </section>
  </section>
  <section>
    <small>Starburst with centered content</small>
    <section data-effect="starburst" data-layout="stack" data-layout-gap="s" data-layout-align="center" style="padding: var(--size-2xl); border-radius: var(--radius-l); min-height: 200px; text-align: center;">
      <h3>Welcome!</h3>
      <p>The spinning conic-gradient creates a kawaii starburst backdrop.</p>
    </section>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
