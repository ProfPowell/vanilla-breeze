<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>diagram-wc — Basic</title>
  <link rel="stylesheet" href="/src/main.css" />
  <link rel="stylesheet" href="/cdn/packs/ux-planning.full.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 56rem; margin-inline: auto; }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <header>
    <h1>diagram-wc — Basic flowchart</h1>
    <p><small>Without JS: readable code block. With JS: rendered SVG.</small></p>
  </header>

  <diagram-wc type="mermaid" caption="A small login flow">
    <pre><code class="language-mermaid">flowchart LR
  Start([Visit page]) --&gt; Form[Login form]
  Form --&gt; Check{Valid&nbsp;creds?}
  Check --&gt;|Yes| Session[Create session]
  Check --&gt;|No| Form
  Session --&gt; Dash([Dashboard])
</code></pre>
  </diagram-wc>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/packs/ux-planning.full.js"></script>
</body>
</html>
