<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pop Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    .spacer { height: 60vh; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); border: 1px dashed var(--color-border); border-radius: var(--radius-m); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Immediate pop</small>
    <h1 data-effect="pop">Pops in on load</h1>
  </section>
  <p class="spacer">Scroll down</p>
  <section>
    <small>Scroll triggered</small>
    <h2 data-effect="pop" data-trigger="scroll">Pops when scrolled into view</h2>
  </section>
  <section>
    <small>Click triggered (shake — stays visible, animates on click)</small>
    <button data-effect="shake" data-trigger="click">Click me to shake</button>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
