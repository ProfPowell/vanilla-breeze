<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outline Text Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.theme.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.effects.css">
  <style>
    body { padding: var(--size-xl); background: oklch(15% 0.01 260); color-scheme: dark; }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default</small>
    <h1 data-effect="outline">Outline Text</h1>
  </section>
  <section>
    <small>Thick</small>
    <h2 data-effect="outline" class="thick">Thick Outline</h2>
  </section>
  <section>
    <small>Ultra</small>
    <h2 data-effect="outline" class="ultra">Ultra Outline</h2>
  </section>
  <section>
    <small>Glow</small>
    <h2 data-effect="outline" class="glow">Glowing Outline</h2>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
