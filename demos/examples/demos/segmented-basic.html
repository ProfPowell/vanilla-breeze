<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Segmented Control Demo</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <fieldset data-segmented>
      <legend class="visually-hidden">Color mode</legend>
      <label><input type="radio" name="mode" value="auto" checked/> Auto</label>
      <label><input type="radio" name="mode" value="light"/> Light</label>
      <label><input type="radio" name="mode" value="dark"/> Dark</label>
    </fieldset>
  </layout-center>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
