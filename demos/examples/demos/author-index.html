<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Author Index &mdash; Vanilla Breeze Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <script type="module" src="/src/main.js"></script>
</head>
<body data-page-layout="article">
  <main>
    <section data-layout="center" data-layout-max="wide" data-layout-gap="l">
      <h1>Author Index</h1>
      <p>The lens reads <code>pages.json</code> at site root and groups every page by its declared <code>author</code>. Use the search field to filter live; switch <code>sort</code> between <em>alpha</em> (default) and <em>count</em>.</p>

      <author-index data-lens-src="/pages.json" placeholder="Filter authors…"></author-index>
    </section>
  </main>
</body>
</html>
