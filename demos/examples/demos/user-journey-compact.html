<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Journey Compact Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <user-journey
    id="journey-support"
    persona="Sarah Chen"
    persona-id="persona-sarah-chen"
    compact>
    <h2 slot="title">Support Incident Journey</h2>
    <p slot="summary">What a developer experiences from first alert to resolved incident</p>
  </user-journey>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/packs/ux-planning.full.js"></script>
  <script type="module">
    document.getElementById('journey-support').phases = [
      {
        name: 'Problem Hits',
        emotion: 'frustrated',
        actions: [
          'Receives an error from a customer',
          'Checks the status page — shows all green',
          'Opens a support ticket with full error logs',
        ],
        thoughts: [
          'The status page says everything is fine but something is clearly broken.',
        ],
        touchpoints: ['Status page', 'Help centre', 'Support ticket'],
        painPoints: [
          'Status page doesn\'t reflect real incidents',
          'Documentation is version-inconsistent',
        ],
        opportunities: [
          'Proactive incident communication',
          'Version-tagged documentation',
        ],
      },
      {
        name: 'Waiting',
        emotion: 'uncertain',
        actions: [
          'Implements a temporary workaround',
          'Follows up on ticket after 6 hours',
          'Posts in the community Slack',
        ],
        thoughts: [
          'SLA says 4-hour response — I\'m past that now.',
        ],
        touchpoints: ['Support ticket', 'Community Slack'],
        painPoints: [
          'SLA missed without acknowledgement',
        ],
        opportunities: [
          'Surface related known issues at ticket creation',
          'Proactive SLA breach notification',
        ],
      },
      {
        name: 'Resolution',
        emotion: 'satisfied',
        actions: [
          'Support identifies root cause — a silent config change',
          'Fix deployed; customer confirms it works',
          'Receives a post-mortem summary',
        ],
        thoughts: [
          'Glad it\'s fixed, but this shouldn\'t have taken 14 hours.',
          'The post-mortem is actually detailed and honest — that\'s rare.',
        ],
        touchpoints: ['Support reply', 'Post-mortem email'],
        painPoints: [
          '14 hours to resolve a vendor-caused issue',
        ],
        opportunities: [
          'Automated regression tests on deploys',
          'Public post-mortem page builds long-term trust',
        ],
      },
    ];
  </script>
</body>
</html>
