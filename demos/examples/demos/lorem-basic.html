<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Lorem Placeholder Text Demo</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <h1>Lorem Placeholder Text Demo</h1>
  <layout-center data-layout-max="narrow">
    <layout-stack data-layout-gap="l">

      <section>
        <h3>Default Paragraph</h3>
        <p data-lorem></p>
      </section>

      <section>
        <h3>Word Count</h3>
        <p data-lorem="20"></p>
      </section>

      <section>
        <h3>Sentence Count</h3>
        <p data-lorem="2 sentences"></p>
      </section>

      <section>
        <h3>Heading Text</h3>
        <h2 data-lorem="heading">Generated heading</h2>
      </section>

      <section>
        <h3>List Items</h3>
        <ul data-lorem="5 items"></ul>
      </section>

      <section>
        <h3>Multi-language</h3>
        <layout-stack data-layout-gap="s">
          <p><strong>Japanese:</strong></p>
          <p lang="ja" data-lorem="20"></p>
          <p><strong>Arabic:</strong></p>
          <p lang="ar" data-lorem="20" dir="rtl"></p>
          <p><strong>Cyrillic:</strong></p>
          <p lang="ru" data-lorem="20"></p>
        </layout-stack>
      </section>

    </layout-stack>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
