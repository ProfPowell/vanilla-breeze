<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkle Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.theme.css">
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.effects.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Sparkle on inline text</small>
    <span data-effect="sparkle">Sparkle Text</span>
  </section>
  <section>
    <small>Sparkle on a button</small>
    <button data-effect="sparkle">Sparkle Button</button>
  </section>
  <section>
    <small>Sparkle on a heading</small>
    <h2 data-effect="sparkle">Sparkle Heading</h2>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
