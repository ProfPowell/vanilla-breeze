<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marquee Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.theme.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.effects.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default</small>
    <div data-effect="marquee"><span>Breaking News</span><span>Latest Headlines</span><span>Stay Tuned</span><span>More Updates</span></div>
  </section>
  <section>
    <small>Slow</small>
    <div data-effect="marquee" class="slow"><span>Breaking News</span><span>Latest Headlines</span><span>Stay Tuned</span><span>More Updates</span></div>
  </section>
  <section>
    <small>Reverse</small>
    <div data-effect="marquee" class="reverse"><span>Breaking News</span><span>Latest Headlines</span><span>Stay Tuned</span><span>More Updates</span></div>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
