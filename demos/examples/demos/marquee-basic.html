<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marquee Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default</small>
    <section data-effect="marquee"><span>Breaking News</span><span>Latest Headlines</span><span>Stay Tuned</span><span>More Updates</span></section>
  </section>
  <section>
    <small>Slow</small>
    <section data-effect="marquee" class="slow"><span>Breaking News</span><span>Latest Headlines</span><span>Stay Tuned</span><span>More Updates</span></section>
  </section>
  <section>
    <small>Reverse</small>
    <section data-effect="marquee" class="reverse"><span>Breaking News</span><span>Latest Headlines</span><span>Stay Tuned</span><span>More Updates</span></section>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
