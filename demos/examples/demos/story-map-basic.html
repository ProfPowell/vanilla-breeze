<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Map Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/cdn/packs/ux-planning.full.css">
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <story-map>
    <section data-activity="discovery" data-activity-label="Discovery">
      <user-story draggable="true" data-id="PROJ-101"
        story-id="PROJ-101" persona="Researcher" action="interview 10 target users"
        priority="high" status="done" points="5" detail="compact">
      </user-story>
      <user-story draggable="true" data-id="PROJ-102"
        story-id="PROJ-102" persona="PM" action="analyze competitor onboarding flows"
        priority="medium" status="done" points="3" detail="compact">
      </user-story>
    </section>
    <section data-activity="design" data-activity-label="Design">
      <user-story draggable="true" data-id="PROJ-201"
        story-id="PROJ-201" persona="Designer" action="create wireframes for new dashboard"
        priority="high" status="in-progress" points="5" detail="compact">
      </user-story>
      <user-story draggable="true" data-id="PROJ-202"
        story-id="PROJ-202" persona="Designer" action="design responsive mobile layout"
        priority="medium" status="to-do" points="3" detail="compact">
      </user-story>
    </section>
    <section data-activity="build" data-activity-label="Build">
      <user-story draggable="true" data-id="PROJ-301"
        story-id="PROJ-301" persona="Developer" action="implement dashboard API endpoints"
        priority="high" status="to-do" points="8" detail="compact">
      </user-story>
      <user-story draggable="true" data-id="PROJ-302"
        story-id="PROJ-302" persona="Developer" action="build timeline visualization component"
        priority="high" status="backlog" points="8" detail="compact">
      </user-story>
      <user-story draggable="true" data-id="PROJ-303"
        story-id="PROJ-303" persona="Developer" action="add CSV export to reports"
        priority="low" status="backlog" points="2" detail="compact">
      </user-story>
    </section>
    <section data-activity="validate" data-activity-label="Validate">
      <user-story draggable="true" data-id="PROJ-401"
        story-id="PROJ-401" persona="QA" action="run usability testing with 5 participants"
        priority="high" status="backlog" points="5" detail="compact">
      </user-story>
      <user-story draggable="true" data-id="PROJ-402"
        story-id="PROJ-402" persona="PM" action="measure onboarding completion rate"
        priority="medium" status="backlog" points="2" detail="compact">
      </user-story>
    </section>
  </story-map>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/packs/ux-planning.full.js"></script>
</body>
</html>
