<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Time Picker Demo</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    .demo-heading { margin: 0 0 var(--size-m); }
    .form-output {
      display: block;
      margin-block-start: var(--size-m);
      padding: var(--size-m);
      background: var(--color-surface-alt);
      border-radius: var(--radius-m);
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
      white-space: pre-wrap;
      min-height: 2em;
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <layout-stack data-layout-gap="2xl">

      <layout-card>
        <h1 class="demo-heading">Time Picker</h1>
        <form id="demo-form">
          <layout-stack data-layout-gap="l">
            <form-field>
              <label for="meeting">Meeting time (24h)</label>
              <time-picker name="meeting">
                <input type="time" id="meeting" value="14:30"/>
              </time-picker>
            </form-field>

            <form-field>
              <label for="alarm">Alarm (12h format)</label>
              <time-picker name="alarm" data-format="12h">
                <input type="time" id="alarm" value="07:30"/>
              </time-picker>
            </form-field>

            <form-field>
              <label for="slot">Appointment slot (15-min intervals)</label>
              <time-picker name="slot">
                <input type="time" id="slot" min="09:00" max="17:00" step="900"/>
              </time-picker>
            </form-field>

            <layout-cluster data-layout-gap="s">
              <button type="submit">Submit</button>
              <button type="reset" data-variant="outline">Reset</button>
            </layout-cluster>
          </layout-stack>
        </form>
        <output id="form-output" class="form-output">Submit the form to see data here</output>
      </layout-card>

    </layout-stack>
  </layout-center>

  <script type="module" src="/src/main.js"></script>
  <script type="module">
    document.getElementById('demo-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const data = new FormData(e.target);
      const entries = [...data.entries()].map(([k, v]) => `${k}: ${v}`).join('\n');
      document.getElementById('form-output').textContent = entries || '(no data)';
    });
  </script>
</body>
</html>
