<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Visualizer Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">

  <h1>Audio Visualizer</h1>

  <section data-layout="stack" data-layout-gap="m">
    <h2>Bars Mode (default)</h2>
    <audio-player>
      <audio id="bars-demo" controls>
        <source src="assets/track.mp3" type="audio/mpeg">
        <p><a href="assets/track.mp3" download>Download track</a></p>
      </audio>
    </audio-player>
    <audio-visualizer for="bars-demo" data-mode="bars"></audio-visualizer>
  </section>

  <section data-layout="stack" data-layout-gap="m">
    <h2>Waveform Mode</h2>
    <audio-player>
      <audio id="wave-demo" controls>
        <source src="assets/track.mp3" type="audio/mpeg">
        <p><a href="assets/track.mp3" download>Download track</a></p>
      </audio>
    </audio-player>
    <audio-visualizer for="wave-demo" data-mode="waveform"></audio-visualizer>
  </section>

  <section data-layout="stack" data-layout-gap="m">
    <h2>Circle Mode</h2>
    <audio-player>
      <audio id="circle-demo" controls>
        <source src="assets/track.mp3" type="audio/mpeg">
        <p><a href="assets/track.mp3" download>Download track</a></p>
      </audio>
    </audio-player>
    <audio-visualizer for="circle-demo" data-mode="circle"
      style="--audio-visualizer-height: 160px;"></audio-visualizer>
  </section>

  <section data-layout="stack" data-layout-gap="m">
    <h2>Custom Styled</h2>
    <audio-player>
      <audio id="custom-demo" controls>
        <source src="assets/track.mp3" type="audio/mpeg">
        <p><a href="assets/track.mp3" download>Download track</a></p>
      </audio>
    </audio-player>
    <audio-visualizer for="custom-demo" data-mode="bars"
      style="--audio-visualizer-color: oklch(70% 0.25 145);
             --audio-visualizer-bg: oklch(10% 0.02 260);
             --audio-visualizer-height: 100px;
             --audio-visualizer-radius: var(--radius-l);"></audio-visualizer>
  </section>

  <section data-layout="stack" data-layout-gap="m">
    <h2>Paired with audio-player</h2>
    <audio-player>
      <audio id="paired-demo" controls>
        <source src="assets/track.mp3" type="audio/mpeg">
        <p><a href="assets/track.mp3" download>Download</a></p>
      </audio>
    </audio-player>
    <audio-visualizer for="paired-demo" data-mode="bars"></audio-visualizer>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
