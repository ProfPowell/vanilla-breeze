<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imposter Layout Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
    .demo-container {
      position: relative;
      block-size: 300px;
      background: var(--color-surface-alt);
      border-radius: var(--radius-m);
      overflow: hidden;
    }
    .flush {
      margin: 0;
    }
    .muted-note {
      margin: 0;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <h1>Imposter Layout Demo</h1>
  <layout-stack data-layout-gap="l">
    <p class="muted-note">The imposter element is centered over its container:</p>
    <section class="demo-container">
      <layout-imposter>
        <layout-card data-variant="elevated">
          <layout-stack data-layout-gap="s">
            <h2 class="flush">Centered Overlay</h2>
            <p class="muted-note">This content is positioned using layout-imposter.</p>
            <button type="button">Action</button>
          </layout-stack>
        </layout-card>
      </layout-imposter>
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
