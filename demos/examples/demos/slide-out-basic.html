<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Out Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Click the button to trigger slide-out on the message</small>
    <p id="msg1">This message will slide out to the right when dismissed.</p>
    <button onclick="document.getElementById('msg1').setAttribute('data-effect-active','')">Dismiss</button>
  </section>
  <section>
    <small>Slow variant</small>
    <p id="msg2" data-effect="slide-out" class="slow">A slower horizontal exit.</p>
    <button onclick="document.getElementById('msg2').setAttribute('data-effect-active','')">Dismiss Slow</button>
  </section>
  <section dir="rtl">
    <small>RTL support</small>
    <p id="msg3" data-effect="slide-out">&#x200F;&#x0647;&#x0630;&#x0627; &#x064A;&#x0646;&#x0632;&#x0644;&#x0642; &#x0625;&#x0644;&#x0649; &#x0627;&#x0644;&#x064A;&#x0633;&#x0627;&#x0631; &#x0641;&#x064A; RTL</p>
    <button onclick="document.getElementById('msg3').setAttribute('data-effect-active','')">&#x0625;&#x063A;&#x0644;&#x0627;&#x0642;</button>
  </section>
  <script type="module" src="/src/main.js"></script>
  <script>
    // Wire up the first message (no data-effect until button pressed)
    document.getElementById('msg1').setAttribute('data-effect', 'slide-out');
  </script>
</body>
</html>
