<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Out Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    .demo-msg {
      padding: var(--size-m);
      background: var(--color-surface-raised, #f5f5f5);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-m);
      cursor: pointer;
    }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Click the message to slide it out</small>
    <p data-effect="slide-out" data-trigger="click" class="demo-msg">Click me to slide out to the right</p>
  </section>
  <section>
    <small>Slow variant</small>
    <p data-effect="slide-out" data-trigger="click" class="slow demo-msg">A slower horizontal exit &mdash; click to dismiss</p>
  </section>
  <section dir="rtl">
    <small>RTL support</small>
    <p data-effect="slide-out" data-trigger="click" class="demo-msg">&#x200F;&#x0627;&#x0646;&#x0642;&#x0631; &#x0644;&#x0644;&#x0625;&#x063A;&#x0644;&#x0627;&#x0642; &mdash; &#x064A;&#x0646;&#x0632;&#x0644;&#x0642; &#x0625;&#x0644;&#x0649; &#x0627;&#x0644;&#x064A;&#x0633;&#x0627;&#x0631;</p>
  </section>
  <section>
    <small>Timed slide out (3 seconds)</small>
    <p data-effect="slide-out" data-trigger="time:3000" class="demo-msg">This will slide out after 3 seconds</p>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
