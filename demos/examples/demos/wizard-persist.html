<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Wizard Persistence Demo</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <layout-card>
      <form id="persist-wizard" data-wizard data-wizard-persist="session">
        <fieldset data-wizard-step>
          <legend>Info</legend>
          <form-field>
            <label for="p-name">Name</label>
            <input type="text" id="p-name" name="p-name"/>
          </form-field>
        </fieldset>

        <fieldset data-wizard-step>
          <legend>Details</legend>
          <form-field>
            <label for="p-color">Favorite Color</label>
            <input type="text" id="p-color" name="p-color"/>
          </form-field>
        </fieldset>

        <fieldset data-wizard-step>
          <legend>Done</legend>
          <p>All set.</p>
        </fieldset>

        <nav data-wizard-nav>
          <button type="button" data-wizard-prev>Back</button>
          <button type="button" data-wizard-next>Next</button>
          <button type="submit">Submit</button>
        </nav>
      </form>
    </layout-card>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
