<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Shapes: Image &amp; Media Clips</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }

    h1 { margin-block-end: var(--size-s); }
    h2 { margin-block: var(--size-xl) var(--size-m); }

    .clip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: var(--size-l);
    }

    .clip-grid figure {
      margin: 0;
      text-align: center;
    }

    .clip-grid img {
      width: 100%;
      aspect-ratio: 1;
      display: block;
    }

    .clip-grid figcaption {
      margin-block-start: var(--size-xs);
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
    }

    /* Wider ratio for swoosh and diagonal-frame */
    .clip-grid .wide img {
      aspect-ratio: 16 / 10;
    }
  </style>
</head>
<body>
  <header>
    <h1>CSS Shapes: Image &amp; Media Clips</h1>
    <p>Responsive shape masking on <code>&lt;img&gt;</code> and <code>&lt;figure&gt;</code> using the <code>data-clip</code> attribute.</p>
  </header>

  <h2>img[data-clip] &mdash; Direct on Images</h2>

  <section class="clip-grid">
    <figure>
      <img data-clip="hexagon" src="https://picsum.photos/seed/hex/400/400" alt="Hexagon clipped photo" width="400" height="400">
      <figcaption><code>data-clip="hexagon"</code></figcaption>
    </figure>

    <figure>
      <img data-clip="arch" src="https://picsum.photos/seed/arch/400/400" alt="Arch clipped photo" width="400" height="400">
      <figcaption><code>data-clip="arch"</code></figcaption>
    </figure>

    <figure>
      <img data-clip="leaf" src="https://picsum.photos/seed/leaf/400/400" alt="Leaf clipped photo" width="400" height="400">
      <figcaption><code>data-clip="leaf"</code></figcaption>
    </figure>

    <figure class="wide">
      <img data-clip="swoosh" src="https://picsum.photos/seed/swoosh/640/400" alt="Swoosh clipped photo" width="640" height="400">
      <figcaption><code>data-clip="swoosh"</code></figcaption>
    </figure>

    <figure class="wide">
      <img data-clip="diagonal-frame" src="https://picsum.photos/seed/diag/640/400" alt="Diagonal frame clipped photo" width="640" height="400">
      <figcaption><code>data-clip="diagonal-frame"</code></figcaption>
    </figure>

    <figure class="wide">
      <img data-clip="torn" src="https://picsum.photos/seed/torn/640/400" alt="Torn edge clipped photo" width="640" height="400">
      <figcaption><code>data-clip="torn"</code></figcaption>
    </figure>
  </section>

  <h2>figure[data-clip] &mdash; On Figure Container</h2>

  <section class="clip-grid">
    <figure data-clip="hexagon">
      <img src="https://picsum.photos/seed/fhex/400/400" alt="Hexagon figure clip" width="400" height="400">
      <figcaption><code>figure[data-clip="hexagon"]</code></figcaption>
    </figure>

    <figure data-clip="arch">
      <img src="https://picsum.photos/seed/farch/400/400" alt="Arch figure clip" width="400" height="400">
      <figcaption><code>figure[data-clip="arch"]</code></figcaption>
    </figure>

    <figure data-clip="leaf">
      <img src="https://picsum.photos/seed/fleaf/400/400" alt="Leaf figure clip" width="400" height="400">
      <figcaption><code>figure[data-clip="leaf"]</code></figcaption>
    </figure>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
