<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prototyping Toolkit Demo - Vanilla Breeze</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <link rel="stylesheet" href="/src/dev.css"/>
  <style>
    .toolbar {
      position: fixed;
      inset-block-start: 0;
      inset-inline: 0;
      z-index: 100000;
      display: flex;
      gap: var(--size-m);
      align-items: center;
      padding: var(--size-s) var(--size-m);
      background: oklch(15% 0 0);
      color: oklch(90% 0 0);
      font-family: system-ui, sans-serif;
      font-size: var(--font-size-s);
    }
    .toolbar label {
      display: flex;
      align-items: center;
      gap: var(--size-2xs);
      cursor: pointer;
    }
    .toolbar select {
      background: oklch(25% 0 0);
      color: oklch(90% 0 0);
      border: 1px solid oklch(40% 0 0);
      padding: var(--size-3xs) var(--size-xs);
      border-radius: var(--radius-s);
    }
    body {
      padding-block-start: 3.5rem;
    }
    main > section,
    body > header,
    body > footer {
      padding: var(--size-l) var(--size-xl);
    }
    body > footer {
      border-block-start: 1px solid var(--color-gray-200);
    }
  </style>
</head>
<body>
  <nav class="toolbar" aria-label="Demo controls">
    <strong>Prototyping Toolkit</strong>
    <label>
      <input type="checkbox" id="wireframe-toggle"/>
      Wireframe
    </label>
    <label>
      Fidelity:
      <select id="fidelity-select">
        <option value="">Default</option>
        <option value="lo">Lo</option>
        <option value="mid">Mid</option>
        <option value="hi">Hi</option>
        <option value="annotate">Annotate</option>
      </select>
    </label>
  </nav>

  <header data-layout="stack" data-layout-gap="s">
    <nav>
      <layout-cluster data-layout-gap="m" data-layout-align="center">
        <img data-mock="logo" alt="Acme Corp">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
      </layout-cluster>
    </nav>
  </header>

  <main>
    <section data-layout="stack" data-layout-gap="m">
      <img data-mock="hero" alt="Welcome to Acme Corp">
      <h1 data-lorem="heading"></h1>
      <p data-lorem="2 sentences"></p>
      <layout-cluster data-layout-gap="s">
        <button>Get Started</button>
        <button>Learn More</button>
      </layout-cluster>
    </section>

    <section>
      <h2 data-lorem="heading"></h2>
      <p data-lorem="2 sentences"></p>
      <layout-grid data-layout-min="280px" data-layout-gap="l">
        <layout-card>
          <img data-mock="card" alt="Feature one">
          <h3 data-lorem="heading"></h3>
          <p data-lorem="25"></p>
          <footer><a href="#">Read more</a></footer>
        </layout-card>
        <layout-card>
          <img data-mock="card" alt="Feature two">
          <h3 data-lorem="heading"></h3>
          <p data-lorem="25"></p>
          <footer><a href="#">Read more</a></footer>
        </layout-card>
        <layout-card>
          <img data-mock="card" alt="Feature three">
          <h3 data-lorem="heading"></h3>
          <p data-lorem="25"></p>
          <footer><a href="#">Read more</a></footer>
        </layout-card>
      </layout-grid>
    </section>

    <section>
      <h2>Team</h2>
      <layout-grid data-layout-min="200px" data-layout-gap="l">
        <article data-layout="stack" data-layout-gap="xs">
          <img data-mock="avatar" alt="Team member">
          <strong data-lorem="heading"></strong>
          <p data-lorem="10"></p>
        </article>
        <article data-layout="stack" data-layout-gap="xs">
          <img data-mock="avatar" alt="Team member">
          <strong data-lorem="heading"></strong>
          <p data-lorem="10"></p>
        </article>
        <article data-layout="stack" data-layout-gap="xs">
          <img data-mock="avatar" alt="Team member">
          <strong data-lorem="heading"></strong>
          <p data-lorem="10"></p>
        </article>
        <article data-layout="stack" data-layout-gap="xs">
          <img data-mock="avatar" alt="Team member">
          <strong data-lorem="heading"></strong>
          <p data-lorem="10"></p>
        </article>
      </layout-grid>
    </section>

    <section>
      <h2>Testimonials</h2>
      <layout-grid data-layout-min="300px" data-layout-gap="l">
        <blockquote>
          <p data-lorem="2 sentences"></p>
          <footer><cite data-lorem="heading"></cite></footer>
        </blockquote>
        <blockquote>
          <p data-lorem="2 sentences"></p>
          <footer><cite data-lorem="heading"></cite></footer>
        </blockquote>
      </layout-grid>
    </section>

    <section>
      <h2>Products</h2>
      <layout-grid data-layout-min="250px" data-layout-gap="l">
        <layout-card>
          <img data-mock="product" alt="Product A">
          <h3 data-lorem="heading"></h3>
          <p data-lorem="15"></p>
          <footer>
            <button>Add to Cart</button>
          </footer>
        </layout-card>
        <layout-card>
          <img data-mock="product" alt="Product B">
          <h3 data-lorem="heading"></h3>
          <p data-lorem="15"></p>
          <footer>
            <button>Add to Cart</button>
          </footer>
        </layout-card>
        <layout-card>
          <img data-mock="product" alt="Product C">
          <h3 data-lorem="heading"></h3>
          <p data-lorem="15"></p>
          <footer>
            <button>Add to Cart</button>
          </footer>
        </layout-card>
        <layout-card>
          <img data-mock="product" alt="Product D">
          <h3 data-lorem="heading"></h3>
          <p data-lorem="15"></p>
          <footer>
            <button>Add to Cart</button>
          </footer>
        </layout-card>
      </layout-grid>
    </section>

    <section>
      <h2>Video Placeholder</h2>
      <video data-mock width="800" height="450" alt="Product demo"></video>
    </section>

    <section lang="ja">
      <h2>Multi-language (Japanese)</h2>
      <p data-lorem></p>
    </section>

    <section lang="ar" dir="rtl">
      <h2>Multi-language (Arabic)</h2>
      <p data-lorem></p>
    </section>
  </main>

  <footer>
    <layout-cluster data-layout-gap="l" data-layout-align="center" data-layout-justify="space-between">
      <p>Built with <code>data-mock</code> + <code>data-lorem</code></p>
      <nav>
        <layout-cluster data-layout-gap="m">
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Contact</a>
        </layout-cluster>
      </nav>
    </layout-cluster>
  </footer>

  <script type="module" src="/src/web-components/index.js"></script>
  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('wireframe-toggle');
    const fidelity = document.getElementById('fidelity-select');

    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        html.setAttribute('data-wireframe', fidelity.value);
      } else {
        html.removeAttribute('data-wireframe');
      }
    });

    fidelity.addEventListener('change', () => {
      if (toggle.checked) {
        html.setAttribute('data-wireframe', fidelity.value);
      }
    });
  </script>
</body>
</html>
