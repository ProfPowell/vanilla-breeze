<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particles Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.theme.css" />
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.effects.css" />
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    [data-effect="particles"] { position: relative; border: 1px solid var(--color-border); border-radius: var(--radius-m); }
    [data-effect="particles"][data-h="250"] { height: 250px; }
    [data-effect="particles"][data-h="350"] { height: 350px; }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Floating sparkle particles</small>
    <section data-effect="particles" data-h="250">
      <p>Floating sparkle particles rise upward and fade.</p>
    </section>
  </section>
  <section>
    <small>Particles in a taller container</small>
    <section data-effect="particles" data-layout="center" data-layout-text data-h="350">
      <p>Watch the sparkles float up.</p>
    </section>
  </section>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/packs/kawaii/kawaii.effects.js"></script>
</body>
</html>
