<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Float Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Gentle float</small>
    <h1 data-effect="float">Floating gently</h1>
  </section>
  <section>
    <small>On an icon or decorative element</small>
    <p style="font-size: 3rem; display: inline-block;" data-effect="float">&#9733;</p>
  </section>
  <section>
    <small>Slow float</small>
    <p data-effect="float" class="slow">Slow, dreamy float.</p>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
