<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hard Shadow Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.theme.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.effects.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default</small>
    <h1 data-effect="hard-shadow">Hard Shadow</h1>
  </section>
  <section>
    <small>Double</small>
    <h2 data-effect="hard-shadow" class="double">Double Shadow</h2>
  </section>
  <section>
    <small>Long</small>
    <h2 data-effect="hard-shadow" class="long">Long Shadow</h2>
  </section>
  <section>
    <small>Long red</small>
    <h2 data-effect="hard-shadow" class="long red">Long Red</h2>
  </section>
  <section>
    <small>Gold</small>
    <h2 data-effect="hard-shadow" class="gold">Gold Shadow</h2>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
