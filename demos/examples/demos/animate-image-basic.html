<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Animate Image Demo</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
    .demo-img {
      max-inline-size: 100%;
      block-size: auto;
      border-radius: var(--radius-m);
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <layout-stack data-layout-gap="l">

      <section>
        <h3>Play/Pause Control</h3>
        <p>Click the toggle button on the image to pause or resume the animation.</p>
        <img src="/docs/examples/demos/assets/robot-arm.gif"
             data-effect="animate-image"
             alt="Robot arm animation"
             class="demo-img"/>
      </section>

      <section>
        <h3>Start Paused</h3>
        <p>This image starts in a paused state. Click play to start it.</p>
        <img src="/docs/examples/demos/assets/robot-arm.gif"
             data-effect="animate-image"
             data-animate-image-paused
             alt="Robot arm animation (paused)"
             class="demo-img"/>
      </section>

    </layout-stack>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
