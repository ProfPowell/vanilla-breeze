<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>File Row Basic</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <ul class="file-list">
      <li data-file>
        <icon-wc name="file-text"></icon-wc>
        <span class="file-name">quarterly-report.pdf</span>
        <span class="file-meta">2.4 MB</span>
        <span class="file-actions">
          <a href="#" download>Download</a>
        </span>
      </li>
      <li data-file>
        <icon-wc name="image"></icon-wc>
        <span class="file-name">site-screenshot.png</span>
        <span class="file-meta">842 KB</span>
        <span class="file-actions">
          <a href="#" download>Download</a>
        </span>
      </li>
      <li data-file>
        <icon-wc name="archive"></icon-wc>
        <span class="file-name">design-assets.zip</span>
        <span class="file-meta">18.7 MB</span>
        <span class="file-actions">
          <a href="#" download>Download</a>
        </span>
      </li>
    </ul>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
