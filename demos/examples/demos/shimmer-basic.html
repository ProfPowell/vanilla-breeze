<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Text Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Default speed (2s cycle)</small>
    <h1 data-effect="shimmer">Shimmering Text Effect</h1>
  </section>
  <section>
    <small>Slow shimmer (4s cycle)</small>
    <h2 data-effect="shimmer" class="slow">Slow and Steady Shimmer</h2>
  </section>
  <section>
    <small>Fast shimmer (1s cycle)</small>
    <h2 data-effect="shimmer" class="fast">Quick Flash Shimmer</h2>
  </section>
  <section>
    <small>On paragraph text</small>
    <p><span data-effect="shimmer">This shimmer effect works on any inline or block text element.</span></p>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
