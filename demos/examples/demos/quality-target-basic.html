<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Quality Target — Basic</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { padding: var(--size-l); background: var(--color-surface-alt); }
    h1   { margin-block-end: var(--size-m); }
    p    { margin-block-end: var(--size-l); color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-center data-layout-max="normal" data-layout-gap="l">
    <h1>Quality Target</h1>
    <p>The polygon is the picker. Click any axis to set its priority + rationale; the radar updates live. Pair with <code>&lt;iron-triangle&gt;</code> via <code>data-bind-to</code> to budget against capacity.</p>

    <iron-triangle id="shape" data-quality-href="#quality"></iron-triangle>

    <quality-target id="quality" name="quality" data-bind-to="shape"></quality-target>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
