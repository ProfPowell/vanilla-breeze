<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Wizard Form Demo</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <layout-card>
      <form id="test-wizard" data-wizard>
        <progress data-wizard-progress></progress>

        <fieldset data-wizard-step>
          <legend>Account</legend>
          <form-field>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required/>
          </form-field>
        </fieldset>

        <fieldset data-wizard-step>
          <legend>Profile</legend>
          <form-field>
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required/>
          </form-field>
          <form-field>
            <label for="account-type">Account Type</label>
            <select id="account-type" name="account-type">
              <option value="personal">Personal</option>
              <option value="business">Business</option>
            </select>
          </form-field>
        </fieldset>

        <fieldset data-wizard-step data-wizard-if="account-type:business">
          <legend>Business Details</legend>
          <form-field>
            <label for="company">Company Name</label>
            <input type="text" id="company" name="company"/>
          </form-field>
        </fieldset>

        <fieldset data-wizard-step data-wizard-optional>
          <legend>Preferences</legend>
          <form-field>
            <label>
              <input type="checkbox"  id="newsletter" name="newsletter" value="yes"/>
              Subscribe to newsletter
            </label>
          </form-field>
        </fieldset>

        <fieldset data-wizard-step>
          <legend>Review</legend>
          <p>Please review your information before submitting.</p>
        </fieldset>

        <nav data-wizard-nav>
          <button type="button" data-wizard-prev>Back</button>
          <button type="button" data-wizard-next>Next</button>
          <button type="submit">Submit</button>
        </nav>
      </form>
    </layout-card>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
