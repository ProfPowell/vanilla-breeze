<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Wizard History Demo</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <layout-card>
      <form id="history-wizard" data-wizard data-wizard-history>
        <progress data-wizard-progress></progress>

        <fieldset data-wizard-step>
          <legend>Step One</legend>
          <p>First step content.</p>
        </fieldset>

        <fieldset data-wizard-step>
          <legend>Step Two</legend>
          <p>Second step content.</p>
        </fieldset>

        <fieldset data-wizard-step>
          <legend>Step Three</legend>
          <p>Third step content.</p>
        </fieldset>

        <nav data-wizard-nav>
          <button type="button" data-wizard-prev>Back</button>
          <button type="button" data-wizard-next>Next</button>
          <button type="submit">Submit</button>
        </nav>
      </form>
    </layout-card>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
