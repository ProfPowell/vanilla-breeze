<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk Register — Basic Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/cdn/packs/ux-planning.full.css">
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 78rem; margin-inline: auto; }
    h1 { font-size: var(--font-size-l); }
    p  { color: var(--color-text-muted); margin-block-end: var(--size-l); }
    table { inline-size: 100%; border-collapse: collapse; font-size: var(--font-size-sm); }
    th, td { padding: var(--size-2xs) var(--size-xs); border-block-end: var(--border-width-thin) solid var(--color-border); text-align: start; vertical-align: top; }
    th { background: var(--color-surface-raised); font-weight: 600; }
    th[data-rollup], td:nth-child(4) { text-align: end; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <h1>Risk Register — table + quadrant from one source</h1>
  <p>One <code>&lt;template&gt;</code> data source, two synchronized views: a sortable table with computed Severity (likelihood × impact, low-good heatmap) and a quadrant grid placing each risk by its (likelihood, impact) coordinates.</p>

  <risk-register label="Q3 project risks">
    <template>
      <tr data-id="vendor-delay"><td>Vendor delay</td><td>4</td><td>3</td><td>PM</td><td>Pre-stage assets in week 6</td></tr>
      <tr data-id="data-breach"><td>Data breach</td><td>2</td><td>5</td><td>Security</td><td>Tabletop exercise + WAF tuning</td></tr>
      <tr data-id="scope-creep"><td>Scope creep</td><td>5</td><td>3</td><td>EM</td><td>Strict change-control board</td></tr>
      <tr data-id="staff-churn"><td>Staff churn</td><td>2</td><td>2</td><td>EM</td><td>Document playbooks + cross-train</td></tr>
      <tr data-id="api-outage"><td>Third-party API outage</td><td>3</td><td>4</td><td>SRE</td><td>Cache last-known-good response</td></tr>
      <tr data-id="legal-review"><td>Slow legal review</td><td>4</td><td>2</td><td>Legal</td><td>Pre-brief counsel during week 3</td></tr>
    </template>
  </risk-register>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/packs/ux-planning.full.js"></script>
</body>
</html>
