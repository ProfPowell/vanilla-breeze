<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendar — Multi-Month</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface);
    }
    output {
      display: block;
      margin-block-start: var(--size-m);
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <h3>Two-month range picker</h3>
  <p>Shows two months side by side for easier range selection. Range highlights span across months.</p>

  <calendar-wc
    id="dual-cal"
    data-months="2"
    data-selection="range">
  </calendar-wc>

  <output id="dual-output">Select a date range</output>

  <script type="module" src="/src/main.js"></script>
  <script>
    document.getElementById('dual-cal').addEventListener('calendar:select', (e) => {
      document.getElementById('dual-output').textContent =
        'Range: ' + e.detail.value;
    });
  </script>
</body>
</html>
