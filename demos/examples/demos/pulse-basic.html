<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Continuous pulse</small>
    <h1 data-effect="pulse">Pulsing text</h1>
  </section>
  <section>
    <small>On a button</small>
    <button data-effect="pulse">Attention needed</button>
  </section>
  <section>
    <small>Fast pulse</small>
    <p data-effect="pulse" class="fast">Urgent pulsing effect.</p>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
