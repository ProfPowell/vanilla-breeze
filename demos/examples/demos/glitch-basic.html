<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitch Text Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Always-on glitch</small>
    <h1 data-effect="glitch">System Error</h1>
  </section>
  <section>
    <small>Hover to trigger</small>
    <h2 data-effect="glitch" data-trigger="hover">Hover Me for Glitch</h2>
  </section>
  <section>
    <small>Works on smaller text too</small>
    <p><span data-effect="glitch">Data corruption detected in sector 7-G.</span></p>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
