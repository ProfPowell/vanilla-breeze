<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Up Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    .spacer { height: 60vh; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); border: 1px dashed var(--color-border); border-radius: var(--radius-m); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Immediate slide up</small>
    <h1 data-effect="slide-up">Slides up on load</h1>
  </section>
  <p class="spacer">Scroll down</p>
  <section>
    <small>Scroll triggered</small>
    <h2 data-effect="slide-up" data-trigger="scroll">Slides up when visible</h2>
  </section>
  <section>
    <small>Combined fade + slide (composited)</small>
    <h2 data-effect="fade-in slide-up" data-trigger="scroll">Fade and slide together</h2>
  </section>
  <section>
    <small>Bouncy easing</small>
    <p data-effect="slide-up" data-trigger="scroll" class="bouncy">Bouncy slide entrance.</p>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
