<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>watch-wc variants</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { padding: var(--size-l); }
    section { display: flex; flex-direction: column; gap: var(--size-s); margin-block-end: var(--size-l); }
    .row { display: flex; gap: var(--size-m); align-items: center; flex-wrap: wrap; }
    label.swatch { font-size: var(--font-size-sm); color: var(--color-text-muted); min-inline-size: 6rem; }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <h1>watch-wc variants</h1>
    <p>Click any button to toggle the watch state for this page. All three stay in sync.</p>

    <section>
      <div class="row"><label class="swatch">Icon (default)</label><watch-wc></watch-wc></div>
      <div class="row"><label class="swatch">Compact</label><watch-wc variant="compact"></watch-wc></div>
      <div class="row"><label class="swatch">Button</label><watch-wc variant="button"></watch-wc></div>
      <div class="row"><label class="swatch">Custom label</label><watch-wc variant="button" label="Save for later"></watch-wc></div>
    </section>

    <layout-cluster data-layout-gap="s" data-layout-align="center">
      <notification-wc></notification-wc>
      <span>Open the bell &rarr; Watching tab to see the entry.</span>
    </layout-cluster>
  </layout-center>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
