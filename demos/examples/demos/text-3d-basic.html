<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Text Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.theme.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.effects.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default</small>
    <h1 data-effect="text-3d">3D Text</h1>
  </section>
  <section>
    <small>Gold</small>
    <h2 data-effect="text-3d" class="gold">Gold Extrusion</h2>
  </section>
  <section>
    <small>Red</small>
    <h2 data-effect="text-3d" class="red">Red Extrusion</h2>
  </section>
  <section>
    <small>Deep modifier</small>
    <h2 data-effect="text-3d" class="gold deep">Deep Gold</h2>
  </section>
  <section>
    <small>Animate modifier</small>
    <h2 data-effect="text-3d" class="red animate">Animated</h2>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
