<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Clipboard Copy Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-xl);
      background: var(--color-surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--size-m);
    }
  </style>
</head>
<body>
  <qr-code id="qr" value="https://vanilla-breeze.dev" size="160">https://vanilla-breeze.dev</qr-code>
  <button type="button" id="copy" class="secondary">Copy QR (text + image)</button>
  <p>
    <small>Paste into a text field for the URL, paste into Slack or Figma for the image.</small>
  </p>
  <script type="module" src="/src/main.js"></script>
  <script type="module">
    const qr = document.querySelector('#qr');
    const btn = document.querySelector('#copy');
    btn.addEventListener('click', () => qr.copy({ button: btn }));
  </script>
</body>
</html>
