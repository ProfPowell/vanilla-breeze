<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Segmented Control with Icons</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <fieldset data-segmented>
      <legend class="visually-hidden">View mode</legend>
      <label>
        <input type="radio" name="view" value="grid" checked/>
        <icon-wc name="grid" size="xs"></icon-wc> Grid
      </label>
      <label>
        <input type="radio" name="view" value="list"/>
        <icon-wc name="list" size="xs"></icon-wc> List
      </label>
      <label>
        <input type="radio" name="view" value="map"/>
        <icon-wc name="map" size="xs"></icon-wc> Map
      </label>
    </fieldset>
  </layout-center>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
