<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tooltip Cards Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-xl);
      background: var(--color-surface);
      display: flex;
      justify-content: center;
    }
    .tt-stack { padding: var(--size-m); }
    .tt-row { display: flex; align-items: center; gap: var(--size-s); }
    .tt-row-start { display: flex; gap: var(--size-s); align-items: start; }
    .tt-sub { display: block; }
    .tt-foot { display: block; margin-block-start: var(--size-xs); }
    .tt-desc { display: block; margin-block-start: var(--size-2xs); }
    .tt-icon { color: var(--color-interactive); flex-shrink: 0; }
  </style>
</head>
<body>
  <layout-stack class="tt-stack" data-layout-gap="m">
    <section>Contributions by
      <tool-tip variant="card">
        <a href="#" data-trigger>Jane Smith</a>
        <section data-content>
          <section class="tt-row">
            <user-avatar data-size="lg">
              <span data-fallback>JS</span>
            </user-avatar>
            <section>
              <strong>Jane Smith</strong>
              <span class="text-muted tt-sub">Senior Developer</span>
            </section>
          </section>
          <span class="text-muted tt-foot">
            <icon-wc name="map-pin" size="xs"></icon-wc> San Francisco
            &middot; 142 contributions
          </span>
        </section>
      </tool-tip>
      were merged yesterday.
    </section>

    <section>See the
      <tool-tip variant="card">
        <a href="/docs/elements/native/dialog/" data-trigger>dialog element</a>
        <section data-content>
          <section class="tt-row-start">
            <icon-wc name="layout-template" size="lg" class="tt-icon"></icon-wc>
            <section>
              <strong>Dialog Element</strong>
              <span class="text-muted tt-desc">Native modal and non-modal dialogs with backdrop, keyboard handling, and focus management.</span>
            </section>
          </section>
        </section>
      </tool-tip>
      for modal patterns.
    </section>
  </layout-stack>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
