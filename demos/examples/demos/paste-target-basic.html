<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paste Button Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-xl);
      background: var(--color-surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--size-m);
    }
    label {
      display: flex;
      align-items: center;
      gap: var(--size-s);
    }
    input {
      padding: var(--size-xs) var(--size-s);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-s);
      min-width: 18ch;
    }
  </style>
</head>
<body>
  <label>
    Destination:
    <input id="dest" type="text" placeholder="Click Paste to fill" />
  </label>
  <button type="button" data-paste-target="#dest">Paste</button>
  <p><small>Copy any text first, then click Paste.</small></p>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
