<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chart WC — Basic Examples</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <link rel="stylesheet" href="/cdn/vanilla-breeze-charts.css"/>
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    h2 { margin-block-start: var(--size-xl); }
    chart-wc { max-width: 600px; margin-block: var(--size-m); }
  </style>
</head>
<body>
  <layout-center data-layout-max="wide">
    <h1>Chart WC — All Chart Types</h1>
    <p>Each chart below uses a JSON <code>data-values</code> attribute.</p>

    <h2>Line Chart</h2>
    <chart-wc
      data-type="line"
      data-title="Weekly Users"
      data-label-x="Day of Week"
      data-label-y="Users"
      data-legend
      data-tooltip
      data-values='[
        {"name": "Desktop", "values": {"Mon": 120, "Tue": 180, "Wed": 150, "Thu": 210, "Fri": 190, "Sat": 80, "Sun": 60}},
        {"name": "Mobile",  "values": {"Mon": 80,  "Tue": 120, "Wed": 160, "Thu": 140, "Fri": 200, "Sat": 220, "Sun": 180}}
      ]'>
    </chart-wc>

    <h2>Area Chart</h2>
    <chart-wc
      data-type="area"
      data-title="Page Views"
      data-label-x="Month"
      data-label-y="Views"
      data-legend
      data-tooltip
      data-values='[
        {"name": "Organic", "values": {"Jan": 3200, "Feb": 4100, "Mar": 3800, "Apr": 5200, "May": 4700, "Jun": 6100}},
        {"name": "Direct",  "values": {"Jan": 1200, "Feb": 1400, "Mar": 1100, "Apr": 1800, "May": 2200, "Jun": 1900}}
      ]'>
    </chart-wc>

    <h2>Bar Chart</h2>
    <chart-wc
      data-type="bar"
      data-title="Revenue by Product"
      data-tooltip
      data-values='[
        {"name": "Revenue", "values": {"Widget A": 42000, "Widget B": 31000, "Widget C": 58000, "Widget D": 24000}}
      ]'>
    </chart-wc>

    <h2>Column Chart</h2>
    <chart-wc
      data-type="column"
      data-title="Quarterly Sales"
      data-legend
      data-tooltip
      data-values='[
        {"name": "2024", "values": {"Q1": 12, "Q2": 18, "Q3": 15, "Q4": 22}},
        {"name": "2025", "values": {"Q1": 14, "Q2": 21, "Q3": 19, "Q4": 28}}
      ]'>
    </chart-wc>

    <h2>Pie Chart</h2>
    <chart-wc
      data-type="pie"
      data-title="Market Share"
      data-legend
      data-values='{"Chrome": 65, "Safari": 18, "Firefox": 8, "Edge": 5, "Other": 4}'>
    </chart-wc>

    <h2>Ring Chart</h2>
    <chart-wc
      data-type="ring"
      data-title="Storage Used"
      data-legend
      data-tooltip
      data-values='{"Documents": 42, "Photos": 28, "Music": 15, "Apps": 10, "Free": 5}'>
    </chart-wc>

    <h2>Scatter Chart</h2>
    <chart-wc
      data-type="scatter"
      data-title="Height vs Weight"
      data-legend
      data-tooltip
      data-values='[
        {"name": "Group A", "values": [[160, 55], [165, 62], [170, 68], [175, 72], [180, 80]]},
        {"name": "Group B", "values": [[155, 50], [162, 58], [168, 65], [172, 70], [178, 78]]}
      ]'>
    </chart-wc>

    <h2>Bubble Chart</h2>
    <chart-wc
      data-type="bubble"
      data-title="Sales Performance"
      data-legend
      data-tooltip
      data-values='[
        {"name": "Region A", "values": [[10, 80, 30], [20, 60, 50], [30, 90, 20]]},
        {"name": "Region B", "values": [[15, 70, 40], [25, 50, 60], [35, 85, 25]]}
      ]'>
    </chart-wc>

  </layout-center>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/vanilla-breeze-charts.js"></script>
</body>
</html>
