<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designed Composition Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.theme.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.effects.css">
  <style>
    body { padding: var(--size-xl); background: oklch(15% 0.01 260); color-scheme: dark; color: white; }
    .spacer { height: 60vh; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); border: 1px dashed var(--color-border); border-radius: var(--radius-m); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>neon + hard-shadow (both use text-shadow — compound CSS rule merges them)</small>
    <h1 data-effect="neon hard-shadow" class="pink">Neon Hard Shadow</h1>
  </section>
  <p class="spacer">Scroll down for entrance compositions</p>
  <section>
    <small>fade-in + slide-up (compound animation)</small>
    <h2 data-effect="fade-in slide-up" data-trigger="scroll">Fade and Slide</h2>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
