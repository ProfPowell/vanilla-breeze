<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collapse Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    .box { padding: var(--size-m); border: 1px solid var(--color-border); border-radius: var(--radius-m); background: var(--color-surface-raised, var(--color-surface)); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Click to collapse</small>
    <p class="box" data-effect="collapse" data-trigger="click">Click this paragraph to collapse it. The element animates its height to zero with a fade out.</p>
  </section>
  <section>
    <small>Timed collapse (4 seconds)</small>
    <p class="box" data-effect="collapse" data-trigger="time:4000">This will collapse after 4 seconds.</p>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
