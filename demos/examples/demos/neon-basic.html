<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.theme.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.effects.css">
  <style>
    body { padding: var(--size-xl); background: oklch(15% 0.01 260); color-scheme: dark; }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default</small>
    <h2 data-effect="neon">Neon Glow</h2>
  </section>
  <section>
    <small>Pink</small>
    <h2 data-effect="neon" class="pink">Pink Neon</h2>
  </section>
  <section>
    <small>Cyan</small>
    <h2 data-effect="neon" class="cyan">Cyan Neon</h2>
  </section>
  <section>
    <small>Green</small>
    <h2 data-effect="neon" class="green">Green Neon</h2>
  </section>
  <section>
    <small>Amber</small>
    <h2 data-effect="neon" class="amber">Amber Neon</h2>
  </section>
  <section>
    <small>Red</small>
    <h2 data-effect="neon" class="red">Red Neon</h2>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
