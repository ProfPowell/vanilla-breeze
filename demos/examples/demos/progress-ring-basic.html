<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Progress Ring Demo</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface);
    }
    .demo-row {
      display: flex;
      align-items: center;
      gap: var(--size-xl);
      margin-block-end: var(--size-l);
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <h3>Basic Progress</h3>
  <section class="demo-row">
    <progress data-type="ring" value="25" max="100">25%</progress>
    <progress data-type="ring" value="50" max="100">50%</progress>
    <progress data-type="ring" value="75" max="100">75%</progress>
    <progress data-type="ring" value="100" max="100">100%</progress>
  </section>

  <h3>Sizes</h3>
  <section class="demo-row">
    <progress data-type="ring" data-size="xs" data-label="none" value="60" max="100">60%</progress>
    <progress data-type="ring" data-size="s" data-label="none" value="60" max="100">60%</progress>
    <progress data-type="ring" data-size="m" value="60" max="100">60%</progress>
    <progress data-type="ring" data-size="l" value="60" max="100">60%</progress>
    <progress data-type="ring" data-size="xl" value="60" max="100">60%</progress>
  </section>

  <h3>Color Variants</h3>
  <section class="demo-row">
    <progress data-type="ring" data-size="l" value="80" max="100">80%</progress>
    <progress data-type="ring" data-size="l" data-state="success" value="100" max="100">Done</progress>
    <progress data-type="ring" data-size="l" class="warning" value="45" max="100">45%</progress>
    <progress data-type="ring" data-size="l" data-state="error" value="15" max="100">15%</progress>
  </section>

  <h3>Indeterminate</h3>
  <section class="demo-row">
    <progress data-type="ring" data-size="l" aria-label="Loading">Loading...</progress>
  </section>

  <h3>Interactive Demo</h3>
  <section class="demo-row">
    <progress data-type="ring" data-size="xl" id="interactive-ring" value="0" max="100">0%</progress>
    <form>
      <label for="ring-slider">Progress:</label>
      <input type="range" id="ring-slider" min="0" max="100" value="0"/>
    </form>
  </section>

  <script type="module" src="/src/main.js"></script>
  <script>
    const slider = document.getElementById('ring-slider');
    const ring = document.getElementById('interactive-ring');
    slider.style.setProperty('--_pct', '0%');
    slider.addEventListener('input', () => {
      ring.value = Number(slider.value);
      slider.style.setProperty('--_pct', slider.value + '%');
    });
  </script>
</body>
</html>
