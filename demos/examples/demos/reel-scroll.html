<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizontal Reel Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface);
    }
    .card-note { margin: 0; color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-reel data-layout-gap="m" data-layout-item-width="m">
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="xs">
        <strong>Item 1</strong>
        <p class="card-note">Scroll horizontally</p>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="xs">
        <strong>Item 2</strong>
        <p class="card-note">Each item snaps</p>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="xs">
        <strong>Item 3</strong>
        <p class="card-note">Touch friendly</p>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="xs">
        <strong>Item 4</strong>
        <p class="card-note">No JS required</p>
      </layout-stack>
    </layout-card>
    <layout-card data-variant="outlined" data-padding="m">
      <layout-stack data-layout-gap="xs">
        <strong>Item 5</strong>
        <p class="card-note">CSS scroll-snap</p>
      </layout-stack>
    </layout-card>
  </layout-reel>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
