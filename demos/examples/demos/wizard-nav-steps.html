<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Wizard Nav Steps Demo</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <layout-card>
      <form id="nav-wizard" data-wizard data-wizard-steps="#step-nav">
        <fieldset data-wizard-step>
          <legend>Account</legend>
          <p>Account step content.</p>
        </fieldset>

        <fieldset data-wizard-step>
          <legend>Profile</legend>
          <p>Profile step content.</p>
        </fieldset>

        <fieldset data-wizard-step>
          <legend>Review</legend>
          <p>Review step content.</p>
        </fieldset>

        <nav data-wizard-nav>
          <button type="button" data-wizard-prev>Back</button>
          <button type="button" data-wizard-next>Next</button>
          <button type="submit">Submit</button>
        </nav>
      </form>

      <nav class="steps" id="step-nav" aria-label="Progress">
        <ol>
          <li><a href="#step-1">Account</a></li>
          <li><a href="#step-2">Profile</a></li>
          <li><a href="#step-3">Review</a></li>
        </ol>
      </nav>
    </layout-card>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
