<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading Spinner Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface);
    }
    .demo-row {
      display: flex;
      align-items: center;
      gap: var(--size-l);
      margin-block-end: var(--size-l);
      flex-wrap: wrap;
    }
    .demo-label {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      min-inline-size: 4em;
    }
  </style>
</head>
<body>
  <h1>Loading Spinner Demo</h1>
  <h2>Sizes</h2>
  <section class="demo-row">
    <span class="demo-label">XS</span>
    <loading-spinner data-size="xs" aria-label="Loading" role="status"></loading-spinner>
    <span class="demo-label">S</span>
    <loading-spinner data-size="s" aria-label="Loading" role="status"></loading-spinner>
    <span class="demo-label">M</span>
    <loading-spinner data-size="m" aria-label="Loading" role="status"></loading-spinner>
    <span class="demo-label">L</span>
    <loading-spinner data-size="l" aria-label="Loading" role="status"></loading-spinner>
    <span class="demo-label">XL</span>
    <loading-spinner data-size="xl" aria-label="Loading" role="status"></loading-spinner>
  </section>

  <h2>Colors</h2>
  <section class="demo-row">
    <loading-spinner data-size="l" aria-label="Loading" role="status"></loading-spinner>
    <loading-spinner data-size="l" data-variant="primary" aria-label="Loading" role="status"></loading-spinner>
    <loading-spinner data-size="l" data-variant="success" aria-label="Loading" role="status"></loading-spinner>
    <loading-spinner data-size="l" data-variant="warning" aria-label="Loading" role="status"></loading-spinner>
    <loading-spinner data-size="l" data-variant="error" aria-label="Loading" role="status"></loading-spinner>
  </section>

  <h2>Inline with text</h2>
  <p>
    <loading-spinner data-size="s" aria-label="Loading" role="status"></loading-spinner>
    Loading your data...
  </p>

  <h2>Button with spinner</h2>
  <button type="button" disabled>
    <loading-spinner data-size="s" aria-label="Loading" role="status"></loading-spinner>
    Processing...
  </button>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
