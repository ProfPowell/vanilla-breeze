<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fade In Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    .spacer { height: 60vh; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); border: 1px dashed var(--color-border); border-radius: var(--radius-m); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Immediate (no trigger)</small>
    <h1 data-effect="fade-in">This text fades in on load</h1>
  </section>
  <p class="spacer">Scroll down to see scroll-triggered fade-in</p>
  <section>
    <small>Scroll triggered</small>
    <h2 data-effect="fade-in" data-trigger="scroll">Appears when scrolled into view</h2>
  </section>
  <section>
    <small>Slow variant</small>
    <p data-effect="fade-in" data-trigger="scroll" class="slow">A slower, more deliberate entrance.</p>
  </section>
  <section>
    <small>Custom duration via CSS custom property</small>
    <p data-effect="fade-in" data-trigger="scroll" style="--vb-duration: 2s">Two-second fade in.</p>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
