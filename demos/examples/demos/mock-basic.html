<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Mock Placeholder Media Demo</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <layout-stack data-layout-gap="l">

      <section>
        <h3>Basic Placeholder</h3>
        <img data-mock width="400" height="300" alt="Hero banner"/>
      </section>

      <section>
        <h3>Presets</h3>
        <layout-stack data-layout-gap="m">
          <img data-mock="hero" alt="Hero banner"/>
          <layout-grid data-layout-min="120px" data-layout-gap="m">
            <figure>
              <img data-mock="card" alt="Card image"/>
              <figcaption>card</figcaption>
            </figure>
            <figure>
              <img data-mock="thumbnail" alt="Thumbnail"/>
              <figcaption>thumbnail</figcaption>
            </figure>
            <figure>
              <img data-mock="logo" alt="Company logo"/>
              <figcaption>logo</figcaption>
            </figure>
            <figure>
              <img data-mock="product" alt="Product shot"/>
              <figcaption>product</figcaption>
            </figure>
          </layout-grid>
        </layout-stack>
      </section>

      <section>
        <h3>Portraits</h3>
        <layout-grid data-layout-min="80px" data-layout-gap="m">
          <figure>
            <img data-mock="avatar" alt="Alice Morgan"/>
            <figcaption>avatar</figcaption>
          </figure>
          <figure>
            <img data-mock="portrait" alt="Ben Torres"/>
            <figcaption>portrait</figcaption>
          </figure>
          <figure>
            <img data-mock="headshot" alt="Chloe Park"/>
            <figcaption>headshot</figcaption>
          </figure>
        </layout-grid>
      </section>

      <section>
        <h3>Inside Figure</h3>
        <figure>
          <img data-mock="card" alt="Team photo"/>
          <figcaption>Our engineering team</figcaption>
        </figure>
      </section>

    </layout-stack>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
