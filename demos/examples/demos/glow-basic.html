<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Default glow (primary color)</small>
    <h1 data-effect="glow">Glowing text</h1>
  </section>
  <section>
    <small>Custom glow color</small>
    <h2 data-effect="glow" style="--vb-glow-color: oklch(65% 0.28 25);">Red glow</h2>
  </section>
  <section>
    <small>Composed: fade-in + glow</small>
    <h2 data-effect="fade-in glow" data-trigger="scroll">Fades in then glows</h2>
  </section>
  <section>
    <small>On a button</small>
    <button data-effect="glow">Attention needed</button>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
