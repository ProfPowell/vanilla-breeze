<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card with Stack Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-gray-100);
    }

    .demo-card { max-inline-size: 20rem; }
    .demo-card :is(h2, p) { margin: 0; }
    .demo-card p { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <h1>Card with Stack Demo</h1>
  <layout-card class="demo-card" data-variant="elevated" data-padding="m">
    <layout-stack data-layout-gap="s">
      <h2>Card Title</h2>
      <p>A description of this card's content goes here.</p>
      <layout-cluster data-layout-gap="s">
        <button type="button">Action</button>
        <button type="button" class="secondary">Cancel</button>
      </layout-cluster>
    </layout-stack>
  </layout-card>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
