<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Iron Triangle — Basic</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { padding: var(--size-l); background: var(--color-surface-alt); }
    h1   { margin-block-end: var(--size-m); }
    p    { margin-block-end: var(--size-l); color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-center data-layout-max="normal" data-layout-gap="l">
    <h1>Iron Triangle</h1>
    <p>The triangle is the UI. Click any vertex (Scope, Time, Cost) to open its editor; click the center "Quality" target to navigate to the NFR compass. Hover any target for a tooltip preview.</p>

    <iron-triangle
      name="triangle"
      data-focus-factor="0.6"
      data-quality-href="/docs/elements/web-components/nfr-compass/"
      data-quality-summary="3 critical: perf, sec, a11y"></iron-triangle>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
