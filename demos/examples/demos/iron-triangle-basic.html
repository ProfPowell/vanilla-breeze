<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Iron Triangle — Basic</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { padding: var(--size-l); background: var(--color-surface-alt); }
    h1   { margin-block-end: var(--size-m); }
    p    { margin-block-end: var(--size-l); color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-center data-layout-max="wide" data-layout-gap="l">
    <h1>Iron Triangle</h1>
    <p>Three corners — Time, Cost, Scope — and one capacity readout. Capacity is computed live as <code>ceil(sprintWeeks &times; sprintCount &times; teamFTE &times; focusFactor)</code>. Tweak any input to watch the budget update.</p>

    <iron-triangle name="triangle" data-focus-factor="0.6">
      <span slot="title">Project shape — v1.0</span>

      <fieldset name="time">
        <legend>Time</legend>
        <label>Sprint weeks <input name="time.sprintWeeks" type="number" min="1" value="2"></label>
        <label>Sprint count <input name="time.sprintCount" type="number" min="1" value="3"></label>
        <label>Hours / week <input name="time.hoursPerWeek" type="number" min="1" max="168" value="40"></label>
        <label>Deadline     <input name="time.deadline" type="date"></label>
      </fieldset>

      <fieldset name="cost">
        <legend>Cost</legend>
        <label>Team FTE <input name="cost.teamFTE" type="number" min="0" step="0.5" value="1"></label>
        <label>Budget tier
          <select name="cost.budgetTier">
            <option value="solo" selected>Solo</option>
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
          </select>
        </label>
        <label>Contractor budget <input name="cost.contractorBudget" type="number" min="0"></label>
      </fieldset>

      <fieldset name="scope">
        <legend>Scope</legend>
        <label>Must-have count   <input name="scope.mustHaveCount" type="number" min="0" value="6"></label>
        <label>Should-have count <input name="scope.shouldHaveCount" type="number" min="0" value="4"></label>
        <label>Notes <textarea name="scope.scopeNotes" rows="2" maxlength="2000"></textarea></label>
      </fieldset>

      <fieldset name="capacity">
        <legend>Capacity</legend>
        <output name="capacityPoints">&mdash;</output>
        <small name="capacityFormula">&mdash; (formula appears after upgrade)</small>
      </fieldset>
    </iron-triangle>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
