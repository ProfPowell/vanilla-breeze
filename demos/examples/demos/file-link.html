<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>File Link (entire row clickable)</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <ul class="file-list">
      <li>
        <a data-file href="#" download="quarterly-report.pdf">
          <icon-wc name="file-text"></icon-wc>
          <span class="file-name">quarterly-report.pdf</span>
          <span class="file-meta">2.4 MB</span>
        </a>
      </li>
      <li>
        <a data-file href="#" download="brand-guidelines.pdf">
          <icon-wc name="file-text"></icon-wc>
          <span class="file-name">brand-guidelines.pdf</span>
          <span class="file-meta">5.1 MB</span>
        </a>
      </li>
      <li>
        <a data-file href="https://example.com/schedule" target="_blank" rel="noopener">
          <icon-wc name="external-link"></icon-wc>
          <span class="file-name">Event schedule (web)</span>
          <span class="file-meta">example.com</span>
        </a>
      </li>
    </ul>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
