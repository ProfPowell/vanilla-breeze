<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Scramble Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    .spacer { height: 60vh; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); border: 1px dashed var(--color-border); border-radius: var(--radius-m); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default scramble (1.5s)</small>
    <h1 data-effect="scramble" data-trigger="scroll">Decoding the future</h1>
  </section>
  <section>
    <small>Binary decode (01 characters)</small>
    <h2 data-effect="scramble" data-trigger="scroll" style="--vb-scramble-duration: 2.5s; --vb-scramble-chars: '01'">Binary transmission</h2>
  </section>
  <p class="spacer">Scroll down to see more scramble effects</p>
  <section>
    <small>Fast decode (800ms)</small>
    <h2 data-effect="scramble" data-trigger="scroll" style="--vb-scramble-duration: 0.8s">Quick decode</h2>
  </section>
  <section>
    <small>Custom character set (katakana-style)</small>
    <p data-effect="scramble" data-trigger="scroll" style="--vb-scramble-duration: 2s; --vb-scramble-chars: 'アイウエオカキクケコ'">The matrix has you, Neo.</p>
  </section>
  <section>
    <small>Dots and dashes</small>
    <h2 data-effect="scramble" data-trigger="scroll" style="--vb-scramble-duration: 2s; --vb-scramble-chars: '.-'">Morse code decode</h2>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
