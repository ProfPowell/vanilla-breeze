<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll-Down Indicator Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body { margin: 0; padding: 0; }
    .hero {
      min-block-size: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, oklch(0.3 0.1 250), oklch(0.5 0.15 280));
      color: white;
      text-align: center;
      padding: var(--size-xl);
      position: relative;
    }
    .hero h1 { font-size: clamp(2rem, 6vw, 4rem); margin: 0; }
    .hero p { opacity: 0.9; max-inline-size: 40ch; margin: var(--size-m) auto 0; }

    /* The scroll-down indicator */
    .scroll-down {
      position: absolute;
      inset-inline: 0;
      inset-block-end: var(--size-l);
      margin-inline: auto;
      inline-size: fit-content;
      color: white;
      text-decoration: none;
      font-size: var(--font-size-s);
      opacity: 0.85;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: var(--size-2xs);
    }
    .scroll-down::after {
      content: "↓";
      display: block;
      font-size: 1.5rem;
      line-height: 1;
      animation: scroll-bounce 1.6s ease-in-out infinite;
    }
    @keyframes scroll-bounce {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(6px); opacity: 0.4; }
    }
    @media (prefers-reduced-motion: reduce) {
      .scroll-down::after { animation: none; }
    }
    main { padding: var(--size-xl); max-inline-size: 60rem; margin-inline: auto; }
  </style>
</head>
<body>
  <header class="hero">
    <hgroup>
      <h1>The hero</h1>
      <p>A scroll-down indicator nudges first-time visitors to scroll without taking up much room.</p>
    </hgroup>
    <a href="#below" class="scroll-down" aria-label="Scroll to content">Scroll</a>
  </header>
  <main id="below">
    <h2>Below the fold</h2>
    <p>The indicator is a CSS-only chevron that bounces gently. It links to the section below for keyboard users and disappears under <code>prefers-reduced-motion</code>.</p>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
