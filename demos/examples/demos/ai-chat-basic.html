<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ai-chat — Basic Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/web-components/ai-chat/logic.js"></script>
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-center data-layout-max="narrow">
    <layout-stack data-layout-gap="l">

      <h1>ai-chat — general</h1>
      <p>Chat with Chrome's on-device <code>LanguageModel</code>. Falls back to a Claude
         deep-link when on-device AI is unavailable.</p>

      <ai-chat
          placeholder="Ask anything…"
          fallback-url="https://claude.ai/new?q={prompt}"
          fallback-label="Ask Claude">
        <template data-role="starters">
          What can you help me with?
          Tell me a haiku about CSS.
          Explain prefers-reduced-motion in one sentence.
        </template>
      </ai-chat>

    </layout-stack>
  </layout-center>
</body>
</html>
