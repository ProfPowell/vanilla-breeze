<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Gallery — With Captions</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <image-gallery columns="250px" ratio="4:3">
    <figure>
      <a href="https://picsum.photos/id/100/1200/800">
        <img src="https://picsum.photos/id/100/500/375" alt="Mountain lake" loading="lazy" />
      </a>
      <figcaption>
        <strong>Morning at the Lake</strong>
        <p>Taken at dawn, Banff National Park.</p>
      </figcaption>
    </figure>
    <figure>
      <a href="https://picsum.photos/id/110/1200/800">
        <img src="https://picsum.photos/id/110/500/375" alt="Desert road" loading="lazy" />
      </a>
      <figcaption>
        <strong>Desert Highway</strong>
        <p>Route 66, Arizona. <a href="#">View full series</a></p>
      </figcaption>
    </figure>
    <figure>
      <a href="https://picsum.photos/id/119/1200/800">
        <img src="https://picsum.photos/id/119/500/375" alt="Autumn canopy" loading="lazy" />
      </a>
      <figcaption>
        <strong>Autumn Canopy</strong>
        <p>Golden hour in Vermont.</p>
      </figcaption>
    </figure>
    <figure>
      <a href="https://picsum.photos/id/129/1200/800">
        <img src="https://picsum.photos/id/129/500/375" alt="Coastal cliff" loading="lazy" />
      </a>
      <figcaption>
        <strong>Coastal Cliffs</strong>
        <p>Pacific Northwest coastline. <a href="#">View on map</a></p>
      </figcaption>
    </figure>
    <figure>
      <a href="https://picsum.photos/id/134/1200/800">
        <img src="https://picsum.photos/id/134/500/375" alt="Forest trail" loading="lazy" />
      </a>
      <figcaption>
        <strong>Into the Woods</strong>
        <p>Olympic National Park, Washington.</p>
      </figcaption>
    </figure>
    <figure>
      <a href="https://picsum.photos/id/142/1200/800">
        <img src="https://picsum.photos/id/142/500/375" alt="Mountain pass" loading="lazy" />
      </a>
      <figcaption>
        <strong>Mountain Pass</strong>
        <p>Elevation 3,400m. <a href="#">Photography tips</a></p>
      </figcaption>
    </figure>
  </image-gallery>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
