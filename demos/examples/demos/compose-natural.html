<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natural Composition Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.theme.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.effects.css">
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.effects.css">
  <style>
    body { padding: var(--size-xl); background: oklch(15% 0.01 260); color-scheme: dark; color: white; }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>neon + rainbow (text-shadow + filter compose naturally)</small>
    <h1 data-effect="neon rainbow">Neon Rainbow</h1>
  </section>
  <section>
    <small>outline + shimmer (-webkit-text-stroke + background compose naturally)</small>
    <h2 data-effect="outline shimmer">Outlined Shimmer</h2>
  </section>
  <section>
    <small>sparkle + gradient-text (pseudo-elements + background compose naturally)</small>
    <h2 data-effect="sparkle gradient-text" class="sunset">Sparkle Gradient</h2>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
