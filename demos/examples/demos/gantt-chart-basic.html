<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gantt Chart Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <link rel="stylesheet" href="/cdn/packs/ux-planning.full.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <gantt-chart title="Q2 Product Roadmap" show-today show-progress show-dependencies>
    <table>
      <thead>
        <tr>
          <th scope="col">Task</th>
          <th scope="col">Start</th>
          <th scope="col">End</th>
          <th scope="col">Progress</th>
        </tr>
      </thead>
      <tbody>
        <tr data-task-id="research" data-group="Design" data-status="done">
          <td>User research</td>
          <td><time datetime="2026-04-01">Apr 1</time></td>
          <td><time datetime="2026-04-07">Apr 7</time></td>
          <td><progress value="100" max="100">100%</progress></td>
        </tr>
        <tr data-task-id="wireframes" data-group="Design" data-depends="research" data-status="done">
          <td>Wireframes</td>
          <td><time datetime="2026-04-07">Apr 7</time></td>
          <td><time datetime="2026-04-14">Apr 14</time></td>
          <td><progress value="100" max="100">100%</progress></td>
        </tr>
        <tr data-task-id="visual-design" data-group="Design" data-depends="wireframes" data-status="in-progress">
          <td>Visual design</td>
          <td><time datetime="2026-04-14">Apr 14</time></td>
          <td><time datetime="2026-04-28">Apr 28</time></td>
          <td><progress value="60" max="100">60%</progress></td>
        </tr>
        <tr data-task-id="api" data-group="Engineering" data-depends="wireframes" data-status="in-progress">
          <td>API development</td>
          <td><time datetime="2026-04-10">Apr 10</time></td>
          <td><time datetime="2026-05-01">May 1</time></td>
          <td><progress value="40" max="100">40%</progress></td>
        </tr>
        <tr data-task-id="frontend" data-group="Engineering" data-depends="visual-design,api" data-status="not-started">
          <td>Frontend build</td>
          <td><time datetime="2026-04-28">Apr 28</time></td>
          <td><time datetime="2026-05-15">May 15</time></td>
          <td><progress value="0" max="100">0%</progress></td>
        </tr>
        <tr data-task-id="testing" data-group="QA" data-depends="frontend" data-status="not-started">
          <td>QA testing</td>
          <td><time datetime="2026-05-12">May 12</time></td>
          <td><time datetime="2026-05-22">May 22</time></td>
          <td><progress value="0" max="100">0%</progress></td>
        </tr>
        <tr data-task-id="launch" data-group="Engineering" data-depends="testing" data-milestone data-status="not-started">
          <td>Launch</td>
          <td><time datetime="2026-05-25">May 25</time></td>
          <td><time datetime="2026-05-25">May 25</time></td>
          <td><progress value="0" max="100">0%</progress></td>
        </tr>
      </tbody>
    </table>
  </gantt-chart>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/packs/ux-planning.full.js"></script>
</body>
</html>
