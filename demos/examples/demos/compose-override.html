<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Override Hierarchy Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    .spacer { height: 40vh; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); border: 1px dashed var(--color-border); border-radius: var(--radius-m); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default speed</small>
    <h2 data-effect="fade-in slide-up" data-trigger="scroll">Default timing</h2>
  </section>
  <p class="spacer">Scroll down</p>
  <section>
    <small>Class variant: .slow (900ms)</small>
    <h2 data-effect="fade-in slide-up" data-trigger="scroll" class="slow">Slow entrance</h2>
  </section>
  <p class="spacer">Scroll down</p>
  <section>
    <small>Class variant: .fast (150ms)</small>
    <h2 data-effect="fade-in slide-up" data-trigger="scroll" class="fast">Fast entrance</h2>
  </section>
  <p class="spacer">Scroll down</p>
  <section>
    <small>Class variant: .bouncy</small>
    <h2 data-effect="fade-in slide-up" data-trigger="scroll" class="bouncy">Bouncy entrance</h2>
  </section>
  <p class="spacer">Scroll down</p>
  <section>
    <small>Inline style override: --vb-duration: 3s</small>
    <h2 data-effect="fade-in slide-up" data-trigger="scroll" style="--vb-duration: 3s">Ultra slow via custom property</h2>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
