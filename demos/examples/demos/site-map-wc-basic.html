<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Map WC Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/cdn/packs/ux-planning.full.css">
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <site-map-wc title="Taskflow Information Architecture">
    <nav>
      <ul>
        <li data-page-type="layout" data-template="app-shell" data-status="live">
          <a href="/">Home</a>
          <ul>
            <li data-page-type="dashboard" data-template="two-column" data-status="live">
              <a href="/dashboard">Dashboard</a>
              <ul>
                <li data-page-type="page" data-template="detail" data-status="live">
                  <a href="/dashboard/project">Project Detail</a>
                </li>
                <li data-page-type="page" data-template="list" data-status="live">
                  <a href="/dashboard/tasks">Task List</a>
                </li>
                <li data-page-type="page" data-template="kanban" data-status="ready">
                  <a href="/dashboard/board">Board View</a>
                </li>
                <li data-page-type="modal" data-template="dialog" data-status="draft">
                  <a href="/dashboard/new-task">New Task</a>
                </li>
              </ul>
            </li>
            <li data-page-type="section" data-template="sidebar" data-status="live">
              <a href="/reports">Reports</a>
              <ul>
                <li data-page-type="page" data-template="document" data-status="live">
                  <a href="/reports/weekly">Weekly Report</a>
                </li>
                <li data-page-type="page" data-template="document" data-status="live">
                  <a href="/reports/monthly">Monthly Report</a>
                </li>
                <li data-page-type="page" data-template="chart" data-status="ready">
                  <a href="/reports/analytics">Analytics</a>
                </li>
                <li data-page-type="page" data-template="document" data-status="draft">
                  <a href="/reports/export">Export</a>
                </li>
              </ul>
            </li>
            <li data-page-type="section" data-template="sidebar" data-status="live">
              <a href="/team">Team</a>
              <ul>
                <li data-page-type="page" data-template="list" data-status="live">
                  <a href="/team/members">Members</a>
                </li>
                <li data-page-type="page" data-template="detail" data-status="ready">
                  <a href="/team/profile">Profile</a>
                </li>
              </ul>
            </li>
            <li data-page-type="page" data-template="settings" data-status="live">
              <a href="/settings">Settings</a>
            </li>
            <li data-page-type="page" data-template="document" data-status="live">
              <a href="/help">Help</a>
            </li>
            <li data-page-type="redirect" data-status="deprecated">
              <a href="/old-dashboard">Old Dashboard</a>
            </li>
          </ul>
        </li>
      </ul>
    </nav>
  </site-map-wc>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/packs/ux-planning.full.js"></script>
</body>
</html>
