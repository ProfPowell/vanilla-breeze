<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Contact Form — Tutorial Preview</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>body { padding: var(--size-l); }</style>
</head>
<body>

<main data-layout="center" data-layout-max="narrow">
  <form data-layout="stack" data-layout-gap="m" aria-labelledby="contact-title" novalidate>
    <header data-layout="stack" data-layout-gap="xs" aria-label="Form intro">
      <h1 id="contact-title">Get in touch</h1>
      <p>We reply within one business day. Required fields are marked.</p>
    </header>

    <layout-stack data-layout-gap="m">
      <form-field>
        <label for="contact-name">Full name</label>
        <input id="contact-name" name="name" type="text" required autocomplete="name"
               data-message-valuemissing="Please tell us your name"/>
      </form-field>

      <form-field>
        <label for="contact-email">Email</label>
        <input id="contact-email" name="email" type="email" required autocomplete="email"
               data-message-valuemissing="We need an email to reply"
               data-message-typemismatch="That doesn't look like a valid email"/>
      </form-field>

      <form-field>
        <label for="contact-topic">Topic</label>
        <select id="contact-topic" name="topic" required>
          <option value="">Pick one…</option>
          <option>Sales question</option>
          <option>Technical support</option>
          <option>Press &amp; media</option>
          <option>Something else</option>
        </select>
      </form-field>

      <form-field>
        <label for="contact-message">Message</label>
        <textarea id="contact-message" name="message" rows="4" required minlength="20"
                  data-message-valuemissing="A short message helps us route this"
                  data-message-tooshort="A few more words, please"></textarea>
      </form-field>
    </layout-stack>

    <label data-layout="cluster" data-layout-gap="xs" data-layout-align="center">
      <input type="checkbox" name="newsletter" checked/>
      Also send me the monthly newsletter
    </label>

    <footer data-layout="cluster" data-layout-gap="s" aria-label="Form actions">
      <button type="submit">Send message</button>
      <button type="reset" class="ghost">Clear</button>
    </footer>
  </form>
</main>

<script type="module" src="/src/main.js"></script>
<script type="module">
  import { ThemeManager } from '/src/lib/theme-manager.js';
  import { ensureThemeLoaded } from '/src/lib/theme-loader.js';
  await ThemeManager.init();
  const params = new URLSearchParams(location.search);
  const theme = params.get('theme');
  if (theme) { await ensureThemeLoaded(theme); ThemeManager.apply({ brand: theme, mode: params.get('mode') || 'auto' }); }
</script>
<script>
  if (window.parent !== window) {
    const report = () => window.parent.postMessage({ type: 'surface-height', height: document.documentElement.scrollHeight }, '*');
    addEventListener('load', () => setTimeout(report, 200));
    new ResizeObserver(report).observe(document.documentElement);
  }
</script>
</body>
</html>
