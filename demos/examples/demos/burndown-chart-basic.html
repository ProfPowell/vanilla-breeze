<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burndown Chart — Basic Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <link rel="stylesheet" href="/cdn/vanilla-breeze-charts.css" />
  <link rel="stylesheet" href="/cdn/packs/ux-planning.full.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 60rem; margin-inline: auto; display: flex; flex-direction: column; gap: var(--size-xl); }
    h1 { font-size: var(--font-size-l); margin: 0; }
    p  { color: var(--color-text-muted); margin: 0; }
    section { display: flex; flex-direction: column; gap: var(--size-s); }
  </style>
</head>
<body>
  <header>
    <h1>Sprint burndown</h1>
    <p>Author supplies daily remaining counts (and optional ±delta scope changes); the component computes the ideal trend line and renders both as a <code>&lt;chart-wc&gt;</code> line chart.</p>
  </header>

  <section>
    <h2>Healthy sprint (tracking close to ideal)</h2>
    <burndown-chart start="2026-05-04" end="2026-05-15" total="42" label="Sprint 14">
      <template>
        <tr><td>2026-05-04</td><td>42</td></tr>
        <tr><td>2026-05-05</td><td>40</td></tr>
        <tr><td>2026-05-06</td><td>37</td></tr>
        <tr><td>2026-05-07</td><td>32</td></tr>
        <tr><td>2026-05-08</td><td>28</td></tr>
        <tr><td>2026-05-11</td><td>21</td></tr>
        <tr><td>2026-05-12</td><td>14</td></tr>
        <tr><td>2026-05-13</td><td>9</td></tr>
        <tr><td>2026-05-14</td><td>3</td></tr>
        <tr><td>2026-05-15</td><td>0</td></tr>
      </template>
    </burndown-chart>
  </section>

  <section>
    <h2>Sprint with mid-sprint scope change</h2>
    <burndown-chart start="2026-05-04" end="2026-05-15" total="30" label="Sprint 15" weekends="exclude">
      <template>
        <tr><td>2026-05-04</td><td>30</td></tr>
        <tr><td>2026-05-05</td><td>27</td></tr>
        <tr><td>2026-05-06</td><td>24</td></tr>
        <tr><td>2026-05-07</td><td>22</td><td>+5</td></tr>
        <tr><td>2026-05-08</td><td>23</td></tr>
        <tr><td>2026-05-11</td><td>17</td></tr>
        <tr><td>2026-05-12</td><td>12</td></tr>
        <tr><td>2026-05-13</td><td>8</td><td>-2</td></tr>
        <tr><td>2026-05-14</td><td>4</td></tr>
        <tr><td>2026-05-15</td><td>0</td></tr>
      </template>
    </burndown-chart>
  </section>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/vanilla-breeze-charts.js"></script>
  <script type="module" src="/cdn/packs/ux-planning.full.js"></script>
</body>
</html>
