<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiple Sections Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <h1>Multiple Sections Demo</h1>
  <layout-text>
    <h2>Section One</h2>
    <p>Content in section one<foot-note>Footnote for section one.</foot-note> with its own footnotes.</p>
  </layout-text>
  <foot-notes></foot-notes>

  <layout-text>
    <h2>Section Two</h2>
    <p>Content in section two<foot-note>Footnote for section two.</foot-note> with separate footnotes.</p>
  </layout-text>
  <foot-notes></foot-notes>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
