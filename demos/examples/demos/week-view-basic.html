<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Week View — Schedule</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface);
      max-inline-size: 72rem;
      margin-inline: auto;
    }
    output {
      display: block;
      margin-block-start: var(--size-s);
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>

<h3>Week of April 6, 2026</h3>

<week-view data-start-date="2026-04-06" id="schedule">
  <calendar-event data-date="2026-04-06" data-category="meeting">
    <time datetime="09:00">9:00 AM</time>
    <icon-wc name="users" size="sm"></icon-wc>
    Sprint standup
  </calendar-event>
  <calendar-event data-date="2026-04-06" data-category="focus" data-duration="2h">
    <time datetime="14:00">2:00 PM</time>
    <icon-wc name="code" size="sm"></icon-wc>
    Deep work block
  </calendar-event>
  <calendar-event data-date="2026-04-07" data-category="meeting" data-duration="2h">
    <time datetime="10:00">10:00 AM</time>
    <icon-wc name="palette" size="sm"></icon-wc>
    Design review
  </calendar-event>
  <calendar-event data-date="2026-04-07" data-category="personal">
    <time datetime="12:00">12:00 PM</time>
    <icon-wc name="utensils" size="sm"></icon-wc>
    Team lunch
  </calendar-event>
  <calendar-event data-date="2026-04-08" data-category="meeting">
    <time datetime="09:00">9:00 AM</time>
    <icon-wc name="users" size="sm"></icon-wc>
    Sprint standup
  </calendar-event>
  <calendar-event data-date="2026-04-08" data-category="meeting">
    <time datetime="15:00">3:00 PM</time>
    <icon-wc name="user" size="sm"></icon-wc>
    1:1 with Sarah
  </calendar-event>
  <calendar-event data-date="2026-04-09" data-category="focus">
    <time datetime="10:00">10:00 AM</time>
    <icon-wc name="code" size="sm"></icon-wc>
    Code review
  </calendar-event>
  <calendar-event data-date="2026-04-09" data-category="meeting">
    <time datetime="14:00">2:00 PM</time>
    <icon-wc name="presentation" size="sm"></icon-wc>
    Sprint demo
  </calendar-event>
  <calendar-event data-date="2026-04-10" data-category="deadline">
    <time datetime="16:00">4:00 PM</time>
    <icon-wc name="alert-triangle" size="sm"></icon-wc>
    Sprint deadline
  </calendar-event>
</week-view>

<output id="click-output">Click an event to see details</output>

<script type="module" src="/src/main.js"></script>
<script>
  document.getElementById('schedule').addEventListener('week-view:event-click', (e) => {
    document.getElementById('click-output').textContent =
      'Clicked: ' + e.detail.date + ' ' + e.detail.time + ' — ' + e.detail.text.split('\n')[0].trim();
  });
</script>
</body>
</html>
