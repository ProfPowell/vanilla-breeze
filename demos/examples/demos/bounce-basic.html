<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bounce Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.theme.css">
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.effects.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default bounce button</small>
    <button data-effect="bounce">Bounce Me!</button>
  </section>
  <section>
    <small>Pill-shaped bounce button</small>
    <button data-effect="bounce" class="pill">Hover for Bounce</button>
  </section>
  <section>
    <small>Ghost bounce button</small>
    <button data-effect="bounce" class="ghost">Ghost Bounce</button>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
