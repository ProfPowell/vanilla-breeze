<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Newsletter sign-up via /go/newsletter</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { padding: var(--size-l); }
    [data-vb-newsletter-status] {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
    }
    [data-vb-newsletter-status][data-state="success"] { color: var(--color-success, oklch(50% 0.15 145)); }
    [data-vb-newsletter-status][data-state="error"]   { color: var(--color-error, oklch(60% 0.2 20)); }
    .lists-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--size-2xs);
    }
    .lists-grid label { display: flex; align-items: center; gap: var(--size-xs); }
  </style>
</head>
<body>
  <toast-msg position="top-end"></toast-msg>

  <layout-center data-layout-max="narrow">
    <layout-stack data-layout-gap="xl">

      <layout-card>
        <h1>Subscribe</h1>
        <p>Pick the lists you want updates from. Posts <code>POST /go/newsletter/subscribe</code>.</p>

        <form action="/newsletter/subscribe" method="POST"
              data-vb-newsletter-form="subscribe"
              data-vb-newsletter-loading-label="Subscribing…"
              data-vb-newsletter-subscribed="You're in. Welcome aboard."
              data-layout="stack" data-layout-gap="m">
          <p>
            <label for="sub-email">Email</label>
            <input type="email" id="sub-email" name="email" required autocomplete="email"/>
          </p>
          <!-- [html-validate-disable-block form-dup-name: checkbox group with shared name is canonical HTML for multi-select submission] -->
          <fieldset class="minimal lists-grid">
            <legend>Lists</legend>
            <label><input type="checkbox" name="lists" value="weekly-digest" checked/> Weekly digest</label>
            <label><input type="checkbox" name="lists" value="release-notes"/> Release notes</label>
            <label><input type="checkbox" name="lists" value="security-alerts"/> Security alerts</label>
          </fieldset>
          <layout-cluster data-layout-justify="space-between" data-layout-align="center">
            <output data-vb-newsletter-status aria-live="polite"></output>
            <button type="submit" class="primary">Subscribe</button>
          </layout-cluster>
        </form>
      </layout-card>

      <layout-card>
        <h2>Manage preferences</h2>
        <p>Enter your email to load existing subscriptions; submit posts the diff (subscribe + unsubscribe in one go).</p>

        <form action="/newsletter/preferences" method="POST"
              data-vb-newsletter-form="preferences"
              data-vb-newsletter-loading-label="Saving…"
              data-vb-newsletter-saved="Preferences saved."
              data-layout="stack" data-layout-gap="m">
          <p>
            <label for="prefs-email">Email</label>
            <input type="email" id="prefs-email" name="email" required autocomplete="email"/>
          </p>
          <!-- [html-validate-disable-block form-dup-name: checkbox group with shared name is canonical HTML for multi-select submission] -->
          <fieldset class="minimal lists-grid">
            <legend>Lists</legend>
            <label><input type="checkbox" name="lists" value="weekly-digest"/> Weekly digest</label>
            <label><input type="checkbox" name="lists" value="release-notes"/> Release notes</label>
            <label><input type="checkbox" name="lists" value="security-alerts"/> Security alerts</label>
          </fieldset>
          <layout-cluster data-layout-justify="space-between" data-layout-align="center">
            <output data-vb-newsletter-status aria-live="polite"></output>
            <button type="submit" class="primary">Save</button>
          </layout-cluster>
        </form>
      </layout-card>

    </layout-stack>
  </layout-center>

  <script type="module" src="/src/main.js"></script>
  <script type="module">
    document.addEventListener('vb-newsletter-form:success', (e) => {
      document.querySelector('toast-msg')?.show({
        message: e.detail.mode === 'unsubscribe' ? 'Unsubscribed.' :
                 e.detail.mode === 'preferences' ? 'Preferences saved.' :
                 'Subscribed!',
        variant: 'success',
        duration: 4000,
      });
    });
    document.addEventListener('vb-newsletter-form:error', (e) => {
      document.querySelector('toast-msg')?.show({
        message: 'Something went wrong.',
        variant: 'error',
        duration: 6000,
      });
    });
    document.addEventListener('vb-newsletter-form:preferences', (e) => {
      console.log('[demo] loaded preferences for', e.detail.email, e.detail);
    });
  </script>
</body>
</html>
