<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mobile-Optimized Form</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
      max-width: 32rem;
      margin-inline: auto;
    }

    .sticky-submit {
      position: sticky;
      bottom: 0;
      padding: var(--size-m);
      padding-block-end: calc(var(--size-m) + var(--safe-bottom, 0px));
      background: var(--color-surface);
      border-block-start: 1px solid var(--color-border);
      margin-inline: calc(-1 * var(--size-l));
    }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">

  <header data-layout="stack" data-layout-gap="s">
    <h1>Contact Us</h1>
    <p style="color: var(--color-text-muted);">This form is optimized for mobile: correct keyboard types, autofill hints, and enter-key labels on every field.</p>
  </header>

  <form class="stacked" novalidate>

    <form-field>
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required
             autocomplete="name"
             autocapitalize="words"
             enterkeyhint="next">
    </form-field>

    <form-field>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required
             autocomplete="email"
             enterkeyhint="next">
      <output class="hint" for="email">We'll respond within one business day.</output>
    </form-field>

    <form-field>
      <label for="phone">Phone <span style="color: var(--color-text-muted); font-weight: normal;">(optional)</span></label>
      <input type="tel" id="phone" name="phone"
             autocomplete="tel"
             inputmode="tel"
             enterkeyhint="next">
    </form-field>

    <form-field>
      <label for="company">Company <span style="color: var(--color-text-muted); font-weight: normal;">(optional)</span></label>
      <input type="text" id="company" name="company"
             autocomplete="organization"
             enterkeyhint="next">
    </form-field>

    <form-field>
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="4" required
                enterkeyhint="send"
                data-grow></textarea>
    </form-field>

    <fieldset class="minimal">
      <legend>Preferred contact method</legend>
      <fieldset class="minimal group">
        <label><input type="radio" name="method" value="email" checked> Email</label>
        <label><input type="radio" name="method" value="phone"> Phone</label>
      </fieldset>
    </fieldset>

    <footer class="sticky-submit">
      <button type="submit" class="full-width">Send Message</button>
    </footer>
  </form>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
