<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Type Specimen Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface);
    }
    section {
      margin-block-end: var(--size-xl);
    }
  </style>
</head>
<body>
  <h3>System UI &mdash; Full Specimen</h3>
  <section>
    <type-specimen
      font-family="system-ui"
      label="System UI"
      show-characters
      show-weights
      show-scale>
    </type-specimen>
  </section>

  <hr>

  <h3>Georgia &mdash; Characters &amp; Weights</h3>
  <section>
    <type-specimen
      font-family="Georgia, serif"
      label="Georgia"
      show-characters
      show-weights
      weights="400,700">
    </type-specimen>
  </section>

  <hr>

  <h3>Monospace &mdash; Custom Sample</h3>
  <section>
    <type-specimen
      font-family="ui-monospace, 'Cascadia Code', monospace"
      label="System Mono"
      sample="Pack my box with five dozen liquor jugs"
      show-characters
      weights="400,700">
    </type-specimen>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
