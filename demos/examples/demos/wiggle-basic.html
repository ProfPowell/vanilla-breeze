<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiggle Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.theme.css" />
  <link rel="stylesheet" href="/src/packs/kawaii/kawaii.effects.css" />
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    .big-icons { font-size: 3rem; }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <h1>Wiggle Demo</h1>
  <section>
    <small>Continuous wiggle (default)</small>
    <p class="big-icons">
      <span data-effect="wiggle">&#x2661;</span>
      <span data-effect="wiggle">&#x2605;</span>
      <span data-effect="wiggle">&#x273F;</span>
    </p>
  </section>
  <section>
    <small>Wiggle on text</small>
    <h2 data-effect="wiggle">Always wiggling!</h2>
  </section>
  <section>
    <small>Hover-triggered wiggle</small>
    <p><span data-effect="wiggle" data-trigger="hover" class="big-icons">Hover me &#x2661;</span></p>
  </section>
  <section>
    <small>Hover wiggle on a button</small>
    <button type="button" data-effect="wiggle" data-trigger="hover">Wiggle Button &#x2726;</button>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
