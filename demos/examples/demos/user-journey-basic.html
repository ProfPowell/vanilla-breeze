<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Journey Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <user-journey
    id="journey-api"
    title="API Platform Evaluation"
    persona="Sarah Chen"
    persona-id="persona-sarah-chen"
    summary="How a senior developer discovers, evaluates, and adopts the API management platform"
    story-ids="PROJ-101,PROJ-102">
  </user-journey>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/packs/ux-planning.full.js"></script>
  <script type="module">
    document.getElementById('journey-api').phases = [
      {
        name: 'Awareness',
        emotion: 'curious',
        storyIds: ['PROJ-101'],
        actions: [
          'Googles "API management platform" after a painful sprint',
          'Reads comparison articles and bookmarks three vendors',
          'Shares a Dev.to post in the team Slack',
        ],
        thoughts: [
          'Every vendor claims they\'re the easiest — how do I actually compare them?',
          'My manager wants a decision in two weeks.',
        ],
        touchpoints: ['Google Search', 'Dev.to', 'Team Slack', 'G2 Reviews'],
        painPoints: [
          'Marketing copy is identical across vendors',
          'Every pricing page just says "contact us"',
        ],
        opportunities: [
          'Lead with a technical comparison matrix',
          'Show a public pricing page',
        ],
      },
      {
        name: 'Evaluation',
        emotion: 'hopeful',
        storyIds: ['PROJ-102'],
        actions: [
          'Signs up for free trial',
          'Follows the quickstart guide — running in 12 minutes',
          'Tests rate-limiting, auth tokens, and error formats',
        ],
        thoughts: [
          'The quickstart is actually good. That\'s a good sign.',
          'The error messages are cryptic — our on-call will hate debugging this.',
        ],
        touchpoints: ['Trial dashboard', 'API docs', 'Python SDK', 'Status page'],
        painPoints: [
          'SSO is enterprise-only — buried in a footnote',
          'Python SDK is two major versions behind Node SDK',
        ],
        opportunities: [
          'SDK parity across languages is a differentiator',
          'A "break things" sandbox mode would close deals faster',
        ],
      },
      {
        name: 'Decision',
        emotion: 'uncertain',
        actions: [
          'Builds a comparison doc with scored criteria',
          'Schedules a demo with vendor sales',
          'Sends a security questionnaire',
        ],
        thoughts: [
          'The demo was a repeat of the docs. I didn\'t learn anything new.',
          'Procurement is going to add another month.',
        ],
        touchpoints: ['Internal Notion doc', 'Sales call', 'Security team', 'Procurement'],
        painPoints: [
          'Sales demo added no value for a technical evaluator',
          'Security questionnaire took 11 days for a response',
        ],
        opportunities: [
          'Self-serve security hub (SOC 2, pen test reports)',
          'Assign solutions engineers for technical evaluators',
        ],
      },
      {
        name: 'Onboarding',
        emotion: 'hopeful',
        actions: [
          'Starts the structured onboarding checklist',
          'Migrates the two highest-traffic services first',
          'Runs a team training session',
        ],
        thoughts: [
          'The migration guide is well written — better than expected.',
          'The team is actually excited about the new dashboard.',
        ],
        touchpoints: ['Onboarding checklist', 'Migration guide', 'Support ticket'],
        painPoints: [
          'Import rate limit not documented — discovered mid-sprint',
          'No bulk migration tooling',
        ],
        opportunities: [
          'Document all rate limits prominently',
          'Provide a migration CLI toolkit',
        ],
      },
      {
        name: 'Steady State',
        emotion: 'satisfied',
        actions: [
          'All services migrated; team fully using the platform',
          'Reviews monthly usage dashboard',
          'Submits a feature request for improved audit logging',
        ],
        thoughts: [
          'On-call incidents related to APIs are down significantly.',
          'Audit logging gaps will be a problem for the compliance audit.',
        ],
        touchpoints: ['Usage dashboard', 'Feature request portal', 'Account manager'],
        painPoints: [
          'Audit log export limited to 90 days — compliance needs 12 months',
        ],
        opportunities: [
          'Configurable quota alerts would reduce surprise overage bills',
          'Extended audit retention unlocks regulated-industry customers',
        ],
      },
    ];
  </script>
</body>
</html>
