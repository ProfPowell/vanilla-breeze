<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bounce (Core) Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    .spacer { height: 60vh; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); border: 1px dashed var(--color-border); border-radius: var(--radius-m); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Continuous bounce</small>
    <button data-effect="bounce">Bouncing Button</button>
  </section>
  <section>
    <small>Slow variant</small>
    <span data-effect="bounce" class="slow">Slow bounce</span>
  </section>
  <section>
    <small>Custom height via CSS property</small>
    <span data-effect="bounce" style="--vb-bounce-height: 20px; display: inline-block;">Big bounce</span>
  </section>
  <p class="spacer">Scroll down to see scroll-triggered bounce</p>
  <section>
    <small>Scroll triggered</small>
    <span data-effect="bounce" data-trigger="scroll">Bounces when scrolled into view</span>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
