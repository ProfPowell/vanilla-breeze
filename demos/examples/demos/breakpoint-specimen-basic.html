<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakpoint Specimen — Basic Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
      max-inline-size: 60rem;
      margin-inline: auto;
      display: flex;
      flex-direction: column;
      gap: var(--size-xl);
    }
    section { display: flex; flex-direction: column; gap: var(--size-s); }
    h2 { margin: 0; font-size: var(--font-size-l); }
    p  { margin: 0; color: var(--color-text-muted); }

    #preview-frame {
      resize: horizontal;
      overflow: auto;
      min-inline-size: 12rem;
      max-inline-size: 100%;
      inline-size: 50%;
      block-size: var(--size-3xl);
      border: var(--border-width-thin) dashed var(--color-border);
      padding: var(--size-m);
      background: var(--color-surface-raised);
      color: var(--color-text-muted);
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Breakpoint Specimen — Basic Demo</h1>
  <section>
    <h2>Viewport mode</h2>
    <p>Resize the browser window. The cursor and active label follow the viewport width.</p>
    <breakpoint-specimen label="VB Breakpoints"></breakpoint-specimen>
  </section>

  <section>
    <h2>Container mode (data-observe)</h2>
    <p>Drag the bottom-right corner of the box to resize it. The specimen tracks the box, not the window.</p>
    <article id="preview-frame">Resize me — drag the corner.</article>
    <breakpoint-specimen data-observe="#preview-frame" label="Container width"></breakpoint-specimen>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
