<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[data-icon] Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: var(--size-m);
      text-align: center;
      list-style: none;
      padding: 0;
      margin: 0 0 var(--size-l);
    }
    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--size-xs);
    }
    .icon-item i[data-icon] {
      font-size: var(--font-size-xl);
    }
    .icon-item small {
      color: var(--color-text-muted);
      font-size: var(--font-size-xs);
    }
    .icon-large {
      font-size: 2rem;
    }
    .icon-sets {
      display: flex;
      gap: var(--size-l);
      align-items: center;
    }
  </style>
</head>
<body>
  <ul class="icon-grid">
    <li class="icon-item">
      <i data-icon="star" aria-hidden="true"></i>
      <small>star</small>
    </li>
    <li class="icon-item">
      <i data-icon="home" aria-hidden="true"></i>
      <small>home</small>
    </li>
    <li class="icon-item">
      <i data-icon="check" aria-hidden="true"></i>
      <small>check</small>
    </li>
    <li class="icon-item">
      <i data-icon="heart" aria-hidden="true"></i>
      <small>heart</small>
    </li>
  </ul>

  <p>
    <button type="button" data-icon="x">Close</button>
  </p>

  <p>
    <i data-icon="star" class="icon-large" aria-hidden="true"></i>
    scales with <code>font-size</code>
  </p>

  <p class="icon-sets">
    <span data-icon="star" data-icon-set="lucide" aria-hidden="true"></span>
    <span data-icon="star" data-icon-set="tabler" aria-hidden="true"></span>
  </p>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
