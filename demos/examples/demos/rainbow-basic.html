<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rainbow Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.theme.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.effects.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default</small>
    <h1 data-effect="rainbow">Rainbow Cycling</h1>
  </section>
  <section>
    <small>Slow</small>
    <h2 data-effect="rainbow" class="slow">Slow Rainbow</h2>
  </section>
  <section>
    <small>Fast</small>
    <h2 data-effect="rainbow" class="fast">Fast Rainbow</h2>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
