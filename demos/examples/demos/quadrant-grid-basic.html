<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quadrant Grid — Basic Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <link rel="stylesheet" href="/cdn/packs/ux-planning.full.css" />
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 60rem; margin-inline: auto; }
    h1, h2 { margin: 0; }
    h1 { font-size: var(--font-size-l); margin-block-end: var(--size-s); }
    p  { color: var(--color-text-muted); margin-block-end: var(--size-l); }
    .card { background: var(--color-surface-raised); padding: var(--size-2xs) var(--size-xs); border-radius: var(--radius-s); font-size: var(--font-size-sm); cursor: grab; }
  </style>
</head>
<body>
  <h1>Generic 2x2 quadrant — drag the cards</h1>
  <p>Configurable axis labels and quadrant titles. Drag the cards between quadrants — the component fires <code>quadrant-grid:move</code>.</p>

  <quadrant-grid
    draggable
    x-label="Effort"
    y-label="Impact"
    x-low="Low" x-high="High"
    y-low="Low" y-high="High"
    q1-label="Big Bets"
    q2-label="Quick Wins"
    q3-label="Fill-Ins"
    q4-label="Money Pit">
    <article class="card" data-quadrant="1" data-id="a">Refactor onboarding</article>
    <article class="card" data-quadrant="1" data-id="b">Add 2FA</article>
    <article class="card" data-quadrant="0" data-id="c">Mobile app rewrite</article>
    <article class="card" data-quadrant="2" data-id="d">Tweak email subject</article>
    <article class="card" data-quadrant="3" data-id="e">Custom dashboard builder</article>
  </quadrant-grid>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/packs/ux-planning.full.js"></script>
</body>
</html>
