<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shake Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Immediate shake</small>
    <h1 data-effect="shake">Shaking text</h1>
  </section>
  <section>
    <small>Hover triggered</small>
    <h2 data-effect="shake" data-trigger="hover">Hover to shake</h2>
  </section>
  <section>
    <small>Click triggered</small>
    <button data-effect="shake" data-trigger="click">Click to shake</button>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
