<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>data-math Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body {
      padding: var(--size-xl);
      background: var(--color-surface);
      max-inline-size: 40rem;
      margin-inline: auto;
    }
  </style>
</head>
<body>
  <h3>Block Math (precompiled)</h3>
  <code data-math
    data-mathml="<math display='block'><mi>x</mi><mo>=</mo><mfrac><mrow><mo>-</mo><mi>b</mi><mo>&pm;</mo><msqrt><msup><mi>b</mi><mn>2</mn></msup><mo>-</mo><mn>4</mn><mi>a</mi><mi>c</mi></msqrt></mrow><mrow><mn>2</mn><mi>a</mi></mrow></mfrac></math>">
    x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}
  </code>

  <h3>Inline Math</h3>
  <p>The area of a circle is
    <code data-math="inline"
      data-mathml="<math><mi>A</mi><mo>=</mo><mi>&pi;</mi><msup><mi>r</mi><mn>2</mn></msup></math>">
      A = \pi r^2
    </code>.
  </p>

  <h3>Copyable (click to copy LaTeX)</h3>
  <code data-math="copyable"
    data-mathml="<math display='block'><msubsup><mo>&int;</mo><mn>0</mn><mo>&infin;</mo></msubsup><msup><mi>e</mi><mrow><mo>-</mo><msup><mi>x</mi><mn>2</mn></msup></mrow></msup><mi>d</mi><mi>x</mi><mo>=</mo><mfrac><msqrt><mi>&pi;</mi></msqrt><mn>2</mn></mfrac></math>">
    \int_0^\infty e^{-x^2} dx = \frac{\sqrt{\pi}}{2}
  </code>

  <h3>No precompiled MathML (fallback)</h3>
  <code data-math>E = mc^2</code>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
