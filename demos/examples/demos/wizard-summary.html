<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Wizard Summary Step Demo</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <h1>Wizard Summary Step Demo</h1>
  <layout-center data-layout-max="narrow">
    <layout-card>
      <h2>Manual Summary (data-wizard-field)</h2>
      <form id="manual-summary-wizard" data-wizard>
        <progress data-wizard-progress></progress>

        <fieldset data-wizard-step>
          <legend>Account</legend>
          <form-field>
            <label for="ms-email">Email</label>
            <input type="email" id="ms-email" name="email" required/>
          </form-field>
          <form-field>
            <label for="ms-name">Full Name</label>
            <input type="text" id="ms-name" name="fullname" required/>
          </form-field>
        </fieldset>

        <fieldset data-wizard-step>
          <legend>Preferences</legend>
          <form-field>
            <label for="ms-color">Favorite Color</label>
            <select id="ms-color" name="color">
              <option value="">Select...</option>
              <option value="red">Red</option>
              <option value="blue">Blue</option>
              <option value="green">Green</option>
            </select>
          </form-field>
        </fieldset>

        <fieldset data-wizard-step data-wizard-summary>
          <legend>Review</legend>
          <p>Please confirm your information:</p>
          <dl>
            <dt>Email</dt>
            <dd data-wizard-field="email"></dd>
            <dt>Name</dt>
            <dd data-wizard-field="fullname"></dd>
            <dt>Color</dt>
            <dd data-wizard-field="color"></dd>
          </dl>
        </fieldset>

        <nav aria-label="Wizard Summary nav" data-wizard-nav>
          <button type="button" data-wizard-prev>Back</button>
          <button type="button" data-wizard-next>Next</button>
          <button type="submit">Submit</button>
        </nav>
      </form>
    </layout-card>

    <layout-card>
      <h2>Auto Summary (no data-wizard-field)</h2>
      <form id="auto-summary-wizard" data-wizard>
        <progress data-wizard-progress></progress>

        <fieldset data-wizard-step>
          <legend>Contact</legend>
          <form-field>
            <label for="as-phone">Phone</label>
            <input type="tel" id="as-phone" name="phone"/>
          </form-field>
          <form-field>
            <label for="as-city">City</label>
            <input type="text" id="as-city" name="city"/>
          </form-field>
        </fieldset>

        <fieldset data-wizard-step data-wizard-summary>
          <legend>Review</legend>
          <p>Your details:</p>
          <!-- dl will be auto-generated -->
        </fieldset>

        <nav aria-label="Wizard Summary nav 2" data-wizard-nav>
          <button type="button" data-wizard-prev>Back</button>
          <button type="button" data-wizard-next>Next</button>
          <button type="submit">Submit</button>
        </nav>
      </form>
    </layout-card>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
