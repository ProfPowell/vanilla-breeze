<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blink Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.theme.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.effects.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default blink</small>
    <span data-effect="blink">Signal Active</span>
  </section>
  <section>
    <small>Slow</small>
    <span data-effect="blink" class="slow">Standby Mode</span>
  </section>
  <section>
    <small>Fast</small>
    <span data-effect="blink" class="fast">Alert!</span>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
