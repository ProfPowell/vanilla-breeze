<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface);
    }
    .demo-row {
      display: flex;
      align-items: flex-start;
      gap: var(--size-xl);
      margin-block-end: var(--size-l);
      flex-wrap: wrap;
    }
    .demo-item {
      text-align: center;
      /* article carries container-type: inline-size from VB layout-attributes;
         as a content-sized flex item that collapses it to zero width. Reset. */
      container-type: normal;
    }
    .demo-item p {
      margin-block-start: var(--size-xs);
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <h1>QR Code Demo</h1>
  <h2>Basic QR Codes</h2>
  <section class="demo-row">
    <article class="demo-item">
      <qr-code value="https://vanilla-breeze.dev">https://vanilla-breeze.dev</qr-code>
      <p>URL</p>
    </article>
    <article class="demo-item">
      <qr-code value="Hello, World!">Hello, World!</qr-code>
      <p>Plain text</p>
    </article>
  </section>

  <h2>Custom Sizes</h2>
  <section class="demo-row">
    <article class="demo-item">
      <qr-code value="https://example.com" size="100">Small</qr-code>
      <p>100px</p>
    </article>
    <article class="demo-item">
      <qr-code value="https://example.com" size="200">Medium</qr-code>
      <p>200px (default)</p>
    </article>
    <article class="demo-item">
      <qr-code value="https://example.com" size="300">Large</qr-code>
      <p>300px</p>
    </article>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
