<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Topic Map &mdash; Vanilla Breeze Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <script type="module" src="/src/main.js"></script>
</head>
<body data-page-layout="article">
  <main>
    <section data-layout="center" data-layout-max="wide" data-layout-gap="l">
      <h1>Topic Map</h1>
      <p>Each page declares <code>vb:topic</code> as a dotted hierarchy. The lens turns those into a nested <code>&lt;details&gt;</code> tree where each segment is one level. Pages without a topic land under <strong>Uncategorized</strong>.</p>

      <topic-map data-lens-src="/pages.json"></topic-map>

      <h2>Expanded by default</h2>
      <topic-map data-lens-src="/pages.json" expand-all></topic-map>
    </section>
  </main>
</body>
</html>
