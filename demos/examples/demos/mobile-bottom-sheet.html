<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mobile Bottom Sheet</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body {
      padding: var(--size-xl);
      background: var(--color-surface);
    }

    /* Drag handle indicator */
    dialog[data-position="bottom"]::before {
      content: '';
      display: block;
      width: 2.5rem;
      height: 0.25rem;
      background: var(--color-border-strong);
      border-radius: var(--radius-full);
      margin: var(--size-s) auto var(--size-xs);
    }

    /* Action list styling */
    .action-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .action-list a {
      display: flex;
      align-items: center;
      gap: var(--size-s);
      padding: var(--size-m);
      text-decoration: none;
      color: var(--color-text);
      border-radius: var(--radius-m);
    }

    .action-list a:hover {
      background: var(--color-surface-raised);
    }

    .action-list .destructive {
      color: var(--color-error);
    }

    .action-list hr {
      margin-block: var(--size-xs);
    }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">

  <header>
    <h1>Photo Gallery</h1>
    <p style="color: var(--color-text-muted);">Tap the button below to see a bottom sheet in action.</p>
  </header>

  <section data-layout="grid" data-layout-min="8rem" data-layout-gap="s">
    <figure style="aspect-ratio: 1; background: var(--color-primary-subtle); border-radius: var(--radius-m);"></figure>
    <figure style="aspect-ratio: 1; background: var(--color-surface-raised); border-radius: var(--radius-m);"></figure>
    <figure style="aspect-ratio: 1; background: var(--color-surface-raised); border-radius: var(--radius-m);"></figure>
    <figure style="aspect-ratio: 1; background: var(--color-primary-subtle); border-radius: var(--radius-m);"></figure>
    <figure style="aspect-ratio: 1; background: var(--color-surface-raised); border-radius: var(--radius-m);"></figure>
    <figure style="aspect-ratio: 1; background: var(--color-primary-subtle); border-radius: var(--radius-m);"></figure>
  </section>

  <footer>
    <button commandfor="photo-actions" command="show-modal" class="full-width">
      <icon-wc name="more-horizontal"></icon-wc> Photo Options
    </button>
  </footer>

  <dialog id="photo-actions" data-position="bottom">
    <header data-layout="cluster" data-layout-justify="between">
      <h2>Photo Options</h2>
      <button commandfor="photo-actions" command="close" class="ghost icon-only" aria-label="Close">
        <icon-wc name="x"></icon-wc>
      </button>
    </header>
    <section style="padding: var(--size-s) var(--size-m);">
      <ul class="action-list">
        <li><a href="#"><icon-wc name="share"></icon-wc> Share</a></li>
        <li><a href="#"><icon-wc name="download"></icon-wc> Save to device</a></li>
        <li><a href="#"><icon-wc name="copy"></icon-wc> Copy link</a></li>
        <li><a href="#"><icon-wc name="bookmark"></icon-wc> Add to favorites</a></li>
        <li><hr></li>
        <li><a href="#" class="destructive"><icon-wc name="trash-2"></icon-wc> Delete</a></li>
      </ul>
    </section>
  </dialog>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
