<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>markdown-editor — Basic Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <script type="importmap">{"imports": {"marked": "https://esm.sh/marked@15"}}</script>

  <!-- Register highlight listener before components load -->
  <script>
    document.addEventListener('markdown-viewer:highlight', ({ detail }) => {
      if (window.hljs) hljs.highlightElement(detail.node);
    });
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/web-components/markdown-viewer/logic.js"></script>
  <script type="module" src="/src/web-components/markdown-editor/logic.js"></script>
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
    h2 { margin-block-start: var(--size-xl); }
    markdown-editor { height: 30em; }
  </style>
</head>
<body>
  <layout-center data-layout-max="wide">
    <layout-stack data-layout-gap="l">

      <h1>markdown-editor</h1>
      <p>Side-by-side markdown editor with live preview. Edit on the left, see rendered output on the right.</p>

      <markdown-editor name="content" highlight data-tab-indent>
        <textarea aria-label="Editor">
# Welcome to Markdown Editor

This is a **live preview** editor. Type on the left and see the rendered output on the right.

## Features

- **Bold**, *italic*, ~~strikethrough~~, and `inline code`
- Lists, blockquotes, and headings
- Fenced code blocks with syntax highlighting
- GFM tables and task lists

## Code Example

```javascript
function greet(name) {
  return `Hello, ${name}!`;
}
```

## Table

| Feature | Status |
|---------|--------|
| Live preview | Done |
| Syntax highlighting | Done |
| Tab indent | Done |

## Task List

- [x] Build markdown-viewer
- [x] Build markdown-editor
- [ ] Add toolbar (Phase 5)
        </textarea>
      </markdown-editor>

      <h2>Form Integration</h2>
      <p>The editor works as a form field. The <code>name</code> attribute is reflected to the internal textarea.</p>

      <form>
        <markdown-editor name="body" rows="8" placeholder="Write your message in markdown...">
          <textarea aria-label="Editor"></textarea>
        </markdown-editor>
        <button type="submit" style="margin-block-start: var(--size-s);">Submit</button>
      </form>

      <output id="form-output" role="status"></output>

    </layout-stack>
  </layout-center>

  <script type="module">
    document.querySelector('form').addEventListener('submit', (e) => {
      e.preventDefault();
      const data = new FormData(e.target);
      const output = document.getElementById('form-output');
      output.textContent = `Submitted: ${data.get('body')?.substring(0, 80)}...`;
    });
  </script>
</body>
</html>
