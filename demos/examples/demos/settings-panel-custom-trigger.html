<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Trigger</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface);
      min-block-size: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
    }
    .demo-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--size-m);
      border-block-start: var(--border-width-thin, 1px) solid var(--color-border);
      margin-block-start: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>Custom Trigger</h1>
    <p>Use <code>data-trigger</code> on a child element to replace the default gear icon with your own button.</p>
  </main>

  <footer class="demo-footer">
    <span>Footer area</span>
    <settings-panel>
      <button data-trigger>
        <x-icon name="settings" label="Settings"></x-icon>
        Settings
      </button>
    </settings-panel>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
