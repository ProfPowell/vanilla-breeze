<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cover Layout Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    .cover-hero {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      color: white;
    }
    .cover-edge {
      opacity: 0.8;
    }
    .cover-title {
      margin: 0;
      font-size: var(--font-size-3xl);
    }
    .cover-lead {
      margin: 0;
      max-inline-size: 40ch;
      opacity: 0.9;
    }
    .cover-btn-primary {
      background: white;
      color: var(--color-primary);
    }
    .ghost.cover-btn-secondary {
      border-color: white;
      color: white;
    }
  </style>
</head>
<body>
  <layout-cover class="cover-hero" data-layout-min="100vh" data-layout-padding="l" data-layout-centered>
    <header class="cover-edge">
      <small>Header Area</small>
    </header>
    <section data-layout-principal>
      <layout-stack data-layout-gap="m" data-layout-align="center">
        <h1 class="cover-title">Hero Section</h1>
        <p class="cover-lead">The principal content is vertically centered while header and footer stay at their edges.</p>
        <layout-cluster data-layout-gap="s">
          <button type="button" class="cover-btn-primary">Get Started</button>
          <button type="button" class="ghost cover-btn-secondary">Learn More</button>
        </layout-cluster>
      </layout-stack>
    </section>
    <footer class="cover-edge">
      <small>Footer Area</small>
    </footer>
  </layout-cover>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
