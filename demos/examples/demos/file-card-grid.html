<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>File Card Grid</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <layout-grid data-layout-min="180px" data-layout-gap="m">
    <a data-file data-file-layout="card" href="#" download="quarterly-report.pdf">
      <icon-wc name="file-text"></icon-wc>
      <span class="file-name">quarterly-report.pdf</span>
      <span class="file-meta">2.4 MB &middot; PDF</span>
    </a>
    <a data-file data-file-layout="card" href="#" download="site-screenshot.png">
      <icon-wc name="image"></icon-wc>
      <span class="file-name">site-screenshot.png</span>
      <span class="file-meta">842 KB &middot; PNG</span>
    </a>
    <a data-file data-file-layout="card" href="#" download="design-assets.zip">
      <icon-wc name="archive"></icon-wc>
      <span class="file-name">design-assets.zip</span>
      <span class="file-meta">18.7 MB &middot; ZIP</span>
    </a>
    <a data-file data-file-layout="card" href="#" download="onboarding.mp4">
      <icon-wc name="film"></icon-wc>
      <span class="file-name">onboarding-walkthrough.mp4</span>
      <span class="file-meta">94 MB &middot; MP4</span>
    </a>
  </layout-grid>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
