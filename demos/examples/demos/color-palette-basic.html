<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body {
      padding: var(--size-m);
      background: var(--color-surface);
    }
    section {
      margin-block-end: var(--size-xl);
    }
  </style>
</head>
<body>
  <h3>Inline with Names</h3>
  <section>
    <color-palette
      colors="#ff6b6b,#4ecdc4,#45b7d1,#f7dc6f,#bb8fce"
      names="Red,Teal,Sky,Gold,Purple"
      show-names>
    </color-palette>
  </section>

  <h3>Grid with Values</h3>
  <section>
    <color-palette
      colors="#2d3436,#636e72,#b2bec3,#dfe6e9,#ffffff"
      names="Dark,Gray,Silver,Light,White"
      layout="grid"
      size="lg"
      show-values
      show-names>
    </color-palette>
  </section>

  <h3>List Layout</h3>
  <section>
    <color-palette
      colors="#1a5276,#2e86c1,#85c1e9"
      names="Navy,Blue,Sky"
      layout="list"
      show-values
      show-names>
    </color-palette>
  </section>

  <h3>oklch Colors</h3>
  <section>
    <color-palette
      colors="oklch(50% 0.2 260),oklch(65% 0.18 30),oklch(75% 0.15 140),oklch(85% 0.12 80)"
      names="Indigo,Orange,Green,Gold"
      show-values
      show-names>
    </color-palette>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
