<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stamp Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.theme.css">
  <link rel="stylesheet" href="/src/packs/retro/retro.effects.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="xl">
  <section>
    <small>Default</small>
    <span data-effect="stamp">APPROVED</span>
  </section>
  <section>
    <small>Blue</small>
    <span data-effect="stamp" class="blue">CLASSIFIED</span>
  </section>
  <section>
    <small>Green</small>
    <span data-effect="stamp" class="green">VERIFIED</span>
  </section>
  <section>
    <small>Gold heavy</small>
    <span data-effect="stamp" class="gold heavy">CERTIFIED</span>
  </section>
  <section>
    <small>Black straight</small>
    <span data-effect="stamp" class="black straight">TOP SECRET</span>
  </section>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/packs/retro/retro.effects.js"></script>
</body>
</html>
