<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stakeholder Map — quadrant-grid recipe</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/cdn/packs/ux-planning.full.css">
  <style>
    body { padding: var(--size-l); background: var(--color-surface); max-inline-size: 50rem; margin-inline: auto; }
    h1 { font-size: var(--font-size-l); }
    p  { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <h1>Stakeholder Map</h1>
  <p>Power × Interest stakeholder grid with labelled dots placed at exact coordinates via <code>data-x</code> / <code>data-y</code>.</p>

  <quadrant-grid
    x-label="Interest"
    y-label="Power"
    x-low="Low" x-high="High"
    y-low="Low" y-high="High"
    q1-label="Manage Closely"
    q2-label="Keep Satisfied"
    q3-label="Monitor"
    q4-label="Keep Informed">
    <span data-x="0.85" data-y="0.9" data-id="ceo">CEO</span>
    <span data-x="0.7"  data-y="0.65" data-id="vp-eng">VP Eng</span>
    <span data-x="0.2"  data-y="0.8" data-id="board">Board</span>
    <span data-x="0.15" data-y="0.25" data-id="vendor">Vendor</span>
    <span data-x="0.6"  data-y="0.35" data-id="users">End users</span>
    <span data-x="0.8"  data-y="0.4"  data-id="support">Support team</span>
  </quadrant-grid>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/packs/ux-planning.full.js"></script>
</body>
</html>
