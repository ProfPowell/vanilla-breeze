<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impact/Effort Matrix Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <link rel="stylesheet" href="/cdn/packs/ux-planning.full.css">
  <style>
    body { padding: var(--size-l); background: var(--color-surface); }
  </style>
</head>
<body>
  <impact-effort>
    <user-story data-quadrant="quick-wins" draggable="true" data-id="PROJ-201"
      story-id="PROJ-201" persona="PM" action="add CSV export to reports"
      priority="medium" status="to-do" points="2" detail="minimal">
    </user-story>
    <user-story data-quadrant="quick-wins" draggable="true" data-id="PROJ-202"
      story-id="PROJ-202" persona="User" action="see loading indicators on all async actions"
      priority="low" status="backlog" points="1" detail="minimal">
    </user-story>
    <user-story data-quadrant="big-bets" draggable="true" data-id="PROJ-301"
      story-id="PROJ-301" persona="Developer" action="migrate to new API gateway"
      priority="high" status="in-progress" points="13" detail="minimal">
    </user-story>
    <user-story data-quadrant="big-bets" draggable="true" data-id="PROJ-302"
      story-id="PROJ-302" persona="PM" action="redesign the onboarding flow"
      priority="high" status="to-do" points="8" detail="minimal">
    </user-story>
    <user-story data-quadrant="fill-ins" draggable="true" data-id="PROJ-401"
      story-id="PROJ-401" persona="Developer" action="update README with new setup steps"
      priority="low" status="backlog" points="1" detail="minimal">
    </user-story>
    <user-story data-quadrant="money-pit" draggable="true" data-id="PROJ-501"
      story-id="PROJ-501" persona="Admin" action="rewrite legacy auth module from scratch"
      priority="medium" status="backlog" points="21" detail="minimal">
    </user-story>
  </impact-effort>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/cdn/packs/ux-planning.full.js"></script>
</body>
</html>
