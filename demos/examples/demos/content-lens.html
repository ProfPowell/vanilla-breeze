<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Content Lens &mdash; Vanilla Breeze Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <script type="module" src="/src/main.js"></script>
</head>
<body data-page-layout="article">
  <main>
    <section data-layout="center" data-layout-max="wide" data-layout-gap="l">
      <h1>Content Lens &mdash; All Six Lenses</h1>
      <p class="lead">A switchable host wraps every Stage 6 lens. The chips above let the reader pick a view; the underlying source (<code>/pages.json</code>) is shared across them all.</p>

      <content-lens data-lens-default="trust" data-lens-src="/pages.json">
        <author-index     data-lens-name="author"   data-lens-label="By Author"></author-index>
        <topic-map        data-lens-name="topic"    data-lens-label="By Topic"></topic-map>
        <trust-filter     data-lens-name="trust"    data-lens-label="By Trust"></trust-filter>
        <recently-visited data-lens-name="recent"   data-lens-label="Recently Visited" no-track></recently-visited>
        <popularity-index data-lens-name="popular"  data-lens-label="Most Visited"
                          data-meta-src="/pages.json"></popularity-index>
      </content-lens>
    </section>
  </main>
</body>
</html>
