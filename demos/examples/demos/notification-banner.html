<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>notification-wc: Banner</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { margin: 0; }
    main { padding: var(--size-l); max-inline-size: 40rem; margin-inline: auto; }
  </style>
</head>
<body>
  <notification-wc mode="banner" persist="demo-banner-v1" variant="info" position="top">
    <layout-cluster data-layout-justify="space-between" data-layout-gap="m" data-layout-align="center">
      <span>
        <strong>v3.0 is out.</strong>
        <a href="#changelog">See what&rsquo;s new</a>
      </span>
      <button type="button" value="dismiss">Dismiss</button>
    </layout-cluster>
  </notification-wc>

  <main>
    <h1>Banner mode</h1>
    <p>The banner above stays dismissed across reloads via VBStore. Change <code>persist</code> to test a fresh key, or set <code>expires</code> to re-show after N days.</p>
    <p>Variants: <code>info</code>, <code>success</code>, <code>warning</code>, <code>error</code>. Position: <code>top</code> or <code>bottom</code>.</p>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
