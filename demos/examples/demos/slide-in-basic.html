<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide In Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { padding: var(--size-xl); background: var(--color-surface); }
    .spacer { height: 60vh; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); border: 1px dashed var(--color-border); border-radius: var(--radius-m); }
  </style>
</head>
<body data-layout="stack" data-layout-gap="l">
  <section>
    <small>Immediate slide in (LTR)</small>
    <h1 data-effect="slide-in">Slides in from the left</h1>
  </section>
  <p class="spacer">Scroll down</p>
  <section>
    <small>Scroll triggered</small>
    <h2 data-effect="slide-in" data-trigger="scroll">Appears from the inline-start direction</h2>
  </section>
  <section dir="rtl">
    <small>RTL aware — slides from the right</small>
    <h2 data-effect="slide-in" data-trigger="scroll">This text slides in respecting dir="rtl"</h2>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
