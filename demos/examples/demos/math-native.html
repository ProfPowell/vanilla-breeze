<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Native MathML Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body {
      padding: var(--size-xl);
      background: var(--color-surface);
      max-inline-size: 40rem;
      margin-inline: auto;
    }
  </style>
</head>
<body>
  <h3>Inline Math</h3>
  <p>The area of a circle is
    <math>
      <mi>A</mi><mo>=</mo><mi>&pi;</mi><msup><mi>r</mi><mn>2</mn></msup>
    </math>, where <math><mi>r</mi></math> is the radius.
  </p>

  <h3>Display Math</h3>
  <math display="block">
    <mi>x</mi><mo>=</mo>
    <mfrac>
      <mrow>
        <mo>-</mo><mi>b</mi><mo>&pm;</mo>
        <msqrt>
          <msup><mi>b</mi><mn>2</mn></msup>
          <mo>-</mo><mn>4</mn><mi>a</mi><mi>c</mi>
        </msqrt>
      </mrow>
      <mrow><mn>2</mn><mi>a</mi></mrow>
    </mfrac>
  </math>

  <h3>Numbered</h3>
  <div class="equation">
    <math display="block">
      <mi>E</mi><mo>=</mo><mi>m</mi><msup><mi>c</mi><mn>2</mn></msup>
    </math>
  </div>

  <div class="equation">
    <math display="block">
      <mi>F</mi><mo>=</mo><mi>m</mi><mi>a</mi>
    </math>
  </div>

  <h3>Captioned</h3>
  <figure class="math">
    <math display="block">
      <munderover>
        <mo>&sum;</mo>
        <mrow><mi>k</mi><mo>=</mo><mn>0</mn></mrow>
        <mi>n</mi>
      </munderover>
      <mrow>
        <mo>(</mo>
        <mfrac linethickness="0">
          <mi>n</mi>
          <mi>k</mi>
        </mfrac>
        <mo>)</mo>
      </mrow>
      <msup><mi>a</mi><mrow><mi>n</mi><mo>-</mo><mi>k</mi></mrow></msup>
      <msup><mi>b</mi><mi>k</mi></msup>
      <mo>=</mo>
      <msup>
        <mrow><mo>(</mo><mi>a</mi><mo>+</mo><mi>b</mi><mo>)</mo></mrow>
        <mi>n</mi>
      </msup>
    </math>
    <figcaption>The Binomial Theorem</figcaption>
  </figure>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
