<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>NFR Radar — Basic</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <style>
    body { padding: var(--size-l); background: var(--color-surface-alt); }
    h1   { margin-block-end: var(--size-m); }
    p    { margin-block-end: var(--size-l); color: var(--color-text-muted); }
  </style>
</head>
<body>
  <layout-center data-layout-max="wide" data-layout-gap="l">
    <h1>NFR Radar</h1>
    <p>The radar visualizes a quality vector against the project's capacity envelope. Pick priorities in the compass to watch the polygon shift; the green ring shows the capacity ratio per axis if costs were uniformly distributed.</p>

    <iron-triangle id="shape" data-focus-factor="0.6">
      <form data-layout="split" data-layout-ratio="2:1" data-layout-gap="l">
        <section data-layout="stack" data-layout-gap="m">
          <fieldset data-layout="stack" data-layout-gap="m">
            <legend>Time</legend>
            <form-field>
              <label for="r-sw">Sprint weeks</label>
              <input id="r-sw" name="time.sprintWeeks" type="number" min="1" value="2" style="inline-size: 6rem">
            </form-field>
            <form-field>
              <label for="r-sc">Number of sprints</label>
              <input id="r-sc" name="time.sprintCount" type="number" min="1" value="6" style="inline-size: 6rem">
            </form-field>
          </fieldset>
          <fieldset data-layout="stack" data-layout-gap="m">
            <legend>Cost</legend>
            <form-field>
              <label for="r-fte">Team size (FTE)</label>
              <input id="r-fte" name="cost.teamFTE" type="number" min="0" step="0.5" value="2" style="inline-size: 6rem">
            </form-field>
          </fieldset>
        </section>
        <figure data-iron-triangle-viz aria-live="polite">
          <output name="capacityPoints">—</output>
          <small name="capacityFormula">Set inputs to compute capacity.</small>
        </figure>
      </form>
    </iron-triangle>

    <section data-layout="split" data-layout-ratio="2:1" data-layout-gap="l">
      <nfr-compass id="picker" data-bind-to="shape">
        <h2 slot="title">Quality priorities</h2>
      </nfr-compass>
      <figure data-layout="stack" data-layout-gap="s">
        <figcaption>Quality envelope vs vector</figcaption>
        <nfr-radar data-bind-to="picker"></nfr-radar>
      </figure>
    </section>
  </layout-center>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
