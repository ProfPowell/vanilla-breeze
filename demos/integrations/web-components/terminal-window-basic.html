<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>terminal-window + Vanilla Breeze</title>
  <link rel="stylesheet" href="/src/main.css">
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="https://unpkg.com/@profpowell/terminal-window@2.1.0/dist/terminal-window.js"></script>
  <style>
    html, body { margin: 0; padding: var(--size-l) var(--size-m); background: var(--color-background); }
    terminal-window { display: block; max-inline-size: 80ch; margin-inline: auto; }
  </style>
</head>
<body>
  <terminal-window
    title="vb.test"
    prompt="$ "
    welcome="Welcome to Vanilla Breeze — type 'help' to see built-in commands."
    typing-effect
    typing-speed="20"
    max-lines="500">
  </terminal-window>
</body>
</html>
