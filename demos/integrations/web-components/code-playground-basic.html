<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>code-playground + Vanilla Breeze — Basic Demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="https://unpkg.com/@profpowell/code-playground"></script>
  <style>
    body {
      padding: var(--size-l) var(--size-m);
      background: var(--color-surface);
      color: var(--color-text);
      font-family: var(--font-body);
      max-inline-size: 90ch;
      margin-inline: auto;
    }
    code-playground {
      display: block;
      block-size: 70vh;
      min-block-size: 480px;
    }
    h2 { font-size: var(--font-size-base); color: var(--color-text-muted); margin-block-end: var(--size-s); }
  </style>
</head>
<body>
  <section>
    <h2>VB-themed code-playground (panes, tab bar, console adopt active theme)</h2>
    <code-playground inherit-theme persist="vb-integration-demo">
      <textarea slot="html"><h1>Hello, Vanilla Breeze</h1>
<p>Edit any pane on the left. The preview re-renders live.</p>
<button id="ping">Click me</button></textarea>
      <textarea slot="css">body { font-family: system-ui; padding: 1rem; }
h1 { color: var(--color-interactive, #2563eb); }
button { padding: .5rem 1rem; }</textarea>
      <textarea slot="js">document.getElementById('ping').addEventListener('click', () => {
  console.log('Pong!', new Date().toISOString());
});</textarea>
    </code-playground>
  </section>
</body>
</html>
