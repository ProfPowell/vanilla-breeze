<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>image-editor + Vanilla Breeze — Basic Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="https://unpkg.com/@profpowell/image-editor"></script>
  <style>
    body {
      padding: var(--size-l) var(--size-m);
      background: var(--color-surface);
      color: var(--color-text);
      font-family: var(--font-body);
      max-inline-size: 90ch;
      margin-inline: auto;
    }
    image-editor {
      display: block;
      block-size: 70vh;
      min-block-size: 480px;
    }
    h2 { font-size: var(--font-size-base); color: var(--color-text-muted); margin-block-end: var(--size-s); }
  </style>
</head>
<body>
  <h1>image-editor + Vanilla Breeze — Basic Demo</h1>
  <section>
    <h2>VB-themed image-editor (toolbar, panels, controls adopt active theme)</h2>
    <image-editor src="/docs/alpenglow/images/hero-light.jpg"></image-editor>
  </section>
</body>
</html>
