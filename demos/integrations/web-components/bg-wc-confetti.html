<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>bg-wc + Vanilla Breeze — confetti (theme palette)</title>
  <link rel="stylesheet" href="/src/main.css"/>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="https://unpkg.com/@profpowell/bg-wc@0.2.1/dist/bg-wc.js"></script>
  <style>
    html, body { block-size: 100%; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      color: var(--color-text);
      background: var(--color-background);
    }
    bg-wc {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-block-size: 100%;
      padding: var(--size-l) var(--size-m);
      text-align: center;
    }
    article {
      max-inline-size: 48ch;
      margin-inline: auto;
    }
    h1 { margin-block: 0 var(--size-s); }
  </style>
</head>
<body>
  <bg-wc preset="confetti" palette="theme" density="0.6">
    <article>
      <h1 style="margin-block-start: 0;">Confetti</h1>
      <p>A Canvas2D particle preset. With <code>palette="theme"</code> it cycles the Vanilla Breeze semantic colors — <code>--color-success</code>, <code>--color-warning</code>, <code>--color-error</code>, and friends — instead of a hardcoded rainbow.</p>
    </article>
  </bg-wc>
</body>
</html>
