<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pdf-viewer + Vanilla Breeze — Basic Demo</title>
  <link rel="stylesheet" href="/src/main.css" />
  <script type="module" src="/src/main.js"></script>
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@profpowell/pdf-viewer/dist/pdf-viewer.js"></script>
  <style>
    body {
      padding: var(--size-l) var(--size-m);
      background: var(--color-surface);
      color: var(--color-text);
      font-family: var(--font-body);
      max-inline-size: 80ch;
      margin-inline: auto;
    }
    pdf-viewer {
      display: block;
      block-size: 70vh;
      min-block-size: 480px;
    }
    h2 { font-size: var(--font-size-base); color: var(--color-text-muted); margin-block-end: var(--size-s); }
  </style>
</head>
<body>
  <section>
    <h2>VB-themed pdf-viewer (toolbar, sidebar, borders adopt active theme)</h2>
    <pdf-viewer
      src="./assets/sample.pdf"
      show-thumbnails
      show-search
      title="Sample PDF"></pdf-viewer>
  </section>
</body>
</html>
