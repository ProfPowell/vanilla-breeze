<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Theming Demo</title>
  <link rel="stylesheet" href="/cdn/vanilla-breeze.css">
  <link id="theme-css" rel="stylesheet" href="">
  <style>
    body {
      padding: var(--size-l);
      background: var(--color-background, var(--color-surface));
    }
    .theme-controls {
      display: flex;
      gap: var(--size-m);
      align-items: center;
      margin-block-end: var(--size-xl);
      flex-wrap: wrap;
    }
    .theme-controls label {
      font-weight: 600;
      font-size: var(--font-size-sm, 0.875rem);
    }
    .theme-controls button {
      padding: var(--size-xs) var(--size-m);
      border: var(--border-width-thin, 1px) solid var(--color-border);
      border-radius: var(--radius-m);
      background: var(--color-surface-raised);
      color: var(--color-text);
      cursor: pointer;
      font: inherit;
      font-size: var(--font-size-sm, 0.875rem);
    }
    .theme-controls button[aria-pressed="true"] {
      background: var(--color-interactive, var(--color-primary));
      color: white;
      border-color: transparent;
    }
  </style>
</head>
<body>
  <layout-center data-layout-max="wide">
    <layout-stack data-layout-gap="xl">

      <h1>Calendar Theming</h1>
      <p>Switch themes to see the calendar-wc expressive theming layer in action.
         Each theme sets its own banner, week tints, watermark, today glow, and holiday decorations via CSS tokens.</p>

      <nav class="theme-controls" aria-label="Theme switcher">
        <label>Theme:</label>
        <button type="button" data-set-theme="" aria-pressed="true">Base</button>
        <button type="button" data-set-theme="kawaii">Kawaii</button>
        <button type="button" data-set-theme="super2026">Super2026</button>
      </nav>

      <layout-grid data-layout-columns="auto-fit" data-layout-min="20rem" data-layout-gap="xl">

        <layout-card>
          <h2 style="margin: 0 0 var(--size-m);">Events Calendar</h2>
          <calendar-wc
            data-events='{"2026-04-03":[{"label":"Team standup","time":"09:00","icon":"users"},{"label":"Sprint review","time":"14:00","icon":"presentation"}],"2026-04-10":"Design sync","2026-04-15":{"label":"Tax deadline","color":"var(--color-danger, #dc2626)"},"2026-04-21":"Company holiday","2026-04-25":"Release day"}'
            data-highlight-dates="2026-04-21:holiday"
            data-selection="single">
          </calendar-wc>
        </layout-card>

        <layout-card>
          <h2 style="margin: 0 0 var(--size-m);">Range with Disabled</h2>
          <calendar-wc
            data-selection="range"
            data-disabled-dates="2026-04-04,2026-04-05,2026-04-11,2026-04-12,2026-04-18,2026-04-19,2026-04-25,2026-04-26">
          </calendar-wc>
        </layout-card>

        <layout-card>
          <h2 style="margin: 0 0 var(--size-m);">Compact</h2>
          <calendar-wc
            data-size="compact"
            data-events='{"2026-04-01":"New Year Q2","2026-04-07":"Sprint start","2026-04-14":"Midpoint","2026-04-21":"Sprint end","2026-04-28":"Retrospective"}'
            data-highlight-dates="2026-04-15:deadline,2026-04-21:holiday">
          </calendar-wc>
        </layout-card>

      </layout-grid>

      <layout-card>
        <h2 style="margin: 0 0 var(--size-m);">Large View</h2>
        <calendar-wc data-size="large"
          data-events='{
            "2026-04-01":[{"label":"Q2 Kickoff","time":"10:00","icon":"rocket"},{"label":"Team Lunch","time":"12:00","icon":"utensils"}],
            "2026-04-03":[{"label":"Standup","time":"09:00","icon":"users"},{"label":"Design Review","time":"14:00","icon":"palette"},{"label":"1:1 w/ Manager","time":"16:00","icon":"message-circle"}],
            "2026-04-07":{"label":"Sprint Planning","time":"09:30","icon":"layout"},
            "2026-04-10":[{"label":"Demo Day","time":"15:00","icon":"monitor"},{"label":"Happy Hour","time":"17:00","icon":"wine"}],
            "2026-04-15":{"label":"Tax Deadline","color":"var(--color-danger, #dc2626)","icon":"alert-triangle"},
            "2026-04-18":{"label":"Conference","icon":"calendar"},
            "2026-04-21":{"label":"Company Holiday","icon":"sun"},
            "2026-04-25":[{"label":"Release v2.0","time":"10:00","icon":"package"},{"label":"Launch Party","time":"18:00","icon":"party-popper"}],
            "2026-04-28":{"label":"Retrospective","time":"14:00","icon":"refresh-cw"},
            "2026-04-30":{"label":"Month Close","time":"09:00","icon":"check-circle"}
          }'
          data-highlight-dates="2026-04-15:deadline,2026-04-21:holiday"
          data-disabled-dates="2026-04-04,2026-04-05,2026-04-11,2026-04-12,2026-04-18,2026-04-19,2026-04-25,2026-04-26">
        </calendar-wc>
      </layout-card>

    </layout-stack>
  </layout-center>

  <script type="module" src="/cdn/vanilla-breeze-autoload.js"></script>
  <script type="module">
    const themeCSS = document.getElementById('theme-css');
    const themePaths = {
      '': '',
      'kawaii': '/cdn/themes/kawaii.css',
      'super2026': '/cdn/themes/super2026.css'
    };

    document.querySelector('.theme-controls').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-set-theme]');
      if (!btn) return;

      const theme = btn.getAttribute('data-set-theme');

      // Update button states
      document.querySelectorAll('[data-set-theme]').forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');

      // Apply theme
      document.body.setAttribute('data-theme', theme);
      themeCSS.href = themePaths[theme] || '';
    });
  </script>
</body>
</html>
