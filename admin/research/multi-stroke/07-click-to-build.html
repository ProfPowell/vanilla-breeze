<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>07 — Click to Build</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap"
      rel="stylesheet">
<style>
  /*
    Each click prepends one outer ring. The new span pops in via a
    bezier scale animation; existing layers don't re-animate because
    only the new node mounts.
  */

  :root {
    --c1:   #cc0d55;
    --c2:   #f4e1e8;
    --base: 4px;
  }
  body {
    margin: 0; min-height: 100vh;
    display: grid; place-items: center;
    background: var(--c2);
    font-family: system-ui;
    user-select: none;
    overflow: hidden;
  }

  .stage {
    display: grid; place-items: center;
    gap: 2rem;
  }

  .multi-stroke {
    display: inline-grid;
    font: 900 clamp(4rem, 16vmin, 12rem)/1 "Bowlby One", system-ui;
  }
  .multi-stroke > * {
    grid-area: 1 / 1;
    color: transparent;
    -webkit-text-stroke: calc(var(--i) * var(--base)) var(--c, var(--c1));
    animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  }
  .multi-stroke > :nth-child(even) { --c: var(--c2); }
  .multi-stroke > .fill {
    color: var(--c1);
    -webkit-text-stroke: 0;
    animation: none;
  }

  @keyframes pop {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .controls {
    display: flex; gap: 0.6rem; align-items: center;
    z-index: 10;
  }
  button {
    font: 600 0.85rem/1 system-ui;
    padding: 0.7rem 1.1rem;
    border: 2px solid var(--c1);
    background: white;
    color: var(--c1);
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.1s, background 0.1s, color 0.1s;
  }
  button:hover  { background: var(--c1); color: white; }
  button:active { transform: scale(0.95); }
  .count {
    font: 500 0.8rem/1 ui-monospace, monospace;
    color: var(--c1);
    opacity: 0.75;
    margin-left: 0.5rem;
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="multi-stroke" id="art">
      <span class="fill">BUILD</span>
    </div>
    <div class="controls">
      <button id="add">+ Add stroke</button>
      <button id="remove">− Remove</button>
      <button id="reset">Reset</button>
      <span class="count" id="count">0 strokes</span>
    </div>
  </div>

  <script type="module">
    const TEXT  = 'BUILD';
    const art   = document.getElementById('art');
    const count = document.getElementById('count');
    let layers  = 0;

    const setCount = () =>
      count.textContent = layers + ' stroke' + (layers === 1 ? '' : 's');

    function add() {
      if (layers >= 30) return;
      layers++;
      const s = document.createElement('span');
      s.style.setProperty('--i', layers);
      s.textContent = TEXT;
      art.prepend(s);                  // outermost → first in DOM
      setCount();
    }

    function remove() {
      if (layers === 0) return;
      art.firstElementChild.remove();
      layers--;
      setCount();
    }

    function reset() {
      while (layers > 0) remove();
    }

    document.getElementById('add').onclick    = add;
    document.getElementById('remove').onclick = remove;
    document.getElementById('reset').onclick  = reset;

    setCount();
  </script>
</body>
</html>
