<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Column Reader v2 — Viewport-Fit Paging Demo</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --paper: #f3ebdd;
    --paper-highlight: #f8f2e8;
    --paper-shadow: #dccdb8;
    --ink: #231913;
    --ink-soft: #5f5145;
    --ink-faint: #8e7d6d;
    --accent: #93412a;
    --chrome: #171210;
    --chrome-border: #302723;
    --chrome-h: 58px;
    --body-size: 1rem;
    --lh: 1.72;
    --vvh: 100dvh;
    --page-width: 100vw;
    --page-columns: 1;
    --page-gutter: clamp(24px, 4vw, 72px);
    --page-top-pad: clamp(20px, 3.6vh, 38px);
    --page-bottom-pad: clamp(28px, 4.8vh, 52px);
  }

  html,
  body {
    min-height: 100%;
    background:
      radial-gradient(circle at top, rgba(222, 193, 154, 0.18), transparent 42%),
      linear-gradient(180deg, #1b1411 0%, #100c0a 100%);
    color: var(--ink);
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: var(--body-size);
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: var(--vvh);
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.02), transparent 16%, transparent 84%, rgba(255, 255, 255, 0.02)),
      repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.015) 0 1px, transparent 1px 3px);
    mix-blend-mode: soft-light;
    opacity: 0.5;
  }

  #app {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-rows: var(--chrome-h) 2px 1fr;
    min-height: var(--vvh);
  }

  #chrome {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 1rem;
    padding: 0 max(1rem, env(safe-area-inset-right)) 0 max(1rem, env(safe-area-inset-left));
    background:
      linear-gradient(180deg, rgba(36, 29, 26, 0.98), rgba(20, 16, 14, 0.98));
    border-bottom: 1px solid var(--chrome-border);
    min-height: var(--chrome-h);
    z-index: 30;
  }

  .chrome-copy {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .chrome-kicker {
    font: 600 0.63rem/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #9a7e69;
  }

  .chrome-title {
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #d2c3b4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chrome-controls {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    min-width: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .chrome-controls::-webkit-scrollbar {
    display: none;
  }

  .control-group {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.18rem;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 999px;
    flex: 0 0 auto;
  }

  .control-label {
    padding-inline: 0.45rem 0.25rem;
    color: #8a7769;
    font: 600 0.58rem/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  button {
    font: inherit;
  }

  .seg-btn,
  .icon-btn,
  .nav-btn {
    border: 0;
    background: transparent;
    color: #8d7f75;
    cursor: pointer;
    transition:
      color 140ms ease,
      background 140ms ease,
      transform 140ms ease;
  }

  .seg-btn {
    min-width: 2.2rem;
    padding: 0.44rem 0.72rem;
    border-radius: 999px;
    font: 600 0.67rem/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .icon-btn {
    width: 2.1rem;
    height: 2.1rem;
    border-radius: 999px;
    display: inline-grid;
    place-items: center;
    font: 600 0.82rem/1 ui-monospace, "SF Mono", Menlo, monospace;
  }

  .seg-btn:hover,
  .icon-btn:hover,
  .nav-btn:hover {
    color: #efe0d1;
    background: rgba(255, 255, 255, 0.08);
  }

  .seg-btn.active {
    color: #fff4e7;
    background: rgba(147, 65, 42, 0.65);
  }

  .icon-btn:disabled,
  .nav-btn:disabled {
    opacity: 0.28;
    cursor: default;
  }

  #progress {
    background: linear-gradient(90deg, #b15a3a 0%, #f0bf7c 100%);
    inline-size: 0%;
    transition: inline-size 180ms ease;
    z-index: 20;
  }

  #book {
    position: relative;
    min-height: 0;
    overflow: hidden;
  }

  #book::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 50%, rgba(255, 232, 198, 0.08), transparent 35%),
      radial-gradient(circle at 80% 50%, rgba(255, 232, 198, 0.06), transparent 36%);
    pointer-events: none;
    z-index: 0;
  }

  #scroller,
  #pager {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  #scroller {
    overflow-y: auto;
    overflow-x: hidden;
    padding:
      max(1rem, env(safe-area-inset-top))
      max(1rem, env(safe-area-inset-right))
      max(1rem, calc(1rem + env(safe-area-inset-bottom)))
      max(1rem, env(safe-area-inset-left));
  }

  #scroller::-webkit-scrollbar {
    width: 5px;
  }

  #scroller::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 999px;
  }

  .scroll-sheet {
    max-width: min(72ch, 100%);
    min-height: 100%;
    margin: 0 auto;
    padding: clamp(1.4rem, 4vw, 3rem);
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.12)),
      var(--paper);
    border: 1px solid rgba(91, 67, 48, 0.22);
    border-radius: 24px;
    box-shadow:
      0 22px 60px rgba(0, 0, 0, 0.32),
      inset 0 1px 0 rgba(255, 255, 255, 0.55);
  }

  #pager {
    display: none;
    overflow-x: auto;
    overflow-y: hidden;
    overscroll-behavior-x: contain;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0) 18%),
      repeating-linear-gradient(
        to right,
        var(--paper) 0,
        var(--paper-highlight) calc(var(--page-width) - 2px),
        rgba(123, 92, 67, 0.18) calc(var(--page-width) - 2px),
        rgba(123, 92, 67, 0.18) var(--page-width)
      );
  }

  #pager::-webkit-scrollbar {
    display: none;
  }

  .pages-flow {
    --_page-gap: calc(var(--page-gutter) * 2);
    width: 100%;
    min-width: 100%;
    height: 100%;
    padding: var(--page-top-pad) var(--page-gutter) var(--page-bottom-pad);
    column-fill: auto;
    column-count: var(--page-columns);
    column-width: auto;
    column-gap: var(--_page-gap);
    orphans: 3;
    widows: 3;
    background: transparent;
  }

  .pages-flow > * {
    max-width: none;
  }

  header,
  figure,
  blockquote,
  .pull-quote {
    break-inside: avoid;
  }

  .article-kicker {
    display: inline-block;
    margin-bottom: 0.8rem;
    color: var(--accent);
    font: 600 0.65rem/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .article-title {
    font-size: clamp(1.75rem, 4.4vw, 3rem);
    line-height: 0.98;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 0.6rem;
  }

  .article-byline {
    color: var(--ink-faint);
    font-size: 0.78rem;
    font-style: italic;
    padding-bottom: 1.25rem;
    margin-bottom: 1.7rem;
    border-bottom: 1px solid rgba(110, 82, 60, 0.18);
  }

  .article-lede {
    font-size: 1.14em;
    line-height: var(--lh);
    color: var(--ink-soft);
    margin-bottom: 1.3em;
    font-style: italic;
  }

  p {
    color: var(--ink-soft);
    line-height: var(--lh);
    margin-bottom: 1em;
    text-align: justify;
    hyphens: auto;
    hanging-punctuation: first allow-end;
  }

  p + p {
    text-indent: 1.45em;
    margin-top: -0.45em;
  }

  h2 {
    color: var(--ink);
    font-size: 1.02rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 1.9em 0 0.7em;
    break-after: avoid;
  }

  h2::before {
    content: "§ ";
    color: var(--accent);
  }

  blockquote {
    margin: 1.35em 0;
    padding: 1rem 1.2rem;
    border-left: 3px solid var(--accent);
    background: rgba(142, 106, 78, 0.1);
  }

  blockquote p {
    color: var(--ink);
    font-style: italic;
    margin: 0;
    text-indent: 0;
  }

  blockquote cite {
    display: block;
    margin-top: 0.55rem;
    color: var(--ink-faint);
    font: 600 0.69rem/1.2 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-style: normal;
  }

  .pull-quote {
    margin: 1.5em 0;
    padding: 1.1rem 0;
    border-top: 2px solid rgba(35, 25, 19, 0.88);
    border-bottom: 1px solid rgba(110, 82, 60, 0.18);
  }

  .pull-quote p {
    text-align: center;
    color: var(--ink);
    font-style: italic;
    font-size: 1.15em;
    line-height: 1.45;
    margin: 0;
    text-indent: 0;
  }

  .drop-cap::first-letter {
    float: left;
    font-size: 3.8em;
    line-height: 0.82;
    margin: 0.08em 0.1em -0.02em 0;
    color: var(--accent);
  }

  #page-nav {
    position: absolute;
    inset: auto auto max(1rem, calc(1rem + env(safe-area-inset-bottom))) 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 0.8rem;
    padding: 0.34rem 0.55rem;
    background: rgba(22, 17, 14, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 999px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 25;
  }

  .nav-btn {
    width: 2rem;
    height: 2rem;
    border-radius: 999px;
    display: inline-grid;
    place-items: center;
    font: 600 1rem/1 ui-monospace, "SF Mono", Menlo, monospace;
  }

  #page-indicator {
    min-width: 6.5ch;
    text-align: center;
    color: #d3c3b4;
    font: 600 0.68rem/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.12em;
  }

  @media (max-width: 760px) {
    :root {
      --chrome-h: 64px;
      --page-gutter: 18px;
    }

    .chrome-kicker {
      display: none;
    }

    .chrome-title {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
    }

    .control-label {
      display: none;
    }

    .seg-btn {
      min-width: 2rem;
      padding-inline: 0.62rem;
    }

    .scroll-sheet {
      padding: 1.3rem 1.15rem 1.6rem;
      border-radius: 18px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    #progress,
    .seg-btn,
    .icon-btn,
    .nav-btn {
      transition: none;
    }
  }
</style>
</head>
<body>
<div id="app">
  <header id="chrome">
    <div class="chrome-copy">
      <span class="chrome-kicker">R&amp;D Demo · Viewport-Fit Paging</span>
      <span class="chrome-title">On the Nature of Slow Reading</span>
    </div>

    <div class="chrome-controls" aria-label="Reader controls">
      <div class="control-group" aria-label="Reading mode">
        <span class="control-label">Mode</span>
        <button class="seg-btn active" id="btn-scroll" type="button">Scroll</button>
        <button class="seg-btn" id="btn-pages" type="button">Pages</button>
      </div>

      <div class="control-group" aria-label="Font size">
        <span class="control-label">Type</span>
        <button class="icon-btn" id="font-down" type="button" aria-label="Decrease font size">A-</button>
        <button class="icon-btn" id="font-up" type="button" aria-label="Increase font size">A+</button>
      </div>

      <div class="control-group" aria-label="Page columns">
        <span class="control-label">Cols</span>
        <button class="seg-btn active" data-cols="auto" type="button">Auto</button>
        <button class="seg-btn" data-cols="1" type="button">1</button>
        <button class="seg-btn" data-cols="2" type="button">2</button>
        <button class="seg-btn" data-cols="3" type="button">3</button>
      </div>
    </div>
  </header>

  <div id="progress" aria-hidden="true"></div>

  <main id="book">
    <section id="scroller" aria-label="Scrolling reader">
      <article class="scroll-sheet" id="article-scroll"></article>
    </section>

    <section id="pager" aria-label="Paged reader">
      <article class="pages-flow" id="article-pages"></article>
    </section>

    <nav id="page-nav" aria-label="Page navigation">
      <button class="nav-btn" id="prev-page" type="button" aria-label="Previous page">←</button>
      <span id="page-indicator" aria-live="polite">1 / 1</span>
      <button class="nav-btn" id="next-page" type="button" aria-label="Next page">→</button>
    </nav>
  </main>
</div>

<script>
const CONTENT = `
<header>
  <span class="article-kicker">Essay · Typography &amp; Reading</span>
  <h1 class="article-title">On the Nature of Slow Reading</h1>
  <p class="article-byline">by Eleanor Marsh · March 2026</p>
</header>

<p class="article-lede">There is a particular quality of attention that long-form reading demands — a patience the eye must relearn each time we return to it, like coming home to a house that has rearranged its furniture in our absence.</p>

<p class="drop-cap">The column has always been the natural unit of reading. Before the infinite scroll and the boundless page, before even the codex, scribes understood that the human eye moves most comfortably across a measure of roughly sixty characters. This is not an aesthetic preference but a fact of physiology: the fovea, our region of sharpest focus, subtends only a few degrees. We do not read across a page so much as across a field of attention.</p>

<p>Yet somewhere in the transition from print to screen, we abandoned this wisdom. We gave readers horizontal stretches of text that exhausted the eye and fractured the sentence. The modern web article, with its single-column expanse filling a 1440-pixel monitor, would be unreadable in print — and so, quite often, it is unread.</p>

<h2>The Measure</h2>

<p>Typographers have long called the optimal line length the <em>measure</em>. Robert Bringhurst, in <em>The Elements of Typographic Style</em>, places ideal prose at 45 to 75 characters. The original Penguin paperbacks ran to about 60. The columns of <em>The London Review of Books</em> — widely considered among the best-designed journals in English — sit at 65. These are not coincidences.</p>

<p>When a line exceeds 80 characters, the eye must work harder to find its return. It sweeps left, hunting for the start of the next line, and occasionally lands on the wrong one. The text becomes, quite literally, harder to follow. Comprehension drops. The reader, without knowing why, feels tired.</p>

<blockquote>
  <p>The best that can be said for the internet's infinite column is that it democratised publishing. The worst is that it forgot everything typography had learned in five hundred years.</p>
  <cite>— Robin Sloan, in conversation</cite>
</blockquote>

<p>Short lines create a different problem. Below 45 characters, the eye returns too frequently, disrupting the rhythmic scanning that allows fast reading. Sentences that spread comfortably across a longer measure become staccato and breathless when forced into a narrow column. Poetry belongs in short measures; prose does not.</p>

<h2>Pagination and Flow</h2>

<p>The page, unlike the scroll, imposes a contract. When a reader reaches the bottom of a page and turns it, something cognitive happens: a small act of completion, a breath between clauses. This is not mere sentiment. Studies of reading behaviour consistently show better retention when text is consumed in finite, bounded chunks than when it scrolls continuously.</p>

<figure class="pull-quote">
  <p>"The scroll is optimised for the producer's convenience. The page is optimised for the reader's comprehension."</p>
</figure>

<p>This may explain the success of e-readers. The Kindle's paginated interface — despite delivering content through the same glass screen as Twitter or Gmail — produces measurably different reading behaviour. Users slow down. Rereading rates increase. Readers report higher confidence in their grasp of material.</p>

<p>The mechanism is probably attentional. Continuous scroll signals an environment of abundance where skim-reading is rewarded. Pagination signals a bounded space where depth is possible. The form shapes the expectation, and the expectation shapes the attention.</p>

<h2>Multi-Column on Screen</h2>

<p>CSS multi-column layout has existed since 2001, yet it remains conspicuously underused. The reasons are partly historical: early implementations were buggy, and horizontal scrolling felt alien on mouse-driven interfaces. Touch has changed that calculation. A finger swipe is as natural as a page turn; the left-right axis is no longer strange.</p>

<p>But there is a deeper resistance. Designers trained on scroll-based interfaces treat the horizontal axis as navigation — links, carousels, product rows. To give the horizontal axis to prose is to repurpose it for a slower, more demanding use. It requires a different kind of trust from the reader.</p>

<blockquote>
  <p>We have spent twenty years teaching people that horizontal movement means navigation, not reading. Unlearning that association takes more than a gesture — it takes a frame that prepares the reader for depth rather than browsing.</p>
  <cite>— from a design journal, 2024</cite>
</blockquote>

<p>When it works — and it does work — the effect is disorienting in the best possible way. The text feels substantial. Each page has weight. The reader does not sense the bottom approaching with dread, but turns to a fresh column with something like anticipation.</p>

<h2>Technical Considerations</h2>

<p>The CSS <code>columns</code> property is remarkably simple at its core: specify a column width, and the browser calculates how many fit. Set <code>column-fill: auto</code> on a fixed-height container, and the browser fills each column to capacity before beginning the next. Overflow flows horizontally.</p>

<p>The subtleties accumulate quickly. <code>break-inside: avoid</code> prevents pull-quotes and block elements from fracturing across columns. <code>orphans</code> and <code>widows</code> control lone lines at column boundaries. The outstanding problem is measurement: to display a reliable page indicator requires knowing the total scrollable width divided by the viewport width — a calculation that must be defended against resize and orientation change events.</p>

<p>Font size changes force a full recalculation: more text fits per column, changing total page count. The ResizeObserver API, watching the fixed book container, is the correct hook — it fires on orientation change and mobile toolbar show/hide, both of which alter available height without triggering a classic window resize event.</p>

<h2>What Remains</h2>

<p>The question is not whether multi-column layouts are technically feasible — they clearly are — but whether readers will follow. This is, ultimately, a question about habituation. The long-form internet has trained a generation of readers for scroll and skim; the column reader asks them to sit.</p>

<p>There is cause for optimism. Substack, newsletters, e-readers, even the return of long-form magazines in digital formats — all point to a hunger for slower reading experiences. The audience exists. What has been missing is the design vocabulary to meet them.</p>

<p>This page is a small experiment in that vocabulary. The column is its argument. The page turn is its hypothesis. Whether you reached the end by scrolling or by turning, the text is the same; only the quality of attention differs. That difference, if it exists, is the whole point.</p>
`;

const FONT_SIZES = [0.88, 0.96, 1, 1.08, 1.16, 1.24];

const root = document.documentElement;
const scroller = document.getElementById("scroller");
const pager = document.getElementById("pager");
const articleScroll = document.getElementById("article-scroll");
const articlePages = document.getElementById("article-pages");
const book = document.getElementById("book");
const progress = document.getElementById("progress");
const btnScroll = document.getElementById("btn-scroll");
const btnPages = document.getElementById("btn-pages");
const fontDown = document.getElementById("font-down");
const fontUp = document.getElementById("font-up");
const columnButtons = [...document.querySelectorAll("[data-cols]")];
const pageNav = document.getElementById("page-nav");
const prevBtn = document.getElementById("prev-page");
const nextBtn = document.getElementById("next-page");
const indicator = document.getElementById("page-indicator");
const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
const params = new URLSearchParams(window.location.search);

articleScroll.innerHTML = CONTENT;
articlePages.innerHTML = CONTENT;

let mode = "scroll";
let sizeIdx = 2;
let currentPage = 0;
let totalPages = 1;
let scrollSnapTimer = 0;
let programmaticScroll = false;
let columnMode = "auto";
let pageStops = [0];
let pendingInitialPage = null;

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function setViewportUnits() {
  const viewport = window.visualViewport;
  const height = Math.round(viewport ? viewport.height : window.innerHeight);
  const width = Math.round(viewport ? viewport.width : window.innerWidth);
  root.style.setProperty("--vvh", `${height}px`);
  root.style.setProperty("--page-width", `${Math.max(1, pager.clientWidth || width)}px`);
}

function getProgressRatio() {
  if (mode === "scroll") {
    const max = scroller.scrollHeight - scroller.clientHeight;
    return max > 0 ? scroller.scrollTop / max : 0;
  }

  const max = pager.scrollWidth - pager.clientWidth;
  return max > 0 ? pager.scrollLeft / max : 0;
}

function updateButtons() {
  fontDown.disabled = sizeIdx === 0;
  fontUp.disabled = sizeIdx === FONT_SIZES.length - 1;
}

function applyFontSize() {
  root.style.setProperty("--body-size", `${FONT_SIZES[sizeIdx]}rem`);
  updateButtons();
}

function resolveAutoColumns() {
  const width = pager.clientWidth || window.innerWidth;
  if (width >= 1680) {
    return 3;
  }
  if (width >= 960) {
    return 2;
  }
  return 1;
}

function applyColumns(nextMode) {
  columnMode = nextMode;
  const count = nextMode === "auto" ? resolveAutoColumns() : Number(nextMode);
  root.style.setProperty("--page-columns", String(count));
  columnButtons.forEach((button) => {
    button.classList.toggle("active", button.dataset.cols === nextMode);
  });
}

function updateScrollProgress() {
  if (mode !== "scroll") {
    return;
  }

  const max = scroller.scrollHeight - scroller.clientHeight;
  const ratio = max > 0 ? scroller.scrollTop / max : 1;
  progress.style.inlineSize = `${ratio * 100}%`;
}

function updatePageHUD() {
  indicator.textContent = `${currentPage + 1} / ${totalPages}`;
  prevBtn.disabled = currentPage === 0;
  nextBtn.disabled = currentPage === totalPages - 1;
  const ratio = totalPages > 1 ? currentPage / (totalPages - 1) : 1;
  progress.style.inlineSize = `${ratio * 100}%`;
}

function scrollToPage(page, smooth = true) {
  currentPage = clamp(page, 0, totalPages - 1);
  const left = pageStops[currentPage] ?? 0;
  programmaticScroll = true;
  pager.scrollTo({
    left,
    behavior: smooth && !reducedMotion.matches ? "smooth" : "auto"
  });
  updatePageHUD();
  window.setTimeout(() => {
    programmaticScroll = false;
  }, smooth && !reducedMotion.matches ? 220 : 0);
}

function findNearestPage(left) {
  let nearestIndex = 0;
  let nearestDistance = Infinity;

  pageStops.forEach((stop, index) => {
    const distance = Math.abs(stop - left);
    if (distance < nearestDistance) {
      nearestDistance = distance;
      nearestIndex = index;
    }
  });

  return nearestIndex;
}

function relayoutPages(anchorRatio = getProgressRatio()) {
  if (mode !== "pages") {
    return;
  }

  setViewportUnits();
  applyColumns(columnMode);

  window.requestAnimationFrame(() => {
    const width = pager.clientWidth || 1;
    const scrollWidth = pager.scrollWidth;
    const maxScroll = Math.max(0, scrollWidth - width);
    const rawPages = scrollWidth / width;
    const estimatedPages = Math.max(1, Math.ceil(rawPages - 0.01));

    pageStops = [];
    for (let page = 0; page < estimatedPages; page += 1) {
      const stop = page === estimatedPages - 1 ? maxScroll : Math.min(page * width, maxScroll);
      if (!pageStops.length || stop - pageStops[pageStops.length - 1] > 1) {
        pageStops.push(stop);
      }
    }

    totalPages = Math.max(1, pageStops.length);
    if (pendingInitialPage !== null) {
      currentPage = clamp(pendingInitialPage, 0, totalPages - 1);
      pendingInitialPage = null;
    } else {
      currentPage = totalPages > 1
        ? clamp(Math.round(anchorRatio * (totalPages - 1)), 0, totalPages - 1)
        : 0;
    }
    scrollToPage(currentPage, false);
  });
}

function setMode(nextMode) {
  const anchorRatio = getProgressRatio();
  mode = nextMode;

  const isPages = mode === "pages";
  btnScroll.classList.toggle("active", !isPages);
  btnPages.classList.toggle("active", isPages);
  scroller.style.display = isPages ? "none" : "block";
  pager.style.display = isPages ? "block" : "none";
  pageNav.style.display = isPages ? "flex" : "none";

  if (isPages) {
    relayoutPages(anchorRatio);
    return;
  }

  setViewportUnits();
  window.requestAnimationFrame(() => {
    const max = scroller.scrollHeight - scroller.clientHeight;
    scroller.scrollTop = max > 0 ? anchorRatio * max : 0;
    updateScrollProgress();
  });
}

fontDown.addEventListener("click", () => {
  if (sizeIdx === 0) {
    return;
  }

  sizeIdx -= 1;
  const anchorRatio = getProgressRatio();
  applyFontSize();
  if (mode === "pages") {
    relayoutPages(anchorRatio);
  }
});

fontUp.addEventListener("click", () => {
  if (sizeIdx === FONT_SIZES.length - 1) {
    return;
  }

  sizeIdx += 1;
  const anchorRatio = getProgressRatio();
  applyFontSize();
  if (mode === "pages") {
    relayoutPages(anchorRatio);
  }
});

columnButtons.forEach((button) => {
  button.addEventListener("click", () => {
    const anchorRatio = getProgressRatio();
    applyColumns(button.dataset.cols);
    if (mode === "pages") {
      relayoutPages(anchorRatio);
    }
  });
});

btnScroll.addEventListener("click", () => setMode("scroll"));
btnPages.addEventListener("click", () => setMode("pages"));

prevBtn.addEventListener("click", () => scrollToPage(currentPage - 1));
nextBtn.addEventListener("click", () => scrollToPage(currentPage + 1));

scroller.addEventListener("scroll", updateScrollProgress, { passive: true });

pager.addEventListener("scroll", () => {
  if (mode !== "pages") {
    return;
  }

  const width = pager.clientWidth || 1;
  const nextPage = findNearestPage(pager.scrollLeft);
  if (nextPage !== currentPage) {
    currentPage = nextPage;
    updatePageHUD();
  }

  if (programmaticScroll) {
    return;
  }

  window.clearTimeout(scrollSnapTimer);
  scrollSnapTimer = window.setTimeout(() => {
    scrollToPage(findNearestPage(pager.scrollLeft), false);
  }, 90);
}, { passive: true });

document.addEventListener("keydown", (event) => {
  if (mode !== "pages") {
    return;
  }

  if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") {
    event.preventDefault();
    scrollToPage(currentPage + 1);
  }

  if (event.key === "ArrowLeft" || event.key === "PageUp") {
    event.preventDefault();
    scrollToPage(currentPage - 1);
  }

  if (event.key === "Home") {
    event.preventDefault();
    scrollToPage(0, false);
  }

  if (event.key === "End") {
    event.preventDefault();
    scrollToPage(totalPages - 1, false);
  }
});

const resizeObserver = new ResizeObserver(() => {
  if (mode === "pages") {
    relayoutPages(getProgressRatio());
  } else {
    setViewportUnits();
    updateScrollProgress();
  }
});

resizeObserver.observe(book);

window.addEventListener("resize", setViewportUnits);

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", setViewportUnits);
  window.visualViewport.addEventListener("scroll", setViewportUnits);
}

const initialColumns = columnButtons.some((button) => button.dataset.cols === params.get("cols"))
  ? params.get("cols")
  : "auto";
const initialMode = params.get("mode") === "pages" ? "pages" : "scroll";
const requestedPage = Number.parseInt(params.get("page") || "", 10);

if (Number.isFinite(requestedPage) && requestedPage > 0) {
  pendingInitialPage = requestedPage - 1;
}

applyFontSize();
applyColumns(initialColumns);
setViewportUnits();
setMode(initialMode);
</script>
</body>
</html>
