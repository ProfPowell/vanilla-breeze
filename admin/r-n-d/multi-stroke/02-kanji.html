<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>02 — Kanji Multi-stroke 愛・秋收冬藏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&family=DotGothic16&display=swap"
      rel="stylesheet">
<style>
  /*
    Same multi-stroke technique, but the visual character of the result
    depends entirely on the font/glyph. Heavy serif kanji get a chunky,
    woodblock-poster vibe; rounded display fonts feel kawaii.
  */

  body {
    margin: 0; min-height: 100vh;
    background: #fdf6e3;
    display: grid;
    grid-template-columns: 1fr 1fr;
    place-items: center;
    gap: 2rem;
    padding: 2rem;
    font-family: system-ui, sans-serif;
  }

  .stack { display: inline-grid; }
  .stack > * { grid-area: 1 / 1; color: transparent; }

  /* === Single big kanji 愛 (ai = love) === */
  .ai {
    font: 900 clamp(8rem, 28vmin, 22rem)/1 "Noto Serif JP", serif;
  }
  .ai > :last-child { color: #c8222b; }

  /* === Vertical seasonal phrase 秋收冬藏 === */
  .vertical {
    font: 400 clamp(3rem, 8vmin, 6rem)/1 "DotGothic16", "Noto Serif JP", sans-serif;
    writing-mode: vertical-rl;
    text-orientation: upright;
  }
  .vertical > :last-child { color: #1a1a1a; }
</style>
</head>
<body>

  <div class="stack ai">
    <span style="-webkit-text-stroke: 26px #c8222b">愛</span>
    <span style="-webkit-text-stroke: 22px #fdf6e3">愛</span>
    <span style="-webkit-text-stroke: 18px #c8222b">愛</span>
    <span style="-webkit-text-stroke: 14px #fdf6e3">愛</span>
    <span style="-webkit-text-stroke: 10px #c8222b">愛</span>
    <span style="-webkit-text-stroke:  6px #fdf6e3">愛</span>
    <span style="-webkit-text-stroke:  3px #c8222b">愛</span>
    <span>愛</span>
  </div>

  <div class="stack vertical">
    <span style="-webkit-text-stroke: 14px #1a1a1a">秋收冬藏</span>
    <span style="-webkit-text-stroke: 11px #fdf6e3">秋收冬藏</span>
    <span style="-webkit-text-stroke:  8px #1a1a1a">秋收冬藏</span>
    <span style="-webkit-text-stroke:  5px #fdf6e3">秋收冬藏</span>
    <span style="-webkit-text-stroke:  2px #1a1a1a">秋收冬藏</span>
    <span>秋收冬藏</span>
  </div>

</body>
</html>
